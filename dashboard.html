<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Creator Dashboard • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#05070c;
color:white;
display:flex;
min-height:100vh;
}

/* sidebar */

.sidebar{
width:250px;
background:#0b0f1c;
border-right:1px solid rgba(255,255,255,.06);
padding:30px;
}

.logo{
font-weight:900;
font-size:20px;
margin-bottom:40px;
}

.logo span{
color:#4da3ff;
}

.nav{
display:flex;
flex-direction:column;
gap:12px;
}

.nav a{
text-decoration:none;
color:white;
padding:12px;
border-radius:10px;
font-size:14px;
opacity:.8;
}

.nav a:hover{
background:#141a2c;
}

/* main */

.main{
flex:1;
padding:40px;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(135deg,#4da3ff,#6cf2c2);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

/* hero */

.hero{
background:#0f1426;
padding:30px;
border-radius:16px;
margin-bottom:35px;
}

.hero h2{
margin-bottom:6px;
}

/* stats */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:35px;
}

.card{
background:#0f1426;
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,.05);
}

.cardLabel{
font-size:13px;
opacity:.6;
}

.cardValue{
font-size:28px;
font-weight:900;
margin-top:8px;
}

/* monetize */

.monetizeBox{
background:#0f1426;
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,.05);
margin-bottom:35px;
}

.monetizeBtn{
margin-top:12px;
padding:12px 18px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
}

/* activity */

.activity{
background:#0f1426;
padding:25px;
border-radius:16px;
}

.activityItem{
font-size:13px;
margin-bottom:10px;
opacity:.85;
}

/* staff panel */

.staffPanel{
margin-top:35px;
padding:25px;
border-radius:16px;
background:#2b2100;
border:1px solid gold;
display:none;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
StudentStream<span>HQ</span>
</div>

<div class="nav">
<a href="#">Overview</a>
<a href="/blue-system.html">Blue System</a>
<a href="/settings.html">Settings</a>
</div>

</div>

<div class="main">

<div class="header">

<h2>Creator Dashboard</h2>

<div class="avatar" id="avatar">?</div>

</div>

<div class="hero">
<h2>Welcome, <span id="username">Creator</span></h2>
<p>Your Rank: <strong id="creatorRank">Loading...</strong></p>
</div>

<div class="stats">

<div class="card">
<div class="cardLabel">Total Earnings</div>
<div class="cardValue" id="earningsTotal">$0</div>
</div>

<div class="card">
<div class="cardLabel">Monthly Revenue</div>
<div class="cardValue" id="monthlyRevenue">$0</div>
</div>

<div class="card">
<div class="cardLabel">Monetization</div>
<div class="cardValue" id="monetizationStatus">Checking...</div>
</div>

</div>

<div class="monetizeBox" id="monetizeBox">
<h3>Monetization</h3>
<p id="monetizeText">Checking your monetization status...</p>
<button class="monetizeBtn" id="applyBtn" style="display:none">
Apply for Monetization
</button>
</div>

<div class="activity">
<h3>Activity</h3>
<div id="activityFeed">Loading...</div>
</div>

<div class="staffPanel" id="staffPanel">
<h3>Executive Panel</h3>
<p>Administrative access enabled.</p>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

async function loadDashboard(){

const {data:{session}}=await supabase.auth.getSession()

if(!session){
location.href="/login.html"
return
}

const user=session.user

/* profile */

const {data:profile}=await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

document.getElementById("username").textContent=profile.username
document.getElementById("creatorRank").textContent=profile.rank || "New Creator"
document.getElementById("avatar").textContent=profile.username.charAt(0)

/* staff */

if(["owner","admin"].includes(profile.role)){
document.getElementById("staffPanel").style.display="block"
}

/* earnings */

const {data:earnings}=await supabase
.from("creator_earnings")
.select("*")
.eq("creator_id",user.id)
.single()

if(earnings){

const total=earnings.total_boost_earnings || 0

document.getElementById("earningsTotal").textContent="$"+total.toFixed(2)
document.getElementById("monthlyRevenue").textContent="$"+(total/6).toFixed(0)

}

/* monetization */

if(profile.monetized){

document.getElementById("monetizationStatus").textContent="Active"
document.getElementById("monetizeText").textContent="Your account is monetized."

}else{

document.getElementById("monetizationStatus").textContent="Not Monetized"
document.getElementById("monetizeText").textContent=
"You are not monetized yet. Apply to start earning."

document.getElementById("applyBtn").style.display="inline-block"

}

/* activity */

const {data:activity}=await supabase
.from("activity_log")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})
.limit(6)

const feed=document.getElementById("activityFeed")

feed.innerHTML=""

activity?.forEach(a=>{

const div=document.createElement("div")
div.className="activityItem"
div.textContent=a.description
feed.appendChild(div)

})

}

loadDashboard()

</script>

</body>
</html>
