<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Dashboard • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui;}

body{
background:#04060f;
color:white;
overflow-x:hidden;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#060913;
border-right:1px solid rgba(255,255,255,.05);
padding:25px 18px;
display:flex;
flex-direction:column;
gap:25px;
position:fixed;
top:0;
bottom:0;
left:0;
}

.logo{
font-weight:900;
font-size:18px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.navItem{
padding:10px;
border-radius:8px;
cursor:pointer;
opacity:.7;
}

.navItem:hover{
background:rgba(255,255,255,.06);
opacity:1;
}

/* MAIN */

.main{
margin-left:230px;
width:100%;
}

/* TOP */

.top{
padding:25px 35px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.06);
}

.userBox{
font-size:14px;
opacity:.8;
}

/* WRAP */

.wrapper{
max-width:1100px;
margin:auto;
padding:30px;
}

/* HEADER */

.header h1{
font-size:28px;
}

.rank{
margin-top:6px;
opacity:.7;
}

/* STATS */

.stats{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-top:25px;
}

.card{
flex:1;
min-width:200px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.07);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#6cf2c2;
}

.label{
font-size:13px;
opacity:.6;
}

.value{
font-size:26px;
font-weight:900;
margin-top:6px;
}

/* SECTION */

.section{
margin-top:40px;
}

.section h2{
margin-bottom:15px;
}

/* CONTENT */

.contentItem{
display:flex;
justify-content:space-between;
background:#0b0f1c;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.contentItem:hover{
background:#121933;
}

/* EARNINGS */

.earning{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

/* SETTINGS PANEL */

.settings{
display:none;
margin-top:20px;
padding:20px;
background:#0b0f1c;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
background:#11172a;
color:white;
}

button{
margin-top:12px;
padding:10px 15px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
cursor:pointer;
font-weight:700;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">SSHQ</div>

<div class="navItem" onclick="showSection('dashboard')">Dashboard</div>
<div class="navItem" onclick="showSection('content')">Content</div>
<div class="navItem" onclick="showSection('earnings')">Earnings</div>
<div class="navItem" onclick="showSection('settings')">Settings</div>

<div class="navItem" onclick="logout()">Logout</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="top">
<div class="userBox" id="userBox">Loading...</div>
</div>

<div class="wrapper">

<!-- HEADER -->

<div class="header">
<h1 id="welcome">Welcome</h1>
<div class="rank" id="rank">Rank: —</div>
</div>

<!-- STATS -->

<div class="stats">

<div class="card">
<div class="label">Total Earnings</div>
<div class="value" id="total">$0</div>
</div>

<div class="card">
<div class="label">Pending</div>
<div class="value" id="pending">$0</div>
</div>

<div class="card">
<div class="label">Plan</div>
<div class="value" id="plan">FREE</div>
</div>

<div class="card">
<div class="label">Monetization</div>
<div class="value" id="monetization">NONE</div>
</div>

</div>

<!-- CONTENT -->

<div class="section" id="contentSection">

<h2>Your Content</h2>
<div id="contentList"></div>

</div>

<!-- EARNINGS -->

<div class="section" id="earningsSection">

<h2>Recent Earnings</h2>
<div id="earningsList"></div>

</div>

<!-- SETTINGS -->

<div class="settings" id="settingsSection">

<h2>Account Settings</h2>

<input id="usernameInput" placeholder="Username">
<input id="displayInput" placeholder="Display Name">

<button onclick="saveSettings()">Save Changes</button>

</div>

</div>

</div>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

let user=null

const welcome=document.getElementById("welcome")
const userBox=document.getElementById("userBox")
const rank=document.getElementById("rank")

const total=document.getElementById("total")
const pending=document.getElementById("pending")
const plan=document.getElementById("plan")
const monetization=document.getElementById("monetization")

const contentList=document.getElementById("contentList")
const earningsList=document.getElementById("earningsList")

/* INIT */

async function init(){

const { data } = await supabase.auth.getUser()
user=data.user

if(!user){
location.href="/login.html"
return
}

userBox.textContent=user.email

loadProfile()
loadContent()
loadEarnings()

}

/* PROFILE */

async function loadProfile(){

const { data } = await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

welcome.textContent="Welcome, "+(data.username || "Creator")

plan.textContent=data.plan.toUpperCase()
monetization.textContent=data.monetization_status.toUpperCase()

total.textContent="$"+data.total_earnings
pending.textContent="$"+data.pending_earnings

/* RANK LOGIC */
let r="New Creator"
if(data.total_earnings>100) r="Rising Creator"
if(data.total_earnings>500) r="Top Creator"
rank.textContent="Rank: "+r

}

/* CONTENT */

async function loadContent(){

const { data } = await supabase
.from("content")
.select("*")
.eq("user_id",user.id)

contentList.innerHTML=""

data.forEach(item=>{

const div=document.createElement("div")
div.className="contentItem"

div.innerHTML=`
<div>${item.title}</div>
<button onclick="play('${item.video_url}')">Play</button>
`

contentList.appendChild(div)

})

}

/* EARNINGS */

async function loadEarnings(){

const { data } = await supabase
.from("earnings")
.select("*")
.eq("user_id",user.id)
.limit(10)

earningsList.innerHTML=""

data.forEach(e=>{

const div=document.createElement("div")
div.className="earning"

div.innerHTML=`
<div>${e.source}</div>
<div>+$${e.final_amount}</div>
`

earningsList.appendChild(div)

})

}

/* SETTINGS */

window.saveSettings=async ()=>{

const username=document.getElementById("usernameInput").value
const display=document.getElementById("displayInput").value

await supabase.from("profiles").update({
username:username,
display_name:display
}).eq("id",user.id)

alert("Saved")

}

/* NAV SWITCH */

window.showSection=(section)=>{

document.getElementById("contentSection").style.display="none"
document.getElementById("earningsSection").style.display="none"
document.getElementById("settingsSection").style.display="none"

if(section==="content"){
document.getElementById("contentSection").style.display="block"
}

if(section==="earnings"){
document.getElementById("earningsSection").style.display="block"
}

if(section==="settings"){
document.getElementById("settingsSection").style.display="block"
}

}

/* PLAY */
window.play=(url)=>window.open(url)

/* LOGOUT */
window.logout=async ()=>{
await supabase.auth.signOut()
location.href="/login.html"
}

init()

</script>

</body>
</html>
