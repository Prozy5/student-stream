<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Dashboard • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#04060f;
color:white;
overflow-x:hidden;
}

/* BACKGROUND GLOW */

.glow1,.glow2{
position:fixed;
width:800px;
height:800px;
filter:blur(120px);
z-index:-1;
}

.glow1{
background:#4da3ff33;
top:-200px;
left:-200px;
}

.glow2{
background:#6cf2c233;
bottom:-200px;
right:-200px;
}

/* NAV */

.nav{
padding:20px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.08);
background:rgba(0,0,0,.4);
backdrop-filter:blur(12px);
position:sticky;
top:0;
}

.logo{
font-weight:900;
font-size:20px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* WRAP */

.wrapper{
max-width:1200px;
margin:auto;
padding:40px 20px 100px;
}

/* STATS */

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

.card{
flex:1;
min-width:220px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#6cf2c2;
}

.card h3{
font-size:14px;
opacity:.7;
}

.value{
font-size:28px;
font-weight:900;
margin-top:10px;
}

/* SECTION */

.section{
margin-top:50px;
}

.section h2{
margin-bottom:20px;
}

/* CONTENT */

.contentItem{
display:flex;
justify-content:space-between;
align-items:center;
background:#0b0f1c;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.contentItem:hover{
background:#11172a;
}

/* EARNINGS */

.earning{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

/* BUTTON */

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<!-- NAV -->

<div class="nav">
<div class="logo">StudentStreamHQ</div>
<button onclick="logout()">Logout</button>
</div>

<div class="wrapper">

<!-- STATS -->

<div class="stats">

<div class="card">
<h3>Total Earnings</h3>
<div class="value" id="total">$0</div>
</div>

<div class="card">
<h3>Pending</h3>
<div class="value" id="pending">$0</div>
</div>

<div class="card">
<h3>Plan</h3>
<div class="value" id="plan">Free</div>
</div>

<div class="card">
<h3>Monetization</h3>
<div class="value" id="monetization">None</div>
</div>

</div>


<!-- CONTENT -->

<div class="section">

<h2>Your Content</h2>

<div id="contentList"></div>

</div>


<!-- EARNINGS -->

<div class="section">

<h2>Recent Earnings</h2>

<div id="earningsList"></div>

</div>

</div>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const total=document.getElementById("total")
const pending=document.getElementById("pending")
const plan=document.getElementById("plan")
const monetization=document.getElementById("monetization")
const contentList=document.getElementById("contentList")
const earningsList=document.getElementById("earningsList")

let user=null

/* INIT */

async function init(){

const { data } = await supabase.auth.getUser()

user=data.user

if(!user){
window.location.href="/login.html"
return
}

loadProfile()
loadContent()
loadEarnings()

}

/* PROFILE */

async function loadProfile(){

const { data } = await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

total.textContent="$"+Number(data.total_earnings).toFixed(2)
pending.textContent="$"+Number(data.pending_earnings).toFixed(2)

plan.textContent=data.plan.toUpperCase()

monetization.textContent=data.monetization_status.toUpperCase()

}

/* CONTENT */

async function loadContent(){

const { data } = await supabase
.from("content")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})

contentList.innerHTML=""

data.forEach(item=>{

const div=document.createElement("div")
div.className="contentItem"

div.innerHTML=`
<div>
<div>${item.title}</div>
<div style="opacity:.6;font-size:13px">${item.views} views</div>
</div>
<button onclick="play('${item.video_url}')">Play</button>
`

contentList.appendChild(div)

})

}

/* EARNINGS */

async function loadEarnings(){

const { data } = await supabase
.from("earnings")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false})
.limit(10)

earningsList.innerHTML=""

data.forEach(e=>{

const div=document.createElement("div")
div.className="earning"

div.innerHTML=`
<div>${e.source}</div>
<div>+$${Number(e.final_amount).toFixed(2)}</div>
`

earningsList.appendChild(div)

})

}

/* PLAY */

window.play=(url)=>{
window.open(url)
}

/* LOGOUT */

window.logout=async ()=>{
await supabase.auth.signOut()
window.location.href="/login.html"
}

init()

</script>

</body>
</html>
