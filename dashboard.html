<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudentStreamHQ Creator Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar a{
display:block;
margin:15px 0;
color:white;
text-decoration:none;
}

.main{
margin-left:240px;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

button{
background:#38bdf8;
border:none;
padding:12px 20px;
border-radius:8px;
color:black;
font-weight:bold;
cursor:pointer;
}

.activity{
margin-top:20px;
}

.activity-item{
background:#020617;
padding:10px;
margin:5px 0;
border-radius:6px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>StudentStreamHQ</h2>

<a href="#">Overview</a>
<a href="#">Blue System</a>
<a href="#">Settings</a>

<button onclick="logout()">Logout</button>
</div>


<div class="main">

<h1>Creator Dashboard</h1>

<div class="card">
<h2 id="welcome">Welcome...</h2>
<p id="rank">Rank: Loading...</p>
<p id="monetized">Monetization: Checking...</p>
</div>

<div class="grid">

<div class="card">
<h3>Total Earnings</h3>
<h1 id="total">$0</h1>
</div>

<div class="card">
<h3>Monthly Revenue</h3>
<h1 id="monthly">$0</h1>
</div>

<div class="card">
<h3>Monetization</h3>
<button onclick="applyMonetization()">Apply</button>
</div>

</div>

<div class="card activity">
<h3>Activity</h3>
<div id="activityLog"></div>
</div>

</div>


<script>

const supabase = window.supabase.createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);


async function loadDashboard(){

const {data:{user}} = await supabase.auth.getUser()

if(!user){
window.location.href="login.html"
return
}


const userId = user.id


/* PROFILE */

let {data:profile} = await supabase
.from("profiles")
.select("*")
.eq("id",userId)
.single()

document.getElementById("welcome").innerText =
"Welcome, "+(profile.username || "Creator")

document.getElementById("rank").innerText =
"Rank: "+profile.rank

document.getElementById("monetized").innerText =
profile.monetized ? "Monetized" : "Not Monetized"


/* EARNINGS */

let {data:earnings} = await supabase
.from("creator_earnings")
.select("*")
.eq("creator_id",userId)
.single()

if(earnings){

document.getElementById("total").innerText =
"$"+earnings.total_earnings

document.getElementById("monthly").innerText =
"$"+earnings.monthly_revenue

}


/* ACTIVITY */

let {data:activity} = await supabase
.from("activity_log")
.select("*")
.eq("user_id",userId)
.order("created_at",{ascending:false})
.limit(10)

const log = document.getElementById("activityLog")
log.innerHTML=""

activity.forEach(a=>{

let div=document.createElement("div")
div.className="activity-item"

div.innerText=a.description

log.appendChild(div)

})


}



/* APPLY FOR MONETIZATION */

async function applyMonetization(){

const {data:{user}} = await supabase.auth.getUser()

await supabase
.from("monetization_applications")
.insert({
creator_id:user.id
})


alert("Application submitted!")

}



/* LOGOUT */

async function logout(){

await supabase.auth.signOut()

window.location.href="login.html"

}


loadDashboard()

</script>

</body>
</html>
