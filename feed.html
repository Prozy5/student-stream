<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Feed • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui;}

body{
background:#04060f;
color:white;
display:flex;
}

/* SIDES */

.feedWrap{
flex:2;
max-width:700px;
margin:auto;
padding:90px 20px;
}

.side{
flex:1;
border-left:1px solid rgba(255,255,255,.06);
padding:20px;
}

/* TOP */

.top{
position:fixed;
top:0;
width:100%;
padding:15px 20px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
z-index:10;
}

/* POST */

.postBox{
background:rgba(255,255,255,.05);
padding:15px;
border-radius:14px;
margin-bottom:20px;
}

textarea{
width:100%;
background:none;
border:none;
color:white;
outline:none;
}

button{
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

/* FEED ITEM */

.feedItem{
background:rgba(255,255,255,.05);
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

.meta{
font-size:12px;
opacity:.7;
margin-bottom:8px;
}

.actions{
margin-top:10px;
display:flex;
gap:15px;
font-size:14px;
cursor:pointer;
}

/* COMMENTS */

.comments{
margin-top:10px;
}

.comment{
font-size:13px;
opacity:.8;
margin-top:5px;
}

/* MESSAGE PANEL */

.chatBox{
position:fixed;
right:20px;
bottom:20px;
width:300px;
background:#0b0f1c;
border-radius:14px;
padding:10px;
display:none;
}

.chatMessages{
height:200px;
overflow-y:auto;
font-size:13px;
margin-bottom:10px;
}

.chatInput{
width:100%;
padding:8px;
border:none;
background:#11172a;
color:white;
}

</style>
</head>

<body>

<div class="top">
<div>StudentStreamHQ</div>
<button onclick="logout()">Logout</button>
</div>

<div class="feedWrap">

<div class="postBox">
<textarea id="postText" placeholder="Share something..."></textarea>
<button onclick="createPost()">Post</button>
</div>

<div id="feed"></div>

</div>

<!-- MESSAGES SIDE -->

<div class="side">

<h3>Messages</h3>
<div id="users"></div>

</div>

<!-- CHAT BOX -->

<div class="chatBox" id="chatBox">

<div class="chatMessages" id="chatMessages"></div>

<input class="chatInput" id="chatInput" placeholder="Message..." onkeydown="sendMsg(event)">

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

let user=null
let currentChat=null

const feed=document.getElementById("feed")

/* INIT */

async function init(){
const { data } = await supabase.auth.getUser()
user=data.user
if(!user) location.href="/login.html"

loadFeed()
loadUsers()
subscribeRealtime()
}

/* FEED */

async function loadFeed(){

const { data } = await supabase
.from("feed")
.select("*, profiles(username)")
.order("created_at",{ascending:false})

feed.innerHTML=""

for(let item of data){

const div=document.createElement("div")
div.className="feedItem"

div.innerHTML=`
<div class="meta">${item.profiles?.username} • ${new Date(item.created_at).toLocaleTimeString()}</div>
<div>${item.text || ""}</div>

<div class="actions">
<span onclick="like('${item.id}')">❤️</span>
<span onclick="toggleComments('${item.id}')">💬</span>
</div>

<div id="comments-${item.id}" class="comments"></div>
`

feed.appendChild(div)
}

}

/* POST */

window.createPost=async ()=>{
const text=document.getElementById("postText").value
await supabase.from("feed").insert({
user_id:user.id,
type:"post",
text:text
})
}

/* LIKE */

window.like=async (id)=>{
await supabase.from("likes").insert({
user_id:user.id,
feed_id:id
})
}

/* COMMENTS */

window.toggleComments=async (id)=>{

const box=document.getElementById("comments-"+id)

const { data } = await supabase
.from("comments")
.select("*, profiles(username)")
.eq("feed_id",id)

box.innerHTML=""

data.forEach(c=>{
box.innerHTML+=`<div class="comment">${c.profiles.username}: ${c.text}</div>`
})

box.innerHTML+=`
<input placeholder="Comment..." onkeydown="addComment(event,'${id}')">
`
}

window.addComment=async (e,id)=>{
if(e.key==="Enter"){
await supabase.from("comments").insert({
user_id:user.id,
feed_id:id,
text:e.target.value
})
e.target.value=""
}
}

/* REALTIME */

function subscribeRealtime(){

supabase.channel("feed")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"feed"},
()=>loadFeed()
).subscribe()

}

/* USERS */

async function loadUsers(){

const { data } = await supabase.from("profiles").select("*")

const box=document.getElementById("users")

data.forEach(u=>{
const div=document.createElement("div")
div.innerText=u.username
div.onclick=()=>openChat(u.id)
box.appendChild(div)
})

}

/* CHAT */

window.openChat=async (id)=>{
currentChat=id
document.getElementById("chatBox").style.display="block"
loadMessages()
}

async function loadMessages(){

const { data } = await supabase
.from("messages")
.select("*")
.or(`sender.eq.${user.id},receiver.eq.${user.id}`)

const box=document.getElementById("chatMessages")
box.innerHTML=""

data.forEach(m=>{
box.innerHTML+=`<div>${m.text}</div>`
})

}

window.sendMsg=async (e)=>{
if(e.key==="Enter"){
await supabase.from("messages").insert({
sender:user.id,
receiver:currentChat,
text:e.target.value
})
e.target.value=""
loadMessages()
}
}

/* LOGOUT */

window.logout=async ()=>{
await supabase.auth.signOut()
location.href="/login.html"
}

init()

</script>

</body>
</html>
