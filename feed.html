<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Feed • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui;}

body{
background:#04060f;
color:white;
overflow-x:hidden;
}

/* TOP BAR */

.top{
position:fixed;
top:0;
width:100%;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:10;
}

.logo{
font-weight:900;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top button{
padding:8px 14px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
cursor:pointer;
}

/* WRAP */

.wrap{
max-width:700px;
margin:auto;
padding:100px 20px 40px;
}

/* POST BOX */

.postBox{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:15px;
margin-bottom:25px;
}

textarea{
width:100%;
background:transparent;
border:none;
color:white;
resize:none;
font-size:15px;
outline:none;
}

.postActions{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.postActions input{
color:white;
}

.postActions button{
padding:8px 16px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
cursor:pointer;
}

/* FEED ITEM */

.feedItem{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:15px;
margin-bottom:15px;
transition:.3s;
}

.feedItem:hover{
background:rgba(255,255,255,.06);
}

/* HEADER */

.feedTop{
display:flex;
justify-content:space-between;
font-size:13px;
opacity:.7;
margin-bottom:8px;
}

/* CONTENT */

.feedText{
font-size:15px;
margin-bottom:10px;
}

/* IMAGE */

.feedMedia{
width:100%;
border-radius:12px;
margin-top:8px;
}

/* TYPE COLORS */

.type-post{border-left:3px solid #6cf2c2;}
.type-upload{border-left:3px solid #4da3ff;}
.type-earning{border-left:3px solid gold;}

</style>
</head>

<body>

<!-- TOP -->

<div class="top">
<div class="logo">StudentStreamHQ</div>
<button onclick="logout()">Logout</button>
</div>

<div class="wrap">

<!-- POST BOX -->

<div class="postBox">

<textarea id="postText" rows="3" placeholder="Share something..."></textarea>

<div class="postActions">
<input type="text" id="mediaUrl" placeholder="Optional image URL">
<button onclick="createPost()">Post</button>
</div>

</div>

<!-- FEED -->

<div id="feed"></div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const feed=document.getElementById("feed")

let user=null

/* INIT */

async function init(){

const { data } = await supabase.auth.getUser()
user=data.user

if(!user){
location.href="/login.html"
return
}

loadFeed()

}

/* LOAD FEED */

async function loadFeed(){

const { data } = await supabase
.from("feed")
.select("*, profiles(username)")
.order("created_at",{ascending:false})
.limit(50)

feed.innerHTML=""

data.forEach(item=>{

const div=document.createElement("div")

div.className="feedItem type-"+item.type

let content=""

/* USER POST */
if(item.type==="post"){
content=`
<div class="feedTop">
<div>${item.profiles?.username || "User"}</div>
<div>${formatTime(item.created_at)}</div>
</div>

<div class="feedText">${item.text || ""}</div>

${item.media_url ? `<img src="${item.media_url}" class="feedMedia">` : ""}
`
}

/* UPLOAD */
if(item.type==="upload"){
content=`
<div class="feedTop">
<div>🎬 ${item.profiles?.username}</div>
<div>${formatTime(item.created_at)}</div>
</div>

<div class="feedText">uploaded new content</div>
`
}

/* EARNING */
if(item.type==="earning"){
content=`
<div class="feedTop">
<div>💰 ${item.profiles?.username}</div>
<div>${formatTime(item.created_at)}</div>
</div>

<div class="feedText">earned $${item.amount}</div>
`
}

div.innerHTML=content

feed.appendChild(div)

})

}

/* CREATE POST */

window.createPost=async ()=>{

const text=document.getElementById("postText").value
const media=document.getElementById("mediaUrl").value

if(!text)return

await supabase.from("feed").insert({
user_id:user.id,
type:"post",
text:text,
media_url:media
})

document.getElementById("postText").value=""
document.getElementById("mediaUrl").value=""

loadFeed()

}

/* TIME FORMAT */

function formatTime(date){
const d=new Date(date)
return d.toLocaleString()
}

/* LOGOUT */

window.logout=async ()=>{
await supabase.auth.signOut()
location.href="/login.html"
}

init()

</script>

</body>
</html>
