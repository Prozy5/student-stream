<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed Trailer</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:black;
  color:white;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(.4);
}

/* OVERLAY TEXT */
.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:3rem;
  font-weight:900;
  text-align:center;
  opacity:0;
  transition:1s;
  padding:20px;
}

.active{
  opacity:1;
}

/* FINAL BUTTON */
.enterBtn{
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  padding:18px 40px;
  border:none;
  border-radius:999px;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  cursor:pointer;
  opacity:0;
  transition:1s;
}

.showBtn{
  opacity:1;
}
</style>
</head>

<body>

<!-- OPTIONAL VIDEO -->
<video autoplay muted loop>
  <source src="your-video.mp4" type="video/mp4">
</video>

<!-- SCENES -->
<div class="scene active" id="s1">You’re wasting food.</div>
<div class="scene" id="s2">You’re wasting money.</div>
<div class="scene" id="s3">You don’t need more groceries.</div>
<div class="scene" id="s4">You need better ideas.</div>
<div class="scene" id="s5">Introducing Cook’ed.</div>
<div class="scene" id="s6">Turn ingredients into real meals.</div>

<button class="enterBtn" id="enterBtn" onclick="enterApp()">Enter Cook’ed</button>

<script>
let current = 1;
const total = 6;

setInterval(()=>{
  document.getElementById("s"+current).classList.remove("active");
  current++;

  if(current <= total){
    document.getElementById("s"+current).classList.add("active");
  }

  if(current === total){
    setTimeout(()=>{
      document.getElementById("enterBtn").classList.add("showBtn");
    },1500);
  }

},2500);

function enterApp(){
  window.location.href = "index.html"; // your main page
}
</script>

</body>
</html>
