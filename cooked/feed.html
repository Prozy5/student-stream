<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cook’ed Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b0f14;
  --card:#121923;
  --accent:#4CAF50;
  --text:#ecf3ff;
  --muted:#9fb3c8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-weight:900;
  border-bottom:1px solid rgba(255,255,255,.1);
}

/* FEED */
.feed{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:15px;
}

/* POST */
.post{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

.post:hover{
  transform:scale(1.01);
}

/* VIDEO PLACEHOLDER */
.video{
  height:220px;
  background:linear-gradient(135deg,#1b5e20,#4CAF50);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

/* INFO */
.info{
  padding:12px;
}

.title{
  font-weight:800;
}

.meta{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalContent{
  background:#121923;
  padding:20px;
  border-radius:20px;
  max-width:400px;
  width:90%;
}

.close{
  float:right;
  cursor:pointer;
  font-size:18px;
}

.recipeTitle{
  font-weight:900;
  margin-bottom:10px;
}

.step{
  font-size:14px;
  margin-bottom:6px;
  color:var(--muted);
}

button{
  margin-top:12px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  font-weight:800;
  cursor:pointer;
}
</style>
</head>

<body>

<header>🍳 Cook’ed Feed</header>

<div class="feed">

  <div class="post" onclick="openRecipe('Egg Toast','Toast bread, cook egg, combine and serve.')">
    <div class="video">🍳</div>
    <div class="info">
      <div class="title">Quick Egg Toast</div>
      <div class="meta">5 min • Budget Meal</div>
    </div>
  </div>

  <div class="post" onclick="openRecipe('Cheesy Rice','Cook rice, add cheese, mix well.')">
    <div class="video">🧀</div>
    <div class="info">
      <div class="title">Cheesy Rice Bowl</div>
      <div class="meta">10 min • Easy</div>
    </div>
  </div>

  <div class="post" onclick="openRecipe('Ramen Upgrade','Cook ramen, add egg + seasoning.')">
    <div class="video">🍜</div>
    <div class="info">
      <div class="title">Ramen Upgrade</div>
      <div class="meta">7 min • Student Favorite</div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalContent">
    <div class="close" onclick="closeRecipe()">✖</div>
    <div class="recipeTitle" id="recipeTitle"></div>
    <div class="step" id="recipeSteps"></div>
    <button>Save Recipe</button>
  </div>
</div>

<script>
function openRecipe(title, steps){
  document.getElementById("modal").style.display="flex";
  document.getElementById("recipeTitle").innerText=title;
  document.getElementById("recipeSteps").innerText=steps;
}

function closeRecipe(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
