<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed Feed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

.topbar{
position:fixed;
top:0;
width:100%;
padding:12px;
text-align:center;
font-weight:900;
background:rgba(0,0,0,.6);
z-index:100;
}

/* FEED */
.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.card{
height:100vh;
position:relative;
scroll-snap-align:start;
cursor:pointer;
}

.media{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
padding:20px;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,.9));
z-index:10;
}

.title{font-size:22px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

.meta{font-size:12px;color:#aaa;margin-top:5px;}

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:18px;
z-index:10;
text-align:center;
}

.count{font-size:12px;}

/* HEART ANIMATION */
.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:80px;
opacity:0;
}
.heart.show{animation:pop .6s;}
@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{opacity:0;}
}

/* PANEL */
.panel{
position:fixed;
inset:0;
background:#0b0f14;
padding:20px;
transform:translateY(100%);
transition:.4s;
z-index:200;
overflow:auto;
}
.panel.active{transform:translateY(0);}

.recipe-title{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.section-title{
margin-top:15px;
font-weight:900;
color:#00ff9d;
}

.comment{
background:#111;
padding:10px;
border-radius:10px;
margin-top:8px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">Cook’ed 🔥</div>

<div class="feed" id="feed"></div>

<!-- RECIPE PANEL -->
<div class="panel" id="recipePanel">
  <div class="recipe-title" id="recipeTitle"></div>
  <div id="recipeDesc"></div>

  <div class="section-title">Ingredients</div>
  <div id="recipeIngredients"></div>

  <div class="section-title">Steps</div>
  <div id="recipeSteps"></div>

  <button onclick="closeRecipe()">Close</button>
</div>

<!-- COMMENTS PANEL -->
<div class="panel" id="commentPanel">
  <h2>Comments 💬</h2>
  <div id="comments"></div>

  <input id="commentInput" placeholder="Add comment">
  <button onclick="addComment()">Post</button>

  <button onclick="closeComments()">Close</button>
</div>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

const img = q=>`https://source.unsplash.com/featured/?${q},food`;

/* DEFAULT DATA */
if(recipes.length===0){
recipes=[
{
title:"Viral Spicy Chicken",
desc:"This is blowing up 🔥",
images:[img("spicy chicken")],
ingredients:["chicken","spices","oil"],
steps:["Season chicken","Cook until crispy","Serve hot"],
likes:120,
views:1200,
comments:[],
created:Date.now()
},
{
title:"Cheesy Pasta",
desc:"Too good 😭",
images:[img("cheesy pasta")],
ingredients:["pasta","cheese","milk"],
steps:["Boil pasta","Add cheese","Mix and serve"],
likes:98,
views:980,
comments:[],
created:Date.now()
}
];
}

/* RENDER */
function render(){
feed.innerHTML="";

recipes.forEach((r,i)=>{

const el=document.createElement("div");
el.className="card";

el.innerHTML=`
<img class="media" src="${r.images[0]}">

<div class="overlay">
<div class="title">${r.title}</div>
<div class="desc">${r.desc}</div>
<div class="meta">${r.views} views</div>
</div>

<div class="actions">
<div onclick="like(event,${i})">❤️<div class="count">${r.likes}</div></div>
<div onclick="openComments(event,${i})">💬</div>
<div onclick="share(event,${i})">🔗</div>
</div>

<div class="heart">❤️</div>
`;

el.ondblclick=()=>likeAnim(el,i);
el.onclick=()=>openRecipe(i);

feed.appendChild(el);
});
}

/* LIKE */
function like(e,i){
e.stopPropagation();
recipes[i].likes++;
save();
render();
}

/* LIKE ANIMATION */
function likeAnim(card,i){
like({stopPropagation:()=>{}},i);
const h=card.querySelector(".heart");
h.classList.add("show");
setTimeout(()=>h.classList.remove("show"),600);
}

/* SHARE */
function share(e,i){
e.stopPropagation();
navigator.clipboard.writeText(recipes[i].title);
alert("Copied recipe name!");
}

/* RECIPE */
function openRecipe(i){
const r = recipes[i];

recipeTitle.innerText = r.title;
recipeDesc.innerText = r.desc;

recipeIngredients.innerHTML = r.ingredients.map(i=>`<div>- ${i}</div>`).join("");
recipeSteps.innerHTML = r.steps.map(s=>`<div>- ${s}</div>`).join("");

recipePanel.classList.add("active");
}

function closeRecipe(){
recipePanel.classList.remove("active");
}

/* COMMENTS */
let currentCommentIndex=0;

function openComments(e,i){
e.stopPropagation();
currentCommentIndex=i;

const r=recipes[i];
comments.innerHTML = (r.comments||[]).map(c=>`<div class="comment">${c}</div>`).join("");

commentPanel.classList.add("active");
}

function addComment(){
const val = commentInput.value;
if(!val) return;

if(!recipes[currentCommentIndex].comments){
recipes[currentCommentIndex].comments=[];
}

recipes[currentCommentIndex].comments.push(val);
commentInput.value="";
save();
openComments({stopPropagation:()=>{}},currentCommentIndex);
}

function closeComments(){
commentPanel.classList.remove("active");
}

/* FAKE LIVE GROWTH (DEMO MAGIC) */
setInterval(()=>{
recipes.forEach(r=>{
r.views += Math.floor(Math.random()*10);
});
save();
render();
},4000);

/* SAVE */
function save(){
localStorage.setItem("recipes",JSON.stringify(recipes));
}

/* INIT */
render();

</script>

</body>
</html>
