<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

/* FEED */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* VIDEO */
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
}

.title{font-size:26px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

/* ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
  text-align:center;
}

.actions div{
  cursor:pointer;
  font-size:18px;
}

/* LIKE ANIM */
.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:80px;
  opacity:0;
}

.heart.show{
  animation:pop .6s;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;}
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:999px;
  background:#00ff9d;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}

/* UPLOAD */
.upload{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  transform:translateY(100%);
  transition:.4s;
  z-index:20;
}

.upload.active{transform:translateY(0);}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

/* COOK MODE */
.cookMode{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  transform:translateY(100%);
  transition:.4s;
  z-index:30;
}

.cookMode.active{transform:translateY(0);}

.step{
  margin-top:20px;
  font-size:18px;
}

.ingredients{
  margin-top:10px;
  color:#aaa;
}

/* FLOAT BTN */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:22px;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<!-- UPLOAD -->
<div class="upload" id="upload">
  <h2>Upload Recipe 🍳</h2>

  <input id="video" placeholder="Google Drive Link">
  <input id="title" placeholder="Recipe Title">
  <input id="desc" placeholder="Short Description">
  <textarea id="ingredients" placeholder="Ingredients (comma separated)"></textarea>
  <textarea id="steps" placeholder="Steps (comma separated)"></textarea>

  <button onclick="submitRecipe()">Post</button>
  <button onclick="closeUpload()">Cancel</button>
</div>

<!-- COOK MODE -->
<div class="cookMode" id="cookMode">
  <h2 id="cookTitle"></h2>
  <div class="ingredients" id="cookIngredients"></div>
  <div class="step" id="cookStep"></div>
  <button onclick="nextStep()">Next Step</button>
  <button onclick="closeCook()">Close</button>
</div>

<button class="float" onclick="openUpload()">＋</button>

<script>

/* STORAGE */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

/* DRIVE */
function getDriveEmbed(url){
  try{
    const id = url.split("/d/")[1].split("/")[0];
    return `https://drive.google.com/uc?export=preview&id=${id}`;
  }catch{return "";}
}

/* RENDER */
function render(){
  feed.innerHTML="";

  recipes.forEach((r,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <iframe src="${getDriveEmbed(r.video)}"></iframe>

      <div class="overlay">
        <div class="title">${r.title}</div>
        <div class="desc">${r.desc}</div>
        <button onclick="openCook(${i})">Cook</button>
      </div>

      <div class="actions">
        <div onclick="like(this)">❤️</div>
        <div>💬</div>
        <div onclick="save(this)">🔖</div>
      </div>

      <div class="heart">❤️</div>
    `;

    el.ondblclick=()=>likeAnim(el);

    feed.appendChild(el);
  });
}

/* LIKE */
function like(el){
  el.style.color = el.style.color==="red" ? "white" : "red";
}

/* SAVE */
function save(el){
  el.style.color = el.style.color==="yellow" ? "white" : "yellow";
}

/* DOUBLE TAP */
function likeAnim(card){
  const h=card.querySelector(".heart");
  h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),600);
}

/* UPLOAD */
function openUpload(){upload.classList.add("active");}
function closeUpload(){upload.classList.remove("active");}

function submitRecipe(){
  if(!video.value || !title.value){
    alert("Fill required fields");
    return;
  }

  const newRecipe={
    video:video.value,
    title:title.value,
    desc:desc.value,
    ingredients:ingredients.value.split(","),
    steps:steps.value.split(",")
  };

  recipes.unshift(newRecipe);
  localStorage.setItem("recipes",JSON.stringify(recipes));

  render();
  closeUpload();

  video.value=title.value=desc.value=ingredients.value=steps.value="";
}

/* COOK MODE */
let currentRecipe, stepIndex=0;

function openCook(i){
  currentRecipe=recipes[i];
  stepIndex=0;

  cookTitle.innerText=currentRecipe.title;
  cookIngredients.innerText="Ingredients: "+currentRecipe.ingredients.join(", ");
  cookStep.innerText=currentRecipe.steps[0];

  cookMode.classList.add("active");
}

function nextStep(){
  stepIndex++;
  if(stepIndex>=currentRecipe.steps.length){
    cookStep.innerText="Done 🎉";
    return;
  }
  cookStep.innerText=currentRecipe.steps[stepIndex];
}

function closeCook(){
  cookMode.classList.remove("active");
}

/* INIT */
render();

</script>

</body>
</html>
