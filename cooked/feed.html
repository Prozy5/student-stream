<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  pointer-events:none; /* FIX CLICK ISSUE */
}

/* CLICK LAYER */
.tapLayer{
  position:absolute;
  inset:0;
  z-index:5;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
  z-index:10;
}

.title{font-size:24px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
  z-index:10;
}

/* HEART */
.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:80px;
  opacity:0;
}

.heart.show{
  animation:pop .6s;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;}
}

/* FLOAT BTNS */
.float{
  position:fixed;
  bottom:20px;
  font-size:20px;
  padding:12px;
  border-radius:50%;
  background:#00ff9d;
  border:none;
  font-weight:900;
}

.add{right:20px;}
.ai{left:20px;}

/* PANELS */
.panel{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  transform:translateY(100%);
  transition:.4s;
  z-index:40;
  overflow:auto;
}

.panel.active{transform:translateY(0);}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

/* VIDEO FRAMES */
.frame{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  text-align:center;
  padding:20px;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:999px;
  background:#00ff9d;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<!-- RECIPE VIEW -->
<div class="panel" id="recipeView">
  <h2 id="rvTitle"></h2>
  <p id="rvDesc"></p>

  <h3>Ingredients</h3>
  <div id="rvIngredients"></div>

  <h3>Steps</h3>
  <div id="rvSteps"></div>

  <button onclick="closeRecipe()">Close</button>
</div>

<!-- AI PANEL -->
<div class="panel" id="aiPanel">
  <h2>Cook’ed AI 🧠</h2>
  <textarea id="aiInput" placeholder="chicken, rice, garlic"></textarea>

  <button onclick="generateAI()">Generate</button>
  <div id="aiResult"></div>
  <button onclick="closeAI()">Close</button>
</div>

<button class="float add" onclick="addFake()">＋</button>
<button class="float ai" onclick="openAI()">🧠</button>

<script>

/* STORAGE */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

/* FAKE START */
if(recipes.length===0){
  recipes=[
    {
      title:"Garlic Chicken",
      desc:"Simple + viral 🔥",
      ingredients:["chicken","garlic","butter"],
      steps:["Season","Cook","Add garlic","Serve"],
      frames:["🔥 Garlic Chicken","🛒 chicken, garlic","Cook it","🍽️ Done"]
    }
  ];
}

/* RENDER */
function render(){
  feed.innerHTML="";

  recipes.forEach((r,i)=>{
    const el=document.createElement("div");
    el.className="card";

    let media="";

    if(r.frames){
      media=`<div class="frame" id="f${i}">${r.frames[0]}</div>`;
      playFrames(i);
    } else {
      media=`<iframe src="${getDriveEmbed(r.video)}"></iframe>`;
    }

    el.innerHTML=`
      ${media}
      <div class="tapLayer" onclick="openRecipe(${i})"></div>

      <div class="overlay">
        <div class="title">${r.title}</div>
        <div class="desc">${r.desc}</div>
      </div>

      <div class="actions">
        <div onclick="like(this)">❤️</div>
        <div>💬</div>
        <div onclick="save(this)">🔖</div>
      </div>

      <div class="heart">❤️</div>
    `;

    el.ondblclick=()=>likeAnim(el);
    feed.appendChild(el);
  });

  localStorage.setItem("recipes",JSON.stringify(recipes));
}

/* FRAME AUTO PLAY */
function playFrames(i){
  let index=0;
  setInterval(()=>{
    const el=document.getElementById("f"+i);
    if(!el) return;
    index=(index+1)%recipes[i].frames.length;
    el.innerHTML=recipes[i].frames[index];
  },1500);
}

/* DRIVE */
function getDriveEmbed(url){
  try{
    const id = url.split("/d/")[1].split("/")[0];
    return `https://drive.google.com/uc?export=preview&id=${id}`;
  }catch{return "";}
}

/* OPEN RECIPE */
function openRecipe(i){
  const r=recipes[i];
  rvTitle.innerText=r.title;
  rvDesc.innerText=r.desc;
  rvIngredients.innerHTML=r.ingredients.join(", ");
  rvSteps.innerHTML=r.steps.map((s,i)=>`${i+1}. ${s}`).join("<br>");
  recipeView.classList.add("active");
}

function closeRecipe(){
  recipeView.classList.remove("active");
}

/* LIKE */
function like(el){el.style.color=el.style.color==="red"?"white":"red";}
function save(el){el.style.color=el.style.color==="yellow"?"white":"yellow";}

/* DOUBLE TAP */
function likeAnim(card){
  const h=card.querySelector(".heart");
  h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),600);
}

/* AI PANEL */
function openAI(){aiPanel.classList.add("active");}
function closeAI(){aiPanel.classList.remove("active");}

/* AI ENGINE */
function generateAI(){
  const input = aiInput.value.split(",").map(x=>x.trim());

  const title = input.join(" ") + " Mix";
  const steps = ["Prep ingredients","Cook everything","Mix well","Serve"];
  const frames=[
    "🔥 "+title,
    "🛒 "+input.join(", "),
    ...steps,
    "🍽️ Done"
  ];

  aiResult.innerHTML=`
    <h3>${title}</h3>
    <button onclick='postAI(${JSON.stringify(title)},${JSON.stringify(input)},${JSON.stringify(steps)},${JSON.stringify(frames)})'>
      Post to Feed 🚀
    </button>
  `;
}

/* POST AI */
function postAI(title,ingredients,steps,frames){
  recipes.unshift({
    title,
    desc:"AI Generated 🤖",
    ingredients,
    steps,
    frames
  });
  render();
  closeAI();
}

/* FAKE ADD */
function addFake(){
  recipes.unshift({
    title:"Egg Toast",
    desc:"Quick breakfast 🔥",
    ingredients:["egg","bread"],
    steps:["Crack egg","Toast","Eat"],
    frames:["🍳 Egg Toast","Cook egg","Toast bread","Done"]
  });
  render();
}

/* INIT */
render();

</script>

</body>
</html>
