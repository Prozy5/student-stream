<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:black;
  color:white;
  overflow:hidden;
}

/* FEED */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* MEDIA */
.card video,
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.75);
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
}

.title{font-size:24px;font-weight:900;}
.desc{font-size:14px;color:#ccc;margin-top:5px;}

.badge{
  font-size:10px;
  background:#00ff9d;
  color:black;
  padding:2px 6px;
  border-radius:6px;
  display:inline-block;
  margin-top:5px;
}

/* ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:18px;
  text-align:center;
}

.actions div{cursor:pointer;font-size:13px;}

/* HEART */
.heart{
  position:absolute;
  font-size:80px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
}

.heart.show{animation:pop .6s ease;}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0;}
}

/* BUTTON */
.cookBtn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
}

/* TOP */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px;
  z-index:10;
}

.profile{
  width:35px;height:35px;border-radius:50%;background:#00ff9d;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
}

/* COOK MODE */
.cookMode{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  transform:translateY(100%);
  transition:.4s;
  z-index:20;
  overflow:auto;
}

.cookMode.active{transform:translateY(0);}

/* COMMENTS */
.comments{
  position:fixed;
  bottom:0;
  width:100%;
  height:50%;
  background:#111;
  transform:translateY(100%);
  transition:.4s;
  z-index:25;
  padding:15px;
}

.comments.active{transform:translateY(0);}
</style>
</head>

<body>

<div class="topbar">
  <div><b>Cook’ed</b></div>
  <div class="profile"></div>
</div>

<div class="feed">

  <!-- CARD -->
  <div class="card" ondblclick="like(this)">
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>

    <div class="overlay">
      <div class="title">Garlic Butter Chicken</div>
      <div class="desc">5 ingredients. 20 minutes.</div>
      <div class="badge">AI Recipe</div>
      <button class="cookBtn" onclick="openCook('chicken')">Cook</button>
    </div>

    <div class="actions">
      <div onclick="like(this.parentNode.parentNode)">❤️ <span class="likeCount">1200</span></div>
      <div onclick="openComments()">💬</div>
      <div onclick="save(this)">🔖</div>
    </div>

    <div class="heart">❤️</div>
  </div>

</div>

<!-- COOK MODE -->
<div class="cookMode" id="cookMode"></div>

<!-- COMMENTS -->
<div class="comments" id="comments">
  <h3>Comments</h3>
  <p>🔥 looks good</p>
  <p>trying this tonight</p>
</div>

<div class="nav">
  <div>Home</div>
  <div>Search</div>
  <div>Create</div>
  <div>Saved</div>
  <div>Profile</div>
</div>

<script>
/* LIKE */
function like(card){
  let heart=card.querySelector(".heart");
  let count=card.querySelector(".likeCount");

  count.textContent=parseInt(count.textContent)+1;

  heart.classList.add("show");
  setTimeout(()=>heart.classList.remove("show"),600);
}

/* SAVE */
function save(el){
  el.style.color="#00ff9d";
}

/* COMMENTS */
function openComments(){
  document.getElementById("comments").classList.add("active");
}

/* COOK MODE */
function openCook(type){
  const cook=document.getElementById("cookMode");

  let steps={
    chicken:[
      "Season chicken",
      "Cook in butter",
      "Add garlic",
      "Serve hot"
    ]
  };

  cook.innerHTML=`
    <h2>Cooking Mode 🍳</h2>
    ${steps[type].map(s=>`<p>• ${s}</p>`).join("")}
    <br><button onclick="closeCook()">Close</button>
  `;

  cook.classList.add("active");
}

function closeCook(){
  document.getElementById("cookMode").classList.remove("active");
}

/* TAP VIDEO SOUND */
document.querySelectorAll("video").forEach(v=>{
  v.addEventListener("click",()=>{
    v.muted=!v.muted;
  });
});
</script>

</body>
</html>
