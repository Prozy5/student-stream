<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed Feed</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:black;
  color:white;
  overflow:hidden;
}

/* 🔥 FEED SCROLLER */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* IMAGE */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.75);
}

/* OVERLAY CONTENT */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.8));
}

/* TEXT */
.title{
  font-size:26px;
  font-weight:900;
}

.desc{
  font-size:14px;
  color:#ccc;
  margin-top:5px;
}

/* RIGHT ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
  text-align:center;
}

.actions div{
  font-size:13px;
  cursor:pointer;
}

/* ❤️ LIKE ANIMATION */
.heart{
  position:absolute;
  font-size:80px;
  color:white;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  pointer-events:none;
}

.heart.show{
  animation:pop .6s ease;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0); opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{transform:translate(-50%,-50%) scale(1); opacity:0;}
}

/* COOK BUTTON */
.cookBtn{
  margin-top:12px;
  padding:10px 20px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
  cursor:pointer;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  z-index:10;
}

.logo{
  font-weight:900;
}

.profile{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#00ff9d;
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
}

.nav div{
  font-size:12px;
  color:#aaa;
}

.nav .active{
  color:#00ff9d;
}

/* FULLSCREEN COOK MODE */
.cookMode{
  position:fixed;
  inset:0;
  background:#0b0f14;
  display:flex;
  flex-direction:column;
  padding:20px;
  transform:translateY(100%);
  transition:.5s ease;
  z-index:20;
}

.cookMode.active{
  transform:translateY(0);
}

.close{
  align-self:flex-end;
  font-size:20px;
  cursor:pointer;
  margin-bottom:20px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">Cook’ed</div>
  <div class="profile"></div>
</div>

<!-- FEED -->
<div class="feed">

  <!-- CARD -->
  <div class="card" ondblclick="like(this)">
    <img src="https://images.unsplash.com/photo-1604908176997-4316c84e91aa">
    
    <div class="overlay">
      <div class="title">Garlic Butter Chicken</div>
      <div class="desc">5 ingredients. 20 minutes.</div>
      <button class="cookBtn" onclick="openCook()">Cook</button>
    </div>

    <div class="actions">
      <div>❤️ 1.2k</div>
      <div>💬 84</div>
      <div>🔖</div>
    </div>

    <div class="heart">❤️</div>
  </div>

  <!-- CARD -->
  <div class="card" ondblclick="like(this)">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
    
    <div class="overlay">
      <div class="title">Quick Breakfast Bowl</div>
      <div class="desc">Energy in 10 minutes.</div>
      <button class="cookBtn" onclick="openCook()">Cook</button>
    </div>

    <div class="actions">
      <div>❤️ 980</div>
      <div>💬 40</div>
      <div>🔖</div>
    </div>

    <div class="heart">❤️</div>
  </div>

</div>

<!-- COOK MODE -->
<div class="cookMode" id="cookMode">
  <div class="close" onclick="closeCook()">✖</div>
  <h2>Cooking Mode 🍳</h2>
  <p>Step-by-step instructions coming here...</p>
</div>

<!-- NAV -->
<div class="nav">
  <div class="active">Home</div>
  <div>Search</div>
  <div>Create</div>
  <div>Saved</div>
  <div>Profile</div>
</div>

<script>
function like(card){
  let heart = card.querySelector(".heart");
  heart.classList.add("show");

  setTimeout(()=>{
    heart.classList.remove("show");
  },600);
}

function openCook(){
  document.getElementById("cookMode").classList.add("active");
}

function closeCook(){
  document.getElementById("cookMode").classList.remove("active");
}
</script>

</body>
</html>
