<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cook’ed Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b0f14;
  --accent:#4CAF50;
  --text:#ecf3ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* 🚨 BANNER */
.banner{
  position:fixed;
  top:0;
  width:100%;
  background:linear-gradient(90deg,#1b5e20,#4CAF50);
  white-space:nowrap;
  overflow:hidden;
  z-index:999;
}

.banner span{
  display:inline-block;
  padding:8px 0;
  animation:scroll 15s linear infinite;
  font-weight:700;
}

@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* FEED CONTAINER */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.post{
  height:100vh;
  scroll-snap-align:start;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* FAKE VIDEO */
.video{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#1b5e20,#4CAF50);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
}

/* OVERLAY INFO */
.overlay{
  position:absolute;
  bottom:80px;
  left:15px;
}

.title{
  font-size:20px;
  font-weight:900;
}

.meta{
  font-size:13px;
  opacity:.8;
}

/* SIDE BUTTONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:18px;
  text-align:center;
}

.actions div{
  cursor:pointer;
  font-size:22px;
  transition:.2s;
}

.actions div:hover{
  transform:scale(1.2);
}

/* AI TAG */
.aiTag{
  position:absolute;
  top:60px;
  left:15px;
  background:rgba(0,0,0,.5);
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
}

/* RECIPE PANEL */
.recipePanel{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#121923;
  border-radius:20px 20px 0 0;
  padding:20px;
  transition:.4s;
  z-index:1000;
}

.recipePanel.active{
  bottom:0;
}

.close{
  float:right;
  cursor:pointer;
}

.step{
  font-size:14px;
  margin-top:8px;
  opacity:.8;
}
</style>
</head>

<body>

<!-- 🚨 BANNER -->
<div class="banner">
  <span>🚨 Cook’ed Feed Actively Being Built • HIGH PRIORITY • StudentStreamHQ Project • Founder: Deondre 🚀</span>
</div>

<div class="feed">

  <!-- POST 1 -->
  <div class="post" onclick="openRecipe('Egg Toast','1. Toast bread 2. Cook egg 3. Combine & serve')">
    <div class="video">🍳</div>

    <div class="aiTag">AI Recommended</div>

    <div class="overlay">
      <div class="title">Quick Egg Toast</div>
      <div class="meta">5 min • Budget Meal</div>
    </div>

    <div class="actions">
      <div onclick="like(event)">❤️</div>
      <div onclick="save(event)">💾</div>
      <div>🔗</div>
    </div>
  </div>

  <!-- POST 2 -->
  <div class="post" onclick="openRecipe('Cheesy Rice','1. Cook rice 2. Add cheese 3. Mix well')">
    <div class="video">🧀</div>

    <div class="overlay">
      <div class="title">Cheesy Rice Bowl</div>
      <div class="meta">10 min • Easy</div>
    </div>

    <div class="actions">
      <div onclick="like(event)">❤️</div>
      <div onclick="save(event)">💾</div>
      <div>🔗</div>
    </div>
  </div>

  <!-- POST 3 -->
  <div class="post" onclick="openRecipe('Ramen Upgrade','1. Cook ramen 2. Add egg 3. Season & enjoy')">
    <div class="video">🍜</div>

    <div class="overlay">
      <div class="title">Ramen Upgrade</div>
      <div class="meta">7 min • Student Favorite</div>
    </div>

    <div class="actions">
      <div onclick="like(event)">❤️</div>
      <div onclick="save(event)">💾</div>
      <div>🔗</div>
    </div>
  </div>

</div>

<!-- RECIPE PANEL -->
<div class="recipePanel" id="panel">
  <div class="close" onclick="closeRecipe()">✖</div>
  <h2 id="recipeTitle"></h2>
  <div id="recipeSteps"></div>
</div>

<script>
function openRecipe(title, steps){
  document.getElementById("panel").classList.add("active");
  document.getElementById("recipeTitle").innerText = title;
  document.getElementById("recipeSteps").innerText = steps;
}

function closeRecipe(){
  document.getElementById("panel").classList.remove("active");
}

function like(e){
  e.stopPropagation();
  e.target.innerText = "💚";
}

function save(e){
  e.stopPropagation();
  e.target.innerText = "✅";
}
</script>

</body>
</html>
