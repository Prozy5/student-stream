<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

/* FEED */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* VIDEO */
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
}

.title{font-size:24px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

/* ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
  text-align:center;
}

.actions div{
  cursor:pointer;
}

/* HEART ANIM */
.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:80px;
  opacity:0;
}

.heart.show{
  animation:pop .6s;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;}
}

/* FLOAT BTN */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:22px;
}

/* RECIPE VIEW */
.recipeView{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  overflow:auto;
  transform:translateY(100%);
  transition:.4s;
  z-index:40;
}

.recipeView.active{transform:translateY(0);}

.section{margin-top:20px;}
.section h3{margin-bottom:10px;}
.step{margin-bottom:8px;color:#ccc;}

button{
  padding:10px;
  border:none;
  border-radius:999px;
  background:#00ff9d;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<!-- RECIPE VIEW -->
<div class="recipeView" id="recipeView">
  <h2 id="rvTitle"></h2>
  <p id="rvDesc"></p>

  <div class="section">
    <h3>Ingredients</h3>
    <div id="rvIngredients"></div>
  </div>

  <div class="section">
    <h3>Steps</h3>
    <div id="rvSteps"></div>
  </div>

  <button onclick="closeRecipe()">Close</button>
</div>

<button class="float" onclick="addFake()">＋</button>

<script>

/* STORAGE */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

/* FAKE DATA IF EMPTY */
if(recipes.length === 0){
  recipes = [
    {
      video:"https://drive.google.com/file/d/1d_dummy_video/view",
      title:"Garlic Butter Chicken",
      desc:"Juicy, buttery, viral 🔥",
      ingredients:["chicken","garlic","butter","salt"],
      steps:["Season chicken","Cook in pan","Add butter + garlic","Serve hot"]
    },
    {
      video:"https://drive.google.com/file/d/1d_dummy_video/view",
      title:"Cheesy Ramen Hack",
      desc:"College meal upgrade 🧀",
      ingredients:["ramen","cheese","milk"],
      steps:["Boil ramen","Add cheese","Mix creamy","Eat"]
    }
  ];
}

/* DRIVE */
function getDriveEmbed(url){
  try{
    const id = url.split("/d/")[1].split("/")[0];
    return `https://drive.google.com/uc?export=preview&id=${id}`;
  }catch{return "";}
}

/* RENDER */
function render(){
  feed.innerHTML="";

  recipes.forEach((r,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <iframe src="${getDriveEmbed(r.video)}" onclick="openRecipe(${i})"></iframe>

      <div class="overlay">
        <div class="title">${r.title}</div>
        <div class="desc">${r.desc}</div>
      </div>

      <div class="actions">
        <div onclick="like(this)">❤️</div>
        <div>💬</div>
        <div onclick="save(this)">🔖</div>
      </div>

      <div class="heart">❤️</div>
    `;

    el.ondblclick=()=>likeAnim(el);

    feed.appendChild(el);
  });

  localStorage.setItem("recipes",JSON.stringify(recipes));
}

/* OPEN RECIPE */
function openRecipe(i){
  const r = recipes[i];

  rvTitle.innerText = r.title;
  rvDesc.innerText = r.desc;

  rvIngredients.innerHTML = r.ingredients.map(x=>`• ${x}`).join("<br>");
  rvSteps.innerHTML = r.steps.map((s,i)=>`<div class="step">${i+1}. ${s}</div>`).join("");

  recipeView.classList.add("active");
}

function closeRecipe(){
  recipeView.classList.remove("active");
}

/* LIKE */
function like(el){
  el.style.color = el.style.color==="red" ? "white" : "red";
}

/* SAVE */
function save(el){
  el.style.color = el.style.color==="yellow" ? "white" : "yellow";
}

/* DOUBLE TAP */
function likeAnim(card){
  const h=card.querySelector(".heart");
  h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),600);
}

/* ADD FAKE (for testing growth feel) */
function addFake(){
  recipes.unshift({
    video:"https://drive.google.com/file/d/1d_dummy_video/view",
    title:"Viral Egg Sandwich",
    desc:"Simple but hits 🔥",
    ingredients:["egg","bread","butter"],
    steps:["Crack egg","Toast bread","Assemble","Eat"]
  });
  render();
}

/* INIT */
render();

</script>

</body>
</html>
