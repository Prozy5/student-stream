<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:black;
  color:white;
  overflow:hidden;
}

/* FEED */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* IMAGE */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.7);
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
}

.title{font-size:26px;font-weight:900;}
.desc{font-size:14px;color:#ccc;margin-top:5px;}

/* ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
  text-align:center;
}

.actions div{cursor:pointer}

/* HEART */
.heart{
  position:absolute;
  font-size:80px;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
}

.heart.show{animation:pop .6s ease;}
@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;}
}

/* BUTTON */
.cookBtn{
  margin-top:12px;
  padding:10px 20px;
  border:none;
  border-radius:999px;
  background:#00ff9d;
  font-weight:900;
  cursor:pointer;
}

/* COOK MODE */
.cookMode{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  transform:translateY(100%);
  transition:.4s;
  z-index:20;
}

.cookMode.active{transform:translateY(0);}

.step{
  margin-top:20px;
  font-size:18px;
}

.nextBtn{
  margin-top:20px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#6c5cff;
  color:white;
}

/* TOP */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px;
  z-index:10;
}

.logo{font-weight:900;}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:rgba(0,0,0,.6);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Cook’ed</div>
</div>

<div class="feed" id="feed"></div>

<div class="cookMode" id="cookMode">
  <h2 id="recipeTitle"></h2>
  <div id="ingredients"></div>
  <div class="step" id="step"></div>
  <button class="nextBtn" onclick="nextStep()">Next Step</button>
</div>

<div class="nav">
  <div>Home</div>
  <div>Search</div>
  <div>Create</div>
  <div>Saved</div>
  <div>Profile</div>
</div>

<script>

/* DATA */
const recipes=[
{
  title:"Garlic Butter Chicken",
  desc:"5 ingredients. 20 min.",
  img:"https://images.unsplash.com/photo-1604908176997-4316c84e91aa",
  ingredients:["Chicken","Garlic","Butter","Salt","Pepper"],
  steps:[
    "Season the chicken",
    "Heat butter in pan",
    "Add garlic",
    "Cook chicken 6 minutes each side",
    "Serve hot"
  ]
},
{
  title:"Breakfast Bowl",
  desc:"Energy in 10 min",
  img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c",
  ingredients:["Eggs","Rice","Avocado","Spinach"],
  steps:[
    "Cook rice",
    "Fry eggs",
    "Slice avocado",
    "Assemble bowl",
    "Enjoy"
  ]
}
];

let currentRecipe=null;
let stepIndex=0;

/* RENDER */
recipes.forEach((r,i)=>{
  const el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <img src="${r.img}">
    <div class="overlay">
      <div class="title">${r.title}</div>
      <div class="desc">${r.desc}</div>
      <button class="cookBtn" onclick="openCook(${i})">Cook</button>
    </div>

    <div class="actions">
      <div onclick="like(event,this)">❤️</div>
      <div>💬</div>
      <div onclick="save(this)">🔖</div>
    </div>

    <div class="heart">❤️</div>
  `;

  el.ondblclick=()=>likeAnim(el);

  feed.appendChild(el);
});

/* LIKE */
function like(e,el){
  e.stopPropagation();
  el.style.color = el.style.color==="red" ? "white" : "red";
}

/* SAVE */
function save(el){
  el.style.color = el.style.color==="yellow" ? "white" : "yellow";
}

/* DOUBLE TAP */
function likeAnim(card){
  let h=card.querySelector(".heart");
  h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),600);
}

/* OPEN COOK */
function openCook(i){
  currentRecipe=recipes[i];
  stepIndex=0;

  recipeTitle.innerText=currentRecipe.title;
  ingredients.innerHTML="Ingredients: "+currentRecipe.ingredients.join(", ");
  step.innerText=currentRecipe.steps[0];

  document.getElementById("cookMode").classList.add("active");

  speak(step.innerText);
}

/* NEXT STEP */
function nextStep(){
  stepIndex++;
  if(stepIndex>=currentRecipe.steps.length){
    step.innerText="Done! 🎉";
    return;
  }
  step.innerText=currentRecipe.steps[stepIndex];
  speak(step.innerText);
}

/* SPEAK */
function speak(text){
  const msg=new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
