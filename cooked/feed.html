<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* IMAGE SLIDESHOW */
.media{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TAP LAYER */
.tapLayer{
  position:absolute;
  inset:0;
  z-index:5;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
  z-index:10;
}

.user{
  font-size:14px;
  font-weight:700;
  margin-bottom:5px;
}

.title{font-size:22px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

/* ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:10;
  text-align:center;
}

.count{font-size:12px;}

/* HEART */
.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:80px;
  opacity:0;
}

.heart.show{animation:pop .6s;}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;}
}

/* FLOAT */
.float{
  position:fixed;
  bottom:20px;
  font-size:20px;
  padding:12px;
  border-radius:50%;
  background:#00ff9d;
  border:none;
  font-weight:900;
}

.add{right:20px;}
.ai{left:20px;}

/* PANEL */
.panel{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  transform:translateY(100%);
  transition:.4s;
  z-index:40;
  overflow:auto;
}

.panel.active{transform:translateY(0);}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:999px;
  background:#00ff9d;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<!-- RECIPE VIEW -->
<div class="panel" id="recipeView">
  <h2 id="rvTitle"></h2>
  <p id="rvDesc"></p>

  <h3>Ingredients</h3>
  <div id="rvIngredients"></div>

  <h3>Steps</h3>
  <div id="rvSteps"></div>

  <button onclick="closeRecipe()">Close</button>
</div>

<!-- AI PANEL -->
<div class="panel" id="aiPanel">
  <h2>Cook’ed AI 🧠</h2>
  <textarea id="aiInput" placeholder="chicken, rice, garlic"></textarea>

  <button onclick="generateAI()">Generate</button>
  <div id="aiResult"></div>
  <button onclick="closeAI()">Close</button>
</div>

<button class="float add" onclick="addFake()">＋</button>
<button class="float ai" onclick="openAI()">🧠</button>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

/* IMAGE GENERATOR */
function getFoodImage(query){
  return `https://source.unsplash.com/featured/?${query},food`;
}

/* START DATA */
if(recipes.length===0){
  recipes=[{
    user:"@chefjay",
    title:"Garlic Chicken",
    desc:"Simple + viral 🔥",
    ingredients:["chicken","garlic","butter"],
    steps:["Season","Cook","Add garlic","Serve"],
    images:[
      getFoodImage("garlic chicken"),
      getFoodImage("cooking chicken"),
      getFoodImage("plated chicken")
    ],
    likes:23
  }];
}

/* RENDER */
function render(){
  feed.innerHTML="";

  recipes.forEach((r,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <img class="media" id="img${i}" src="${r.images[0]}">

      <div class="tapLayer" onclick="openRecipe(${i})"></div>

      <div class="overlay">
        <div class="user">${r.user}</div>
        <div class="title">${r.title}</div>
        <div class="desc">${r.desc}</div>
      </div>

      <div class="actions">
        <div onclick="like(this,${i})">❤️<div class="count">${r.likes||0}</div></div>
        <div>💬<div class="count">12</div></div>
        <div onclick="save(this)">🔖</div>
      </div>

      <div class="heart">❤️</div>
    `;

    slideshow(i);
    el.ondblclick=()=>likeAnim(el,i);

    feed.appendChild(el);
  });

  localStorage.setItem("recipes",JSON.stringify(recipes));
}

/* IMAGE SLIDESHOW */
function slideshow(i){
  let index=0;
  setInterval(()=>{
    const img=document.getElementById("img"+i);
    if(!img) return;
    index=(index+1)%recipes[i].images.length;
    img.src=recipes[i].images[index];
  },2000);
}

/* RECIPE VIEW */
function openRecipe(i){
  const r=recipes[i];
  rvTitle.innerText=r.title;
  rvDesc.innerText=r.desc;
  rvIngredients.innerHTML=r.ingredients.join(", ");
  rvSteps.innerHTML=r.steps.map((s,i)=>`${i+1}. ${s}`).join("<br>");
  recipeView.classList.add("active");
}

function closeRecipe(){recipeView.classList.remove("active");}

/* LIKE */
function like(el,i){
  recipes[i].likes++;
  render();
}

/* SAVE */
function save(el){
  el.style.color=el.style.color==="yellow"?"white":"yellow";
}

/* DOUBLE TAP */
function likeAnim(card,i){
  recipes[i].likes++;
  const h=card.querySelector(".heart");
  h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),600);
  render();
}

/* AI PANEL */
function openAI(){aiPanel.classList.add("active");}
function closeAI(){aiPanel.classList.remove("active");}

/* AI */
function generateAI(){
  const input=aiInput.value.split(",").map(x=>x.trim());

  const title=input.join(" ")+" Mix";
  const images=[
    getFoodImage(title),
    getFoodImage(input[0]||"food"),
    getFoodImage("cooking "+title)
  ];

  aiResult.innerHTML=`
    <h3>${title}</h3>
    <button onclick='postAI(${JSON.stringify(title)},${JSON.stringify(input)},${JSON.stringify(images)})'>
      Post 🚀
    </button>
  `;
}

/* POST AI */
function postAI(title,ingredients,images){
  recipes.unshift({
    user:"@ai_chef",
    title,
    desc:"AI Generated 🤖",
    ingredients,
    steps:["Prep","Cook","Mix","Serve"],
    images,
    likes:0
  });
  render();
  closeAI();
}

/* FAKE */
function addFake(){
  recipes.unshift({
    user:"@foodie",
    title:"Egg Toast",
    desc:"Quick 🔥",
    ingredients:["egg","bread"],
    steps:["Cook","Toast","Eat"],
    images:[
      getFoodImage("egg toast"),
      getFoodImage("fried egg"),
      getFoodImage("toast breakfast")
    ],
    likes:5
  });
  render();
}

render();

</script>

</body>
</html>
