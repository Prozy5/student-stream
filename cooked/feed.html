<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

.topbar{
position:fixed;
top:0;
width:100%;
padding:12px;
text-align:center;
font-weight:900;
background:rgba(0,0,0,.6);
z-index:100;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.card{
height:100vh;
position:relative;
scroll-snap-align:start;
}

.media, video{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
padding:20px;
width:100%;
background:linear-gradient(transparent,rgba(0,0,0,.9));
z-index:10;
}

.title{font-size:22px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

.meta{font-size:12px;color:#aaa;margin-top:5px;}

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:18px;
z-index:10;
text-align:center;
}

.count{font-size:12px;}

.badge{
background:#00ff9d;
color:black;
font-size:10px;
padding:4px 6px;
border-radius:999px;
margin-left:6px;
}

.heart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:80px;
opacity:0;
}
.heart.show{animation:pop .6s;}
@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{opacity:0;}
}

.float{
position:fixed;
bottom:20px;
font-size:18px;
padding:12px;
border-radius:50%;
background:#00ff9d;
border:none;
font-weight:900;
}
.add{right:20px;}
.ai{left:20px;}

.panel{
position:fixed;
inset:0;
background:#0b0f14;
padding:20px;
transform:translateY(100%);
transition:.4s;
z-index:200;
overflow:auto;
}
.panel.active{transform:translateY(0);}
</style>
</head>

<body>

<div class="topbar">Cook’ed 🔥</div>

<div class="feed" id="feed"></div>

<!-- AI PANEL -->
<div class="panel" id="aiPanel">
<h2>AI Recipe Generator</h2>
<textarea id="aiInput" placeholder="e.g. spicy chicken tacos"></textarea>
<button onclick="generateAI()">Generate</button>
<div id="aiResult"></div>
<button onclick="closeAI()">Close</button>
</div>

<button class="float add" onclick="addFake()">＋</button>
<button class="float ai" onclick="openAI()">🧠</button>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

/* HELPERS */
const img = q=>`https://source.unsplash.com/featured/?${q},food`;

function getVideo(url){
if(!url) return null;

if(url.includes("drive.google.com")){
try{
const id = url.split("/d/")[1].split("/")[0];
return `https://drive.google.com/uc?export=preview&id=${id}`;
}catch{}
}

if(url.endsWith(".mp4")) return url;

return null;
}

function timeAgo(ts){
const diff = Math.floor((Date.now()-ts)/60000);
if(diff<1) return "just now";
if(diff<60) return diff+"m ago";
return Math.floor(diff/60)+"h ago";
}

/* INIT */
if(recipes.length===0){
recipes=[{
title:"Viral Spicy Chicken",
desc:"This is blowing up 🔥",
images:[img("spicy chicken"),img("fried chicken")],
video:null,
likes:120,
views:1200,
created:Date.now()
}]
}

/* RENDER */
function render(){
feed.innerHTML="";

recipes.forEach((r,i)=>{

const video = getVideo(r.video);

const el=document.createElement("div");
el.className="card";

el.innerHTML=`
${video ? 
`<video src="${video}" autoplay loop muted playsinline></video>` :
`<img class="media" id="img${i}" src="${r.images[0]}">`
}

<div class="overlay">
<div class="title">${r.title} ${r.views>1000?'<span class="badge">TRENDING</span>':''}</div>
<div class="desc">${r.desc}</div>
<div class="meta">${timeAgo(r.created)} • ${r.views} views</div>
</div>

<div class="actions">
<div onclick="like(${i})">❤️<div class="count" id="like${i}">${r.likes}</div></div>
<div onclick="repost(${i})">🔁</div>
</div>

<div class="heart">❤️</div>
`;

el.ondblclick=()=>likeAnim(el,i);

feed.appendChild(el);

/* slideshow fallback */
if(!video && r.images.length>1){
startSlide(i);
}
});

/* fake growth */
setInterval(()=>{
recipes.forEach(r=>{
r.views+=Math.floor(Math.random()*20);
});
localStorage.setItem("recipes",JSON.stringify(recipes));
},2000);

}

/* SLIDES */
const timers={};
function startSlide(i){
clearInterval(timers[i]);
let index=0;

timers[i]=setInterval(()=>{
const el=document.getElementById("img"+i);
if(!el) return;
index=(index+1)%recipes[i].images.length;
el.src=recipes[i].images[index];
},2000);
}

/* LIKE */
function like(i){
recipes[i].likes++;
document.getElementById("like"+i).innerText=recipes[i].likes;
}

/* REPOST */
function repost(i){
recipes.unshift({...recipes[i],created:Date.now()});
render();
}

/* DOUBLE TAP */
function likeAnim(card,i){
like(i);
const h=card.querySelector(".heart");
h.classList.add("show");
setTimeout(()=>h.classList.remove("show"),600);
}

/* AI */
function openAI(){aiPanel.classList.add("active");}
function closeAI(){aiPanel.classList.remove("active");}

function generateAI(){
const q = aiInput.value;

const recipe={
title:q.charAt(0).toUpperCase()+q.slice(1),
desc:"AI created viral recipe 🤖🔥",
images:[img(q),img("cooking "+q),img("food plating "+q)],
likes:0,
views:0,
created:Date.now()
};

aiResult.innerHTML=`
<h3>${recipe.title}</h3>
<button onclick='postAI(${JSON.stringify(recipe)})'>Post</button>
`;
}

function postAI(r){
recipes.unshift(r);
render();
closeAI();
}

/* FAKE */
function addFake(){
recipes.unshift({
title:"Cheesy Pasta",
desc:"Too good 😭",
images:[img("pasta"),img("cheese pasta")],
likes:Math.floor(Math.random()*200),
views:Math.floor(Math.random()*5000),
created:Date.now()
});
render();
}

render();

</script>
</body>
</html>
