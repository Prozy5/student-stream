<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed Feed</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:#0b0f14;
  color:white;
  overflow-x:hidden;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  z-index:10;
}

.logo{
  font-weight:900;
  font-size:20px;
}

.profile{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#00ff9d;
}

/* FEED */
.feed{
  padding-top:80px;
  padding-bottom:100px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CARD */
.card{
  margin:0 15px;
  border-radius:20px;
  overflow:hidden;
  background:#111;
  box-shadow:0 0 20px rgba(0,0,0,.4);
  transition:.3s;
}

.card:hover{
  transform:scale(1.02);
}

/* IMAGE */
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:15px;
}

.title{
  font-size:18px;
  font-weight:800;
}

.desc{
  font-size:13px;
  color:#aaa;
  margin-top:5px;
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
}

.leftActions{
  display:flex;
  gap:15px;
  font-size:14px;
  color:#ccc;
}

.rightBtn{
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  border:none;
  padding:8px 16px;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
}

/* NAV BAR */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f141a;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  border-top:1px solid #222;
}

.nav div{
  font-size:12px;
  text-align:center;
  color:#aaa;
}

.nav div.active{
  color:#00ff9d;
}

/* FLOAT BUTTON */
.addBtn{
  position:fixed;
  bottom:70px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,255,157,.6);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Cook’ed</div>
  <div class="profile"></div>
</div>

<!-- FEED -->
<div class="feed">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-4316c84e91aa">
    <div class="content">
      <div class="title">Garlic Butter Chicken</div>
      <div class="desc">Made with 5 ingredients you already have.</div>
      <div class="actions">
        <div class="leftActions">
          <span>❤️ 1.2k</span>
          <span>💬 84</span>
        </div>
        <button class="rightBtn">Cook</button>
      </div>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
    <div class="content">
      <div class="title">Quick Breakfast Bowl</div>
      <div class="desc">10-minute energy meal.</div>
      <div class="actions">
        <div class="leftActions">
          <span>❤️ 980</span>
          <span>💬 40</span>
        </div>
        <button class="rightBtn">Cook</button>
      </div>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd">
    <div class="content">
      <div class="title">Healthy Pasta</div>
      <div class="desc">Low cost. High flavor.</div>
      <div class="actions">
        <div class="leftActions">
          <span>❤️ 2.3k</span>
          <span>💬 120</span>
        </div>
        <button class="rightBtn">Cook</button>
      </div>
    </div>
  </div>

</div>

<!-- FLOAT BUTTON -->
<div class="addBtn">+</div>

<!-- NAV -->
<div class="nav">
  <div class="active">Home</div>
  <div>Search</div>
  <div>Create</div>
  <div>Saved</div>
  <div>Profile</div>
</div>

</body>
</html>
