<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* MEDIA */
.media{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:opacity .5s;
}

/* TAP */
.tapLayer{
  position:absolute;
  inset:0;
  z-index:5;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
  z-index:10;
}

.user{font-weight:700;cursor:pointer;}
.title{font-size:22px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

/* ACTIONS */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:10;
  text-align:center;
}

.count{font-size:12px;}

/* HEART */
.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:80px;
  opacity:0;
}
.heart.show{animation:pop .6s;}
@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;}
}

/* FLOAT */
.float{
  position:fixed;
  bottom:20px;
  font-size:18px;
  padding:12px;
  border-radius:50%;
  background:#00ff9d;
  border:none;
  font-weight:900;
}
.add{right:20px;}
.ai{left:20px;}

/* PANELS */
.panel{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  transform:translateY(100%);
  transition:.4s;
  z-index:40;
  overflow:auto;
}
.panel.active{transform:translateY(0);}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:999px;
  background:#00ff9d;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<input placeholder="Search food..." oninput="search(this.value)" style="position:fixed;top:10px;left:10px;z-index:50;padding:8px;border-radius:8px;border:none;">

<div class="feed" id="feed"></div>

<!-- COMMENTS -->
<div class="panel" id="commentsPanel">
  <h2>Comments</h2>
  <div id="commentsList"></div>
  <input id="commentInput" placeholder="Add comment">
  <button onclick="addComment()">Post</button>
  <button onclick="closeComments()">Close</button>
</div>

<!-- PROFILE -->
<div class="panel" id="profilePanel">
  <h2 id="profileName"></h2>
  <div id="profilePosts"></div>
  <button onclick="closeProfile()">Close</button>
</div>

<!-- AI -->
<div class="panel" id="aiPanel">
  <h2>Cook’ed AI 🧠</h2>
  <textarea id="aiInput"></textarea>
  <button onclick="generateAI()">Generate</button>
  <div id="aiResult"></div>
  <button onclick="closeAI()">Close</button>
</div>

<button class="float add" onclick="addFake()">＋</button>
<button class="float ai" onclick="openAI()">🧠</button>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");
let activeIndex = null;

/* IMAGE */
const img = q=>`https://source.unsplash.com/featured/?${q},food`;

/* INIT */
if(recipes.length===0){
recipes=[{
user:"@chef",
title:"Spicy Chicken",
desc:"🔥🔥🔥",
ingredients:["chicken","spices"],
steps:["Cook","Eat"],
images:[img("spicy chicken"),img("cooking chicken")],
likes:10,
comments:["fire 🔥","need this"]
}]
}

/* RENDER */
function render(list=recipes){
feed.innerHTML="";

list.forEach((r,i)=>{
const el=document.createElement("div");
el.className="card";

el.innerHTML=`
<img class="media" id="img${i}" src="${r.images[0]}">

<div class="tapLayer" onclick="togglePlay(${i})"></div>

<div class="overlay">
<div class="user" onclick="openProfile('${r.user}')">${r.user}</div>
<div class="title">${r.title}</div>
<div class="desc">${r.desc}</div>
</div>

<div class="actions">
<div onclick="like(this,${i})">❤️<div class="count" id="like${i}">${r.likes}</div></div>
<div onclick="openComments(${i})">💬<div class="count">${r.comments?.length||0}</div></div>
<div onclick="save(this)">🔖</div>
</div>

<div class="heart">❤️</div>
`;

startSlide(i);
el.ondblclick=()=>likeAnim(el,i);
feed.appendChild(el);
});

localStorage.setItem("recipes",JSON.stringify(recipes));
}

/* SLIDES */
const timers={};
function startSlide(i){
clearInterval(timers[i]);
let index=0;

timers[i]=setInterval(()=>{
const el=document.getElementById("img"+i);
if(!el) return;
index=(index+1)%recipes[i].images.length;
el.style.opacity=0;
setTimeout(()=>{
el.src=recipes[i].images[index];
el.style.opacity=1;
},200);
},2000);
}

function togglePlay(i){
if(timers[i]){
clearInterval(timers[i]);
timers[i]=null;
}else startSlide(i);
}

/* LIKE */
function like(el,i){
recipes[i].likes++;
document.getElementById("like"+i).innerText=recipes[i].likes;
}

/* DOUBLE TAP */
function likeAnim(card,i){
like(null,i);
const h=card.querySelector(".heart");
h.classList.add("show");
setTimeout(()=>h.classList.remove("show"),600);
}

/* COMMENTS */
function openComments(i){
activeIndex=i;
commentsPanel.classList.add("active");
commentsList.innerHTML=recipes[i].comments.map(c=>`<p>${c}</p>`).join("");
}

function addComment(){
recipes[activeIndex].comments.push(commentInput.value);
render();
closeComments();
}

function closeComments(){commentsPanel.classList.remove("active");}

/* PROFILE */
function openProfile(user){
profilePanel.classList.add("active");
profileName.innerText=user;

const posts=recipes.filter(r=>r.user===user);
profilePosts.innerHTML=posts.map(p=>`<p>${p.title}</p>`).join("");
}

function closeProfile(){profilePanel.classList.remove("active");}

/* SEARCH */
function search(q){
render(recipes.filter(r=>r.title.toLowerCase().includes(q.toLowerCase())));
}

/* AI */
function openAI(){aiPanel.classList.add("active");}
function closeAI(){aiPanel.classList.remove("active");}

function generateAI(){
const input=aiInput.value;
const title=input+" Dish";

aiResult.innerHTML=`
<h3>${title}</h3>
<button onclick="postAI('${title}','${input}')">Post</button>
`;
}

function postAI(title,input){
recipes.unshift({
user:"@ai",
title,
desc:"AI magic 🤖",
ingredients:[input],
steps:["Cook it"],
images:[img(input),img("cooking "+input)],
likes:0,
comments:[]
});
render();
closeAI();
}

/* FAKE */
function addFake(){
recipes.unshift({
user:"@foodie",
title:"Pasta",
desc:"🔥",
ingredients:["pasta"],
steps:["cook"],
images:[img("pasta"),img("italian pasta")],
likes:5,
comments:["yum"]
});
render();
}

render();

</script>
</body>
</html>
