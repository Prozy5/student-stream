<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStream HQ • Live Ops</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0b0f14;color:#e6edf3;display:flex;height:100vh;}

.sidebar{
width:260px;
background:#06080c;
padding:15px;
border-right:1px solid #111;
}

.main{flex:1;display:flex;flex-direction:column;}

.logo{font-weight:900;margin-bottom:20px;}

.comp{
padding:10px;margin-bottom:8px;border-radius:8px;
background:#11161d;display:flex;justify-content:space-between;
}

.status{font-size:10px;padding:4px 6px;border-radius:999px;}
.live{background:#003d2e;color:#00ff9d;}
.build{background:#2e2e00;color:#ffd000;}
.err{background:#3d0000;color:#ff4d4d;}

.feed{flex:1;overflow:auto;padding:15px;}
.log{margin-bottom:10px;padding:10px;background:#11161d;border-radius:8px;}
.time{color:#777;font-size:11px;}

.chat{height:120px;border-top:1px solid #111;overflow:auto;padding:10px;}

.inbox{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#05070a;
border-left:1px solid #111;
overflow:auto;
}

.dm{
padding:12px;
border-bottom:1px solid #111;
cursor:pointer;
position:relative;
}

.dm:hover{background:#111;}

.unread{
position:absolute;
right:10px;
top:10px;
background:red;
width:8px;
height:8px;
border-radius:50%;
}

.thread{
position:fixed;
inset:0;
background:#0b0f14;
z-index:100;
padding:20px;
display:none;
flex-direction:column;
}

.thread.active{display:flex;}

.threadMsgs{
flex:1;
overflow:auto;
margin-bottom:10px;
}

.tmsg{margin-bottom:10px;}
.me{color:#00ff9d;}

input{
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:999px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">StudentStream HQ</div>

<div class="comp">Cook’ed <span class="status build">BUILDING</span></div>
<div class="comp">SS Films <span class="status live">LIVE</span></div>
<div class="comp">Library <span class="status build">SYNCING</span></div>
<div class="comp">Auth <span class="status live">ONLINE</span></div>
<div class="comp">AI Engine <span class="status build">TRAINING</span></div>

<button onclick="triggerOutage()">🚨 Trigger Outage</button>
</div>

<div class="main">
<div class="feed" id="logFeed"></div>
<div class="chat" id="chat"></div>
</div>

<div class="inbox" id="inbox"></div>

<div class="thread" id="thread">
<h3 id="threadName"></h3>
<div class="threadMsgs" id="threadMsgs"></div>
<input id="replyInput" placeholder="Reply as CEO...">
<button onclick="sendReply()">Send</button>
<button onclick="closeThread()">Close</button>
</div>

<script>

/* STAFF PERSONALITIES */
const staff=[
{name:"Alex (Dev)", replies:["restarting now","checking logs","might be API","trying fix rn"]},
{name:"Maya (Ops)", replies:["traffic spiking","servers stressed","we need scale","monitoring rn"]},
{name:"Jordan (Backend)", replies:["db might be cooked","queries slow","fixing indexes","patching now"]},
{name:"AI Worker", replies:["generating fix...","optimizing system","analyzing error","auto-repair attempt"]}
];

let threads=[];
let outage=false;

/* LOGS */
const logs=["Deploying...","Scaling...","Fixing bug...","Server retry..."];

/* LOG */
function addLog(){
const log=document.createElement("div");
log.className="log";
log.innerHTML=logs[Math.floor(Math.random()*logs.length)]+
`<div class="time">${new Date().toLocaleTimeString()}</div>`;
logFeed.prepend(log);
}

/* CREATE DM */
function createDM(person,text){
let t=threads.find(x=>x.name===person.name);

if(!t){
t={name:person.name,msgs:[],unread:true};
threads.push(t);
}

t.msgs.push({from:person.name,text});
t.unread=true;
renderInbox();
}

/* RANDOM DM */
function randomDM(){
const person=staff[Math.floor(Math.random()*staff.length)];

const msgs= outage ? [
"WE GOT ERRORS",
"should I restart server?",
"users complaining rn",
"what you want me to do?"
] : [
"small bug here",
"should I push update?",
"checking something quick",
"all good mostly"
];

createDM(person,msgs[Math.floor(Math.random()*msgs.length)]);
}

/* INBOX */
function renderInbox(){
inbox.innerHTML="";
threads.forEach((t,i)=>{
const el=document.createElement("div");
el.className="dm";
el.innerHTML=`<b>${t.name}</b><br>${t.msgs[t.msgs.length-1].text}`+
(t.unread?'<div class="unread"></div>':'');
el.onclick=()=>openThread(i);
inbox.appendChild(el);
});
}

/* OPEN THREAD */
let currentThread=null;
function openThread(i){
currentThread=i;
thread.classList.add("active");
threads[i].unread=false;

threadName.innerText=threads[i].name;

renderThread();
renderInbox();
}

function renderThread(){
threadMsgs.innerHTML=threads[currentThread].msgs.map(m=>
`<div class="tmsg ${m.from==='You'?'me':''}"><b>${m.from}:</b> ${m.text}</div>`
).join("");
}

/* REPLY */
function sendReply(){
const text=replyInput.value;
const t=threads[currentThread];

t.msgs.push({from:"You",text});
replyInput.value="";
renderThread();

/* STAFF RESPONDS */
setTimeout(()=>{
const person=staff.find(s=>s.name===t.name);
const reply=person.replies[Math.floor(Math.random()*person.replies.length)];
t.msgs.push({from:t.name,text:reply});
renderThread();
},1000);
}

/* CLOSE */
function closeThread(){thread.classList.remove("active");}

/* OUTAGE */
function triggerOutage(){outage=true;}

/* LOOP */
setInterval(()=>{
addLog();
if(Math.random()>0.6) randomDM();
},1200);

</script>

</body>
</html>
