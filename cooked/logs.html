<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStream HQ • Live Ops</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0b0f14;color:#e6edf3;display:flex;height:100vh;}

.sidebar{
width:260px;
background:#06080c;
padding:15px;
border-right:1px solid #111;
}

.main{flex:1;display:flex;flex-direction:column;}

.logo{font-weight:900;margin-bottom:20px;}

.comp{
padding:10px;margin-bottom:8px;border-radius:8px;
background:#11161d;display:flex;justify-content:space-between;
}

.status{font-size:10px;padding:4px 6px;border-radius:999px;}
.live{background:#003d2e;color:#00ff9d;}
.build{background:#2e2e00;color:#ffd000;}
.err{background:#3d0000;color:#ff4d4d;}

.feed{flex:1;overflow:auto;padding:15px;}
.log{margin-bottom:10px;padding:10px;background:#11161d;border-radius:8px;}
.time{color:#777;font-size:11px;}

/* CHAT */
.chat{height:160px;border-top:1px solid #111;overflow:auto;padding:10px;}
.msg{margin-bottom:6px;font-size:13px;}
.name{font-weight:700;}
.dev{color:#4da6ff;}
.ops{color:#ffcc00;}
.ai{color:#00ff9d;}

/* INBOX */
.inbox{
position:fixed;
right:0;
top:0;
width:280px;
height:100%;
background:#05070a;
border-left:1px solid #111;
overflow:auto;
z-index:50;
}

.dm{
padding:10px;
border-bottom:1px solid #111;
cursor:pointer;
}

.dm:hover{background:#111;}

.thread{
position:fixed;
inset:0;
background:#0b0f14;
z-index:100;
padding:20px;
display:none;
flex-direction:column;
}

.thread.active{display:flex;}

.threadMsgs{
flex:1;
overflow:auto;
margin-bottom:10px;
}

.tmsg{margin-bottom:8px;}
.me{color:#00ff9d;}

button{
padding:10px;
border:none;
border-radius:999px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">StudentStream HQ</div>

<div class="comp">Cook’ed <span class="status build">BUILDING</span></div>
<div class="comp">SS Films <span class="status live">LIVE</span></div>
<div class="comp">Library <span class="status build">SYNCING</span></div>
<div class="comp">Auth <span class="status live">ONLINE</span></div>
<div class="comp">AI Engine <span class="status build">TRAINING</span></div>

<button onclick="triggerOutage()" style="margin-top:10px;">🚨 Trigger Outage</button>
</div>

<div class="main">
<div class="feed" id="logFeed"></div>
<div class="chat" id="chat"></div>
</div>

<!-- INBOX -->
<div class="inbox" id="inbox"></div>

<!-- THREAD -->
<div class="thread" id="thread">
<h3 id="threadName"></h3>
<div class="threadMsgs" id="threadMsgs"></div>
<input id="replyInput" placeholder="Reply...">
<button onclick="sendReply()">Send</button>
<button onclick="closeThread()">Close</button>
</div>

<script>

/* LOGS */
const logs=[
"Deploying update...",
"Fixing Cook’ed bug...",
"API reconnecting...",
"Scaling servers...",
"Hotfix pushed...",
"Auth retry...",
"Database spike detected..."
];

/* PEOPLE */
const staff=[
{name:"Alex (Dev)",cls:"dev"},
{name:"Maya (Ops)",cls:"ops"},
{name:"Jordan (Backend)",cls:"dev"},
{name:"AI Worker",cls:"ai"}
];

/* UNIQUE MESSAGE POOL */
let messagePool=[
"site is lagging bad",
"users reporting crashes",
"feed not loading",
"api might be down",
"checking logs now",
"this might be database",
"trying restart",
"we got spike in traffic",
"nah something broke fr",
"looking into it"
];

/* INBOX THREADS */
let threads=[];

/* ADD LOG */
function addLog(){
const log=document.createElement("div");
log.className="log";
log.innerHTML=logs[Math.floor(Math.random()*logs.length)] +
`<div class="time">${new Date().toLocaleTimeString()}</div>`;
logFeed.prepend(log);
}

/* CHAT (NO REPEAT) */
function addMsg(){
if(messagePool.length===0) return;

const person=staff[Math.floor(Math.random()*staff.length)];
const text=messagePool.splice(Math.floor(Math.random()*messagePool.length),1)[0];

const msg=document.createElement("div");
msg.className="msg";
msg.innerHTML=`<span class="name ${person.cls}">${person.name}:</span> ${text}`;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;

/* ALSO SEND TO DM */
createDM(person.name,text);
}

/* CREATE DM */
function createDM(name,text){
let thread=threads.find(t=>t.name===name);

if(!thread){
thread={name, msgs:[]};
threads.push(thread);
}

thread.msgs.push({from:name,text});

/* RENDER INBOX */
renderInbox();
}

/* INBOX UI */
function renderInbox(){
inbox.innerHTML="";
threads.forEach((t,i)=>{
const el=document.createElement("div");
el.className="dm";
el.innerHTML=`<b>${t.name}</b><br>${t.msgs[t.msgs.length-1].text}`;
el.onclick=()=>openThread(i);
inbox.appendChild(el);
});
}

/* OPEN THREAD */
let currentThread=null;
function openThread(i){
currentThread=i;
thread.classList.add("active");
threadName.innerText=threads[i].name;

threadMsgs.innerHTML=threads[i].msgs.map(m=>
`<div class="tmsg ${m.from==='You'?'me':''}"><b>${m.from}:</b> ${m.text}</div>`
).join("");
}

/* SEND REPLY */
function sendReply(){
const text=replyInput.value;
threads[currentThread].msgs.push({from:"You",text});
replyInput.value="";
openThread(currentThread);
}

/* CLOSE */
function closeThread(){
thread.classList.remove("active");
}

/* OUTAGE MODE */
function triggerOutage(){
messagePool=[
"SITE DOWN??",
"yo prod is dead",
"500 errors everywhere",
"users blowing me up",
"WE ARE DOWN",
"checking db NOW",
"restart??",
"this is bad",
"traffic spike killed us"
];
}

/* LOOP */
setInterval(()=>{
addLog();
if(Math.random()>0.5) addMsg();
},1200);

</script>

</body>
</html>
