<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Cook’ed — Cook Better. Live Healthier.</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<!-- ICONS -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
--accent:#00ff9d;
--bg:#050505;
--card:rgba(255,255,255,.08);
--text:#fff;
--muted:#a1a1aa;
}

.premium{
--accent:#ff7ca8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
}

.screen{
display:none;
height:100vh;
width:100vw;
overflow:auto;
background:#000;
}

.active{
display:block;
animation:fade .25s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:18px;
background:#111;
color:white;
font-size:15px;
margin-top:12px;
}

.btn{
background:var(--accent);
color:black;
padding:15px;
border-radius:18px;
font-weight:900;
text-align:center;
margin-top:14px;
cursor:pointer;
transition:.2s;
}

.btn:active{
transform:scale(.97);
}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
padding:18px;
border-radius:24px;
margin:14px;
}

.hero{
height:60vh;
background:
linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.2)),
url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:24px;
}

.heroText h1{
font-size:54px;
font-weight:900;
letter-spacing:-2px;
}

.heroText p{
margin-top:8px;
font-size:16px;
color:#ddd;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.feed::-webkit-scrollbar{
display:none;
}

.feedItem{
height:100vh;
width:100%;
position:relative;
scroll-snap-align:start;
overflow:hidden;
background:black;
}

.feedItem img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

.feedShade{
position:absolute;
inset:0;
background:
linear-gradient(
to top,
rgba(0,0,0,.96),
rgba(0,0,0,.3),
transparent
);
}

.overlay{
position:absolute;
bottom:120px;
left:18px;
max-width:72%;
z-index:10;
}

.overlay h2{
font-size:34px;
font-weight:900;
margin-bottom:6px;
}

.overlay p{
font-size:14px;
color:#ddd;
line-height:1.5;
}

.actions{
position:absolute;
right:16px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
z-index:10;
align-items:center;
}

.actionBtn{
text-align:center;
font-size:13px;
font-weight:700;
cursor:pointer;
}

.actionBtn i{
font-size:30px;
margin-bottom:6px;
}

.liked{
color:#ff4d6d;
}

.nav{
position:fixed;
bottom:0;
width:100%;
padding:14px 0 20px;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,.88);
backdrop-filter:blur(20px);
z-index:999;
border-top:1px solid rgba(255,255,255,.08);
}

.nav i{
font-size:25px;
}

.modal{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:none;
overflow:auto;
padding-bottom:120px;
}

.modal.active{
display:block;
animation:fade .25s;
}

.recipeHero{
width:100%;
height:340px;
object-fit:cover;
}

.recipeContent{
padding:20px;
}

.recipeContent h2{
font-size:38px;
font-weight:900;
margin-bottom:10px;
}

.recipeContent h3{
margin-top:28px;
margin-bottom:14px;
font-size:22px;
}

.recipeContent p{
line-height:1.7;
color:#ddd;
margin-top:10px;
}

.videoPlayer{
width:100%;
height:230px;
border:none;
border-radius:22px;
margin-top:12px;
background:#111;
}

.badge{
display:inline-block;
padding:7px 14px;
border-radius:999px;
background:rgba(0,255,157,.12);
color:var(--accent);
font-size:12px;
font-weight:800;
margin-top:10px;
margin-right:6px;
}

.substituteCard{
background:#111;
padding:16px;
border-radius:18px;
margin-top:12px;
line-height:1.6;
}

.comment{
background:#111;
padding:14px;
border-radius:18px;
margin-top:12px;
}

.cameraWrap{
padding:16px;
}

.cameraBox{
position:relative;
overflow:hidden;
border-radius:28px;
}

video{
width:100%;
height:70vh;
object-fit:cover;
background:black;
border-radius:28px;
}

.scannerLine{
position:absolute;
top:0;
left:0;
width:100%;
height:3px;
background:var(--accent);
box-shadow:0 0 20px var(--accent);
animation:scannerMove 2s linear infinite;
}

@keyframes scannerMove{
0%{top:0}
100%{top:100%}
}

.scanCorner{
position:absolute;
width:40px;
height:40px;
border:4px solid var(--accent);
}

.corner1{
top:12px;
left:12px;
border-right:none;
border-bottom:none;
}

.corner2{
top:12px;
right:12px;
border-left:none;
border-bottom:none;
}

.corner3{
bottom:12px;
left:12px;
border-right:none;
border-top:none;
}

.corner4{
bottom:12px;
right:12px;
border-left:none;
border-top:none;
}

.ingredientsGrid{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:14px;
}

.ingredientTag{
background:#111;
padding:10px 14px;
border-radius:999px;
font-size:13px;
font-weight:700;
border:1px solid rgba(255,255,255,.08);
}

.aiGlow{
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:.7}
50%{opacity:1}
100%{opacity:.7}
}

.progress{
width:100%;
height:12px;
background:#111;
border-radius:999px;
overflow:hidden;
margin-top:8px;
}

.healthStats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.stat{
background:#111;
padding:14px;
border-radius:18px;
font-weight:700;
}

.mealCard{
margin-top:14px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.mealCard img{
width:100%;
height:180px;
object-fit:cover;
}

.mealInfo{
padding:14px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login" class="screen active">

<div class="hero">

<div class="heroText">
<h1>Cook’ed</h1>
<p>Cook Better. Live Healthier.</p>
</div>

</div>

<div class="card">

<h2>Welcome Back</h2>

<input id="username" placeholder="Enter username">

<div class="btn" onclick="enterApp()">
Enter App
</div>

<div class="badge">
AI Food + Fitness Platform
</div>

</div>

</div>

<!-- HOME -->

<div id="home" class="screen">
<div class="feed" id="feed"></div>
</div>

<!-- CAMERA -->

<div id="camera" class="screen">

<div class="cameraWrap">

<h2 style="margin-bottom:14px">
AI Fridge + Pantry Scanner
</h2>

<div class="cameraBox">

<video
id="video"
autoplay
playsinline
muted
></video>

<div class="scannerLine"></div>

<div class="scanCorner corner1"></div>
<div class="scanCorner corner2"></div>
<div class="scanCorner corner3"></div>
<div class="scanCorner corner4"></div>

</div>

<div class="btn" onclick="capture()">
Scan Refrigerator
</div>

<div id="scanResult"></div>

</div>

</div>

<!-- PROFILE -->

<div id="profile" class="screen">

<div class="card">

<h2 id="userInfo">Chef</h2>

<div class="badge">
Cook’ed Premium
</div>

<div class="btn" onclick="togglePremium()">
Toggle Premium 👑
</div>

</div>

<div id="health" style="display:none">

<div class="card">

<h2>AI Body Analysis</h2>

<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">

<div class="btn" onclick="analyze()">
Analyze Body
</div>

<div id="healthResult"></div>

</div>

<div class="card">

<h3>Daily Progress</h3>

Protein
<div class="progress">
<div style="width:78%;height:100%;background:var(--accent)"></div>
</div>

<br>

Calories
<div class="progress">
<div style="width:64%;height:100%;background:var(--accent)"></div>
</div>

<br>

Hydration
<div class="progress">
<div style="width:90%;height:100%;background:var(--accent)"></div>
</div>

</div>

<div class="card">

<h3>Recommended Meals</h3>

<div id="mealPlan"></div>

</div>

</div>

</div>

<!-- RECIPE MODAL -->

<div id="recipeModal" class="modal"></div>

<!-- COMMENTS -->

<div id="commentModal" class="modal">

<div style="padding:20px">

<h2>Comments</h2>

<div id="comments"></div>

<input
placeholder="Add comment..."
onkeydown="addComment(event)"
>

<div class="btn" onclick="closeComments()">
Close
</div>

</div>

</div>

<!-- NAV -->

<div class="nav">

<div onclick="nav('home')">
<i class="fa-solid fa-house"></i>
</div>

<div onclick="startCamera()">
<i class="fa-solid fa-camera"></i>
</div>

<div onclick="nav('profile')">
<i class="fa-solid fa-user"></i>
</div>

</div>

<script>

const ingredientDatabase = {

milk:["Mac and Cheese","Pancakes","Alfredo Pasta"],
eggs:["Omelette","Fried Rice","Breakfast Sandwich"],
cheese:["Burger","Pizza","Quesadilla"],
bread:["Sandwich","Toast","Grilled Cheese"],
chicken:["Chicken Alfredo","BBQ Chicken","Chicken Bowl"],
beef:["Burger","Steak Bowl","Tacos"],
lettuce:["Salad","Burger Wrap","Tacos"],
rice:["Fried Rice","Rice Bowl","Hibachi"],
banana:["Smoothie","Banana Pancakes","Oatmeal"]

};

const substitutes = {
milk:"Almond Milk",
butter:"Olive Oil",
eggs:"Banana",
rice:"Quinoa",
cream:"Greek Yogurt"
};

let user;
let isPremium = false;
let model;
let likes = {};
let likedPosts = {};
let currentStream;

/* NAV */

function nav(id){

document.querySelectorAll('.screen')
.forEach(s=>s.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

}

/* LOGIN */

async function enterApp(){

user = username.value || "Chef";

userInfo.innerHTML = `👤 ${user}`;

await loadFeed();

nav('home');

}

/* LOAD FEED */

async function loadFeed(){

feed.innerHTML = '';

const searches = [
"burger",
"pizza",
"pasta",
"steak",
"chicken",
"beef",
"salad",
"ramen",
"taco",
"pancake",
"omelette"
];

let meals = [];

for(let s of searches){

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${s}`
);

const data = await res.json();

if(data.meals){

meals.push(...data.meals.slice(0,2));

}

}

meals = meals.sort(()=>Math.random()-0.5);

meals.forEach(meal=>{

if(!likes[meal.idMeal]){

likes[meal.idMeal] =
Math.floor(Math.random()*900)+100;

}

feed.innerHTML += `

<div class="feedItem">

<img
src="${meal.strMealThumb}"
onclick="openRecipe('${meal.strMeal}')"
>

<div class="feedShade"></div>

<div class="overlay">

<h2>${meal.strMeal}</h2>

<p>
${meal.strCategory} • ${meal.strArea}
</p>

</div>

<div class="actions">

<div class="actionBtn"
onclick="like('${meal.idMeal}',this)">

<i class="fa-solid fa-heart ${likedPosts[meal.idMeal] ? 'liked' : ''}"></i>

<div id="likes-${meal.idMeal}">
${likes[meal.idMeal]}
</div>

</div>

<div class="actionBtn"
onclick="openComments()">

<i class="fa-solid fa-comment"></i>

<div>${Math.floor(Math.random()*300)}</div>

</div>

</div>

</div>

`;

});

}

/* LIKE */

function like(id,el){

if(!likedPosts[id]){

likes[id]++;
likedPosts[id] = true;

el.querySelector("i")
.classList.add('liked');

}else{

likes[id]--;
likedPosts[id] = false;

el.querySelector("i")
.classList.remove('liked');

}

document.getElementById(
`likes-${id}`
).innerText = likes[id];

}

/* RECIPE MODAL */

async function openRecipe(name){

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${name}`
);

const data = await res.json();

const meal = data.meals[0];

if(!meal)return;

recipeModal.classList.add('active');

/* INGREDIENTS */

let ingredientsHTML = '';

for(let i=1;i<=20;i++){

const ingredient =
meal[`strIngredient${i}`];

const measure =
meal[`strMeasure${i}`];

if(
ingredient &&
ingredient.trim() !== ""
){

ingredientsHTML += `

<div class="substituteCard">
🥘 ${measure || ''} ${ingredient}
</div>

`;

}

}

/* STEPS */

const steps = meal.strInstructions
.split('.')
.filter(step => step.trim() !== '');

let stepsHTML = '';

steps.forEach((step,index)=>{

stepsHTML += `

<div class="substituteCard">
<b>Step ${index+1}</b>
<br><br>
${step.trim()}.
</div>

`;

});

/* VIDEO */

let videoContent = '';

if(isPremium){

videoContent = `

<video
class="videoPlayer"
controls
poster="${meal.strMealThumb}"
>

<source
src="YOUR-UPLOADED-MP4-LINK.mp4"
type="video/mp4"
>

</video>

<div class="badge">
Premium Cooking Tutorial
</div>

`;

}else{

const yt =
meal.strYoutube
?
meal.strYoutube.split('v=')[1]
:
'';

videoContent = `

<iframe
class="videoPlayer"
src="https://www.youtube.com/embed/${yt}"
allowfullscreen>
</iframe>

`;

}

/* FINAL MODAL */

recipeModal.innerHTML = `

<img
class="recipeHero"
src="${meal.strMealThumb}"
>

<div class="recipeContent">

<h2>${meal.strMeal}</h2>

<div class="badge">
${meal.strCategory}
</div>

<div class="badge">
${meal.strArea} Cuisine
</div>

<div class="badge">
AI Recipe Guide
</div>

<p>
Tap through the full recipe below with ingredients,
instructions, and video tutorial.
</p>

<h3>🥘 Ingredients</h3>

${ingredientsHTML}

<h3>👨‍🍳 Step-by-Step Instructions</h3>

${stepsHTML}

<h3>🎥 Recipe Video</h3>

${videoContent}

<div class="card">

<h2>💡 Cook’ed AI Tips</h2>

<div class="substituteCard">
No milk? Use ${substitutes.milk}
</div>

<div class="substituteCard">
No eggs? Use ${substitutes.eggs}
</div>

<div class="substituteCard">
No butter? Use ${substitutes.butter}
</div>

<div class="substituteCard">
No cream? Use ${substitutes.cream}
</div>

</div>

<div class="btn"
onclick="openComments()">
Comments 💬
</div>

<div class="btn"
onclick="closeRecipe()">
Close
</div>

</div>

`;

}

function closeRecipe(){

recipeModal.classList.remove('active');

}

/* COMMENTS */

function openComments(){

commentModal.classList.add('active');

comments.innerHTML = `

<div class="comment">
🔥 This looks insane
</div>

<div class="comment">
Trying this tonight
</div>

<div class="comment">
W recipe fr
</div>

`;

}

function closeComments(){

commentModal.classList.remove('active');

}

function addComment(e){

if(e.key==="Enter"){

comments.innerHTML += `

<div class="comment">
${e.target.value}
</div>

`;

e.target.value = '';

}

}

/* CAMERA */

async function startCamera(){

nav('camera');

try{

if(currentStream){

currentStream.getTracks()
.forEach(track=>track.stop());

}

const stream =
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{
ideal:"environment"
}
},
audio:false
});

currentStream = stream;

video.srcObject = stream;

await video.play();

if(!model){

scanResult.innerHTML = `
<div class="card aiGlow">
Loading AI refrigerator scanner...
</div>
`;

model = await mobilenet.load();

}

scanResult.innerHTML = '';

}catch(err){

scanResult.innerHTML = `
<div class="card">
❌ Camera failed to load
</div>
`;

}

}

/* SCAN */

async function capture(){

if(!model)return;

scanResult.innerHTML = `
<div class="card aiGlow">
Analyzing refrigerator ingredients...
</div>
`;

const predictions =
await model.classify(video);

const detected = predictions
.slice(0,5)
.map(p=>p.className.split(',')[0]);

const fridgeItems = [];

detected.forEach(item=>{

const lower = item.toLowerCase();

if(lower.includes("banana"))
fridgeItems.push("banana");

if(lower.includes("apple"))
fridgeItems.push("apple");

if(lower.includes("milk"))
fridgeItems.push("milk");

if(lower.includes("egg"))
fridgeItems.push("eggs");

if(lower.includes("bread"))
fridgeItems.push("bread");

if(lower.includes("cheese"))
fridgeItems.push("cheese");

if(lower.includes("meat"))
fridgeItems.push("beef");

if(lower.includes("chicken"))
fridgeItems.push("chicken");

});

if(fridgeItems.length === 0){

fridgeItems.push(
"milk",
"eggs",
"bread",
"cheese"
);

}

showFridgeAnalysis(fridgeItems);

}

/* FRIDGE AI */

function showFridgeAnalysis(items){

let recipes = [];

items.forEach(item=>{

if(ingredientDatabase[item]){

recipes.push(...ingredientDatabase[item]);

}

});

recipes = [...new Set(recipes)];

scanResult.innerHTML = `

<div class="card">

<h2>🧠 AI Refrigerator Analysis</h2>

<p>
We detected these ingredients.
</p>

<div class="ingredientsGrid">

${items.map(item=>`

<div class="ingredientTag">
${item}
</div>

`).join('')}

</div>

</div>

<div class="card">

<h2>🍳 Meals You Can Make</h2>

${recipes.slice(0,6).map(recipe=>`

<div class="substituteCard">
${recipe}
</div>

`).join('')}

</div>

`;

}

/* PREMIUM */

function togglePremium(){

isPremium = !isPremium;

document.body.classList.toggle('premium');

health.style.display =
isPremium
?
'block'
:
'none';

}

/* HEALTH */

function analyze(){

const h = parseFloat(height.value);
const w = parseFloat(weight.value);

if(!h || !w)return;

const bmi =
(w / ((h/100)*(h/100)))
.toFixed(1);

const goal =
bmi < 18.5
?
"Bulk 💪"
:
bmi < 25
?
"Maintain ⚖️"
:
"Cut 🔥";

healthResult.innerHTML = `

<div class="healthStats">

<div class="stat">
BMI<br><br>${bmi}
</div>

<div class="stat">
Goal<br><br>${goal}
</div>

<div class="stat">
Calories<br><br>
${Math.floor(2200+w*8)}
</div>

<div class="stat">
Protein<br><br>
${Math.floor(w*1.3)}g
</div>

</div>

`;

generateMeals(goal);

}

/* MEALS */

async function generateMeals(goal){

const query =
goal.includes("Bulk")
?
"steak"
:
goal.includes("Cut")
?
"salad"
:
"chicken";

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`
);

const data = await res.json();

mealPlan.innerHTML = '';

data.meals.slice(0,3).forEach(m=>{

mealPlan.innerHTML += `

<div class="mealCard">

<img
src="${m.strMealThumb}"
>

<div class="mealInfo">

<h3>${m.strMeal}</h3>

<p style="color:#bbb">
${m.strCategory} • ${m.strArea}
</p>

</div>

</div>

`;

});

}

</script>

</body>
</html>
