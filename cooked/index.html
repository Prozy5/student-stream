<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#22c55e;
  --accent2:#4ade80;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:linear-gradient(180deg,#020617,#000);
  color:var(--text);
}

.app{width:100vw;height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex:1;overflow:auto}
.active{display:block}

/* LOGIN UPGRADE */
.login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top,#064e3b,#020617);
}

.login-card{
  background:rgba(15,23,42,0.9);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:360px;
  text-align:center;
  backdrop-filter:blur(12px);
  box-shadow:0 0 50px rgba(34,197,94,0.25);
}

.input, .btn, .file{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:none;
}

.input{background:#020617;color:white}
.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));cursor:pointer}
.file{background:#111;color:white}

/* FEED VIDEO */
.feed{display:flex;flex-direction:column}
.post{margin-bottom:20px}

video{
  width:100%;
  border-radius:12px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:10px;
  margin:10px;
}

.header{text-align:center;font-weight:900;padding:10px}

.nav{
  height:70px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#020617;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#020617;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-height:85%;
  overflow:auto;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <div class="login-card">
    <h1>Cook’ed</h1>
    <p style="color:var(--muted)">Short-form AI Cooking</p>

    <input class="input" id="username" placeholder="Username">
    <button class="btn" onclick="login()">Enter</button>
  </div>
</div>

<div class="app" id="app" style="display:none">

<!-- HOME FEED -->
<div class="screen active" id="home">
  <div class="header">Cook’ed Feed</div>

  <div class="feed" id="feed"></div>

  <!-- UPLOAD -->
  <div class="card">
    <input type="file" class="file" accept="video/*" onchange="uploadVideo(event)">
    <button class="btn" onclick="postVideo()">Post Video</button>
  </div>
</div>

<!-- AI -->
<div class="screen" id="ai">
  <div class="header">AI Suggestions</div>
  <button class="btn" onclick="scanFood()">Scan Pantry</button>
  <div id="aiResult"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>
  <h2 id="userDisplay"></h2>
  <h3>Saved</h3>
  <div id="savedList"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchScreen('home')">🏠</div>
  <div onclick="switchScreen('ai')">🤖</div>
  <div onclick="switchScreen('profile')">👤</div>
</div>

</div>

<!-- RECIPE MODAL -->
<div class="modal" id="recipeModal">
  <div class="modal-content" id="recipeContent"></div>
</div>

<script>

let uploadedVideo = null;

/* LOGIN */
function login(){
  const user = document.getElementById("username").value;
  if(!user) return;
  localStorage.setItem("user", user);
  startApp();
}

function startApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("userDisplay").innerText = "Chef " + localStorage.getItem("user");
  loadFeed();
  loadSaved();
}

if(localStorage.getItem("user")) startApp();

/* NAV */
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* FEED SYSTEM */
function loadFeed(){
  let feed = JSON.parse(localStorage.getItem("feed")) || [];

  // default videos
  if(feed.length===0){
    feed = [
      {video:"https://www.w3schools.com/html/mov_bbb.mp4",title:"Steak Cooking"},
      {video:"https://www.w3schools.com/html/movie.mp4",title:"Pasta Cooking"}
    ];
    localStorage.setItem("feed", JSON.stringify(feed));
  }

  renderFeed();
}

function renderFeed(){
  let feed = JSON.parse(localStorage.getItem("feed")) || [];

  document.getElementById("feed").innerHTML = feed.map((p,i)=>`
    <div class="post card">
      <video controls src="${p.video}"></video>
      <b>${p.title}</b>
      <button class="btn" onclick="openRecipe('chicken')">View Recipe</button>
    </div>
  `).join("");
}

/* UPLOAD VIDEO */
function uploadVideo(e){
  const file = e.target.files[0];
  if(file){
    uploadedVideo = URL.createObjectURL(file);
  }
}

function postVideo(){
  if(!uploadedVideo) return alert("Upload video first");

  let feed = JSON.parse(localStorage.getItem("feed")) || [];
  feed.unshift({video:uploadedVideo,title:"User Upload"});
  localStorage.setItem("feed", JSON.stringify(feed));

  uploadedVideo = null;
  renderFeed();
}

/* AI */
function scanFood(){
  const foods=["chicken","rice","eggs"];
  const pick=foods[Math.floor(Math.random()*foods.length)];
  document.getElementById("aiResult").innerHTML="Detected: "+pick;
}

/* RECIPE */
function openRecipe(q){
  document.getElementById("recipeModal").style.display="flex";
  fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${q}`)
  .then(res=>res.json())
  .then(data=>{
    const m=data.meals[0];
    document.getElementById("recipeContent").innerHTML=`
      <h2>${m.strMeal}</h2>
      <img src="${m.strMealThumb}" style="width:100%">
      <p>${m.strInstructions.substring(0,200)}...</p>
      <button class="btn" onclick="saveRecipe('${m.strMeal}')">Save</button>
    `;
  });
}

/* SAVE */
function saveRecipe(name){
  let saved=JSON.parse(localStorage.getItem("saved"))||[];
  saved.push(name);
  localStorage.setItem("saved",JSON.stringify(saved));
  loadSaved();
}

function loadSaved(){
  let saved=JSON.parse(localStorage.getItem("saved"))||[];
  document.getElementById("savedList").innerHTML=
    saved.map(r=>"<div class='card'>"+r+"</div>").join("");
}

/* CLOSE MODAL */
document.getElementById("recipeModal").onclick=()=>{
  document.getElementById("recipeModal").style.display="none";
}

</script>

</body>
</html>
