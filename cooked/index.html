<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#020617;
  --card:rgba(255,255,255,0.06);
  --accent:#00ff9d;
  --text:#eafff5;
}

/* PREMIUM THEME */
.premium-on{
  --accent:#ffcc00;
  --bg:#1a1200;
  --card:rgba(255,204,0,0.1);
}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* BASIC UI SAME BUT CLEANER */
.screen{display:none;padding:20px}
.active{display:block}

.card{
  background:var(--card);
  padding:12px;
  border-radius:15px;
  margin-bottom:12px;
}

img{width:100%;border-radius:10px}

/* BUTTON */
button{
  background:var(--accent);
  border:none;
  padding:10px;
  border-radius:10px;
  width:100%;
  margin-top:8px;
  cursor:pointer;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
}

/* PREMIUM */
.toggle{
  width:40px;height:20px;background:#333;border-radius:20px;cursor:pointer;
}
.toggle.active{background:var(--accent)}

/* AUTH */
.auth-btn{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  background:#111;
  text-align:center;
  cursor:pointer;
}

/* HEALTH */
.health{
  background:#111;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>Cook’ed</h1>
  <input id="user" placeholder="Username">
  <button onclick="start()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- HOME -->
<div id="home" class="screen active">
  <h2>Cook’ed</h2>
  <input placeholder="Search food..." onkeyup="search(this.value)">
  <div id="feed"></div>
</div>

<!-- AI -->
<div id="ai" class="screen">
  <h2>AI Kitchen</h2>
  <input placeholder="Type ingredients..." onkeyup="ai(this.value)">
  <div id="aiBox"></div>

  <button onclick="scan()">📸 Scan Meal</button>

  <div id="healthPanel"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <h2 id="name"></h2>

  <div>
    Cook’ed Premium 👑
    <div class="toggle" id="toggle" onclick="premium()"></div>
  </div>

  <div id="auth"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="nav('ai')">🤖</div>
  <div onclick="nav('profile')">👤</div>
</div>

</div>

<script>

function start(){
  app.style.display="block";
  login.style.display="none";
  name.innerText="Chef "+user.value;
  loadFeed();
}

function nav(x){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(x).classList.add("active");
}

/* IMAGE API */
function foodImg(q){
  return `https://source.unsplash.com/400x300/?${q},food`;
}

/* FEED */
function loadFeed(){
  let foods=["chicken","pasta","steak"];
  feed.innerHTML="";
  foods.forEach(f=>{
    feed.innerHTML+=`
    <div class="card">
      <img src="${foodImg(f)}">
      <b>${f}</b>
      <button onclick="open('${f}')">View</button>
    </div>`;
  });
}

/* SEARCH */
function search(q){
  if(q.length<2)return;
  open(q);
}

/* AI */
function ai(q){
  if(q.length<2)return;
  aiBox.innerHTML=`<div class="card" onclick="open('${q}')">AI Suggestion: ${q}</div>`;
}

/* SCAN FOOD AI */
function scan(){
  alert("Scanning image...");
  setTimeout(()=>{
    let food="chicken salad";

    healthPanel.innerHTML=`
    <div class="health">
      <h3>${food}</h3>
      Calories: 400 kcal<br>
      Protein: 30g<br>
      Carbs: 20g<br><br>

      💡 Recommendation:
      High protein meal. Good for muscle gain.
    </div>`;
  },1500);
}

/* PREMIUM */
let isPremium=false;

function premium(){
  isPremium=!isPremium;
  toggle.classList.toggle("active");

  if(isPremium){
    document.body.classList.add("premium-on");

    auth.innerHTML=`
      <h3>Sign in</h3>
      <div class="auth-btn">Continue with Google</div>
      <div class="auth-btn">Continue with Apple</div>
      <div class="auth-btn">Continue with Microsoft</div>
      <div class="auth-btn">Enable 2FA 🔐</div>
    `;
  }else{
    document.body.classList.remove("premium-on");
    auth.innerHTML="";
  }
}

/* OPEN */
function open(q){
  alert("Loading "+q);
}

</script>

</body>
</html>
