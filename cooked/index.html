<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Cook’ed — Cook Better. Live Healthier.</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<!-- ICONS -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
--accent:#00ff9d;
--bg:#050505;
--card:rgba(255,255,255,.07);
--text:#fff;
--muted:#b3b3b3;
}

.premium{
--accent:#ff7ca8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
}

/* GLOBAL */

.screen{
display:none;
height:100vh;
width:100vw;
overflow:auto;
background:#000;
}

.active{
display:block;
animation:fade .25s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:18px;
background:#111;
color:white;
font-size:15px;
margin-top:12px;
}

.btn{
background:var(--accent);
color:black;
padding:14px;
border-radius:18px;
font-weight:900;
text-align:center;
margin-top:14px;
cursor:pointer;
transition:.2s;
}

.btn:active{
transform:scale(.97);
}

.card{
background:var(--card);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
padding:18px;
border-radius:24px;
margin:14px;
}

/* LOGIN */

.hero{
height:58vh;
background:
linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.2)),
url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1400&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:24px;
}

.heroText h1{
font-size:48px;
font-weight:900;
}

.heroText p{
margin-top:6px;
color:#ddd;
font-size:16px;
}

/* FEED */

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.feed::-webkit-scrollbar{
display:none;
}

.feedItem{
height:100vh;
width:100%;
position:relative;
scroll-snap-align:start;
background:black;
overflow:hidden;
}

.feedItem img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:120px;
left:18px;
max-width:72%;
z-index:10;
}

.overlay h2{
font-size:32px;
font-weight:900;
margin-bottom:4px;
}

.overlay p{
font-size:14px;
color:#ddd;
line-height:1.4;
}

.actions{
position:absolute;
right:16px;
bottom:120px;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
z-index:10;
}

.actionBtn{
text-align:center;
font-size:13px;
font-weight:700;
cursor:pointer;
}

.actionBtn i{
font-size:30px;
margin-bottom:5px;
}

.liked{
color:#ff4d6d;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
width:100%;
padding:14px 0 20px;
background:rgba(0,0,0,.9);
display:flex;
justify-content:space-around;
backdrop-filter:blur(18px);
z-index:999;
}

.nav i{
font-size:25px;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:none;
overflow:auto;
padding-bottom:100px;
}

.modal.active{
display:block;
}

.recipeHero{
width:100%;
height:340px;
object-fit:cover;
}

.recipeContent{
padding:20px;
}

.recipeContent h2{
font-size:34px;
margin-bottom:8px;
}

.recipeContent p{
color:#ddd;
line-height:1.7;
margin-top:10px;
}

.recipeContent h3{
margin-top:24px;
margin-bottom:10px;
}

/* CAMERA */

.cameraWrap{
padding:16px;
}

video{
width:100%;
height:68vh;
object-fit:cover;
border-radius:28px;
background:black;
}

.scanResult img{
width:100%;
border-radius:20px;
margin-top:12px;
}

/* HEALTH */

.bodyScan{
height:260px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.body{
width:120px;
height:220px;
border-radius:60px;
background:
linear-gradient(to bottom,#222,#111);
position:relative;
}

.dot{
width:8px;
height:8px;
background:var(--accent);
border-radius:50%;
position:absolute;
animation:scan 2s infinite;
}

@keyframes scan{
0%{transform:translateY(-20px);opacity:0}
50%{opacity:1}
100%{transform:translateY(240px);opacity:0}
}

.progress{
height:10px;
background:#222;
border-radius:999px;
margin-top:10px;
overflow:hidden;
}

.progress div{
height:100%;
background:var(--accent);
}

.stat{
background:#111;
padding:14px;
border-radius:18px;
margin-top:10px;
font-weight:700;
}

/* COMMENTS */

.comment{
background:#111;
padding:12px;
border-radius:16px;
margin-top:10px;
}

/* BADGE */

.badge{
display:inline-block;
padding:7px 14px;
border-radius:999px;
background:rgba(0,255,157,.15);
color:var(--accent);
font-size:12px;
font-weight:800;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login" class="screen active">

<div class="hero">
<div class="heroText">
<h1>Cook’ed</h1>
<p>Cook Better. Live Healthier.</p>
</div>
</div>

<div class="card">

<h2>Welcome Back</h2>

<input id="username" placeholder="Enter username">

<div class="btn" onclick="enterApp()">
Enter App
</div>

<div class="badge">
AI Food + Fitness Platform
</div>

</div>

</div>

<!-- HOME -->

<div id="home" class="screen">
<div class="feed" id="feed"></div>
</div>

<!-- CAMERA -->

<div id="camera" class="screen">

<div class="cameraWrap">

<h2 style="margin-bottom:14px">
AI Food Scanner
</h2>

<video
id="video"
autoplay
playsinline
muted
></video>

<div class="btn" onclick="capture()">
Scan Food
</div>

<div id="scanResult" class="scanResult"></div>

</div>

</div>

<!-- PROFILE -->

<div id="profile" class="screen">

<div class="card">

<h2 id="userInfo">
Chef
</h2>

<div class="badge">
Cook’ed Premium
</div>

<div class="btn" onclick="togglePremium()">
Toggle Premium 👑
</div>

</div>

<div id="health" style="display:none">

<div class="card">

<h2>AI Body Analysis</h2>

<div class="bodyScan">

<div class="body">

<div class="dot" style="left:20px"></div>
<div class="dot" style="left:55px;animation-delay:.4s"></div>
<div class="dot" style="left:90px;animation-delay:.8s"></div>

</div>

</div>

<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">

<div class="btn" onclick="analyze()">
Analyze Body
</div>

<div id="healthResult"></div>

</div>

<div class="card">

<h3>Daily Progress</h3>

Protein
<div class="progress">
<div style="width:74%"></div>
</div>

Calories
<div class="progress">
<div style="width:60%"></div>
</div>

Hydration
<div class="progress">
<div style="width:88%"></div>
</div>

Workout
<div class="progress">
<div style="width:42%"></div>
</div>

</div>

<div class="card">

<h3>Recommended Meals</h3>

<div id="mealPlan"></div>

</div>

</div>

</div>

<!-- RECIPE MODAL -->

<div id="recipeModal" class="modal"></div>

<!-- COMMENTS -->

<div id="commentModal" class="modal">

<div style="padding:20px">

<h2>Comments</h2>

<div id="comments"></div>

<input
placeholder="Add comment..."
onkeydown="addComment(event)"
>

<div class="btn" onclick="closeComments()">
Close
</div>

</div>

</div>

<!-- NAV -->

<div class="nav">

<div onclick="nav('home')">
<i class="fa-solid fa-house"></i>
</div>

<div onclick="startCamera()">
<i class="fa-solid fa-camera"></i>
</div>

<div onclick="nav('profile')">
<i class="fa-solid fa-user"></i>
</div>

</div>

<script>

/* ======================
SUPABASE
====================== */

const SUPABASE_URL =
"https://iabzmoxzbqzcqgypxctr.supabase.co";

const SUPABASE_KEY =
"YOUR_SUPABASE_ANON_KEY";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* ======================
GLOBAL
====================== */

let user;
let isPremium = false;
let model;
let likes = {};
let likedPosts = {};

/* ======================
NAV
====================== */

function nav(id){

document.querySelectorAll('.screen')
.forEach(s=>s.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

}

/* ======================
LOGIN
====================== */

async function enterApp(){

user = username.value || "Chef";

userInfo.innerHTML =
`👤 ${user}`;

await loadFeed();

nav('home');

}

/* ======================
LOAD FEED
====================== */

async function loadFeed(){

feed.innerHTML = '';

const searches = [
"burger",
"pizza",
"pasta",
"chicken",
"beef",
"salad",
"rice",
"steak",
"sandwich",
"seafood"
];

let meals = [];

for(let s of searches){

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${s}`
);

const data = await res.json();

if(data.meals){

meals.push(...data.meals.slice(0,2));

}

}

meals = meals.sort(()=>Math.random()-0.5);

meals.forEach(meal=>{

if(!likes[meal.idMeal]){

likes[meal.idMeal] =
Math.floor(Math.random()*900)+100;

}

feed.innerHTML += `

<div class="feedItem">

<img
src="${meal.strMealThumb}"
onclick="openRecipe('${meal.strMeal}')"
>

<div class="overlay">

<h2>${meal.strMeal}</h2>

<p>
${meal.strCategory}
• ${meal.strArea}
</p>

</div>

<div class="actions">

<div class="actionBtn"
onclick="like('${meal.idMeal}',this)">

<i class="fa-solid fa-heart
${likedPosts[meal.idMeal]?'liked':''}">
</i>

<div id="likes-${meal.idMeal}">
${likes[meal.idMeal]}
</div>

</div>

<div class="actionBtn"
onclick="openComments()">

<i class="fa-solid fa-comment"></i>

<div>
${Math.floor(Math.random()*200)}
</div>

</div>

<div class="actionBtn">

<i class="fa-solid fa-bookmark"></i>

<div>Save</div>

</div>

</div>

</div>

`;

});

}

/* ======================
LIKE
====================== */

function like(id,el){

if(!likedPosts[id]){

likes[id]++;

likedPosts[id] = true;

el.querySelector("i")
.classList.add('liked');

}else{

likes[id]--;

likedPosts[id] = false;

el.querySelector("i")
.classList.remove('liked');

}

document.getElementById(
`likes-${id}`
).innerText = likes[id];

}

/* ======================
RECIPE
====================== */

async function openRecipe(name){

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${name}`
);

const data = await res.json();

const meal = data.meals[0];

recipeModal.classList.add('active');

recipeModal.innerHTML = `

<img
class="recipeHero"
src="${meal.strMealThumb}"
>

<div class="recipeContent">

<h2>${meal.strMeal}</h2>

<div class="badge">
${meal.strCategory}
</div>

<p>
${meal.strInstructions}
</p>

<h3>Ingredients</h3>

<p>
🥩 ${meal.strIngredient1}<br>
🥬 ${meal.strIngredient2}<br>
🧂 ${meal.strIngredient3}<br>
🍚 ${meal.strIngredient4}<br>
🍅 ${meal.strIngredient5}
</p>

<h3>Recipe Video</h3>

<iframe
width="100%"
height="240"
src="https://www.youtube.com/embed?listType=search&list=${meal.strMeal} recipe"
style="border:none;border-radius:18px"
allowfullscreen>
</iframe>

<div class="btn" onclick="openComments()">
Comments 💬
</div>

<div class="btn" onclick="closeRecipe()">
Close
</div>

</div>

`;

}

function closeRecipe(){

recipeModal.classList.remove('active');

}

/* ======================
COMMENTS
====================== */

function openComments(){

commentModal.classList.add('active');

comments.innerHTML = `

<div class="comment">
🔥 This looks crazy
</div>

<div class="comment">
Trying this tonight
</div>

<div class="comment">
W recipe fr
</div>

`;

}

function closeComments(){

commentModal.classList.remove('active');

}

function addComment(e){

if(e.key==="Enter"){

comments.innerHTML += `
<div class="comment">
${e.target.value}
</div>
`;

e.target.value = '';

}

}

/* ======================
CAMERA
====================== */

async function startCamera(){

nav('camera');

try{

const stream =
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment"
},
audio:false
});

video.srcObject = stream;

video.play();

if(!model){

scanResult.innerHTML = `
<div class="card">
Loading AI scanner...
</div>
`;

model = await mobilenet.load();

}

scanResult.innerHTML = '';

}catch(err){

scanResult.innerHTML = `
<div class="card">
❌ Camera failed to load
</div>
`;

}

}

/* ======================
SCAN
====================== */

async function capture(){

if(!model)return;

scanResult.innerHTML = `
<div class="card">
Scanning food...
</div>
`;

const predictions =
await model.classify(video);

const food =
predictions[0].className
.split(',')[0];

const confidence =
(predictions[0].probability*100)
.toFixed(1);

scanResult.innerHTML = `

<div class="card">

<h2>${food}</h2>

<p>
Confidence: ${confidence}%
</p>

<div class="badge">
AI Food Detection
</div>

</div>

`;

suggestRecipe(food);

}

/* ======================
SUGGEST
====================== */

async function suggestRecipe(food){

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${food}`
);

const data = await res.json();

if(data.meals){

const meal = data.meals[0];

scanResult.innerHTML += `

<div class="card">

<img
src="${meal.strMealThumb}"
style="
width:100%;
border-radius:20px;
"
>

<h2 style="margin-top:12px">
${meal.strMeal}
</h2>

<p>
${meal.strCategory}
• ${meal.strArea}
</p>

<div class="btn"
onclick="openRecipe('${meal.strMeal}')">
Open Recipe
</div>

</div>

`;

}else{

scanResult.innerHTML += `

<div class="card">

No exact recipe found.
Try scanning another food.

</div>

`;

}

}

/* ======================
PREMIUM
====================== */

function togglePremium(){

isPremium = !isPremium;

document.body.classList.toggle(
'premium'
);

health.style.display =
isPremium
?
'block'
:
'none';

}

/* ======================
HEALTH AI
====================== */

function analyze(){

const h = parseFloat(height.value);
const w = parseFloat(weight.value);

if(!h || !w)return;

const bmi =
(w / ((h/100)*(h/100)))
.toFixed(1);

const goal =
bmi < 18.5
?
"Bulk 💪"
:
bmi < 25
?
"Maintain ⚖️"
:
"Cut 🔥";

healthResult.innerHTML = `

<div class="stat">
BMI: ${bmi}
</div>

<div class="stat">
Goal: ${goal}
</div>

<div class="stat">
Calories:
${Math.floor(2200+w*8)}
</div>

<div class="stat">
Protein Goal:
${Math.floor(w*1.3)}g
</div>

`;

generateMeals(goal);

}

/* ======================
MEALS
====================== */

async function generateMeals(goal){

const query =
goal.includes("Bulk")
?
"steak"
:
goal.includes("Cut")
?
"salad"
:
"chicken";

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`
);

const data = await res.json();

mealPlan.innerHTML = '';

data.meals.slice(0,3).forEach(m=>{

mealPlan.innerHTML += `

<div class="card">

<img
src="${m.strMealThumb}"
style="
width:100%;
border-radius:18px;
"
>

<h3 style="margin-top:12px">
${m.strMeal}
</h3>

<p style="color:#bbb">
${m.strCategory}
• ${m.strArea}
</p>

</div>

`;

});

}

</script>

</body>
</html>
