<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#020617;
  --card:rgba(255,255,255,0.06);
  --accent:#00ff9d;
  --text:#eafff5;
}

/* PREMIUM COLORS */
.premium-mode{
  --accent:#ff7b7b;
  --text:#ffecec;
}

body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:var(--text);
}

/* GENERAL */
.screen{display:none;padding:20px}
.active{display:block}

.header{text-align:center;font-size:24px;font-weight:bold}

/* CARDS */
.card{
  background:var(--card);
  padding:10px;
  border-radius:15px;
  margin-top:10px;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
}

/* TOGGLE */
.toggle{
  width:40px;height:20px;background:#333;border-radius:20px;cursor:pointer;position:relative
}
.toggle::after{
  content:"";width:18px;height:18px;background:white;position:absolute;top:1px;left:1px;border-radius:50%
}
.toggle.active{background:var(--accent)}
.toggle.active::after{left:21px}

/* AUTH */
.auth-btn{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#111;
  text-align:center;
  cursor:pointer;
}

/* HEALTH PANEL */
.health{
  background:#111;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="header">Cook’ed</div>
  <input placeholder="Search food..." onkeyup="search(this.value)">
  <div id="feed"></div>
</div>

<!-- AI -->
<div class="screen" id="ai">
  <div class="header">AI Kitchen</div>
  <input placeholder="Type ingredients...">
  <div id="aiBox"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>

  <div>Chef User</div>

  <div style="margin-top:10px;">
    Cook’ed Premium 👑
    <div class="toggle" id="toggle" onclick="togglePremium()"></div>
  </div>

  <!-- AUTH (PREMIUM ONLY) -->
  <div id="authSection" style="display:none;">
    <div class="auth-btn">🔐 Sign in with Google</div>
    <div class="auth-btn">🍎 Sign in with Apple</div>
    <div class="auth-btn">🪟 Sign in with Microsoft</div>
  </div>

  <!-- HEALTH AI -->
  <div id="healthSection" style="display:none;">
    <div class="card" onclick="scanFood()">📸 Scan Meal</div>
    <div id="healthResult"></div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="nav('ai')">🤖</div>
  <div onclick="nav('profile')">👤</div>
</div>

</div>

<script>

/* NAV */
function nav(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* LOAD FEED WITH REAL IMAGES */
function loadFeed(){
  const foods=["chicken","steak","pasta","salmon"];

  foods.forEach(f=>{
    feed.innerHTML+=`
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?${f},food">
      <b>${f}</b>
    </div>`;
  });
}
loadFeed();

/* SEARCH */
function search(q){
  if(q.length<2)return;
  feed.innerHTML=`
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?${q},food">
      <b>${q}</b>
    </div>`;
}

/* PREMIUM */
let premium=false;

function togglePremium(){
  premium=!premium;
  toggle.classList.toggle("active");

  document.body.classList.toggle("premium-mode");

  authSection.style.display = premium ? "block":"none";
  healthSection.style.display = premium ? "block":"none";
}

/* AI FOOD SCAN + HEALTH */
function scanFood(){
  const foods=[
    {name:"Chicken",cal:450,protein:35,diet:"High Protein 💪"},
    {name:"Salmon",cal:500,protein:40,diet:"Healthy Fats 🧠"},
    {name:"Pasta",cal:650,protein:20,diet:"Carb Load 🍝"}
  ];

  let f=foods[Math.floor(Math.random()*foods.length)];

  healthResult.innerHTML=`
    <div class="health">
      <h3>${f.name}</h3>
      Calories: ${f.cal} kcal<br>
      Protein: ${f.protein}g<br>
      Recommendation: ${f.diet}
    </div>
  `;
}

</script>

</body>
</html>
