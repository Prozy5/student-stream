<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
:root{--accent:#00ff9d;--bg:#000;--card:rgba(255,255,255,0.08);--text:#fff}
.premium{--accent:#ff7a9c}

body{margin:0;font-family:-apple-system;background:#000;color:#fff}

.screen{display:none;height:100vh;overflow:auto}
.active{display:block}

.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.feed-item{height:100vh;scroll-snap-align:start;position:relative}
.feed-item img{width:100%;height:100%;object-fit:cover}

.overlay{position:absolute;bottom:120px;left:15px}
.actions{position:absolute;right:15px;bottom:120px;text-align:center}
.actions div{margin:10px 0;font-size:18px}

.card{background:rgba(255,255,255,0.08);padding:15px;border-radius:20px;margin:10px}
.btn{background:var(--accent);padding:12px;border-radius:14px;margin:10px;text-align:center}

.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;padding:10px;background:#000}

.modal{position:fixed;inset:0;background:#000;display:none;padding:20px;overflow:auto}
.modal.active{display:block}

.hero{height:300px;background:url('https://source.unsplash.com/900x700/?chef,kitchen') center/cover}

.heart{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:80px;
animation:pop .6s;
}
@keyframes pop{
0%{opacity:0;transform:scale(.5)}
50%{opacity:1;transform:scale(1.2)}
100%{opacity:0}
}
</style>
</head>

<body>

<div id="login" class="screen active">
<div class="hero"></div>
<div class="card">
<h2>Cook’ed</h2>
<p>Cook better. Live healthier.</p>
<input id="username" placeholder="Username">
<div class="btn" onclick="enterApp()">Enter</div>
</div>
</div>

<div id="home" class="screen">
<div id="feed" class="feed"></div>
</div>

<div id="camera" class="screen">
<video id="video" autoplay playsinline style="width:100%"></video>
<canvas id="canvas" style="display:none"></canvas>
<div class="btn" onclick="capture()">Scan</div>
<div id="scanResult"></div>
</div>

<div id="profile" class="screen">
<div id="userInfo"></div>
<div class="btn" onclick="togglePremium()">Toggle Premium 👑</div>

<div id="health" style="display:none">
<input id="height" placeholder="Height cm">
<input id="weight" placeholder="Weight kg">
<div class="btn" onclick="analyze()">Analyze</div>
<div id="healthResult"></div>
<div id="mealPlan"></div>
</div>
</div>

<div id="recipeModal" class="modal"></div>

<div id="commentModal" class="modal"></div>

<div class="nav">
<div onclick="nav('home')">🏠</div>
<div onclick="startCamera()">📸</div>
<div onclick="nav('profile')">👤</div>
</div>

<script>
let user,isPremium=false,model,stream;
let likes={},commentsData={};

function nav(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id!=='camera' && stream){
stream.getTracks().forEach(t=>t.stop());
}
}

function enterApp(){
user=username.value||'Chef';
userInfo.innerText="👤 "+user;
loadFeed();
nav('home');
}

async function loadFeed(){
let res=await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=');
let data=await res.json();
feed.innerHTML='';

data.meals.slice(0,8).forEach(meal=>{
likes[meal.idMeal]=likes[meal.idMeal]||Math.floor(Math.random()*500);

feed.innerHTML+=`
<div class="feed-item" ondblclick="doubleLike('${meal.idMeal}')">
<img src="${meal.strMealThumb}" onclick="openRecipe('${meal.strMeal}','${meal.idMeal}')">

<div class="overlay"><h2>${meal.strMeal}</h2></div>

<div class="actions">
<div onclick="like('${meal.idMeal}')">❤️<br>${likes[meal.idMeal]}</div>
<div onclick="openComments('${meal.idMeal}')">💬</div>
<div onclick="save('${meal.idMeal}')">🔖</div>
</div>

<div id="heart-${meal.idMeal}"></div>
</div>`;
});
}

function like(id){likes[id]++;loadFeed();}

function doubleLike(id){
likes[id]++;
document.getElementById("heart-"+id).innerHTML="<div class='heart'>❤️</div>";
setTimeout(loadFeed,300);
}

function save(id){
alert("Saved 🔖");
}

function openRecipe(name,id){
recipeModal.classList.add('active');
recipeModal.innerHTML=`
<h2>${name}</h2>
<p>Recipe loaded</p>
${isPremium?`<iframe width="100%" height="200" src="https://www.youtube.com/embed?listType=search&list=${name} recipe"></iframe>`:'🔒 Premium for video'}
<div class="btn" onclick="closeRecipe()">Close</div>
`;
}

function closeRecipe(){recipeModal.classList.remove('active');}

function openComments(id){
commentModal.classList.add('active');
if(!commentsData[id])commentsData[id]=["🔥 fire","making this"];
commentModal.innerHTML=`<h3>Comments</h3>`;

commentsData[id].forEach(c=>{
commentModal.innerHTML+=`<div class="card">${c}</div>`;
});

commentModal.innerHTML+=`
<input id="commentInput" placeholder="Add comment" onkeydown="addComment(event,'${id}')">
<div class="btn" onclick="closeComments()">Close</div>
`;
}

function addComment(e,id){
if(e.key==="Enter"){
commentsData[id].push(e.target.value);
openComments(id);
}
}

function closeComments(){commentModal.classList.remove('active');}

// CAMERA
async function startCamera(){
nav('camera');

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

video.srcObject=stream;

if(!model)model=await mobilenet.load();
}

async function capture(){
const ctx=canvas.getContext('2d');
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
ctx.drawImage(video,0,0);

let predictions=await model.classify(canvas);
let food=predictions[0].className.split(',')[0];

scanResult.innerHTML=`<div class="card">Detected: ${food}</div>`;
suggestRecipe(food);
}

async function suggestRecipe(food){
let res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${food}`);
let data=await res.json();

if(data.meals){
scanResult.innerHTML+=`<div class="card">Try: ${data.meals[0].strMeal}</div>`;
}
}

// PREMIUM
function togglePremium(){
isPremium=!isPremium;
health.style.display=isPremium?'block':'none';
}

// HEALTH
function analyze(){
let h=height.value;
let w=weight.value;
let bmi=(w/((h/100)*(h/100))).toFixed(1);

let goal=bmi<18.5?"Bulk 💪":bmi<25?"Maintain ⚖️":"Cut 🔥";

healthResult.innerHTML=`<div class="card">BMI: ${bmi}<br>${goal}</div>`;
generateMeals(goal);
}

async function generateMeals(goal){
let query=goal.includes("Bulk")?"chicken":"salad";
let res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
let data=await res.json();

mealPlan.innerHTML="<h3>Meals</h3>";
data.meals.slice(0,3).forEach(m=>{
mealPlan.innerHTML+=`<div class="card">${m.strMeal}</div>`;
});
}
</script>

</body>
</html>
