<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#06110c;
  --accent:#4CAF50;
  --accent2:#00ff9d;
  --text:#eafef3;
  --muted:#9fb3c8;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:radial-gradient(circle at top,#0b1f16,#020705);
  color:var(--text);
  overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(0,255,157,.08), transparent 60%);
  animation:moveBg 18s linear infinite;
}
@keyframes moveBg{
  0%{transform:translate(0,0)}
  50%{transform:translate(-8%, -10%)}
  100%{transform:translate(0,0)}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  position:sticky;
  top:0;
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:900;
  font-size:20px;
}
.logo span{color:var(--accent)}

.navLinks{
  display:flex;
  gap:20px;
  align-items:center;
}

.navLinks span{
  cursor:pointer;
  color:var(--muted);
  font-weight:600;
  transition:.2s;
}
.navLinks span:hover{
  color:white;
}

.navBtn{
  padding:10px 20px;
  border-radius:999px;
  border:none;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  transition:.2s;
}
.navBtn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(0,255,157,.4);
}

/* HERO */
.hero{
  text-align:center;
  padding:130px 20px 90px;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px)}
  to{opacity:1; transform:translateY(0)}
}

.hero img{
  width:85px;
  margin-bottom:20px;
  filter:drop-shadow(0 0 20px rgba(0,255,157,.5));
}

.hero h1{
  font-size:66px;
  font-weight:900;
}

.highlight{
  background:linear-gradient(90deg,#4CAF50,#00ff9d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* JOIN MODAL */
.joinModal{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:end;
  transition:.4s;
}

.joinBox{
  width:100%;
  max-width:500px;
  background:#081710;
  padding:30px;
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  animation:slideUp .4s ease;
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

.joinBox h2{
  margin-bottom:10px;
}

.joinBox input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0c1c14;
  color:white;
}

.joinBox button{
  margin-top:15px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:900;
  cursor:pointer;
}

.closeBtn{
  margin-top:10px;
  text-align:center;
  cursor:pointer;
  color:var(--muted);
}

/* USER COUNT */
.counter{
  margin-top:15px;
  font-size:14px;
  color:var(--muted);
}

/* EVERYTHING ELSE SAME */
.section{max-width:1100px;margin:100px auto;padding:0 20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px;}
.card{padding:22px;border-radius:20px;background:var(--card);border:1px solid var(--border);transition:.3s;}
.card:hover{transform:translateY(-8px);border-color:var(--accent);}

.demo{text-align:center;}
.demo input{padding:15px;width:60%;max-width:420px;border-radius:12px;border:1px solid var(--border);background:#0c1c14;color:white;}
.demo button{padding:15px;margin-left:10px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));font-weight:900;}

.results{margin-top:30px;display:grid;gap:15px;}
.resultCard{padding:18px;border-radius:16px;background:var(--card);border:1px solid var(--border);}

.feedGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-top:20px;}
.feedCard{height:200px;border-radius:16px;background:linear-gradient(135deg,#123,#000);display:flex;align-items:end;padding:12px;font-weight:800;}

footer{text-align:center;padding:50px;color:var(--muted);}
</style>
</head>

<body>

<nav>
  <div class="logo">Cook<span>’ed</span></div>

  <div class="navLinks">
    <span onclick="scrollToTop()">Home</span>
    <span onclick="scrollToFeed()">Feed</span>
    <span onclick="openJoin()">Join</span>
    <button class="navBtn" onclick="scrollToDemo()">Try Demo</button>
  </div>
</nav>

<section class="hero">
  <img src="cooked-logo.PNG">
  <h1>Cook Smarter. <br><span class="highlight">Not Harder.</span></h1>
  <p>Turn whatever you have into real meals.</p>

  <div class="counter" id="userCount">🔥 1,284 people joined</div>
</section>

<!-- JOIN MODAL -->
<div class="joinModal" id="joinModal">
  <div class="joinBox">
    <h2>Join Cook’ed</h2>
    <p>Create your account (demo)</p>

    <input placeholder="Username">
    <input placeholder="Email">
    <input placeholder="Password" type="password">

    <button onclick="join()">Create Account</button>
    <div class="closeBtn" onclick="closeJoin()">Cancel</div>
  </div>
</div>

<!-- KEEP REST SAME -->
<section class="section demo" id="demo">
  <h2>Try the AI</h2>
  <input id="ingredients" placeholder="eggs, rice, cheese">
  <button onclick="generateMeals()">Generate</button>
  <div class="results" id="results"></div>
</section>

<section class="section" id="feed">
  <h2>🔥 Trending Meals</h2>
  <div class="feedGrid">
    <div class="feedCard">🍝 Viral Pasta</div>
    <div class="feedCard">🍳 Egg Hack</div>
    <div class="feedCard">🌯 Budget Wrap</div>
    <div class="feedCard">🍜 Ramen Upgrade</div>
  </div>
</section>

<footer>Cook’ed • A Prodigy Project</footer>

<script>
let users = 1284;

function openJoin(){
  document.getElementById("joinModal").style.bottom="0";
}

function closeJoin(){
  document.getElementById("joinModal").style.bottom="-100%";
}

function join(){
  users += Math.floor(Math.random()*3)+1;
  document.getElementById("userCount").innerText = "🔥 " + users + " people joined";
  closeJoin();
}

function scrollToDemo(){
  document.getElementById("demo").scrollIntoView({behavior:"smooth"});
}

function scrollToFeed(){
  document.getElementById("feed").scrollIntoView({behavior:"smooth"});
}

function scrollToTop(){
  window.scrollTo({top:0, behavior:"smooth"});
}

document.getElementById("ingredients").addEventListener("keypress", e=>{
  if(e.key==="Enter") generateMeals();
});

function generateMeals(){
  const input=document.getElementById("ingredients").value;
  const results=document.getElementById("results");

  if(!input){
    results.innerHTML="Enter ingredients first.";
    return;
  }

  results.innerHTML=`
    <div class="resultCard">🍳 Cheesy Bowl using ${input}</div>
    <div class="resultCard">🌯 Quick Wrap idea</div>
    <div class="resultCard">🍜 Easy remix meal</div>
  `;
}
</script>

</body>
</html>
