<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cook’ed Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b0f14;
  --panel:#121923;
  --accent:#4CAF50;
  --accent2:#2e7d32;
  --text:#ecf3ff;
  --muted:#9fb3c8;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:radial-gradient(circle at top,#0f1720,#05080c);
  color:var(--text);
  overflow-x:hidden;
}

/* 🔥 ORBS */
.orb{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(120px);
  opacity:.2;
}
.orb1{background:#4CAF50;top:-200px;left:-200px;}
.orb2{background:#2e7d32;bottom:-200px;right:-200px;}

/* 🚨 BANNER */
.banner{
  background:linear-gradient(90deg,#0f3d1c,#4CAF50,#0f3d1c);
  overflow:hidden;
  white-space:nowrap;
}
.banner span{
  display:inline-block;
  padding:12px 0;
  font-weight:800;
  animation:scroll 20s linear infinite;
}
@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 24px;
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.logoWrap{
  display:flex;
  gap:10px;
  align-items:center;
}
.logoImg{
  width:36px;
  border-radius:10px;
  box-shadow:0 0 15px #4CAF50;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}
.heroLogo{
  width:90px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(76,175,80,.5);
}

.hero h1{
  font-size:52px;
  font-weight:900;
}
.typing{
  border-right:2px solid var(--accent);
}

/* INPUT */
.inputBox{
  margin:30px auto;
  max-width:600px;
  display:flex;
  gap:10px;
}
.inputBox input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel);
  color:white;
}
.inputBox button{
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  cursor:pointer;
  transition:.3s;
}
.inputBox button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(76,175,80,.5);
}

/* RESULTS */
.results{
  max-width:1000px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  position:relative;
  border-radius:20px;
  padding:18px;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(15px);
  transition:.3s;
}
.card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 0 30px rgba(76,175,80,.3);
}

/* ❤️ BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.actions button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  color:white;
  cursor:pointer;
  transition:.2s;
}
.actions button:hover{
  background:#4CAF50;
}

/* FEED PREVIEW */
.feedGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}
.feedCard{
  height:180px;
  border-radius:16px;
  display:flex;
  align-items:flex-end;
  padding:10px;
  font-weight:700;
  background:linear-gradient(135deg,#1b2b1f,#0b0f14);
  transition:.3s;
}
.feedCard:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(76,175,80,.3);
}

/* FEATURES */
.feature{
  padding:18px;
  border-radius:16px;
  background:rgba(255,255,255,.02);
  transition:.3s;
}
.feature:hover{
  transform:translateY(-5px);
  border:1px solid #4CAF50;
}

footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="banner">
<span>🚨 Cook’ed Page actively being built by orders from StudentStreamHQ owner Deondre • HIGH PRIORITY 🚀</span>
</div>

<nav>
  <div class="logoWrap">
    <img src="cooked-logo.PNG" class="logoImg">
    <b>Cook’ed</b>
  </div>
  <div>Live Demo</div>
</nav>

<section class="hero">
<img src="cooked-logo.PNG" class="heroLogo">

<h1>Cook with What You <span id="typing"></span></h1>
<p>Smart meals. Zero waste. Built for Gen Z.</p>

<div class="inputBox">
<input id="ingredients" placeholder="eggs, rice, cheese">
<button onclick="generateMeals()">Find Meals</button>
</div>

</section>

<section class="results" id="results"></section>

<section class="feedPreview">
<h2 style="text-align:center;margin-bottom:20px;">🔥 Trending</h2>
<div class="feedGrid">
<div class="feedCard">🍝 Viral Pasta</div>
<div class="feedCard">🍳 Egg Hack</div>
<div class="feedCard">🌯 Wrap Combo</div>
<div class="feedCard">🍜 Ramen Upgrade</div>
</div>
</section>

<footer>Cook’ed • StudentStreamHQ</footer>

<script>

/* typing */
const words=["Have","Got","Can Afford"];
let i=0,j=0;
function type(){
document.getElementById("typing").innerText=words[i].slice(0,j++);
if(j>words[i].length){j=0;i=(i+1)%words.length;}
setTimeout(type,80);
}
type();

/* enter key */
document.getElementById("ingredients").addEventListener("keypress",e=>{
if(e.key==="Enter") generateMeals();
});

/* generator */
function generateMeals(){
const input=document.getElementById("ingredients").value;
const results=document.getElementById("results");

if(!input){
results.innerHTML="<p style='text-align:center'>Enter ingredients</p>";
return;
}

results.innerHTML="";

const meals=[
"🔥 Street Style Bowl",
"🍳 Protein Breakfast",
"🌯 Quick Wrap",
"🍝 Creamy Pasta Remix"
];

meals.forEach(m=>{
results.innerHTML+=`
<div class="card">
<h3>${m}</h3>
<p>Made from ${input}</p>
<div class="actions">
<button onclick="like(this)">❤️ Like</button>
<button onclick="save(this)">💾 Save</button>
</div>
</div>`;
});
}

/* interactions */
function like(btn){
btn.innerText="❤️ Liked";
btn.style.background="#4CAF50";
}
function save(btn){
btn.innerText="✔ Saved";
}

</script>

</body>
</html>
