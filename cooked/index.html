<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#06110c;
  --accent:#4CAF50;
  --accent2:#00ff9d;
  --text:#eafef3;
  --muted:#9fb3c8;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:#020705;
  color:var(--text);
}

/* 🔥 BANNER */
.banner{
  width:100%;
  overflow:hidden;
  background:linear-gradient(90deg,#00ff9d,#4CAF50);
  color:black;
  font-weight:800;
  font-size:13px;
  white-space:nowrap;
}
.banner span{
  display:inline-block;
  padding:8px 0;
  animation:scrollBanner 12s linear infinite;
}
@keyframes scrollBanner{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* 🧊 APP CONTAINER */
.app{
  max-width:1200px;
  margin:auto;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
}

.logo{
  font-weight:900;
  font-size:20px;
}
.logo span{color:var(--accent)}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px 40px;
}

.hero h1{
  font-size:48px;
}

.highlight{
  background:linear-gradient(90deg,#4CAF50,#00ff9d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

/* CTA */
.cta{
  margin-top:20px;
  display:flex;
  gap:10px;
  justify-content:center;
}

.cta button{
  padding:12px 20px;
  border-radius:999px;
  border:none;
  font-weight:800;
  cursor:pointer;
}

.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

.secondary{
  background:transparent;
  border:1px solid var(--border);
  color:white;
}

/* FEED */
.feedGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
  padding:20px;
}

.feedCard{
  height:180px;
  border-radius:14px;
  background:linear-gradient(135deg,#123,#000);
  display:flex;
  align-items:end;
  padding:10px;
  font-weight:800;
  transition:.3s;
}

.feedCard:hover{
  transform:scale(1.05);
}

/* 🔐 LOGIN MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(10px);
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.card{
  width:320px;
  padding:25px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  text-align:center;
}

.card img{
  width:60px;
  margin-bottom:10px;
}

.input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0c1c14;
  color:white;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:900;
  margin-top:10px;
  cursor:pointer;
}

/* 📱 MOBILE */
@media(max-width:600px){
  .hero h1{
    font-size:34px;
  }
}
</style>
</head>

<body>

<div class="banner">
  <span>⚠️ Page actively being developed • High Priority • StudentStreamHQ — Deondre ⚠️</span>
</div>

<div class="app">

<nav>
  <div class="logo">Cook<span>’ed</span></div>
  <button class="primary" onclick="openLogin()">Login</button>
</nav>

<section class="hero">
  <h1>Cook Smarter.<br><span class="highlight">Not Harder.</span></h1>
  <p>Turn whatever you have into real meals instantly.</p>

  <div class="cta">
    <button class="primary" onclick="openLogin()">Get Started</button>
    <button class="secondary">Explore</button>
  </div>
</section>

<div class="feedGrid">
  <div class="feedCard">🍝 Viral Pasta</div>
  <div class="feedCard">🍳 Egg Hack</div>
  <div class="feedCard">🌯 Budget Wrap</div>
  <div class="feedCard">🍜 Ramen Upgrade</div>
</div>

</div>

<!-- 🔐 LOGIN -->
<div class="modal" id="loginModal">
  <div class="card">
    <img src="cooked-logo.png">
    <h2>Cook’ed</h2>

    <input class="input" placeholder="Email">
    <input class="input" type="password" placeholder="Password">

    <button class="btn">Log In</button>
  </div>
</div>

<script>
function openLogin(){
  document.getElementById("loginModal").classList.add("active");
}

window.onclick = function(e){
  const modal=document.getElementById("loginModal");
  if(e.target===modal){
    modal.classList.remove("active");
  }
}
</script>

</body>
</html>
