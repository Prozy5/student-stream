<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#030806;
  --card:#0c1c14;
  --accent:#00ff9d;
  --accent2:#4CAF50;
  --text:#eafff5;
  --muted:#8fa89c;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 30% 20%, rgba(0,255,157,.08), transparent 40%),
             radial-gradient(circle at 70% 60%, rgba(0,255,157,.06), transparent 50%);
  animation:bgMove 18s linear infinite;
}
@keyframes bgMove{
  0%{transform:translate(0,0)}
  50%{transform:translate(-5%,-8%)}
  100%{transform:translate(0,0)}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:900;
  font-size:22px;
}
.logo span{color:var(--accent)}

.navBtn{
  padding:10px 18px;
  border-radius:999px;
  border:none;
  font-weight:800;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 40px;
}

.hero h1{
  font-size:48px;
}

.highlight{
  background:linear-gradient(90deg,#4CAF50,#00ff9d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

.cta{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.cta button{
  padding:14px;
  border-radius:999px;
  border:none;
  font-weight:900;
  width:140px;
  cursor:pointer;
}

.primary{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  box-shadow:0 0 20px rgba(0,255,157,.3);
}

.secondary{
  background:transparent;
  border:1px solid var(--border);
  color:white;
}

/* PANTRY AI */
.ai-box{
  margin:40px auto;
  max-width:500px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  text-align:center;
}

.upload{
  border:2px dashed var(--border);
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.upload:hover{
  border-color:var(--accent);
}

.preview{
  margin-top:15px;
  max-width:100%;
  border-radius:10px;
}

.result{
  margin-top:20px;
  text-align:left;
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
}

/* FEED */
.section{
  padding:50px 20px;
}

.feed{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.post{
  height:180px;
  border-radius:14px;
  background:linear-gradient(135deg,#0f2a1f,#000);
  display:flex;
  align-items:end;
  padding:10px;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

.post:hover{
  transform:scale(1.05);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  max-width:400px;
  width:90%;
}

/* MOBILE */
@media(max-width:700px){
  .hero h1{font-size:32px}
  .cta{flex-direction:column}
  .cta button{width:100%}
}
</style>
</head>

<body>

<nav>
  <div class="logo">Cook<span>’ed</span></div>
  <button class="navBtn" onclick="goLogin()">Login</button>
</nav>

<section class="hero">
  <h1>Cook Smarter.<br><span class="highlight">Not Harder.</span></h1>
  <p>Turn what you already have into meals instantly.</p>

  <div class="cta">
    <button class="primary">Scan Pantry</button>
    <button class="secondary">Explore</button>
  </div>
</section>

<!-- AI -->
<section class="ai-box">
  <h3>📸 Scan Your Pantry</h3>

  <input type="file" id="fileInput" hidden>
  
  <div class="upload" onclick="document.getElementById('fileInput').click()">
    Tap to upload pantry image
  </div>

  <img id="preview" class="preview" style="display:none">

  <div class="result" id="aiResult"></div>
</section>

<!-- FEED -->
<section class="section">
  <h2>🔥 Trending</h2>

  <div class="feed">
    <div class="post" onclick="openRecipe('Ramen Upgrade')">🍜 Ramen Upgrade</div>
    <div class="post" onclick="openRecipe('Air Fryer Burger')">🍔 Air Fryer Burger</div>
    <div class="post" onclick="openRecipe('Healthy Bowl')">🥗 Healthy Bowl</div>
    <div class="post" onclick="openRecipe('Crispy Chicken')">🍗 Crispy Chicken</div>
  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="recipeTitle"></h3>
    <p>Ingredients: chicken, rice, seasoning</p>
    <p>Steps: cook, mix, serve.</p>
  </div>
</div>

<script>
function goLogin(){
  window.location.href="/cooked/login.html";
}

/* IMAGE + AI */
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const preview = document.getElementById("preview");
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";

  runAI();
});

function runAI(){
  const box = document.getElementById("aiResult");
  box.innerHTML = "🧠 Analyzing pantry...";

  setTimeout(()=>{
    box.innerHTML += "<br>Detected: eggs, rice, chicken, cheese...";
  },1200);

  setTimeout(()=>{
    box.innerHTML += "<br>Generating recipes...";
  },2400);

  setTimeout(()=>{
    box.innerHTML += `
      <br><br><b>🍳 Recipes:</b>
      <br>- Chicken Fried Rice
      <br>- Cheesy Omelette Bowl
      <br>- Crispy Chicken Wrap
    `;
  },3600);
}

/* MODAL */
function openRecipe(name){
  document.getElementById("modal").style.display="flex";
  document.getElementById("recipeTitle").innerText = name;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
