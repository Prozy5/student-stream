<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
:root{--accent:#00ff9d;--bg:#000;--card:rgba(255,255,255,0.08);--text:#fff}
.premium{--accent:#ff7a9c}
body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text);overflow:hidden}
.screen{display:none;height:100vh;overflow:auto}.active{display:block}
.header{text-align:center;font-size:24px;font-weight:800;padding:10px}
.card{background:var(--card);border-radius:20px;padding:15px;margin:10px}
.btn{background:var(--accent);padding:12px;border-radius:14px;text-align:center;margin:10px;font-weight:700}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;padding:12px;background:#000}
video{width:100%;border-radius:15px}

/* LOGIN */
.hero{height:300px;background:url('https://source.unsplash.com/900x700/?chef,kitchen,cooking,class') center/cover}
.tag{text-align:center;margin-top:10px;font-size:18px}
.sub{opacity:.6;text-align:center;margin-bottom:10px}

/* FEED */
.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.feed-item{height:100vh;scroll-snap-align:start;position:relative}
.feed-item img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;bottom:120px;left:15px}
.actions{position:absolute;right:15px;bottom:120px;text-align:center}
.actions div{margin:10px 0;cursor:pointer}

.modal{position:fixed;inset:0;background:#000;display:none;z-index:10;padding:20px;overflow:auto}
.modal.active{display:block}

.chat{height:150px;overflow:auto;background:#111;border-radius:10px;padding:10px;margin-top:10px}
.msg{font-size:13px;margin-bottom:6px}

/* COMMENTS */
.comment-box{background:#111;border-radius:10px;padding:10px;margin-top:10px}

/* HEALTH */
.health-box input{margin-bottom:10px}
.avatar{width:200px;display:block;margin:auto}
.stat{padding:10px;margin:5px;background:#111;border-radius:10px}
</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->
<div class="screen active" id="login">
  <div class="hero"></div>
  <div class="card">
    <h2>Cook’ed</h2>
    <div class="tag">Cook smarter, not harder.</div>
    <div class="sub">Scan food • Discover recipes • Build your body</div>
    <input id="username" placeholder="Username">
    <div class="btn" onclick="enterApp()">Enter</div>
  </div>
</div>

<!-- FEED -->
<div class="screen" id="home">
  <div class="feed" id="feed"></div>
</div>

<!-- RECIPE -->
<div class="modal" id="recipeModal">
  <div id="recipeContent"></div>
  <div class="btn" onclick="openComments()">Comments 💬</div>
  <div class="btn" onclick="closeRecipe()">Close</div>
</div>

<!-- COMMENTS MODAL -->
<div class="modal" id="commentModal">
  <h3>Comments</h3>
  <div id="comments"></div>
  <input placeholder="Add comment..." onkeydown="addComment(event)">
  <div class="btn" onclick="closeComments()">Close</div>
</div>

<!-- CAMERA -->
<div class="screen" id="camera">
  <div class="header">Scan Food</div>
  <video id="video" autoplay></video>
  <div class="btn" onclick="capture()">Scan</div>
  <canvas id="canvas" style="display:none"></canvas>
  <div id="result"></div>
</div>

<!-- PROFILE / HEALTH -->
<div class="screen" id="profile">
  <div class="header">Profile</div>
  <div id="userInfo"></div>

  <div class="btn" onclick="togglePremium()">Toggle Premium 👑</div>

  <div id="healthSection" style="display:none">
    <div class="card health-box">
      <h3>Health Tracker</h3>
      <input id="height" placeholder="Height (cm)">
      <input id="weight" placeholder="Weight (kg)">
      <div class="btn" onclick="generateStats()">Generate Stats</div>
    </div>

    <img id="bodyImg" class="avatar" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Gnome-stock_person.svg">

    <div id="stats"></div>

    <div class="chat" id="chat"></div>
    <input placeholder="Ask fitness AI..." onkeydown="chatAI(event)">
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="startCamera()">📸</div>
  <div onclick="nav('profile')">👤</div>
</div>

</div>

<script>
let user, isPremium=false, model;
let likes = {};

function nav(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function enterApp(){user=document.getElementById('username').value||'Chef';userInfo.innerText="👤 "+user;loadFeed();nav('home');}

async function loadFeed(){
  feed.innerHTML='';
  let res = await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=chicken');
  let data = await res.json();

  data.meals.slice(0,6).forEach(meal=>{
    likes[meal.idMeal] = Math.floor(Math.random()*500);

    feed.innerHTML+=`
    <div class="feed-item">
      <img src="${meal.strMealThumb}" onclick="openRecipe('${meal.strMeal}','${meal.strMealThumb}')">
      <div class="overlay"><h2>${meal.strMeal}</h2></div>

      <div class="actions">
        <div onclick="like('${meal.idMeal}')">❤️<br><span id="like-${meal.idMeal}">${likes[meal.idMeal]}</span></div>
        <div onclick="openComments()">💬</div>
      </div>
    </div>`;
  });
}

function like(id){likes[id]++;document.getElementById('like-'+id).innerText=likes[id];}

function openRecipe(name,img){
  recipeModal.classList.add('active');
  recipeContent.innerHTML=`
    <h2>${name}</h2>
    <img src="${img}">
    <p>Recipe steps and ingredients.</p>
    ${isPremium ? `<iframe width="100%" height="200" src="https://www.youtube.com/embed?listType=search&list=${name} recipe"></iframe>` : '<p>🔒 Video recipes are Premium</p>'}
  `;
}

function closeRecipe(){recipeModal.classList.remove('active');}

function openComments(){
  commentModal.classList.add('active');
  comments.innerHTML='';
  ['Looks good 🔥','Trying this tonight','W recipe'].forEach(c=>{
    comments.innerHTML+=`<div class="comment-box">${c}</div>`;
  });
}

function closeComments(){commentModal.classList.remove('active');}

function addComment(e){
  if(e.key==='Enter'){
    comments.innerHTML+=`<div class="comment-box">${e.target.value}</div>`;
    e.target.value='';
  }
}

async function startCamera(){nav('camera');const stream=await navigator.mediaDevices.getUserMedia({video:true});video.srcObject=stream;if(!model)model=await mobilenet.load();}

function capture(){const ctx=canvas.getContext('2d');canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);detectFood();}

async function detectFood(){const p=await model.classify(video);result.innerHTML=`<div class="card">${p[0].className}</div>`;}

function togglePremium(){
  isPremium=!isPremium;
  document.body.classList.toggle('premium');
  healthSection.style.display = isPremium ? 'block' : 'none';
}

function generateStats(){
  let h = document.getElementById('height').value;
  let w = document.getElementById('weight').value;
  let bmi = (w / ((h/100)*(h/100))).toFixed(1);

  bodyImg.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Human_body_silhouette.svg/512px-Human_body_silhouette.svg.png";

  stats.innerHTML = `
    <div class="stat">BMI: ${bmi}</div>
    <div class="stat">Goal: Build muscle 💪</div>
    <div class="stat">Calories Needed: ${Math.floor(2000 + (w*10))}</div>
  `;
}

function chatAI(e){
  if(e.key==='Enter'){
    let msg=e.target.value;
    chat.innerHTML+=`<div class="msg">You: ${msg}</div>`;
    chat.innerHTML+=`<div class="msg">AI: Increase protein & stay consistent 💪</div>`;
    e.target.value='';
  }
}
</script>

</body>
</html>
