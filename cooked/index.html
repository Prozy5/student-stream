<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#030806;
  --card:#0c1c14;
  --accent:#00ff9d;
  --text:#eafff5;
}

body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
.app{max-width:420px;margin:auto;height:100vh;display:flex;flex-direction:column}

.screen{display:none;flex:1;overflow:auto;padding:15px}
.active{display:block}

.header{text-align:center;font-weight:900;margin-bottom:10px}
.header span{color:var(--accent)}

.card{
  background:var(--card);
  border-radius:14px;
  padding:10px;
  margin-bottom:12px;
}

.card img{width:100%;border-radius:10px;cursor:pointer}

.nav{
  height:60px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#000;
}

/* LOGIN */
.login{
  display:flex;
  flex-direction:column;
  gap:10px;
  justify-content:center;
  height:100vh;
  padding:20px;
}

input,button{
  padding:10px;
  border:none;
  border-radius:8px;
}

button{background:var(--accent);cursor:pointer}

/* MODALS */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:12px;
  max-width:90%;
  max-height:80%;
  overflow:auto;
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login">
  <h2>Cook’ed Login</h2>
  <input id="username" placeholder="Enter username">
  <button onclick="login()">Login</button>
</div>

<div class="app" id="app" style="display:none">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="header">Cook<span>’ed</span></div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-4316c64c7f8c" onclick="openRecipe('chicken')">
    <b>Marry Me Chicken</b>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2" onclick="openRecipe('beef')">
    <b>Garlic Butter Steak</b>
  </div>
</div>

<!-- AI -->
<div class="screen" id="ai">
  <div class="header">Cook<span>’ed AI</span></div>

  <button onclick="scanFood()">📸 Scan Pantry</button>
  <div id="aiResult"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>
  <h3 id="userDisplay"></h3>

  <h4>Saved Recipes</h4>
  <div id="savedList"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchScreen('home')">🏠</div>
  <div onclick="switchScreen('ai')">📸</div>
  <div onclick="switchScreen('profile')">👤</div>
</div>

</div>

<!-- RECIPE MODAL -->
<div class="modal" id="recipeModal">
  <div class="modal-content" id="recipeContent"></div>
</div>

<script>

/* LOGIN SYSTEM */
function login(){
  const user = document.getElementById("username").value;
  if(!user) return;
  localStorage.setItem("user", user);
  startApp();
}

function startApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";

  const user = localStorage.getItem("user");
  document.getElementById("userDisplay").innerText = "Chef " + user;
  loadSaved();
}

if(localStorage.getItem("user")) startApp();

/* NAV */
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AI SYSTEM */
function scanFood(){
  const foods = ["chicken","rice","eggs","cheese"];
  const pick = foods[Math.floor(Math.random()*foods.length)];

  document.getElementById("aiResult").innerHTML =
  "🧠 Detected: "+pick+"<br>Suggested: "+pick+" bowl, "+pick+" pasta";
}

/* RECIPE API */
function openRecipe(query){
  document.getElementById("recipeModal").style.display="flex";
  const box = document.getElementById("recipeContent");
  box.innerHTML="Loading...";

  fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`)
  .then(res=>res.json())
  .then(data=>{
    const meal = data.meals[0];
    box.innerHTML=`
      <h2>${meal.strMeal}</h2>
      <img src="${meal.strMealThumb}" style="width:100%">
      <p>${meal.strInstructions.substring(0,200)}...</p>
      <button onclick="saveRecipe('${meal.strMeal}')">⭐ Save</button>
    `;
  });
}

/* SAVE SYSTEM */
function saveRecipe(name){
  let saved = JSON.parse(localStorage.getItem("saved")) || [];
  saved.push(name);
  localStorage.setItem("saved", JSON.stringify(saved));
  alert("Saved!");
  loadSaved();
}

function loadSaved(){
  let saved = JSON.parse(localStorage.getItem("saved")) || [];
  document.getElementById("savedList").innerHTML =
    saved.map(r=>"<div class='card'>"+r+"</div>").join("");
}

/* CLOSE MODAL */
document.getElementById("recipeModal").onclick=()=>{
  document.getElementById("recipeModal").style.display="none";
}

</script>

</body>
</html>
