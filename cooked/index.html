<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
:root{--accent:#00ff9d;--bg:#000;--card:rgba(255,255,255,0.08);--text:#fff}
.premium{--accent:#ff7a9c}
body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text);overflow:hidden}
.screen{display:none;height:100vh;overflow:auto}.active{display:block}
.header{text-align:center;font-size:24px;font-weight:800;padding:10px}
.card{background:var(--card);border-radius:20px;padding:15px;margin:10px}
input{width:100%;padding:12px;border-radius:14px;border:none;margin-top:10px;background:#111;color:#fff}
.btn{background:var(--accent);padding:12px;border-radius:14px;text-align:center;margin-top:10px;font-weight:700}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;padding:12px;background:#000}
video{width:100%;border-radius:15px}

/* 🎬 TikTok Feed */
.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.feed-item{height:100vh;scroll-snap-align:start;position:relative}
.feed-item img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;bottom:80px;left:15px}

/* 🔍 bubbles */
.bubbles{display:flex;flex-wrap:wrap;gap:10px;padding:10px}
.bubble{padding:15px;border-radius:50px;background:var(--card);backdrop-filter:blur(20px);cursor:pointer}

/* 🧠 avatar */
.avatar{width:160px;margin:20px auto;display:block}

/* LOGIN */
.hero{height:260px;background:url('https://source.unsplash.com/900x700/?food,chef') center/cover}
.lock{opacity:.6;text-align:center;margin-top:20px}
</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->
<div class="screen active" id="login">
  <div class="hero"></div>
  <div class="card">
    <input id="username" placeholder="Enter username">
    <div class="btn" onclick="enterApp()">Enter Cook’ed</div>
  </div>
</div>

<!-- TIKTOK FEED -->
<div class="screen" id="home">
  <div class="feed" id="feed"></div>
</div>

<!-- SEARCH -->
<div class="screen" id="search">
  <div class="header">Search</div>
  <div class="bubbles">
    <div class="bubble" onclick="filterFeed('protein')">Protein</div>
    <div class="bubble" onclick="filterFeed('seafood')">Seafood</div>
    <div class="bubble" onclick="filterFeed('quick')">Quick Meals</div>
    <div class="bubble" onclick="filterFeed('fried')">Fried</div>
  </div>
</div>

<!-- CAMERA -->
<div class="screen" id="camera">
  <div class="header">Scan Food</div>
  <video id="video" autoplay></video>
  <div class="btn" onclick="capture()">Scan</div>
  <canvas id="canvas" style="display:none"></canvas>
  <div id="result"></div>
</div>

<!-- FRIDGE (premium) -->
<div class="screen" id="fridge">
  <div class="header">Fridge Scanner</div>
  <video id="fridgeVideo" autoplay></video>
  <div class="btn" onclick="scanFridge()">Scan Ingredients</div>
  <div id="fridgeResult"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>
  <img class="avatar" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Gnome-stock_person.svg">
  <div id="userInfo"></div>
  <div class="btn" onclick="togglePremium()">Toggle Premium 👑</div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="nav('search')">🔍</div>
  <div onclick="startCamera()">📸</div>
  <div onclick="openFridge()">🧊</div>
  <div onclick="nav('profile')">👤</div>
</div>

</div>

<script>
let isPremium=false;
let user;
let model;

function nav(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function enterApp(){
  user = document.getElementById('username').value || 'Chef';
  userInfo.innerText = "👤 " + user;
  loadFeed();
  nav('home');
}

function loadFeed(type='food'){
  feed.innerHTML='';
  ['chicken','steak','pasta','salmon'].forEach(f=>{
    feed.innerHTML += `
    <div class="feed-item">
      <img src="https://source.unsplash.com/900x1600/?${f},${type}">
      <div class="overlay">
        <h2>${f}</h2>
        <div>${Math.floor(Math.random()*500)} kcal</div>
      </div>
    </div>`;
  });
}

function filterFeed(type){
  loadFeed(type);
  nav('home');
}

async function startCamera(){
  nav('camera');
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
  if(!model) model = await mobilenet.load();
}

function capture(){
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);
  detectFood();
}

async function detectFood(){
  const predictions = await model.classify(video);
  result.innerHTML = `<div class="card"><h3>${predictions[0].className}</h3>${(predictions[0].probability*100).toFixed(1)}%</div>`;
}

function openFridge(){
  if(!isPremium){
    nav('fridge');
    fridgeResult.innerHTML = `<div class="lock">🔒 Premium Feature<br>Enable premium to scan your fridge</div>`;
    return;
  }
  nav('fridge');
  startFridgeCamera();
}

async function startFridgeCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  fridgeVideo.srcObject = stream;
}

function scanFridge(){
  if(!isPremium){
    fridgeResult.innerHTML = `<div class="lock">🔒 Upgrade to use this</div>`;
    return;
  }
  fridgeResult.innerHTML = `<div class="card">Detected: eggs, milk, vegetables 🥦</div>`;
}

function togglePremium(){
  isPremium=!isPremium;
  document.body.classList.toggle('premium');
}

</script>

</body>
</html>
