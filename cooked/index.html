 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#22c55e;
  --accent2:#4ade80;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:linear-gradient(180deg,#020617,#000);
  color:var(--text);
}

.app{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.screen{
  display:none;
  flex:1;
  overflow:auto;
  padding:16px;
}

.active{display:block}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top,#064e3b,#020617);
}

.login-card{
  background:rgba(15,23,42,0.9);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:center;
  backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(34,197,94,0.2);
}

.login-card h1{
  margin-bottom:10px;
}

.login-card span{color:var(--accent)}

.input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:15px;
  background:#020617;
  color:white;
}

.btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  font-weight:bold;
  cursor:pointer;
}

/* HEADER */
.header{
  text-align:center;
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}
.header span{color:var(--accent)}

/* CARDS */
.card{
  background:var(--card);
  border-radius:16px;
  padding:10px;
  margin-bottom:14px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.card img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
}

/* NAV */
.nav{
  height:70px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#020617;
  border-top:1px solid #111;
}

.nav div{
  font-size:20px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#020617;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-height:85%;
  overflow:auto;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <div class="login-card">
    <h1>Cook<span>’ed</span></h1>
    <p style="color:var(--muted)">AI Cooking Experience</p>

    <input class="input" id="username" placeholder="Enter username">
    <button class="btn" onclick="login()">Enter Kitchen</button>
  </div>
</div>

<div class="app" id="app" style="display:none">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="header">Cook<span>’ed</span></div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-4316c64c7f8c" onclick="openRecipe('chicken')">
    <b>Marry Me Chicken</b>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2" onclick="openRecipe('beef')">
    <b>Garlic Butter Steak</b>
  </div>
</div>

<!-- AI -->
<div class="screen" id="ai">
  <div class="header">Cook<span>’ed AI</span></div>

  <button class="btn" onclick="scanFood()">Scan Pantry</button>
  <div id="aiResult" style="margin-top:15px;color:var(--muted)"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>
  <h2 id="userDisplay"></h2>

  <h3 style="margin-top:10px">Saved Recipes</h3>
  <div id="savedList"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchScreen('home')">🏠</div>
  <div onclick="switchScreen('ai')">🤖</div>
  <div onclick="switchScreen('profile')">👤</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="recipeModal">
  <div class="modal-content" id="recipeContent"></div>
</div>

<script>

function login(){
  const user = document.getElementById("username").value;
  if(!user) return;
  localStorage.setItem("user", user);
  startApp();
}

function startApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";

  const user = localStorage.getItem("user");
  document.getElementById("userDisplay").innerText = "Chef " + user;
  loadSaved();
}

if(localStorage.getItem("user")) startApp();

function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function scanFood(){
  const foods = ["chicken","rice","eggs","cheese"];
  const pick = foods[Math.floor(Math.random()*foods.length)];

  document.getElementById("aiResult").innerHTML =
  "Detected: "+pick+"<br>Suggested meals: "+pick+" bowl, "+pick+" pasta";
}

function openRecipe(query){
  document.getElementById("recipeModal").style.display="flex";
  const box = document.getElementById("recipeContent");
  box.innerHTML="Loading...";

  fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`)
  .then(res=>res.json())
  .then(data=>{
    const meal = data.meals[0];
    box.innerHTML=`
      <h2>${meal.strMeal}</h2>
      <img src="${meal.strMealThumb}" style="width:100%;border-radius:10px">
      <p>${meal.strInstructions.substring(0,200)}...</p>
      <button class="btn" onclick="saveRecipe('${meal.strMeal}')">Save Recipe</button>
    `;
  });
}

function saveRecipe(name){
  let saved = JSON.parse(localStorage.getItem("saved")) || [];
  saved.push(name);
  localStorage.setItem("saved", JSON.stringify(saved));
  loadSaved();
}

function loadSaved(){
  let saved = JSON.parse(localStorage.getItem("saved")) || [];
  document.getElementById("savedList").innerHTML =
    saved.map(r=>"<div class='card'>"+r+"</div>").join("");
}

document.getElementById("recipeModal").onclick=()=>{
  document.getElementById("recipeModal").style.display="none";
}

</script>

</body>
</html>
