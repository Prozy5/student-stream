<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#06110c;
  --accent:#4CAF50;
  --accent2:#00ff9d;
  --text:#eafef3;
  --muted:#9fb3c8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:#020705;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 📱 PHONE FRAME */
.phone{
  width:360px;
  height:740px;
  border-radius:40px;
  background:#000;
  box-shadow:0 0 60px rgba(0,0,0,.8);
  overflow:hidden;
  position:relative;
}

/* APP SCREEN */
.screen{
  height:100%;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
}

/* SECTIONS = APP PAGES */
.page{
  height:100%;
  padding:20px;
  scroll-snap-align:start;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.logo{
  font-weight:900;
  font-size:18px;
}

.logo span{color:var(--accent)}

/* FEED (TIKTOK STYLE) */
.feedCard{
  height:75%;
  border-radius:20px;
  background:linear-gradient(135deg,#123,#000);
  display:flex;
  align-items:end;
  padding:15px;
  font-size:20px;
  font-weight:900;
  margin-bottom:10px;
  position:relative;
}

.feedOverlay{
  position:absolute;
  right:10px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.feedOverlay div{
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* DEMO INPUT */
.demoBox{
  margin-top:10px;
}

.demoBox input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0c1c14;
  color:white;
  margin-bottom:10px;
}

.demoBox button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* RESULTS */
.results{
  margin-top:10px;
  display:grid;
  gap:10px;
}

.resultCard{
  padding:14px;
  border-radius:12px;
  background:#0c1c14;
}

/* NAV BAR */
.nav{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

.nav div{
  font-size:12px;
  text-align:center;
  cursor:pointer;
  color:var(--muted);
}

.nav div.active{
  color:#00ff9d;
}
</style>
</head>

<body>

<div class="phone">

  <div class="screen" id="screen">

    <!-- 🏠 HOME FEED -->
    <div class="page" id="home">
      <div class="header">
        <div class="logo">Cook<span>’ed</span></div>
        <div>🔥</div>
      </div>

      <div class="feedCard">
        🍝 Viral Pasta
        <div class="feedOverlay">
          <div>❤️</div>
          <div>💬</div>
          <div>🔖</div>
        </div>
      </div>

      <div class="feedCard">
        🍳 Egg Hack
      </div>
    </div>

    <!-- 🤖 AI PAGE -->
    <div class="page" id="ai">
      <div class="header">
        <div class="logo">AI Generator</div>
      </div>

      <div class="demoBox">
        <input id="ingredients" placeholder="eggs, rice, cheese">
        <button onclick="generateMeals()">Generate Meals</button>
      </div>

      <div class="results" id="results"></div>
    </div>

    <!-- 👤 PROFILE -->
    <div class="page" id="profile">
      <div class="header">
        <div class="logo">Your Profile</div>
      </div>

      <div style="margin-top:20px;">
        <h2>Deondre 👑</h2>
        <p style="color:#9fb3c8;">Founder of StudentStreamHQ</p>
      </div>

      <div style="margin-top:20px;">
        <div class="resultCard">Saved Recipes</div>
        <div class="resultCard">My Uploads</div>
        <div class="resultCard">Settings</div>
      </div>
    </div>

  </div>

  <!-- 🔻 NAV -->
  <div class="nav">
    <div onclick="goTo(0)" class="active">Home</div>
    <div onclick="goTo(1)">AI</div>
    <div onclick="goTo(2)">Profile</div>
  </div>

</div>

<script>
function goTo(index){
  const screen=document.getElementById("screen");
  const height=window.innerHeight;
  screen.scrollTo({
    top:index * height,
    behavior:"smooth"
  });

  document.querySelectorAll(".nav div").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".nav div")[index].classList.add("active");
}

function generateMeals(){
  const input=document.getElementById("ingredients").value;
  const results=document.getElementById("results");

  if(!input){
    results.innerHTML="Enter ingredients first.";
    return;
  }

  results.innerHTML=`
    <div class="resultCard">🍳 Smart Bowl using ${input}</div>
    <div class="resultCard">🌯 AI Wrap Idea</div>
    <div class="resultCard">🍜 Remix Meal</div>
  `;
}
</script>

</body>
</html>
