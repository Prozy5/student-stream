<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#020617;
  --card:rgba(255,255,255,0.05);
  --accent:#00ff9d;
  --text:#eafff5;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui;
  background:linear-gradient(135deg,#020617,#000);
  color:var(--text);
}

/* LOGIN */
.login-screen{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  background:var(--card);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}

.login-box h1{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  cursor:pointer;
  font-weight:bold;
}

/* APP */
.app{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.screen{
  display:none;
  flex:1;
  overflow:auto;
  padding:20px;
}

.active{display:block}

.header{
  text-align:center;
  font-weight:900;
  font-size:22px;
  margin-bottom:15px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(10px);
  padding:10px;
  border-radius:15px;
  margin-bottom:15px;
}

.card img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* NAV */
.nav{
  height:65px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#000;
}

/* PROFILE */
.upload{
  margin-top:15px;
  padding:15px;
  border:2px dashed var(--accent);
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:12px;
  max-width:500px;
  width:90%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Cook’ed</h1>
    <input id="username" placeholder="Username">
    <button onclick="login()">Enter Kitchen</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="header">Cook’ed</div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-4316c64c7f8c" onclick="openRecipe('chicken')">
    <b>Marry Me Chicken</b>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2" onclick="openRecipe('beef')">
    <b>Garlic Butter Steak</b>
  </div>
</div>

<!-- AI -->
<div class="screen" id="ai">
  <div class="header">AI Kitchen</div>
  <button onclick="scanFood()">Scan Pantry</button>
  <div id="aiResult"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>
  <h3 id="userDisplay"></h3>

  <div class="upload" onclick="uploadVideo()">
    🎥 Upload Cooking Video
  </div>

  <h4 style="margin-top:20px;">Saved Recipes</h4>
  <div id="savedList"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchScreen('home')">🏠</div>
  <div onclick="switchScreen('ai')">🤖</div>
  <div onclick="switchScreen('profile')">👤</div>
</div>

</div>

<!-- RECIPE MODAL -->
<div class="modal" id="recipeModal">
  <div class="modal-content" id="recipeContent"></div>
</div>

<script>

/* LOGIN */
function login(){
  const user = document.getElementById("username").value;
  if(!user) return;
  localStorage.setItem("user", user);
  startApp();
}

function startApp(){
  loginScreen.style.display="none";
  app.style.display="flex";
  userDisplay.innerText="Chef "+localStorage.getItem("user");
  loadSaved();
}

if(localStorage.getItem("user")) startApp();

/* NAV */
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AI PANTRY */
function scanFood(){
  const foods=["chicken","pasta","rice","eggs"];
  const pick=foods[Math.floor(Math.random()*foods.length)];

  aiResult.innerHTML=`🧠 Detected: ${pick}<br>Loading recipes...`;
  openRecipe(pick);
}

/* VIDEO AI */
function uploadVideo(){
  alert("Uploading video...");

  setTimeout(()=>{
    const detected=["pasta","chicken","beef"];
    const pick=detected[Math.floor(Math.random()*detected.length)];

    alert("AI detected: "+pick);
    openRecipe(pick);
  },1500);
}

/* RECIPE API */
function openRecipe(query){
  recipeModal.style.display="flex";
  recipeContent.innerHTML="Loading...";

  fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`)
  .then(res=>res.json())
  .then(data=>{
    const meal=data.meals[0];

    recipeContent.innerHTML=`
      <h2>${meal.strMeal}</h2>
      <img src="${meal.strMealThumb}" style="width:100%">
      <p>${meal.strInstructions.substring(0,250)}...</p>
      <button onclick="saveRecipe('${meal.strMeal}')">⭐ Save</button>
    `;
  });
}

/* SAVE */
function saveRecipe(name){
  let saved=JSON.parse(localStorage.getItem("saved"))||[];
  saved.push(name);
  localStorage.setItem("saved",JSON.stringify(saved));
  loadSaved();
}

function loadSaved(){
  let saved=JSON.parse(localStorage.getItem("saved"))||[];
  savedList.innerHTML=saved.map(r=>`<div class="card">${r}</div>`).join("");
}

/* CLOSE MODAL */
recipeModal.onclick=()=>recipeModal.style.display="none";

</script>

</body>
</html>
