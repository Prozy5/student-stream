<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Cook’ed — Cook Better. Live Healthier.</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- AI -->

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
--accent:#00ff9d;
--bg:#050505;
--card:rgba(255,255,255,.08);
--text:#fff;
--muted:#a1a1aa;
}

.premium{
--accent:#ff7ca8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
}

/* GLOBAL */

.screen{
display:none;
height:100vh;
width:100vw;
overflow:auto;
background:#000;
}

.active{
display:block;
animation:fade .25s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:18px;
background:#111;
color:white;
font-size:15px;
margin-top:12px;
}

.btn{
background:var(--accent);
color:black;
padding:15px;
border-radius:18px;
font-weight:900;
text-align:center;
margin-top:14px;
cursor:pointer;
transition:.2s;
}

.btn:active{
transform:scale(.97);
}

.card{
background:var(--card);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
padding:18px;
border-radius:24px;
margin:14px;
}

/* HERO */

.hero{
height:60vh;
background:
linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.2)),
url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:24px;
}

.heroText h1{
font-size:54px;
font-weight:900;
letter-spacing:-2px;
}

.heroText p{
margin-top:8px;
font-size:16px;
color:#ddd;
}

/* FEED */

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.feed::-webkit-scrollbar{
display:none;
}

.feedItem{
height:100vh;
width:100%;
position:relative;
scroll-snap-align:start;
overflow:hidden;
background:black;
}

.feedItem img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

.feedShade{
position:absolute;
inset:0;
background:
linear-gradient(
to top,
rgba(0,0,0,.95),
rgba(0,0,0,.2),
transparent
);
}

.overlay{
position:absolute;
bottom:120px;
left:18px;
max-width:72%;
z-index:10;
}

.overlay h2{
font-size:34px;
font-weight:900;
margin-bottom:6px;
}

.overlay p{
font-size:14px;
color:#ddd;
line-height:1.5;
}

.actions{
position:absolute;
right:16px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
z-index:10;
align-items:center;
}

.actionBtn{
text-align:center;
font-size:13px;
font-weight:700;
cursor:pointer;
}

.actionBtn i{
font-size:30px;
margin-bottom:6px;
}

.liked{
color:#ff4d6d;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
width:100%;
padding:14px 0 20px;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,.88);
backdrop-filter:blur(20px);
z-index:999;
border-top:1px solid rgba(255,255,255,.08);
}

.nav i{
font-size:25px;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:none;
overflow:auto;
padding-bottom:120px;
}

.modal.active{
display:block;
}

.recipeHero{
width:100%;
height:340px;
object-fit:cover;
}

.recipeContent{
padding:20px;
}

.recipeContent h2{
font-size:36px;
margin-bottom:10px;
}

.recipeContent p{
line-height:1.7;
color:#ddd;
margin-top:10px;
}

.recipeContent h3{
margin-top:24px;
margin-bottom:10px;
}

.videoPlayer{
width:100%;
height:230px;
border:none;
border-radius:22px;
margin-top:12px;
background:#111;
}

/* CAMERA */

.cameraWrap{
padding:16px;
}

.cameraBox{
position:relative;
overflow:hidden;
border-radius:28px;
}

video{
width:100%;
height:70vh;
object-fit:cover;
background:black;
border-radius:28px;
}

.scannerLine{
position:absolute;
top:0;
left:0;
width:100%;
height:3px;
background:var(--accent);
box-shadow:0 0 20px var(--accent);
animation:scannerMove 2s linear infinite;
}

@keyframes scannerMove{
0%{top:0}
100%{top:100%}
}

.scanCorner{
position:absolute;
width:40px;
height:40px;
border:4px solid var(--accent);
}

.corner1{
top:12px;
left:12px;
border-right:none;
border-bottom:none;
}

.corner2{
top:12px;
right:12px;
border-left:none;
border-bottom:none;
}

.corner3{
bottom:12px;
left:12px;
border-right:none;
border-top:none;
}

.corner4{
bottom:12px;
right:12px;
border-left:none;
border-top:none;
}

.scanResult img{
width:100%;
border-radius:18px;
margin-top:12px;
}

/* HEALTH */

.bodyContainer{
position:relative;
height:340px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.bodyGlow{
position:absolute;
width:220px;
height:220px;
background:var(--accent);
filter:blur(90px);
opacity:.2;
}

.bodyImage{
width:210px;
z-index:2;
filter:drop-shadow(0 0 25px rgba(0,255,157,.4));
border-radius:28px;
object-fit:cover;
}

.scanBeam{
position:absolute;
width:220px;
height:4px;
background:var(--accent);
box-shadow:0 0 20px var(--accent);
animation:bodyScan 2.5s linear infinite;
z-index:3;
}

@keyframes bodyScan{
0%{top:20px}
100%{top:300px}
}

.healthStats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.stat{
background:#111;
padding:14px;
border-radius:18px;
font-weight:700;
}

/* COMMENTS */

.comment{
background:#111;
padding:14px;
border-radius:18px;
margin-top:12px;
}

/* BADGE */

.badge{
display:inline-block;
padding:7px 14px;
border-radius:999px;
background:rgba(0,255,157,.12);
color:var(--accent);
font-size:12px;
font-weight:800;
margin-top:10px;
margin-right:8px;
}

.mealCard{
margin-top:14px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.mealCard img{
width:100%;
height:180px;
object-fit:cover;
}

.mealInfo{
padding:14px;
}

/* FRIDGE AI */

.ingredientsGrid{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:14px;
}

.ingredientTag{
background:#111;
padding:10px 14px;
border-radius:999px;
font-size:13px;
font-weight:700;
border:1px solid rgba(255,255,255,.08);
}

.substituteCard{
background:#111;
padding:14px;
border-radius:18px;
margin-top:12px;
}

.aiGlow{
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:.7}
50%{opacity:1}
100%{opacity:.7}
}

.progress{
width:100%;
height:12px;
background:#222;
border-radius:999px;
overflow:hidden;
margin-top:8px;
}

.stepCard{
background:#111;
padding:16px;
border-radius:18px;
margin-top:14px;
line-height:1.6;
}

.closeX{
position:fixed;
top:20px;
right:20px;
width:45px;
height:45px;
border-radius:50%;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:10000;
cursor:pointer;
backdrop-filter:blur(10px);
}

</style>
</head>

class="bodyImage"

<script>

<script>

/* ======================
SUPABASE
====================== */

const SUPABASE_URL =
"https://iabzmoxzbqzcqgypxctr.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* ======================
GLOBAL
====================== */

let user;
let isPremium = false;
let model;
let likes = {};
let likedPosts = {};
let currentStream;

/* ======================
INGREDIENT DATABASE
====================== */

const ingredientDatabase = {

milk:["mac and cheese","pancakes","alfredo pasta"],
eggs:["omelette","fried rice","breakfast sandwich"],
cheese:["burger","pizza","quesadilla"],
bread:["sandwich","toast","grilled cheese"],
chicken:["chicken alfredo","bbq chicken","chicken bowl"],
beef:["burger","steak bowl","tacos"],
lettuce:["salad","burger wrap","tacos"],
rice:["fried rice","rice bowl","hibachi"],
tomato:["pasta","pizza","salad"],
potato:["fries","mashed potatoes","breakfast hash"],
onion:["burger","steak","fried rice"],
apple:["fruit bowl","smoothie","salad"],
banana:["smoothie","banana pancakes","oatmeal"],
yogurt:["smoothie","fruit bowl","parfait"],
spinach:["salad","omelette","pasta"]

};

const substitutes = {
milk:"almond milk",
butter:"olive oil",
eggs:"banana",
rice:"quinoa",
cheese:"vegan cheese",
sugar:"honey",
flour:"oat flour",
cream:"greek yogurt"
};

/* ======================
NAV
====================== */

function nav(id){

document.querySelectorAll('.screen')
.forEach(s=>s.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

}

/* ======================
LOGIN
====================== */

async function enterApp(){

user = username.value || "Chef";

userInfo.innerHTML =
`👤 ${user}`;

await loadFeed();

nav('home');

}

/* ======================
LOAD FEED FIXED
====================== */

async function loadFeed(){

feed.innerHTML = '';

const searches = [
"burger",
"pizza",
"pasta",
"steak",
"american",
"chicken",
"beef",
"salad",
"rice",
"seafood",
"sandwich",
"fries",
"bbq",
"taco",
"ramen",
"pancake",
"omelette",
"mac and cheese"
];

let meals = [];

for(let s of searches){

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${s}`
);

const data = await res.json();

if(data.meals){

meals.push(...data.meals.slice(0,2));

}

}

meals = meals.sort(()=>Math.random()-0.5);

meals.forEach(meal=>{

if(!likes[meal.idMeal]){

likes[meal.idMeal] =
Math.floor(Math.random()*900)+100;

}

feed.innerHTML += `

<div class="feedItem"
onclick='openRecipe(${JSON.stringify(meal.strMeal)})'>

<img
src="${meal.strMealThumb}"
>

<div class="feedShade"></div>

<div class="overlay">

<h2>${meal.strMeal}</h2>

<p>
${meal.strCategory}
• ${meal.strArea}
</p>

</div>

<div class="actions">

<div class="actionBtn"
onclick="event.stopPropagation(); like('${meal.idMeal}',this)">

<i class="fa-solid fa-heart
${likedPosts[meal.idMeal]?'liked':''}">
</i>

<div id="likes-${meal.idMeal}">
${likes[meal.idMeal]}
</div>

</div>

<div class="actionBtn"
onclick="event.stopPropagation(); openComments()">

<i class="fa-solid fa-comment"></i>

<div>
${Math.floor(Math.random()*300)}
</div>

</div>

<div class="actionBtn"
onclick="event.stopPropagation()">

<i class="fa-solid fa-bookmark"></i>

<div>Save</div>

</div>

</div>

</div>

`;

});

}

/* ======================
LIKE
====================== */

function like(id,el){

if(!likedPosts[id]){

likes[id]++;
likedPosts[id] = true;

el.querySelector("i")
.classList.add('liked');

}else{

likes[id]--;
likedPosts[id] = false;

el.querySelector("i")
.classList.remove('liked');

}

document.getElementById(
`likes-${id}`
).innerText = likes[id];

}

/* ======================
OPEN RECIPE
====================== */

async function openRecipe(name){

try{

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(name)}`
);

const data = await res.json();

if(!data.meals){

alert("Recipe not found");
return;

}

const meal = data.meals[0];

recipeModal.classList.add('active');

/* INGREDIENTS */

let ingredientsHTML = '';

for(let i=1;i<=20;i++){

const ingredient =
meal[`strIngredient${i}`];

const measure =
meal[`strMeasure${i}`];

if(
ingredient &&
ingredient.trim() !== ""
){

ingredientsHTML += `

<div class="substituteCard">
🥘 ${measure || ''} ${ingredient}
</div>

`;

}

}

/* STEPS */

const instructions =
meal.strInstructions
.split('.')
.filter(step=>step.trim() !== '');

let stepsHTML = '';

instructions.forEach((step,index)=>{

stepsHTML += `

<div class="stepCard">

<b>
Step ${index+1}
</b>

<br><br>

${step.trim()}.

</div>

`;

});

/* VIDEO */

let videoHTML = '';

if(isPremium){

videoHTML = `

<video
class="videoPlayer"
controls
poster="${meal.strMealThumb}"
>

<source
src="YOUR-UPLOADED-MP4-LINK.mp4"
type="video/mp4"
>

</video>

<div class="badge">
Premium Exclusive Cooking Video
</div>

`;

}else{

const yt =
meal.strYoutube
?
meal.strYoutube.split('v=')[1]
:
'';

videoHTML = `

<iframe
class="videoPlayer"
src="https://www.youtube.com/embed/${yt}"
allowfullscreen>
</iframe>

`;

}

/* FINAL MODAL */

recipeModal.innerHTML = `

<div class="closeX"
onclick="closeRecipe()">
✕
</div>

<img
class="recipeHero"
src="${meal.strMealThumb}"
>

<div class="recipeContent">

<h2>
${meal.strMeal}
</h2>

<div class="badge">
${meal.strCategory}
</div>

<div class="badge">
${meal.strArea} Cuisine
</div>

<div class="badge">
AI Guided Recipe
</div>

<p>
${meal.strInstructions.slice(0,180)}...
</p>

<h3>
🥘 Ingredients
</h3>

${ingredientsHTML}

<h3>
👨‍🍳 Step-by-Step Instructions
</h3>

${stepsHTML}

<h3>
🎥 Recipe Video
</h3>

${videoHTML}

<div class="card">

<h2>
💡 Cook’ed AI Tips
</h2>

<div class="substituteCard">
Missing butter? Use olive oil.
</div>

<div class="substituteCard">
Missing milk? Use almond milk.
</div>

<div class="substituteCard">
Need more protein? Add chicken or eggs.
</div>

</div>

<div class="btn"
onclick="openComments()">
Comments 💬
</div>

<div class="btn"
onclick="closeRecipe()">
Close Recipe
</div>

</div>

`;

}catch(err){

console.log(err);

alert("Recipe failed to load");

}

}

function closeRecipe(){

recipeModal.classList.remove('active');

recipeModal.innerHTML = '';

}

/* ======================
COMMENTS
====================== */

function openComments(){

commentModal.classList.add('active');

comments.innerHTML = `

<div class="comment">
🔥 This looks insane
</div>

<div class="comment">
Trying this tonight
</div>

<div class="comment">
W recipe fr
</div>

`;

}

function closeComments(){

commentModal.classList.remove('active');

}

function addComment(e){

if(e.key==="Enter"){

comments.innerHTML += `
<div class="comment">
${e.target.value}
</div>
`;

e.target.value = '';

}

}

/* ======================
CAMERA
====================== */

async function startCamera(){

nav('camera');

try{

if(currentStream){

currentStream.getTracks()
.forEach(track=>track.stop());

}

const stream =
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{
ideal:"environment"
},
width:{ideal:1920},
height:{ideal:1080}
},
audio:false
});

currentStream = stream;

video.srcObject = stream;

await video.play();

if(!model){

scanResult.innerHTML = `
<div class="card aiGlow">
Loading AI refrigerator scanner...
</div>
`;

model = await mobilenet.load();

}

scanResult.innerHTML = '';

}catch(err){

scanResult.innerHTML = `
<div class="card">
❌ Camera failed to load
</div>
`;

}

}

/* ======================
SCAN FRIDGE
====================== */

async function capture(){

if(!model)return;

scanResult.innerHTML = `
<div class="card aiGlow">
Analyzing refrigerator ingredients...
</div>
`;

const predictions =
await model.classify(video);

const detected = predictions
.slice(0,5)
.map(p=>p.className.split(',')[0]);

const fridgeItems = [];

detected.forEach(item=>{

const lower = item.toLowerCase();

if(lower.includes("banana")) fridgeItems.push("banana");
if(lower.includes("apple")) fridgeItems.push("apple");
if(lower.includes("milk")) fridgeItems.push("milk");
if(lower.includes("egg")) fridgeItems.push("eggs");
if(lower.includes("bread")) fridgeItems.push("bread");
if(lower.includes("cheese")) fridgeItems.push("cheese");
if(lower.includes("meat")) fridgeItems.push("beef");
if(lower.includes("chicken")) fridgeItems.push("chicken");

});

if(fridgeItems.length === 0){

fridgeItems.push(
"milk",
"eggs",
"bread",
"cheese"
);

}

showFridgeAnalysis(fridgeItems);

}

/* ======================
FRIDGE ANALYSIS
====================== */

function showFridgeAnalysis(items){

/* ======================
HEALTH AI
====================== */

function analyze(){

const h = parseFloat(height.value);
const w = parseFloat(weight.value);

if(!h || !w)return;

const bmi =
(w / ((h/100)*(h/100)))
.toFixed(1);

const goal =
bmi < 18.5
?
"Bulk 💪"
:
bmi < 25
?
"Maintain ⚖️"
:
"Cut 🔥";

healthResult.innerHTML = `

<div class="healthStats">

<div class="stat">
BMI<br><br>${bmi}
</div>

<div class="stat">
Goal<br><br>${goal}
</div>

<div class="stat">
Calories<br><br>
${Math.floor(2200+w*8)}
</div>

<div class="stat">
Protein<br><br>
${Math.floor(w*1.3)}g
</div>

</div>

`;

generateMeals(goal);

}

/* ======================
MEALS
====================== */

async function generateMeals(goal){

const query =
goal.includes("Bulk")
?
"steak"
:
goal.includes("Cut")
?
"salad"
:
"chicken";

const res = await fetch(
`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`
);

const data = await res.json();

mealPlan.innerHTML = '';

data.meals.slice(0,3).forEach(m=>{

mealPlan.innerHTML += `

<div class="mealCard"
onclick='openRecipe(${JSON.stringify(m.strMeal)})'>

<img
src="${m.strMealThumb}"
>

<div class="mealInfo">

<h3>${m.strMeal}</h3>

<p style="color:#bbb">
${m.strCategory}
• ${m.strArea}
</p>

</div>

</div>

`;

});

}
