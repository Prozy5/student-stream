<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<!-- Supabase (no key needed for demo) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --accent:#00ff9d;
  --bg:#000;
  --card:rgba(255,255,255,0.08);
  --text:#fff;
}

/* PREMIUM */
.premium{
  --accent:#ff7a9c;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  text-align:center;
  font-size:22px;
  font-weight:600;
  padding:15px;
}

/* SCREENS */
.screen{display:none;padding:15px}
.active{display:block}

/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  padding:10px;
  margin-bottom:15px;
  backdrop-filter:blur(20px);
}

img{width:100%;border-radius:15px}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:rgba(0,0,0,0.8);
}

/* CAMERA */
video{width:100%;border-radius:15px}

/* CHAT */
.chat{
  height:150px;
  overflow:auto;
  background:#111;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

.msg{font-size:13px;margin-bottom:6px}

/* BUTTON */
.btn{
  background:var(--accent);
  padding:10px;
  border-radius:10px;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="header">Cook’ed</div>
  <div id="feed"></div>
</div>

<!-- CAMERA -->
<div class="screen" id="camera">
  <div class="header">Scan Food</div>

  <video id="video" autoplay></video>
  <div class="btn" onclick="capture()">Scan</div>

  <canvas id="canvas" style="display:none"></canvas>

  <div id="result"></div>

  <!-- CHAT -->
  <div id="chatBox" style="display:none;">
    <div class="chat" id="chat"></div>
    <input placeholder="Ask AI..." onkeydown="chatAI(event)">
  </div>

</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>

  <div>Chef User</div>

  <div class="btn" onclick="togglePremium()">Toggle Premium 👑</div>

  <div id="premiumBox"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="startCamera()">📸</div>
  <div onclick="nav('profile')">👤</div>
</div>

</div>

<script>

/* NAV */
function nav(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* FEED */
function loadFeed(){
  ["chicken","pasta","steak","salmon"].forEach(f=>{
    feed.innerHTML+=`
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?${f},food">
      <b>${f}</b>
    </div>`;
  });
}
loadFeed();

/* CAMERA + MODEL */
let model;

async function startCamera(){
  nav("camera");

  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;

  if(!model){
    model = await mobilenet.load();
  }
}

/* CAPTURE */
function capture(){
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);

  detectFood();
}

/* FAKE STORAGE (SIMULATES SUPABASE STORAGE) */
function fakeUpload(){
  return "https://source.unsplash.com/400x300/?food";
}

/* DETECT FOOD */
async function detectFood(){
  const predictions = await model.classify(video);
  let food = predictions[0].className;

  let image = fakeUpload();

  result.innerHTML=`
    <div class="card">
      <img src="${image}">
      <h3>${food}</h3>
      Confidence: ${(predictions[0].probability*100).toFixed(1)}%
      ${isPremium ? nutritionHTML() : ""}
    </div>
  `;

  saveScan(food,image);
  showChat();
}

/* NUTRITION (PREMIUM ONLY) */
function nutritionHTML(){
  return `
    <br>
    Calories: ${Math.floor(Math.random()*400+200)} kcal<br>
    Protein: ${Math.floor(Math.random()*40)}g
  `;
}

/* FAKE SUPABASE SAVE */
function saveScan(food,img){
  console.log("Saved to Supabase:",food,img);
}

/* CHAT AI */
function showChat(){
  chatBox.style.display="block";
}

function chatAI(e){
  if(e.key==="Enter"){
    let msg=e.target.value;

    chat.innerHTML+=`<div class="msg">You: ${msg}</div>`;

    let replies=[
      "Add garlic & butter 🔥",
      "Try baking instead of frying 👨‍🍳",
      "Pair with veggies 🥦",
      "Increase protein for gains 💪"
    ];

    let reply = replies[Math.floor(Math.random()*replies.length)];

    chat.innerHTML+=`<div class="msg">AI: ${reply}</div>`;

    e.target.value="";
  }
}

/* PREMIUM */
let isPremium=false;

function togglePremium(){
  isPremium=!isPremium;

  document.body.classList.toggle("premium");

  premiumBox.innerHTML = isPremium ? `
    <div class="card">💪 Nutrition Unlocked</div>
    <div class="card">📊 Health Insights</div>
  ` : "";
}

</script>

</body>
</html>
