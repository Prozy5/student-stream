<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
:root{
  --accent:#00ff9d;
  --bg:#000;
  --card:rgba(255,255,255,0.08);
  --text:#fff;
}

/* PREMIUM MODE */
.premium{
  --accent:#ff7a9c;
}

/* BODY */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  text-align:center;
  font-size:22px;
  font-weight:600;
  padding:15px;
}

/* SCREENS */
.screen{display:none;padding:15px}
.active{display:block}

/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  padding:10px;
  margin-bottom:15px;
  backdrop-filter:blur(20px);
}

.card img{
  width:100%;
  border-radius:15px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(20px);
}

/* TOGGLE */
.toggle{
  width:45px;height:22px;background:#333;border-radius:20px;cursor:pointer;position:relative
}
.toggle::after{
  content:"";width:20px;height:20px;background:white;position:absolute;top:1px;left:1px;border-radius:50%
}
.toggle.active{background:var(--accent)}
.toggle.active::after{left:23px}

/* CAMERA */
video{
  width:100%;
  border-radius:15px;
}
</style>
</head>

<body>

<div id="app">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="header">Cook’ed</div>
  <div id="feed"></div>
</div>

<!-- AI CAMERA -->
<div class="screen" id="ai">
  <div class="header">Scan Food</div>

  <video id="camera" autoplay></video>
  <button onclick="scan()">Scan</button>

  <div id="result"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>

  <div>Chef User</div>

  <div style="margin-top:10px;">
    Premium 👑
    <div class="toggle" id="toggle" onclick="togglePremium()"></div>
  </div>

  <div id="premiumFeatures" style="display:none;">
    <div class="card">🔐 Google / Apple / Microsoft Login</div>
    <div class="card">💪 Nutrition AI Enabled</div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="nav('ai')">📸</div>
  <div onclick="nav('profile')">👤</div>
</div>

</div>

<script>

/* NAV */
function nav(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* FEED */
function loadFeed(){
  let foods=["chicken","pasta","steak","salmon"];

  foods.forEach(f=>{
    feed.innerHTML+=`
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?${f},food">
      <b>${f}</b>
    </div>`;
  });
}
loadFeed();

/* CAMERA SETUP */
let model;

async function initCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({ video:true });
  camera.srcObject = stream;

  model = await mobilenet.load();
}
initCamera();

/* SCAN FUNCTION */
async function scan(){
  const predictions = await model.classify(camera);

  let top = predictions[0];

  result.innerHTML=`
    <div class="card">
      <h3>${top.className}</h3>
      Confidence: ${(top.probability*100).toFixed(1)}%
      <br><br>
      Calories: ${Math.floor(Math.random()*500+200)} kcal
      <br>
      Protein: ${Math.floor(Math.random()*40)}g
    </div>
  `;
}

/* PREMIUM */
let isPremium=false;

function togglePremium(){
  isPremium=!isPremium;

  toggle.classList.toggle("active");
  document.body.classList.toggle("premium");

  premiumFeatures.style.display = isPremium ? "block":"none";
}

</script>

</body>
</html>
