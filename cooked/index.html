<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed Demo</title>

<style>
:root{
  --bg:#0e1a12;
  --panel:#13261a;
  --accent:#5cff87;
  --text:#eafff1;
  --muted:#9cc3a7;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:linear-gradient(180deg,#0e1a12,#08110c);
  color:var(--text);
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px 20px;
}

.logo{
  width:80px;
  margin-bottom:10px;
}

h1{
  font-size:34px;
  font-weight:900;
}

.tag{
  font-size:14px;
  color:var(--muted);
  margin-top:6px;
}

/* INPUT AREA */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.inputBox{
  margin-top:25px;
}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:var(--panel);
  color:white;
  font-size:15px;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:#00210f;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
}

/* MODES */
.modes{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.mode{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:12px;
  background:var(--panel);
  font-size:13px;
  cursor:pointer;
  border:1px solid transparent;
}

.mode.active{
  border:1px solid var(--accent);
  color:var(--accent);
}

/* RESULTS */
.results{
  margin-top:25px;
}

.card{
  background:var(--panel);
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

.card h3{
  font-size:16px;
}

.card p{
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  padding:30px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Cook’ed</h1>
  <div class="tag">Turn what you have into real meals</div>
</div>

<div class="container">

  <!-- INPUT -->
  <div class="inputBox">
    <input id="ingredients" placeholder="Enter ingredients (e.g. eggs, rice, cheese)">
    <button onclick="generateMeals()">Find Meals</button>
  </div>

  <!-- MODES -->
  <div class="modes">
    <div class="mode active" onclick="setMode(this,'quick')">⚡ Quick</div>
    <div class="mode" onclick="setMode(this,'budget')">💰 Budget</div>
    <div class="mode" onclick="setMode(this,'eco')">🌱 Eco</div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results"></div>

</div>

<div class="footer">
  Cook’ed Demo • Prodigy Presentation
</div>

<script>
let currentMode = "quick";

function setMode(el, mode){
  document.querySelectorAll(".mode").forEach(m=>m.classList.remove("active"));
  el.classList.add("active");
  currentMode = mode;
}

function generateMeals(){
  const input = document.getElementById("ingredients").value;
  const results = document.getElementById("results");

  if(!input){
    results.innerHTML = "<div class='card'>Enter ingredients first.</div>";
    return;
  }

  let meals = [];

  if(currentMode === "quick"){
    meals = [
      {title:"5-Minute Scramble Bowl", desc:"Quick mix using " + input},
      {title:"Fast Stir Fry", desc:"Simple and ready in minutes"},
      {title:"Lazy Wrap", desc:"Wrap everything together and go"}
    ];
  }

  if(currentMode === "budget"){
    meals = [
      {title:"Budget Rice Mix", desc:"Cheap and filling meal"},
      {title:"Student Combo Plate", desc:"Max calories, low cost"},
      {title:"Pan Toss Meal", desc:"Use everything efficiently"}
    ];
  }

  if(currentMode === "eco"){
    meals = [
      {title:"Zero Waste Bowl", desc:"Uses all ingredients"},
      {title:"Leftover Remix", desc:"Turn scraps into meals"},
      {title:"Eco Plate", desc:"Reduce waste, maximize food"}
    ];
  }

  results.innerHTML = meals.map(m => `
    <div class="card">
      <h3>${m.title}</h3>
      <p>${m.desc}</p>
    </div>
  `).join("");
}
</script>

</body>
</html>
