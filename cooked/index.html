<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cook’ed Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b0f14;
  --panel:#121923;
  --accent:#4CAF50;
  --accent2:#2e7d32;
  --text:#ecf3ff;
  --muted:#9fb3c8;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:radial-gradient(circle at top,#0f1720,#05080c);
  color:var(--text);
  overflow-x:hidden;
}

/* 🔥 BACKGROUND ORBS */
.orb{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(120px);
  opacity:.2;
}
.orb1{background:#4CAF50;top:-200px;left:-200px;}
.orb2{background:#2e7d32;bottom:-200px;right:-200px;}

/* 🚨 BANNER */
.banner{
  width:100%;
  background:linear-gradient(90deg,#0f3d1c,#4CAF50,#0f3d1c);
  overflow:hidden;
  white-space:nowrap;
  border-bottom:1px solid var(--border);
}

.banner span{
  display:inline-block;
  padding:12px 0;
  font-weight:800;
  animation:scrollText 20s linear infinite;
}

@keyframes scrollText{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 24px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}

.logoWrap{
  display:flex;
  align-items:center;
  gap:10px;
}

.logoImg{
  width:34px;
  height:34px;
  object-fit:contain;
}

.logo{
  font-weight:900;
}

.status{
  font-size:12px;
  color:#4CAF50;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px 40px;
}

.heroLogo{
  width:90px;
  margin-bottom:15px;
  filter:drop-shadow(0 0 25px rgba(76,175,80,.5));
}

.hero h1{
  font-size:52px;
  font-weight:900;
}

.typing{
  border-right:2px solid var(--accent);
  white-space:nowrap;
  overflow:hidden;
}

/* INPUT */
.inputBox{
  margin:35px auto;
  max-width:600px;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel);
  color:white;
}

button{
  padding:14px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:800;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(76,175,80,.5);
}

.feedBtn{
  margin-top:10px;
  background:rgba(255,255,255,.05);
  color:white;
}

/* RESULTS */
.results{
  max-width:1000px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
  transition:.3s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 30px rgba(76,175,80,.3);
}

.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.actions button{
  padding:6px 10px;
  font-size:12px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalContent{
  background:#121923;
  padding:20px;
  border-radius:16px;
  max-width:400px;
}

/* FEED */
.feedGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.feedCard{
  height:180px;
  border-radius:16px;
  background:linear-gradient(135deg,#1b2b1f,#0b0f14);
  display:flex;
  align-items:flex-end;
  padding:12px;
  transition:.3s;
}

.feedCard:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="banner">
  <span>
  🚨 Cook’ed page actively being built by orders from StudentStreamHQ owner Deondre • HIGH PRIORITY 🚀
  </span>
</div>

<nav>
  <div class="logoWrap">
    <img src="cooked-logo.png" class="logoImg">
    <div class="logo">Cook’ed</div>
  </div>
  <div class="status">● Live Build</div>
</nav>

<section class="hero">
  <img src="cooked-logo.png" class="heroLogo">

  <h1>Cook with What You <span id="typing" class="typing"></span></h1>

  <div class="inputBox">
    <input id="ingredients" placeholder="eggs, rice, cheese">
    <button onclick="generateMeals()">Find Meals</button>
  </div>

  <button class="inputBox feedBtn">Explore Feed 🔥</button>
</section>

<section id="results" class="results"></section>

<!-- 🔥 FEED -->
<div class="feedGrid">
  <div class="feedCard">🍝 Viral Pasta</div>
  <div class="feedCard">🍳 Egg Hack</div>
  <div class="feedCard">🌯 Wrap</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modalContent" id="modalContent"></div>
</div>

<footer>
Cook’ed • StudentStreamHQ
</footer>

<script>

/* typing */
const words=["Have","Got","Can Afford"];
let i=0,j=0;

function type(){
  document.getElementById("typing").innerText=words[i].slice(0,j++);
  if(j>words[i].length){j=0;i=(i+1)%words.length;}
  setTimeout(type,80);
}
type();

/* meals */
function generateMeals(){
  const input=document.getElementById("ingredients").value;
  const results=document.getElementById("results");

  results.innerHTML=`
    <div class="card" onclick="openModal('Cheesy Rice Bowl')">
      <h3>🍳 Cheesy Rice</h3>
      <p>${input}</p>
      <div class="actions">
        <button>❤️ Like</button>
        <button>🔖 Save</button>
      </div>
    </div>

    <div class="card" onclick="openModal('Ramen Remix')">
      <h3>🍜 Ramen Remix</h3>
      <p>${input}</p>
      <div class="actions">
        <button>❤️ Like</button>
        <button>🔖 Save</button>
      </div>
    </div>
  `;
}

/* modal */
function openModal(title){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h2>${title}</h2>
    <p>Step-by-step recipe coming soon...</p>
  `;
}

document.getElementById("modal").onclick=()=>{
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
