<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{--accent:#00ff9d;--bg:#000;--card:rgba(255,255,255,0.08);--text:#fff}
.premium{--accent:#ff7a9c}
body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text)}
.screen{display:none;padding:15px}.active{display:block}
.header{text-align:center;font-size:22px;font-weight:600;padding:15px}
.card{background:var(--card);border-radius:20px;padding:12px;margin-bottom:15px}
input{width:100%;padding:12px;border-radius:12px;border:none;margin-top:10px;background:#111;color:#fff}
.btn{background:var(--accent);padding:12px;border-radius:12px;text-align:center;margin-top:10px;font-weight:600}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;padding:12px;background:#000}
video{width:100%;border-radius:15px}
.chat{height:150px;overflow:auto;background:#111;border-radius:10px;padding:10px;margin-top:10px}
.msg{font-size:13px;margin-bottom:6px}

/* LOGIN UI */
.login-hero{
  height:180px;
  border-radius:20px;
  background:url('https://source.unsplash.com/600x400/?food,kitchen') center/cover;
  margin-bottom:15px;
}
.tagline{font-size:13px;opacity:.7;text-align:center;margin-top:-10px}
</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->
<div class="screen active" id="login">
  <div class="login-hero"></div>
  <div class="header">Cook’ed</div>
  <div class="tagline">AI-powered food scanning & cooking assistant</div>

  <div class="card">
    <b>🔥 Quick Start (Free)</b>
    <input id="username" placeholder="Enter username">
    <div class="btn" onclick="enterFree()">Start Cooking</div>
  </div>

  <div class="card">
    <b>👑 Premium Access</b>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <div class="btn" onclick="signIn()">Login / Sign Up</div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="home">
  <div class="header">Cook’ed</div>
  <div id="feed"></div>
</div>

<!-- CAMERA -->
<div class="screen" id="camera">
  <div class="header">Scan Food</div>
  <video id="video" autoplay></video>
  <div class="btn" onclick="capture()">Scan</div>
  <canvas id="canvas" style="display:none"></canvas>
  <div id="result"></div>

  <div id="chatBox" style="display:none;">
    <div class="chat" id="chat"></div>
    <input placeholder="Ask AI..." onkeydown="chatAI(event)">
  </div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>
  <div id="userInfo"></div>
  <div class="btn" onclick="togglePremium()">Toggle Premium</div>
  <div class="btn" onclick="logout()">Logout</div>
  <div id="premiumBox"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="startCamera()">📸</div>
  <div onclick="nav('profile')">👤</div>
</div>

</div>

<script>

/* SUPABASE (PUT REAL KEYS) */
const supabase = window.supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

let user = null;
let isPremium = false;

/* NAV */
function nav(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* FREE MODE */
function enterFree(){
  let name = document.getElementById('username').value || "Guest";
  user = {name};
  userInfo.innerText = "Free User: " + name;
  nav('home');
}

/* AUTH (PREMIUM) */
async function signIn(){
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;

  let { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    await supabase.auth.signUp({ email, password });
    alert('Account created. Login again.');
    return;
  }

  user = data.user;
  isPremium = true;
  document.body.classList.add('premium');

  userInfo.innerText = "Premium: " + user.email;
  nav('home');
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* FEED */
function loadFeed(){
  ["chicken","pasta","steak","salmon"].forEach(f=>{
    feed.innerHTML += `<div class="card"><img src="https://source.unsplash.com/400x300/?${f},food"><b>${f}</b></div>`;
  });
}
loadFeed();

/* CAMERA */
let model;
async function startCamera(){
  nav('camera');
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
  if(!model) model = await mobilenet.load();
}

function capture(){
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);
  detectFood();
}

function fakeUpload(){
  return "https://source.unsplash.com/400x300/?food";
}

async function detectFood(){
  const predictions = await model.classify(video);
  let food = predictions[0].className;
  let image = fakeUpload();

  result.innerHTML = `
    <div class="card">
      <img src="${image}">
      <h3>${food}</h3>
      ${(predictions[0].probability*100).toFixed(1)}% confidence
      ${isPremium ? nutritionHTML() : '<br><i>Upgrade for nutrition</i>'}
    </div>`;

  saveScan(food, image);
  showChat();
}

function nutritionHTML(){
  return `<br>Calories: ${Math.floor(Math.random()*400+200)} kcal<br>Protein: ${Math.floor(Math.random()*40)}g`;
}

/* SAVE */
async function saveScan(food, img){
  if(isPremium){
    await supabase.from('scans').insert([{ food, image: img }]);
  } else {
    console.log('Free scan:', food);
  }
}

/* CHAT */
function showChat(){ chatBox.style.display='block'; }

function chatAI(e){
  if(e.key === 'Enter'){
    let msg = e.target.value;
    chat.innerHTML += `<div class="msg">You: ${msg}</div>`;

    let replies = [
      "Add garlic & butter 🔥",
      "Try baking instead 👨‍🍳",
      "Pair with veggies 🥦",
      "More protein = better 💪"
    ];

    let reply = replies[Math.floor(Math.random()*replies.length)];
    chat.innerHTML += `<div class="msg">AI: ${reply}</div>`;

    e.target.value = '';
  }
}

/* PREMIUM TOGGLE (DEMO) */
function togglePremium(){
  isPremium = !isPremium;
  document.body.classList.toggle('premium');

  premiumBox.innerHTML = isPremium ? `
    <div class="card">Nutrition Unlocked</div>
    <div class="card">Health Insights</div>
  ` : '';
}

</script>

</body>
</html>
