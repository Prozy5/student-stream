<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed • Smart Cooking</title>

<style>
:root{
--bg:#08110c;
--panel:#0f1f16;
--accent:#5cff87;
--accent2:#00ffcc;
--text:#ecfff3;
--muted:#9bbca7;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:radial-gradient(circle at top,#0c1f14,#050806);
color:var(--text);
overflow-x:hidden;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.3);
backdrop-filter:blur(12px);
z-index:100;
}

.logoWrap{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:38px;
height:38px;
object-fit:contain;
}

.navTitle{
font-weight:900;
font-size:18px;
}

.nav button{
padding:10px 18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,var(--accent),var(--accent2));
font-weight:800;
cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
padding:140px 20px 90px;
}

.hero img{
width:90px;
margin-bottom:15px;
filter:drop-shadow(0 0 15px rgba(92,255,135,.4));
}

.hero h1{
font-size:60px;
font-weight:900;
}

.hero span{
background:linear-gradient(90deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:18px;
opacity:.75;
font-size:17px;
max-width:650px;
margin:auto;
}

/* CTA */
.cta{
margin-top:35px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.cta button{
padding:16px 30px;
border-radius:16px;
border:none;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.cta button:hover{
transform:translateY(-3px);
}

.primary{
background:linear-gradient(90deg,var(--accent),var(--accent2));
color:#00210f;
}

.secondary{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
color:white;
}

/* SECTION */
.section{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

.section h2{
font-size:36px;
margin-bottom:10px;
}

/* DEMO */
.demo{
margin-top:40px;
background:var(--panel);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 40px rgba(0,255,170,.05);
}

.demo input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#08140d;
color:white;
}

.demo button{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:12px;
background:var(--accent);
font-weight:900;
cursor:pointer;
}

/* MODES */
.modes{
display:flex;
gap:10px;
margin-top:10px;
}

.mode{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
background:#08140d;
cursor:pointer;
font-size:13px;
}

.mode.active{
border:1px solid var(--accent);
color:var(--accent);
}

/* AI BOX */
.aiBox{
margin-top:15px;
font-size:14px;
color:var(--muted);
min-height:40px;
}

/* RESULT CARDS */
.results{
margin-top:15px;
}

.card{
background:#08140d;
padding:14px;
border-radius:12px;
margin-bottom:10px;
}

/* STATS */
.stats{
display:flex;
gap:10px;
margin-top:10px;
}

.stat{
flex:1;
background:#08140d;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
}

/* FOOTER */
.footer{
text-align:center;
padding:30px;
font-size:12px;
opacity:.5;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logoWrap">
<img src="cooked-logo.jpg" class="logo">
<div class="navTitle">Cook’ed</div>
</div>
<button onclick="scrollToDemo()">Try Demo</button>
</div>

<!-- HERO -->
<div class="hero">
<img src="cooked-logo.jpg">
<h1>AI Cooking <span>Made Simple</span></h1>
<p>Turn random ingredients into real meals instantly.</p>

<div class="cta">
<button class="primary" onclick="scrollToDemo()">Try Now</button>
<button class="secondary">Learn More</button>
</div>
</div>

<!-- DEMO -->
<div class="section" id="demoSection">
<h2>Live AI Demo</h2>

<div class="demo">
<input id="input" placeholder="eggs, rice, cheese">

<div class="modes">
<div class="mode active" onclick="setMode(this,'quick')">⚡ Quick</div>
<div class="mode" onclick="setMode(this,'budget')">💰 Budget</div>
<div class="mode" onclick="setMode(this,'eco')">🌱 Eco</div>
</div>

<button onclick="generate()">Generate Meal</button>

<div class="aiBox" id="aiText"></div>

<div class="results" id="results"></div>

<div class="stats" id="stats"></div>

</div>
</div>

<div class="footer">
Cook’ed • Prodigy Winning Demo
</div>

<script>
let mode="quick";

function scrollToDemo(){
document.getElementById("demoSection").scrollIntoView({behavior:"smooth"});
}

function setMode(el,m){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
mode=m;
}

function generate(){
let input=document.getElementById("input").value;
let ai=document.getElementById("aiText");
let results=document.getElementById("results");
let stats=document.getElementById("stats");

if(!input){
ai.innerHTML="Enter ingredients first.";
return;
}

/* FAKE AI LOADING */
ai.innerHTML="🤖 Analyzing ingredients...";
results.innerHTML="";
stats.innerHTML="";

setTimeout(()=>{
ai.innerHTML="✔ Found meal ideas based on your ingredients.";

let meals=[
"Egg Fried Rice 🍳",
"Cheesy Rice Bowl 🧀",
"Quick Stir Mix 🔥"
];

results.innerHTML=meals.map(m=>`
<div class="card">${m}<br><small>Using: ${input}</small></div>
`).join("");

/* STATS */
let money = (Math.random()*8+2).toFixed(2);
let waste = Math.floor(Math.random()*3+1);

stats.innerHTML=`
<div class="stat">💰 Saved $${money}</div>
<div class="stat">🌱 Reduced ${waste} waste items</div>
`;

},1200);
}
</script>

</body>
</html>
