<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#020617;
  --card:rgba(255,255,255,0.06);
  --accent:#00ff9d;
  --text:#eafff5;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:#000;
  color:var(--text);
}

/* LOGIN */
.login-screen{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  background:var(--card);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  cursor:pointer;
  font-weight:bold;
}

/* APP */
.app{
  display:none;
  height:100vh;
  flex-direction:column;
}

.screen{
  display:none;
  flex:1;
  overflow:auto;
  padding:20px;
}

.active{display:block}

/* HEADER */
.header{
  text-align:center;
  font-weight:900;
  font-size:24px;
  margin-bottom:15px;
  color:#7df9ff;
}

/* CARD */
.card{
  background:var(--card);
  backdrop-filter:blur(15px);
  padding:10px;
  border-radius:18px;
  margin-bottom:15px;
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

.card img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
}

/* NAV */
.nav{
  height:65px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#000;
  border-top:1px solid rgba(255,255,255,0.1);
  font-size:22px;
}

/* AI BUBBLES */
.bubble{
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle,#00ff9d33,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:13px;
  cursor:pointer;
  transition:.3s;
}

.bubble:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #00ff9d;
}

/* PROFILE */
.upload{
  margin-top:15px;
  padding:15px;
  border:2px dashed var(--accent);
  text-align:center;
  border-radius:15px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#0a0a0a;
  padding:20px;
  border-radius:15px;
  max-width:500px;
  width:90%;
  max-height:80vh;
  overflow:auto;
}

/* PREMIUM */
.premium{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}

.toggle{
  width:40px;
  height:20px;
  background:#333;
  border-radius:20px;
  position:relative;
  cursor:pointer;
}

.toggle::after{
  content:"";
  width:18px;
  height:18px;
  background:white;
  position:absolute;
  top:1px;
  left:1px;
  border-radius:50%;
  transition:.3s;
}

.toggle.active{
  background:var(--accent);
}

.toggle.active::after{
  left:21px;
}

/* COMMENTS */
.comment{
  background:#111;
  padding:8px;
  border-radius:8px;
  margin-top:5px;
  font-size:12px;
}

.like{
  cursor:pointer;
  margin-top:5px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Cook’ed</h1>
    <input id="username" placeholder="Username">
    <button onclick="login()">Enter Kitchen</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="header">Cook’ed</div>

  <input placeholder="Search recipes..." onkeyup="searchRecipe(this.value)">

  <div id="feed"></div>
</div>

<!-- AI -->
<div class="screen" id="ai">
  <div class="header">AI Kitchen</div>

  <input placeholder="Type ingredients..." onkeyup="aiSuggest(this.value)">

  <div id="aiResults"></div>
</div>

<!-- PROFILE -->
<div class="screen" id="profile">
  <div class="header">Profile</div>

  <div id="userDisplay"></div>

  <div class="premium">
    Cook’ed Premium 👑
    <div class="toggle" id="premiumToggle" onclick="togglePremium()"></div>
  </div>

  <div class="upload" onclick="scanFood()">📸 Scan Food</div>

  <h4>Saved Recipes</h4>
  <div id="savedList"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchScreen('home')">🏠</div>
  <div onclick="switchScreen('ai')">🤖</div>
  <div onclick="switchScreen('profile')">👤</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="recipeModal">
  <div class="modal-content" id="recipeContent"></div>
</div>

<script>

/* LOGIN */
function login(){
  let user=username.value;
  if(!user)return;
  localStorage.setItem("user",user);
  startApp();
}

function startApp(){
  loginScreen.style.display="none";
  app.style.display="flex";
  userDisplay.innerText="Chef "+localStorage.getItem("user");
  loadSaved();
  loadFeed();
}

if(localStorage.getItem("user")) startApp();

/* NAV */
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* FEED */
function loadFeed(){
  const meals=["chicken","beef","pasta"];
  feed.innerHTML="";
  meals.forEach(m=>{
    feed.innerHTML+=`
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?${m}" onclick="openRecipe('${m}')">
      <b>${m}</b>
      <div class="like" onclick="like(this)">❤️ Like</div>
    </div>`;
  });
}

/* SEARCH */
function searchRecipe(q){
  if(q.length<2)return;
  openRecipe(q);
}

/* AI */
function aiSuggest(q){
  if(q.length<2)return;
  aiResults.innerHTML=`<div class="card" onclick="openRecipe('${q}')">AI Suggestion: ${q}</div>`;
}

/* SCAN */
function scanFood(){
  alert("Scanning...");
  setTimeout(()=>{
    openRecipe("chicken");
  },1200);
}

/* PREMIUM */
function togglePremium(){
  premiumToggle.classList.toggle("active");
  alert(premiumToggle.classList.contains("active") ? "Premium ON 👑" : "Premium OFF");
}

/* LIKE */
function like(el){
  el.innerText="❤️ Liked";
}

/* RECIPE */
function openRecipe(q){
  recipeModal.style.display="flex";
  recipeContent.innerHTML="Loading...";

  fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${q}`)
  .then(r=>r.json())
  .then(d=>{
    let m=d.meals[0];

    recipeContent.innerHTML=`
      <h2>${m.strMeal}</h2>
      <img src="${m.strMealThumb}" style="width:100%">
      <p>${m.strInstructions.substring(0,150)}...</p>

      <button onclick="saveRecipe('${m.strMeal}')">⭐ Save</button>

      <input placeholder="Add comment..." onkeydown="addComment(event)">
      <div id="comments"></div>
    `;
  });
}

/* COMMENTS */
function addComment(e){
  if(e.key==="Enter"){
    comments.innerHTML+=`<div class="comment">${e.target.value}</div>`;
    e.target.value="";
  }
}

/* SAVE */
function saveRecipe(name){
  let s=JSON.parse(localStorage.getItem("saved"))||[];
  if(!s.includes(name)) s.push(name);
  localStorage.setItem("saved",JSON.stringify(s));
  loadSaved();
}

/* LOAD SAVED */
function loadSaved(){
  let s=JSON.parse(localStorage.getItem("saved"))||[];
  savedList.innerHTML=s.map(x=>`<div class="card">${x}</div>`).join("");
}

/* CLOSE */
recipeModal.onclick=()=>recipeModal.style.display="none";

</script>

</body>
</html>
