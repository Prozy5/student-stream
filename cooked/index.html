<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
:root{--accent:#00ff9d;--bg:#000;--card:rgba(255,255,255,0.08);--text:#fff}
.premium{--accent:#ff7a9c}
body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text);overflow:hidden}
.screen{display:none;height:100vh;overflow:auto}
.active{display:block}

.card{background:var(--card);border-radius:20px;padding:15px;margin:10px}
.btn{background:var(--accent);padding:12px;border-radius:14px;text-align:center;margin:10px;font-weight:700}

.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;padding:12px;background:#000}

.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.feed-item{height:100vh;scroll-snap-align:start;position:relative}
.feed-item img{width:100%;height:100%;object-fit:cover}

.overlay{position:absolute;bottom:120px;left:15px}
.actions{position:absolute;right:15px;bottom:120px;text-align:center}

.modal{position:fixed;inset:0;background:#000;display:none;padding:20px}
.modal.active{display:block}

.hero{height:300px;background:url('https://source.unsplash.com/900x700/?chef,food') center/cover}
</style>
</head>

<body>

<div id="login" class="screen active">
<div class="hero"></div>
<div class="card">
<h2>Cook’ed</h2>
<p>Cook better. Live healthier.</p>
<input id="username" placeholder="Username">
<div class="btn" onclick="enterApp()">Enter</div>
</div>
</div>

<div id="home" class="screen">
<div id="feed" class="feed"></div>
</div>

<div id="camera" class="screen">
<video id="video" autoplay></video>
<div class="btn" onclick="capture()">Scan</div>
<div id="scanResult"></div>
</div>

<div id="profile" class="screen">
<div id="userInfo"></div>
<div class="btn" onclick="togglePremium()">Toggle Premium</div>

<div id="health" style="display:none">
<input id="height" placeholder="Height">
<input id="weight" placeholder="Weight">
<div class="btn" onclick="analyze()">Analyze</div>
<div id="healthResult"></div>
<div id="mealPlan"></div>
</div>
</div>

<div id="recipeModal" class="modal"></div>

<div class="nav">
<div onclick="nav('home')">🏠</div>
<div onclick="startCamera()">📸</div>
<div onclick="nav('profile')">👤</div>
</div>

<script>
let user,isPremium=false,model;

// NAV
function nav(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// LOGIN
function enterApp(){
user=username.value||'Chef';
userInfo.innerText="👤 "+user;
loadFeed();
nav('home');
}

// FEED (REAL API)
async function loadFeed(){
let res=await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=');
let data=await res.json();

feed.innerHTML='';

data.meals.slice(0,10).forEach(meal=>{
feed.innerHTML+=`
<div class="feed-item">
<img src="${meal.strMealThumb}" onclick="openRecipe('${meal.strMeal}')">
<div class="overlay"><h2>${meal.strMeal}</h2></div>
</div>`;
});
}

// RECIPE (API + VIDEO)
async function openRecipe(name){
let res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${name}`);
let data=await res.json();
let meal=data.meals[0];

recipeModal.classList.add('active');

recipeModal.innerHTML=`
<h2>${meal.strMeal}</h2>
<img src="${meal.strMealThumb}" style="width:100%">
<p>${meal.strInstructions}</p>

${isPremium?`
<iframe width="100%" height="200"
src="https://www.youtube.com/embed?listType=search&list=${name} recipe">
</iframe>`:`<p>🔒 Premium for videos</p>`}

<div class="btn" onclick="closeRecipe()">Close</div>
`;
}

function closeRecipe(){recipeModal.classList.remove('active');}

// CAMERA AI
async function startCamera(){
nav('camera');
const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
if(!model)model=await mobilenet.load();
}

async function capture(){
let predictions=await model.classify(video);
let food=predictions[0].className.split(',')[0];

scanResult.innerHTML=`Detected: ${food}`;

suggestRecipe(food);
}

// SMART RECIPE SUGGESTION
async function suggestRecipe(food){
let res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${food}`);
let data=await res.json();

if(data.meals){
scanResult.innerHTML+=`
<div class="card">
Suggested: ${data.meals[0].strMeal}
</div>`;
}
}

// PREMIUM
function togglePremium(){
isPremium=!isPremium;
health.style.display=isPremium?'block':'none';
}

// HEALTH AI
function analyze(){
let h=height.value;
let w=weight.value;

let bmi=(w/((h/100)*(h/100))).toFixed(1);
let goal=bmi<18.5?"Bulk":bmi<25?"Maintain":"Cut";

healthResult.innerHTML=`
<div class="card">
BMI: ${bmi}<br>
Goal: ${goal}
</div>`;

generateMeals(goal);
}

// MEAL RECOMMENDER
async function generateMeals(goal){
let query = goal=="Bulk"?"chicken":"salad";

let res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
let data=await res.json();

mealPlan.innerHTML="<h3>Recommended Meals</h3>";

data.meals.slice(0,3).forEach(m=>{
mealPlan.innerHTML+=`
<div class="card">${m.strMeal}</div>`;
});
}
</script>

</body>
</html>
