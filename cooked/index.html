<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed App</title>

<style>
:root{
  --bg:#030806;
  --card:#0c1c14;
  --accent:#00ff9d;
  --accent2:#4CAF50;
  --text:#eafff5;
  --muted:#8fa89c;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* APP CONTAINER */
.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* SCREENS */
.screen{
  flex:1;
  display:none;
  overflow-y:auto;
  padding:15px;
}

.active{
  display:block;
}

/* HEADER */
.header{
  text-align:center;
  font-weight:900;
  font-size:20px;
  margin-bottom:10px;
}

.header span{color:var(--accent)}

/* HOME */
.food{
  width:100%;
  border-radius:14px;
  margin-bottom:10px;
}

.ingredients{
  font-size:13px;
  color:var(--muted);
}

/* AI SCREEN */
.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:15px;
}

.bubbles{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.bubble{
  padding:15px;
  border-radius:50%;
  background:#111;
  border:1px solid var(--accent);
  cursor:pointer;
  text-align:center;
}

/* RECIPES */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.recipe{
  background:#111;
  border-radius:10px;
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PROFILE */
.profile{
  text-align:center;
}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ccc;
  margin:auto;
}

.box{
  margin-top:15px;
  padding:15px;
  background:#111;
  border-radius:10px;
}

/* NAV BAR */
.nav{
  height:60px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #222;
  background:#000;
}

.nav div{
  cursor:pointer;
}

/* AI RESULT */
.result{
  margin-top:15px;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="app">

  <!-- HOME -->
  <div class="screen active" id="home">
    <div class="header">Cook<span>’ed</span></div>

    <img class="food" src="https://images.unsplash.com/photo-1604908176997-4316c64c7f8c">
    <b>Meal: Marry Me Chicken</b>

    <div class="ingredients">
      chicken • onion • garlic • cream
    </div>
  </div>

  <!-- AI -->
  <div class="screen" id="ai">
    <div class="header">Cook<span>’ed</span></div>

    <input class="search" placeholder="What do you want to cook today?">

    <div class="bubbles">
      <div class="bubble" onclick="selectAI('High Protein')">Protein</div>
      <div class="bubble" onclick="selectAI('Seafood')">Seafood</div>
      <div class="bubble" onclick="selectAI('Quick Meals')">30 min</div>
      <div class="bubble" onclick="selectAI('Fried Foods')">Fried</div>
    </div>

    <div class="result" id="aiResult"></div>
  </div>

  <!-- RECIPES -->
  <div class="screen" id="recipes">
    <div class="header">Recipes</div>

    <div class="grid">
      <div class="recipe">🍗 Chicken</div>
      <div class="recipe">🍜 Noodles</div>
      <div class="recipe">🥗 Salad</div>
      <div class="recipe">🥞 Pancakes</div>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="screen" id="profile">
    <div class="header">Cook<span>’ed</span></div>

    <div class="profile">
      <div class="avatar"></div>
      <h3>Nick Name</h3>

      <div class="box">Short description...</div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div onclick="switchScreen('home')">🏠</div>
    <div onclick="switchScreen('ai')">🔍</div>
    <div onclick="switchScreen('recipes')">🍽️</div>
    <div onclick="switchScreen('profile')">👤</div>
  </div>

</div>

<script>
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function selectAI(type){
  const box = document.getElementById("aiResult");
  box.innerHTML = "🧠 Generating " + type + " meals...";

  setTimeout(()=>{
    box.innerHTML += "<br>✔ Suggestions:";
    box.innerHTML += "<br>- Garlic Chicken Bowl";
    box.innerHTML += "<br>- Spicy Shrimp Pasta";
  },1200);
}
</script>

</body>
</html>
