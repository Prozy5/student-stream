<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --bg:#06110c;
  --accent:#4CAF50;
  --accent2:#00ff9d;
  --text:#eafef3;
  --muted:#9fb3c8;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:radial-gradient(circle at top,#0b1f16,#020705);
  color:var(--text);
  overflow-x:hidden;
}

/* 🔥 MOVING BANNER */
.banner{
  background:linear-gradient(90deg,#00ff9d,#4CAF50);
  color:#000;
  padding:10px;
  text-align:center;
  font-weight:800;
  animation:slide 10s linear infinite;
}
@keyframes slide{
  0%{letter-spacing:1px}
  50%{letter-spacing:3px}
  100%{letter-spacing:1px}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  position:sticky;
  top:0;
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:900;
  font-size:20px;
}
.logo span{color:var(--accent)}

.navLinks{
  display:flex;
  gap:20px;
}

.navLinks span{
  cursor:pointer;
  color:var(--muted);
  font-weight:600;
}
.navLinks span:hover{
  color:white;
}

.navBtn{
  padding:10px 20px;
  border-radius:999px;
  border:none;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero img{
  width:85px;
  margin-bottom:20px;
}

.hero h1{
  font-size:64px;
  font-weight:900;
}

.highlight{
  background:linear-gradient(90deg,#4CAF50,#00ff9d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* JOIN MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalBox{
  background:#08140f;
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}

.modalBox input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.modalBox button{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:800;
}

/* FEED */
.feedGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:40px;
}

.feedCard{
  height:200px;
  border-radius:16px;
  background:#111;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:10px;
}

.likes{
  font-size:12px;
  color:var(--muted);
}

/* DEMO + OTHER SAME AS BEFORE */
.section{max-width:1100px;margin:80px auto;padding:0 20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px;}
.card{padding:20px;border-radius:16px;background:var(--card);border:1px solid var(--border);}
.demo{text-align:center;}
.demo input{padding:14px;width:60%;border-radius:10px;border:none;}
.demo button{padding:14px;border:none;border-radius:10px;background:var(--accent);}
.results{margin-top:20px;display:grid;gap:10px;}
.resultCard{padding:15px;background:var(--card);border-radius:12px;}

footer{text-align:center;padding:40px;color:var(--muted);}
</style>
</head>

<body>

<div class="banner">
🚧 Page actively being upgraded • HIGH PRIORITY • From The Owner of StudentStreamHQ — Deondre 🚀
</div>

<nav>
  <div class="logo">Cook<span>’ed</span></div>

  <div class="navLinks">
    <span onclick="scrollToFeed()">Feed</span>
    <span onclick="scrollToDemo()">Explore</span>
    <span onclick="openModal()">Join Cook’ed</span>
  </div>

  <button class="navBtn" onclick="openModal()">Join</button>
</nav>

<section class="hero">
  <img src="cooked-logo.PNG">
  <h1>Cook Smarter.<br><span class="highlight">Not Harder.</span></h1>
</section>

<!-- FEED -->
<section id="feed">
  <div class="feedGrid">
    <div class="feedCard">
      🍝 Viral Pasta
      <div class="likes">❤️ 120 likes</div>
    </div>
    <div class="feedCard">
      🍳 Egg Hack
      <div class="likes">❤️ 89 likes</div>
    </div>
    <div class="feedCard">
      🌯 Budget Wrap
      <div class="likes">❤️ 64 likes</div>
    </div>
  </div>
</section>

<!-- DEMO -->
<section class="section demo" id="demo">
  <h2>Try the AI</h2>
  <input id="ingredients" placeholder="eggs, rice">
  <button onclick="generateMeals()">Generate</button>
  <div id="results" class="results"></div>
</section>

<footer>
Cook’ed • A Prodigy Project
</footer>

<!-- JOIN MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">
    <h3>Join Cook’ed</h3>
    <input id="username" placeholder="Enter your name">
    <button onclick="join()">Join Now</button>
  </div>
</div>

<script>
let user="";

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function join(){
  user=document.getElementById("username").value;
  alert("Welcome to Cook’ed, "+user+" 🔥");
  document.getElementById("modal").style.display="none";
}

function scrollToDemo(){
  document.getElementById("demo").scrollIntoView({behavior:"smooth"});
}

function scrollToFeed(){
  document.getElementById("feed").scrollIntoView({behavior:"smooth"});
}

function generateMeals(){
  const input=document.getElementById("ingredients").value;
  const results=document.getElementById("results");

  results.innerHTML=`
    <div class="resultCard">🍳 Meal for ${input}</div>
    <div class="resultCard">🌯 Wrap idea</div>
  `;
}
</script>

</body>
</html>
