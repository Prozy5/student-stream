<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
:root{
  --accent:#4CAF50;
  --accent2:#00ff9d;
  --text:#eafef3;
  --muted:#9fb3c8;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:radial-gradient(circle at top,#0b1f16,#020705);
  color:var(--text);
}

/* 🔥 TOP BANNER */
.banner{
  text-align:center;
  padding:8px;
  font-size:14px;
  background:linear-gradient(90deg,#00ff9d,#4CAF50,#00ff9d);
  background-size:200%;
  animation:slide 6s linear infinite;
  color:black;
  font-weight:700;
}
@keyframes slide{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  backdrop-filter:blur(12px);
}

.navLinks{
  display:flex;
  gap:15px;
}

.navLinks button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  font-weight:700;
}

.navBtn{
  padding:10px 18px;
  border-radius:999px;
  border:none;
  font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:60px;
}

.highlight{
  background:linear-gradient(90deg,#4CAF50,#00ff9d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* LIVE USERS */
.stats{
  margin-top:20px;
  font-size:14px;
  color:var(--muted);
}

/* JOIN MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalContent{
  background:#0c1c14;
  padding:30px;
  border-radius:20px;
  width:300px;
}

.modal input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.modal button{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:800;
}

/* FEED BUTTON */
.feedBtn{
  margin-top:20px;
  padding:14px 20px;
  border:none;
  border-radius:999px;
  background:var(--card);
  color:white;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="banner">
🚧 Page actively being upgraded • High Priority • From the Owner of StudentStreamHQ — Deondre
</div>

<nav>
  <div><b>Cook<span style="color:#4CAF50">’ed</span></b></div>

  <div class="navLinks">
    <button onclick="scrollToTop()">Home</button>
    <button onclick="scrollToDemo()">Demo</button>
    <button onclick="openModal()">Join</button>
  </div>

  <button class="navBtn" onclick="openModal()">Join Cook’ed</button>
</nav>

<section class="hero">
  <h1>Cook Smarter.<br><span class="highlight">Not Harder.</span></h1>
  <p>AI-powered meals for Gen Z.</p>

  <div class="stats">
    🔥 <span id="users">2,184</span> students already using Cook’ed
  </div>

  <button class="feedBtn">Explore Feed</button>
</section>

<!-- JOIN MODAL -->
<div class="modal" id="modal">
  <div class="modalContent">
    <h2>Join Cook’ed</h2>
    <input placeholder="Username">
    <input placeholder="Email">
    <button onclick="join()">Create Account</button>
  </div>
</div>

<footer>
Cook’ed • A Prodigy Project
</footer>

<script>
function scrollToTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}

function scrollToDemo(){
  alert("Demo section coming soon...");
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function join(){
  document.getElementById("modal").innerHTML="<h2 style='color:white'>🎉 Welcome to Cook’ed</h2>";
}

/* FAKE LIVE USERS */
let count = 2184;
setInterval(()=>{
  count += Math.floor(Math.random()*3);
  document.getElementById("users").innerText = count.toLocaleString();
},2000);
</script>

</body>
</html>
