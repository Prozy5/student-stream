<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
color:#00ff9d;
}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
overflow-y:auto;
}

/* UPLOAD */
.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
transition:.2s;
}
.upload:hover{background:#0f1a14;}

.upload input{display:none;}

.preview{
width:100%;
border-radius:15px;
margin-top:10px;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#111;
color:white;
font-size:15px;
}

/* BUTTONS */
button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
transition:.2s;
}
button:hover{opacity:.85;}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

/* OUTPUT CARD */
.output{
background:#111;
padding:18px;
border-radius:18px;
margin-top:10px;
line-height:1.6;
}

.section{
margin-top:15px;
}

.title{
font-weight:900;
font-size:18px;
color:#00ff9d;
margin-bottom:5px;
}

.badge{
display:inline-block;
padding:6px 10px;
border-radius:10px;
background:#00ff9d;
color:black;
font-size:12px;
margin-top:10px;
}

.loading{
text-align:center;
opacity:.7;
}

.success{
color:#00ff9d;
text-align:center;
font-weight:900;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">Cook AI</div>

<div class="container">

<label class="upload">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" class="preview" style="display:none;">
</label>

<input id="mealInput" placeholder="Enter a meal (pasta, chicken, etc)">

<button onclick="runAI()">Generate Meal</button>

<div id="output" class="output" style="display:none;"></div>

<button id="postBtn" class="secondary" style="display:none;" onclick="postToFeed()">Post to Cook’ed</button>

<div id="successMsg" class="success" style="display:none;">Posted to feed</div>

</div>

<script>

let pantryItems = [];
let generatedRecipe = null;

/* IMAGE PREVIEW */
function previewImage(e){
const file = e.target.files[0];
const preview = document.getElementById("preview");

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";

pantryItems = generatePantry();
uploadText.innerText = "Pantry scanned";
}
}

/* DEMO PANTRY */
function generatePantry(){
const items = ["chicken","rice","eggs","cheese","milk","tomato","onion","garlic","pasta"];
return items.sort(()=>0.5-Math.random()).slice(0,5);
}

/* MAIN AI */
async function runAI(){

const meal = document.getElementById("mealInput").value;
const output = document.getElementById("output");

if(!meal){
alert("Enter a meal");
return;
}

output.style.display="block";
output.innerHTML = "<div class='loading'>Generating recipe...</div>";

try{

const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${meal}`);
const data = await res.json();

if(data.meals){

buildRecipe(data.meals[0]);

}else{
fallbackAI(meal);
}

}catch{
fallbackAI(meal);
}

}

/* BUILD REAL RECIPE */
function buildRecipe(m){

let ingredients = [];
for(let i=1;i<=20;i++){
let ing = m["strIngredient"+i];
if(ing && ing.trim()){
ingredients.push(ing);
}
}

/* MATCH SCORE */
let matchCount = ingredients.filter(i => 
pantryItems.includes(i.toLowerCase())
).length;

let score = Math.round((matchCount / ingredients.length) * 100);

generatedRecipe = {
title: m.strMeal,
desc: "AI Generated Meal",
images: [m.strMealThumb],
ingredients,
steps: m.strInstructions.split("."),
likes: Math.floor(Math.random()*200),
views: Math.floor(Math.random()*2000),
comments: [],
created: Date.now()
};

renderOutput(m.strMeal, ingredients, m.strInstructions, score);

}

/* RENDER UI */
function renderOutput(title, ingredients, steps, score){

const output = document.getElementById("output");

output.innerHTML = `
<div class="title">${title}</div>

<div class="badge">${score}% ingredient match</div>

<div class="section">
<div class="title">Pantry</div>
${pantryItems.map(i=>`- ${i}`).join("<br>")}
</div>

<div class="section">
<div class="title">Ingredients</div>
${ingredients.map(i=>`- ${i}`).join("<br>")}
</div>

<div class="section">
<div class="title">Steps</div>
${steps}
</div>

<div class="section">
<div class="title">Substitutions</div>
Use similar pantry items if something is missing
</div>
`;

document.getElementById("postBtn").style.display="block";

}

/* FALLBACK */
function fallbackAI(meal){

generatedRecipe = {
title: meal,
desc: "Custom pantry meal",
images: [`https://source.unsplash.com/featured/?${meal},food`],
ingredients: pantryItems,
steps: ["Prepare ingredients","Cook","Combine","Serve"],
likes: 50,
views: 500,
comments: [],
created: Date.now()
};

renderOutput(meal, pantryItems, "Prepare ingredients. Cook. Combine. Serve.", 80);

}

/* POST */
function postToFeed(){

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

recipes.unshift(generatedRecipe);

localStorage.setItem("recipes", JSON.stringify(recipes));

document.getElementById("successMsg").style.display="block";

setTimeout(()=>{
document.getElementById("successMsg").style.display="none";
},2000);

}

</script>

</body>
</html>
