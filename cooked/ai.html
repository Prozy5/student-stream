<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
color:#00ff9d;
}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}

.upload input{display:none;}

.preview{
width:100%;
border-radius:15px;
margin-top:10px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
transition:.2s;
}

button:active{
transform:scale(.97);
}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

.output{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
line-height:1.6;
}

.section{
margin-top:10px;
}

.section-title{
color:#00ff9d;
font-weight:900;
margin-bottom:5px;
}

.loading{
text-align:center;
opacity:.7;
}

.match{
margin-top:10px;
font-weight:900;
color:#00ff9d;
}
</style>
</head>

<body>

<div class="header">Cook AI</div>

<div class="container">

<label class="upload">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" class="preview" style="display:none;">
</label>

<input id="mealInput" placeholder="Enter a meal (pasta, chicken, etc)">

<button onclick="runAI()">Generate Meal</button>

<div id="output" class="output" style="display:none;"></div>

<button id="postBtn" class="secondary" style="display:none;" onclick="postToFeed()">Post to Cook’ed</button>

</div>

<script>

let pantryItems = [];
let generatedRecipe = null;

/* IMAGE PREVIEW */
function previewImage(e){
const file = e.target.files[0];
const preview = document.getElementById("preview");

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";

pantryItems = generatePantry();
uploadText.innerText = "Pantry scanned";
}
}

/* FAKE VISION */
function generatePantry(){
const items = ["chicken","rice","eggs","cheese","milk","tomato","onion","garlic","pasta"];
return items.sort(()=>0.5-Math.random()).slice(0,5);
}

/* MAIN AI */
async function runAI(){

const meal = document.getElementById("mealInput").value;
const output = document.getElementById("output");

if(!meal){
alert("Enter a meal");
return;
}

output.style.display="block";
output.innerHTML = "<div class='loading'>Analyzing pantry and generating recipe...</div>";

try{

const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${meal}`);
const data = await res.json();

if(data.meals){

const m = data.meals[0];

let ingredients = [];
for(let i=1;i<=20;i++){
let ing = m["strIngredient"+i];
if(ing && ing.trim() !== ""){
ingredients.push(ing.toLowerCase());
}
}

/* MATCH SCORE */
let matchCount = ingredients.filter(i =>
pantryItems.some(p => i.includes(p))
).length;

let matchPercent = Math.floor((matchCount / ingredients.length) * 100);

/* MISSING */
let missing = ingredients.filter(i =>
!pantryItems.some(p => i.includes(p))
);

/* BUILD UI */
output.innerHTML = `
<div class="section">
<div class="section-title">Meal</div>
${m.strMeal}
</div>

<div class="section match">
Match: ${matchPercent}% of ingredients available
</div>

<div class="section">
<div class="section-title">Pantry</div>
- ${pantryItems.join("<br>- ")}
</div>

<div class="section">
<div class="section-title">Ingredients</div>
- ${ingredients.join("<br>- ")}
</div>

<div class="section">
<div class="section-title">Missing Ingredients</div>
- ${missing.length ? missing.join("<br>- ") : "None"}
</div>

<div class="section">
<div class="section-title">Steps</div>
${m.strInstructions}
</div>

<div class="section">
<div class="section-title">Substitutions</div>
Use similar pantry items if something is missing
</div>
`;

generatedRecipe = {
title: m.strMeal,
desc: "AI generated meal",
images: [m.strMealThumb],
ingredients: ingredients,
steps: m.strInstructions.split("."),
likes: Math.floor(Math.random()*200),
views: Math.floor(Math.random()*2000),
comments: [],
created: Date.now()
};

document.getElementById("postBtn").style.display="block";

}else{
fallbackAI(meal);
}

}catch(err){
fallbackAI(meal);
}

}

/* FALLBACK */
function fallbackAI(meal){

const output = document.getElementById("output");

output.innerHTML = `
<div class="section">
<div class="section-title">Meal</div>
${meal}
</div>

<div class="section">
<div class="section-title">Pantry</div>
- ${pantryItems.join("<br>- ")}
</div>

<div class="section">
<div class="section-title">Suggestion</div>
Create a custom version using your available ingredients
</div>

<div class="section">
<div class="section-title">Steps</div>
1. Prepare ingredients<br>
2. Cook<br>
3. Combine<br>
4. Serve
</div>
`;

generatedRecipe = {
title: meal,
desc: "Custom pantry meal",
images: [`https://source.unsplash.com/featured/?${meal},food`],
ingredients: pantryItems,
steps: ["Prepare ingredients","Cook","Combine","Serve"],
likes: 50,
views: 500,
comments: [],
created: Date.now()
};

document.getElementById("postBtn").style.display="block";

}

/* POST */
function postToFeed(){

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

recipes.unshift(generatedRecipe);

localStorage.setItem("recipes", JSON.stringify(recipes));

alert("Posted to Cook’ed feed");

}

</script>

</body>
</html>
