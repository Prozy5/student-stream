<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
}

.header span.cook{color:#00ff9d;}
.header span.ai{color:#fff;}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
overflow:auto;
}

/* UPLOAD */
.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}

/* CARD STYLE */
.card{
background:#111;
padding:15px;
border-radius:15px;
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

/* BUTTONS */
button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

/* OUTPUT */
.recipe{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.title{
font-weight:900;
font-size:18px;
color:#00ff9d;
}

.section{
margin-top:10px;
font-size:14px;
}

.match{
color:#00ff9d;
font-weight:900;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
<span class="cook">Cook</span> <span class="ai">AI</span>
</div>

<div class="container">

<label class="upload card">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" style="width:100%;margin-top:10px;border-radius:10px;display:none;">
</label>

<input id="mealInput" placeholder="Enter a meal idea">

<button onclick="runAI()">Generate Meals</button>

<div id="results"></div>

</div>

l<script>

/* SMART RENDER */
function renderRecipes(list){

results.innerHTML = "";

const userMeal = mealInput.value.toLowerCase();

list.forEach((m,i)=>{

let ingredients=[];
for(let x=1;x<=20;x++){
let ing=m["strIngredient"+x];
if(ing && ing.trim()!==""){
ingredients.push(ing.toLowerCase());
}
}

/* SAFETY */
if(ingredients.length === 0){
ingredients = ["salt","water"];
}

/* INTELLIGENT MATCH (based on requested meal) */
let relevantIngredients = ingredients.filter(i =>
userMeal.includes(i) || i.includes(userMeal)
);

/* WHAT USER HAS */
let have = ingredients.filter(i =>
pantryItems.some(p => i.includes(p))
);

/* WHAT THEY CAN USE */
let usable = pantryItems.filter(p =>
ingredients.some(i => i.includes(p))
);

/* MISSING */
let missing = ingredients.filter(i =>
!pantryItems.some(p => i.includes(p))
);

/* MATCH SCORE */
let percent = Math.floor((have.length / ingredients.length)*100);
if(isNaN(percent)) percent = 0;

/* SMART SUBSTITUTIONS */
let subs = missing.map(i => {

if(i.includes("milk")) return i + " → use water, cream, or butter";
if(i.includes("cheese")) return i + " → use butter or sauce";
if(i.includes("chicken")) return i + " → use eggs, beans, or tofu";
if(i.includes("rice")) return i + " → use pasta or bread";
if(i.includes("butter")) return i + " → use oil";
if(i.includes("egg")) return i + " → use milk or banana";

return i + " → use similar pantry ingredient";

});

/* UI */
const card = document.createElement("div");
card.className="recipe";

card.innerHTML = `
<div class="title">${m.strMeal || "Generated Meal"}</div>

<div class="match">Match: ${percent}%</div>

<div class="section">
You have:<br>- ${have.length ? have.join("<br>- ") : "Minimal match"}
</div>

<div class="section">
Use these from pantry:<br>- ${usable.length ? usable.join("<br>- ") : "Try basic ingredients"}
</div>

<div class="section">
Missing:<br>- ${missing.length ? missing.join("<br>- ") : "Nothing missing"}
</div>

<div class="section">
Substitutions:<br>- ${subs.length ? subs.join("<br>- ") : "Not needed"}
</div>

<button onclick="postToFeed(${i})">Post to Feed</button>
`;

results.appendChild(card);

/* STORE CLEAN VERSION */
generatedList[i] = {
title: m.strMeal || "Generated Meal",
desc: "AI personalized recipe",
images: [m.strMealThumb || `https://source.unsplash.com/featured/?food`],
ingredients: ingredients,
steps: m.strInstructions ? m.strInstructions.split(".") : ["Prepare","Cook","Serve"],
likes: Math.floor(Math.random()*200),
views: Math.floor(Math.random()*2000),
comments: [],
created: Date.now()
};

});

}

</script>
