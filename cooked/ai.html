<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
color:#00ff9d;
}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}

.upload input{display:none;}

.preview{
width:100%;
border-radius:15px;
margin-top:10px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

.output{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
line-height:1.5;
white-space:pre-line;
}

.loading{
text-align:center;
opacity:.7;
}
</style>
</head>

<body>

<div class="header">Cook AI</div>

<div class="container">

<label class="upload">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" class="preview" style="display:none;">
</label>

<input id="mealInput" placeholder="Enter a meal (pasta, chicken, etc)">

<button onclick="runAI()">Generate Meal</button>

<div id="output" class="output" style="display:none;"></div>

<button id="postBtn" class="secondary" style="display:none;" onclick="postToFeed()">Post to Cook’ed</button>

</div>

<script>

let pantryItems = [];
let generatedRecipe = null;

/* IMAGE PREVIEW */
function previewImage(e){
const file = e.target.files[0];
const preview = document.getElementById("preview");

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";

pantryItems = generatePantry();
uploadText.innerText = "Pantry scanned";
}
}

/* FAKE VISION (FOR DEMO) */
function generatePantry(){
const items = ["chicken","rice","eggs","cheese","milk","tomato","onion","garlic","pasta"];
return items.sort(()=>0.5-Math.random()).slice(0,5);
}

/* MAIN AI */
async function runAI(){

const meal = document.getElementById("mealInput").value;
const output = document.getElementById("output");

if(!meal){
alert("Enter a meal");
return;
}

output.style.display="block";
output.innerHTML = "<div class='loading'>Generating recipe...</div>";

try{

/* REAL API */
const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${meal}`);
const data = await res.json();

if(data.meals){

const m = data.meals[0];

let ingredients = [];
for(let i=1;i<=20;i++){
if(m["strIngredient"+i]){
ingredients.push(m["strIngredient"+i]);
}
}

generatedRecipe = {
title: m.strMeal,
desc: "Generated from AI",
images: [m.strMealThumb],
ingredients: ingredients,
steps: m.strInstructions.split("."),
likes: Math.floor(Math.random()*200),
views: Math.floor(Math.random()*2000),
comments: [],
created: Date.now()
};

output.innerText = `
Meal: ${m.strMeal}

Pantry:
- ${pantryItems.join("\n- ")}

Ingredients:
- ${ingredients.join("\n- ")}

Steps:
${m.strInstructions}

Substitutions:
Use similar pantry items if missing ingredients
`;

document.getElementById("postBtn").style.display="block";

}else{

fallbackAI(meal);

}

}catch(err){
fallbackAI(meal);
}

}

/* FALLBACK AI */
function fallbackAI(meal){

const output = document.getElementById("output");

generatedRecipe = {
title: meal,
desc: "Custom pantry recipe",
images: [`https://source.unsplash.com/featured/?${meal},food`],
ingredients: pantryItems,
steps: ["Prepare ingredients","Cook","Combine","Serve"],
likes: 50,
views: 500,
comments: [],
created: Date.now()
};

output.innerText = `
Meal: ${meal}

Pantry:
- ${pantryItems.join("\n- ")}

Suggested Meal:
Use available ingredients to create a custom version.

Steps:
1. Prepare ingredients
2. Cook
3. Combine
4. Serve

Substitutions:
Use pantry alternatives if needed
`;

document.getElementById("postBtn").style.display="block";

}

/* POST TO FEED */
function postToFeed(){

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

recipes.unshift(generatedRecipe);

localStorage.setItem("recipes", JSON.stringify(recipes));

alert("Posted to Cook’ed feed");

}

/* END */

</script>

</body>
</html>
