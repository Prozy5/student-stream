<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
color:#00ff9d;
}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
overflow-y:auto;
}

/* UPLOAD */
.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}
.upload input{display:none;}

.preview{
width:100%;
border-radius:15px;
margin-top:10px;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

/* BUTTON */
button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

/* OUTPUT */
.output{
background:#111;
padding:18px;
border-radius:18px;
line-height:1.6;
}

.section{
margin-top:15px;
}

.title{
font-weight:900;
color:#00ff9d;
margin-bottom:5px;
}

.badge{
display:inline-block;
padding:6px 10px;
border-radius:10px;
background:#00ff9d;
color:black;
font-size:12px;
margin-top:10px;
}

.good{color:#00ff9d;}
.missing{color:#ff4d4d;}

.loading{
text-align:center;
opacity:.7;
}

.success{
color:#00ff9d;
text-align:center;
font-weight:900;
}
</style>
</head>

<body>

<div class="header">Cook AI</div>

<div class="container">

<label class="upload">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" class="preview" style="display:none;">
</label>

<input id="mealInput" placeholder="Enter a meal">

<button onclick="runAI()">Generate Meal</button>

<div id="output" class="output" style="display:none;"></div>

<button id="postBtn" class="secondary" style="display:none;" onclick="postToFeed()">Post to Cook’ed</button>

<div id="successMsg" class="success" style="display:none;">Posted</div>

</div>

<script>

let pantryItems = [];
let generatedRecipe = null;
let uploadedImage = null;

/* IMAGE */
function previewImage(e){
const file = e.target.files[0];
const preview = document.getElementById("preview");

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";

uploadedImage = preview.src;

pantryItems = generatePantry();
uploadText.innerText = "Pantry scanned";
}
}

/* DEMO PANTRY */
function generatePantry(){
const items = ["chicken","rice","eggs","cheese","milk","tomato","onion","garlic","pasta"];
return items.sort(()=>0.5-Math.random()).slice(0,5);
}

/* AI */
async function runAI(){

const meal = mealInput.value;
if(!meal) return alert("Enter meal");

output.style.display="block";
output.innerHTML = "<div class='loading'>Generating...</div>";

try{

const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${meal}`);
const data = await res.json();

if(data.meals){
buildRecipe(data.meals[0]);
}else{
fallbackAI(meal);
}

}catch{
fallbackAI(meal);
}

}

/* BUILD */
function buildRecipe(m){

let ingredients = [];
for(let i=1;i<=20;i++){
let ing = m["strIngredient"+i];
if(ing && ing.trim()) ingredients.push(ing.toLowerCase());
}

/* MATCH */
let matched = ingredients.filter(i=>pantryItems.includes(i));
let missing = ingredients.filter(i=>!pantryItems.includes(i));

let score = Math.round((matched.length / ingredients.length)*100);

let confidence = score > 70 ? "High" : score > 40 ? "Medium" : "Low";

/* CLEAN STEPS */
let steps = m.strInstructions.split(".").filter(s=>s.trim());

generatedRecipe = {
title: m.strMeal,
desc: "AI Generated Meal",
images: [uploadedImage || m.strMealThumb],
ingredients,
steps,
likes: Math.floor(Math.random()*200),
views: Math.floor(Math.random()*2000),
comments: [],
created: Date.now()
};

renderOutput(m.strMeal, matched, missing, steps, score, confidence);

}

/* UI */
function renderOutput(title, matched, missing, steps, score, confidence){

output.innerHTML = `
<div class="title">${title}</div>

<div class="badge">${score}% match • ${confidence} confidence</div>

<div class="section">
<div class="title">Available Ingredients</div>
${matched.map(i=>`<div class="good">- ${i}</div>`).join("")}
</div>

<div class="section">
<div class="title">Missing Ingredients</div>
${missing.map(i=>`<div class="missing">- ${i}</div>`).join("")}
</div>

<div class="section">
<div class="title">Steps</div>
${steps.map((s,i)=>`${i+1}. ${s}`).join("<br><br>")}
</div>

<div class="section">
<div class="title">Substitutions</div>
${missing.map(i=>`- Replace ${i} with similar pantry item`).join("<br>")}
</div>
`;

postBtn.style.display="block";

}

/* FALLBACK */
function fallbackAI(meal){

generatedRecipe = {
title: meal,
desc: "Custom Meal",
images: [uploadedImage || `https://source.unsplash.com/featured/?${meal},food`],
ingredients: pantryItems,
steps: ["Prepare","Cook","Combine","Serve"],
likes: 50,
views: 500,
comments: [],
created: Date.now()
};

renderOutput(meal, pantryItems, [], generatedRecipe.steps, 80, "Medium");

}

/* POST */
function postToFeed(){

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

recipes.unshift(generatedRecipe);

localStorage.setItem("recipes", JSON.stringify(recipes));

successMsg.style.display="block";

setTimeout(()=>{
window.location.href = "feed.html"; // IMPORTANT
},1200);

}

</script>

</body>
</html>
