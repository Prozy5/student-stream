<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:black;color:white;overflow:hidden;}

/* FEED */
.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

/* VIDEO / FRAME */
.videoFrame{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:26px;
  padding:20px;
  background:#111;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  padding:20px;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
}

.title{font-size:26px;font-weight:900;}
.desc{font-size:14px;color:#ccc;}

.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:999px;
  background:#00ff9d;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}

/* PANELS */
.panel{
  position:fixed;
  inset:0;
  background:#0b0f14;
  padding:20px;
  overflow:auto;
  transform:translateY(100%);
  transition:.4s;
  z-index:20;
}
.panel.active{transform:translateY(0);}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}

/* IMAGE PREVIEW */
.preview{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

/* FLOAT BUTTONS */
.float{
  position:fixed;
  bottom:20px;
  font-size:22px;
}
.add{right:20px;}
.ai{left:20px;}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<!-- AI PANEL (PANTRY SCAN) -->
<div class="panel" id="aiPanel">
  <h2>📸 Scan Your Pantry</h2>

  <input type="file" id="imageInput" accept="image/*" capture="environment">

  <img id="preview" class="preview" style="display:none">

  <button onclick="scanPantry()">Scan Pantry</button>

  <div id="aiResult"></div>

  <button onclick="closeAI()">Close</button>
</div>

<!-- FLOAT BUTTON -->
<button class="float ai" onclick="openAI()">📸</button>

<script>

/* STORAGE */
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

/* RENDER */
function render(){
  feed.innerHTML="";

  recipes.forEach((r,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <div class="videoFrame">${r.title}</div>

      <div class="overlay">
        <div class="title">${r.title}</div>
        <div class="desc">${r.desc}</div>
        <button onclick="openCook(${i})">Cook</button>
      </div>

      <div class="actions">
        <div onclick="like(this)">❤️</div>
        <div onclick="save(this)">🔖</div>
      </div>
    `;

    feed.appendChild(el);
  });
}

/* IMAGE PREVIEW */
imageInput.onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;

  preview.src = URL.createObjectURL(file);
  preview.style.display="block";
};

/* AI SCAN */
function scanPantry(){
  const result = document.getElementById("aiResult");

  result.innerHTML="🧠 Scanning pantry...";

  setTimeout(()=>{
    const possible = ["eggs","rice","chicken","cheese","bread","beans","pasta"];
    const detected = possible.sort(()=>0.5-Math.random()).slice(0,4);

    result.innerHTML += "<br>Detected: "+detected.join(", ");

    setTimeout(()=>{
      const title = detected.join(" ")+" Meal";

      result.innerHTML += `
        <br><br><b>🍳 Recipes:</b>
        <br>- ${detected[0]} & ${detected[1]} Bowl
        <br>- ${detected[2]} ${detected[3]} Mix
      `;

      result.innerHTML += `
        <br><br>
        <button onclick='postAI("${title}", ${JSON.stringify(detected)})'>
          Post to Feed
        </button>
      `;
    },1500);

  },1200);
}

/* POST AI */
function postAI(title,ingredients){
  const newRecipe={
    title,
    desc:"Generated from your pantry 📸",
    steps:["Prep","Cook","Serve"]
  };

  recipes.unshift(newRecipe);
  localStorage.setItem("recipes",JSON.stringify(recipes));
  render();
  closeAI();
}

/* LIKE / SAVE */
function like(el){el.style.color = el.style.color==="red"?"white":"red";}
function save(el){el.style.color = el.style.color==="yellow"?"white":"yellow";}

/* COOK MODE */
function openCook(i){
  alert(recipes[i].steps.join("\n"));
}

/* PANEL */
function openAI(){aiPanel.classList.add("active");}
function closeAI(){aiPanel.classList.remove("active");}

/* INIT */
render();

</script>

</body>
</html>
