<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
}

.header span.cook{color:#00ff9d;}
.header span.ai{color:#fff;}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
overflow:auto;
}

.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}

.card{
background:#111;
padding:15px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

.recipe{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.title{
font-weight:900;
font-size:18px;
color:#00ff9d;
}

.section{
margin-top:10px;
font-size:14px;
}

.match{
color:#00ff9d;
font-weight:900;
margin-top:8px;
}

.loading{
opacity:.6;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<span class="cook">Cook</span> <span class="ai">AI</span>
</div>

<div class="container">

<label class="upload card">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" style="width:100%;margin-top:10px;border-radius:10px;display:none;">
</label>

<input id="mealInput" placeholder="What do you want to cook?">

<button onclick="runAI()">Generate Meals</button>

<div id="results"></div>

</div>

<script>

let pantryItems = JSON.parse(localStorage.getItem("pantryMemory") || "[]");
let generatedList = [];
let chefMode = "beginner";

/* IMAGE PREVIEW + MEMORY */
async function previewImage(e){
const file = e.target.files[0];

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";
uploadText.innerText = "Analyzing pantry...";

const detected = await analyzePantryImage(file);

/* MERGE WITH MEMORY */
pantryItems = [...new Set([...pantryItems, ...detected])];

localStorage.setItem("pantryMemory", JSON.stringify(pantryItems));

uploadText.innerText = "Pantry Ready: " + pantryItems.join(", ");
}
}

/* AI VISION (UPGRADE READY) */
async function analyzePantryImage(file){
return new Promise(resolve=>{
setTimeout(()=>{
const possible = [
"chicken","rice","eggs","milk","cheese",
"tomato","onion","garlic","butter","bread",
"pasta","pepper","beans","carrot"
];
resolve(possible.sort(()=>0.5-Math.random()).slice(0,6));
},800);
});
}

/* CHEF MODE SWITCH */
function setChef(mode){
chefMode = mode;
alert("Chef mode: " + mode);
}

/* MAIN AI */
async function runAI(){

const meal = mealInput.value.toLowerCase();
if(!meal){
alert("Enter a meal idea");
return;
}

results.innerHTML = "<div class='loading'>AI Chef analyzing your kitchen...</div>";

try{

const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${meal}`);
const data = await res.json();

if(!data.meals){
fallbackAI(meal);
return;
}

generatedList = data.meals.slice(0,5);
renderRecipes(generatedList, meal);

}catch{
fallbackAI(meal);
}

}

/* SMART ENGINE */
function renderRecipes(list, meal){

results.innerHTML = "";

list.forEach((m,i)=>{

let ingredients=[];

for(let x=1;x<=20;x++){
let ing=m["strIngredient"+x];
if(ing && ing.trim()!==""){
ingredients.push(ing.toLowerCase());
}
}

if(ingredients.length===0){
ingredients = pantryItems;
}

/* 🔥 INTELLIGENCE LAYER */

/* relevance to requested meal */
let relevance = ingredients.filter(i =>
meal.includes(i) || i.includes(meal)
);

/* what user has */
let have = ingredients.filter(i =>
pantryItems.some(p => i.includes(p))
);

/* best usable ingredients */
let usable = pantryItems.filter(p =>
ingredients.some(i => i.includes(p))
);

/* missing */
let missing = ingredients.filter(i =>
!pantryItems.some(p => i.includes(p))
);

/* SMART SCORE (weighted) */
let score = (
(have.length * 2) + 
(relevance.length * 3)
) / (ingredients.length * 3);

let percent = Math.floor(score * 100);
if(isNaN(percent)) percent = 0;

/* SUBSTITUTIONS ENGINE */
let subs = missing.map(i=>{
if(i.includes("milk")) return i+" → use butter / cream / water";
if(i.includes("egg")) return i+" → use banana / yogurt";
if(i.includes("cheese")) return i+" → use sauce / butter";
if(i.includes("chicken")) return i+" → use beans / eggs";
if(i.includes("rice")) return i+" → use pasta / bread";
return i+" → similar ingredient";
});

/* STEP BREAKDOWN */
let steps = (m.strInstructions || "Cook normally")
.split(".")
.filter(s=>s.trim().length>10)
.slice(0,6);

/* CHEF MODE MODIFY */
if(chefMode === "beginner"){
steps = steps.map((s,i)=>`${i+1}. ${s.trim()}`);
}

if(chefMode === "pro"){
steps = steps.map((s,i)=>`Step ${i+1}: ${s.trim()} (optimize heat & timing)`);
}

if(chefMode === "budget"){
subs.push("💡 Budget tip: prioritize cheaper pantry items");
}

/* GROCERY LIST */
let grocery = missing.join(", ");

/* UI */
const card = document.createElement("div");
card.className="recipe";

card.innerHTML = `
<div class="title">${m.strMeal || "Smart Meal"}</div>

<img src="${m.strMealThumb || 'https://source.unsplash.com/featured/?food'}"
style="width:100%;border-radius:10px;margin-top:10px;">

<div class="match">AI Match: ${percent}%</div>

<div class="section">
You have:<br>- ${have.length ? have.join("<br>- ") : "Low match"}
</div>

<div class="section">
Best to use:<br>- ${usable.length ? usable.join("<br>- ") : "Basic items"}
</div>

<div class="section">
Missing:<br>- ${missing.length ? missing.join("<br>- ") : "Nothing"}
</div>

<div class="section">
Substitutions:<br>- ${subs.length ? subs.join("<br>- ") : "None"}
</div>

<div class="section">
Steps:<br>- ${steps.join("<br>- ")}
</div>

<div class="section">
🛒 Grocery List:<br>${grocery || "None needed"}
</div>

<button onclick="postToFeed(${i})">Post to Feed</button>
`;

results.appendChild(card);

/* STORE */
generatedList[i] = {
title:m.strMeal || "Smart Meal",
desc:"AI optimized recipe",
images:[m.strMealThumb],
ingredients,
steps,
likes:Math.floor(Math.random()*200),
views:Math.floor(Math.random()*2000),
comments:[],
created:Date.now()
};

});

}

/* FALLBACK */
function fallbackAI(meal){

generatedList=[{
title:meal,
desc:"Custom AI meal",
images:[`https://source.unsplash.com/featured/?${meal},food`],
ingredients:pantryItems,
steps:["Prep","Cook","Serve"],
likes:50,
views:500,
comments:[],
created:Date.now()
}];

renderRecipes(generatedList, meal);

}

/* POST */
function postToFeed(i){

let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");

recipes.unshift(generatedList[i]);

localStorage.setItem("recipes", JSON.stringify(recipes));

window.location.href="feed.html";

}

</script>
