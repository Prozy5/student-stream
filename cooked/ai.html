<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
}

/* MAIN */
.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

/* UPLOAD */
.upload{
border:2px dashed #333;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}

.upload input{display:none;}

.preview{
width:100%;
border-radius:15px;
margin-top:10px;
}

/* INPUT */
input, textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

/* BUTTON */
button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
}

/* OUTPUT */
.output{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
line-height:1.5;
white-space:pre-line;
}

/* LOADING */
.loading{
text-align:center;
opacity:.7;
}
</style>
</head>

<body>

<div class="header">Cook AI 🧠🔥</div>

<div class="container">

<!-- IMAGE UPLOAD -->
<label class="upload">
Tap to scan your pantry 📸
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" class="preview" style="display:none;">
</label>

<!-- USER INPUT -->
<input id="mealInput" placeholder="What do you want to cook? (e.g. pasta, tacos, etc)">

<button onclick="runAI()">Generate Meal</button>

<!-- OUTPUT -->
<div id="output" class="output" style="display:none;"></div>

</div>

<script>

let pantryItems = [];

/* IMAGE PREVIEW */
function previewImage(e){
const file = e.target.files[0];
const preview = document.getElementById("preview");

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";

/* FAKE AI VISION (DEMO) */
pantryItems = generatePantry();
uploadText.innerText = "Pantry scanned ✅";
}
}

/* FAKE PANTRY DETECTION */
function generatePantry(){
const possible = [
"chicken","rice","eggs","cheese","milk",
"tomatoes","onions","garlic","pasta","bread"
];

return possible.sort(()=>0.5-Math.random()).slice(0,5);
}

/* AI GENERATION */
function runAI(){

const meal = document.getElementById("mealInput").value;
const output = document.getElementById("output");

if(!meal){
alert("Enter a meal idea");
return;
}

output.style.display="block";
output.innerHTML = "<div class='loading'>Analyzing pantry...</div>";

setTimeout(()=>{

const result = generateRecipe(meal, pantryItems);
output.innerText = result;

},1500);

}

/* RECIPE LOGIC */
function generateRecipe(meal, items){

let recipe = `🍽 Meal: ${meal.toUpperCase()}\n\n`;

recipe += `🧺 Pantry Detected:\n- ${items.join("\n- ")}\n\n`;

recipe += `✅ What You Can Make:\n`;
recipe += `You can create a version of ${meal} using your available ingredients.\n\n`;

recipe += `🧂 Suggested Ingredients:\n`;
items.forEach(i=>{
recipe += `- ${i}\n`;
});

recipe += `\n🍳 Steps:\n`;
recipe += `1. Prep all ingredients\n`;
recipe += `2. Cook based on your meal style\n`;
recipe += `3. Combine and season\n`;
recipe += `4. Serve hot\n\n`;

/* SUBSTITUTIONS */
recipe += `🔄 Missing Something?\n`;
recipe += `- No cheese? → use butter or sauce\n`;
recipe += `- No meat? → use eggs or beans\n`;
recipe += `- No pasta? → use rice or bread\n`;

return recipe;

}

</script>

</body>
</html>
