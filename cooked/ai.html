<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
}

.header span.cook{color:#00ff9d;}
.header span.ai{color:#fff;}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
overflow:auto;
}

.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}

.card{
background:#111;
padding:15px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

.recipe{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.title{
font-weight:900;
font-size:18px;
color:#00ff9d;
}

.section{
margin-top:10px;
font-size:14px;
}

.match{
color:#00ff9d;
font-weight:900;
margin-top:8px;
}

.loading{
opacity:.6;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<span class="cook">Cook</span> <span class="ai">AI</span>
</div>

<div class="container">

<label class="upload card">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" style="width:100%;margin-top:10px;border-radius:10px;display:none;">
</label>

<input id="mealInput" placeholder="What do you want to cook?">

<button onclick="runAI()">Generate Meals</button>

<div id="results"></div>

</div>

<script>

let pantryItems = [];
let generatedList = [];

/* IMAGE PREVIEW + AI VISION SIMULATION */
async function previewImage(e){
const file = e.target.files[0];

if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";
uploadText.innerText = "Analyzing pantry...";

/* REALISTIC AI SIMULATION (replace with API later) */
pantryItems = await analyzePantryImage(file);

uploadText.innerText = "Pantry Ready: " + pantryItems.join(", ");
}
}

/* 🔥 FAKE AI VISION (UPGRADE READY FOR REAL API) */
async function analyzePantryImage(file){

/*
🔥 REAL API OPTIONS YOU CAN PLUG IN LATER:
- Google Vision API
- Clarifai Food Model
- Spoonacular Ingredient Detection
*/

return new Promise(resolve=>{
setTimeout(()=>{
const possible = [
"chicken","rice","eggs","milk","cheese",
"tomato","onion","garlic","butter","bread",
"pasta","pepper","beans","carrot"
];

resolve(possible.sort(()=>0.5-Math.random()).slice(0,6));
},1000);
});
}

/* MAIN AI */
async function runAI(){

const meal = mealInput.value.toLowerCase();
if(!meal){
alert("Enter a meal idea");
return;
}

results.innerHTML = "<div class='loading'>Cooking up smart recipes...</div>";

try{

/* MULTI API COMBO */
const [mealDB, spoon] = await Promise.all([
fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${meal}`).then(r=>r.json()),
fetch(`https://api.spoonacular.com/recipes/complexSearch?query=${meal}&number=3&apiKey=YOUR_API_KEY`).then(r=>r.json()).catch(()=>null)
]);

let meals = [];

/* MealDB */
if(mealDB.meals){
meals = mealDB.meals;
}

/* Spoonacular fallback */
if(spoon && spoon.results){
spoon.results.forEach(r=>{
meals.push({
strMeal:r.title,
strMealThumb:r.image,
strInstructions:"Follow standard cooking steps."
});
});
}

if(!meals.length){
fallbackAI(meal);
return;
}

generatedList = meals.slice(0,5);
renderRecipes(generatedList, meal);

}catch{
fallbackAI(meal);
}

}

/* SMART RENDER */
function renderRecipes(list, meal){

results.innerHTML = "";

list.forEach((m,i)=>{

let ingredients=[];
for(let x=1;x<=20;x++){
let ing=m["strIngredient"+x];
if(ing && ing.trim()!==""){
ingredients.push(ing.toLowerCase());
}
}

if(ingredients.length===0){
ingredients = pantryItems;
}

/* WHAT USER HAS */
let have = ingredients.filter(i =>
pantryItems.some(p => i.includes(p))
);

/* WHAT THEY SHOULD USE */
let use = pantryItems.filter(p =>
ingredients.some(i => i.includes(p))
);

/* MISSING */
let missing = ingredients.filter(i =>
!pantryItems.some(p => i.includes(p))
);

/* MATCH */
let percent = Math.floor((have.length / ingredients.length)*100);
if(isNaN(percent)) percent = 0;

/* SMART SUBSTITUTIONS */
let subs = missing.map(i=>{
if(i.includes("milk")) return i+" → use butter or water";
if(i.includes("egg")) return i+" → use banana or milk";
if(i.includes("cheese")) return i+" → use sauce or butter";
if(i.includes("chicken")) return i+" → use beans or eggs";
if(i.includes("rice")) return i+" → use pasta or bread";
return i+" → similar pantry item";
});

const card = document.createElement("div");
card.className="recipe";

card.innerHTML = `
<div class="title">${m.strMeal || "Smart Meal"}</div>

<img src="${m.strMealThumb || 'https://source.unsplash.com/featured/?food'}" 
style="width:100%;border-radius:10px;margin-top:10px;">

<div class="match">Match: ${percent}%</div>

<div class="section">
You have:<br>- ${have.length ? have.join("<br>- ") : "Low match"}
</div>

<div class="section">
Use these:<br>- ${use.length ? use.join("<br>- ") : "Basic ingredients"}
</div>

<div class="section">
Missing:<br>- ${missing.length ? missing.join("<br>- ") : "Nothing"}
</div>

<div class="section">
Substitutions:<br>- ${subs.length ? subs.join("<br>- ") : "None"}
</div>

<button onclick="postToFeed(${i})">Post to Feed</button>
`;

results.appendChild(card);

/* STORE */
generatedList[i] = {
title:m.strMeal || "Smart Meal",
desc:"AI generated",
images:[m.strMealThumb],
ingredients,
steps:["Prep","Cook","Serve"],
likes:Math.floor(Math.random()*200),
views:Math.floor(Math.random()*2000),
comments:[],
created:Date.now()
};

});

}

/* FALLBACK */
function fallbackAI(meal){

generatedList=[{
title:meal,
desc:"Custom AI meal",
images:[`https://source.unsplash.com/featured/?${meal},food`],
ingredients:pantryItems,
steps:["Prep","Cook","Serve"],
likes:50,
views:500,
comments:[],
created:Date.now()
}];

renderRecipes(generatedList, meal);

}

/* POST + REDIRECT */
function postToFeed(i){

let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");

recipes.unshift(generatedList[i]);

localStorage.setItem("recipes", JSON.stringify(recipes));

window.location.href="feed.html";

}

</script>

</body>
</html>
