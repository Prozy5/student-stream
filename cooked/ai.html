<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
background:#0b0f14;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
padding:15px;
text-align:center;
font-weight:900;
font-size:20px;
background:#000;
}

.header span.cook{color:#00ff9d;}
.header span.ai{color:#fff;}

.container{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
overflow:auto;
}

/* UPLOAD */
.upload{
border:2px dashed #00ff9d;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
}

/* CARD STYLE */
.card{
background:#111;
padding:15px;
border-radius:15px;
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#111;
color:white;
}

/* BUTTONS */
button{
padding:14px;
border:none;
border-radius:12px;
background:#00ff9d;
font-weight:900;
cursor:pointer;
color:black;
}

.secondary{
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
}

/* OUTPUT */
.recipe{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.title{
font-weight:900;
font-size:18px;
color:#00ff9d;
}

.section{
margin-top:10px;
font-size:14px;
}

.match{
color:#00ff9d;
font-weight:900;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
<span class="cook">Cook</span> <span class="ai">AI</span>
</div>

<div class="container">

<label class="upload card">
Scan Pantry
<input type="file" accept="image/*" onchange="previewImage(event)">
<div id="uploadText">Upload pantry image</div>
<img id="preview" style="width:100%;margin-top:10px;border-radius:10px;display:none;">
</label>

<input id="mealInput" placeholder="Enter a meal idea">

<button onclick="runAI()">Generate Meals</button>

<div id="results"></div>

</div>

<script>

let pantryItems = [];
let generatedList = [];

/* IMAGE */
function previewImage(e){
const file = e.target.files[0];
if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";

/* LEARNING MEMORY */
let history = JSON.parse(localStorage.getItem("pantryHistory")||"[]");

pantryItems = generatePantry();
history.push(pantryItems);

localStorage.setItem("pantryHistory", JSON.stringify(history));

uploadText.innerText = "Pantry analyzed";
}
}

/* FAKE VISION */
function generatePantry(){
const items = ["chicken","rice","eggs","cheese","milk","tomato","onion","garlic","pasta"];
return items.sort(()=>0.5-Math.random()).slice(0,6);
}

/* MAIN */
async function runAI(){

const meal = mealInput.value;
if(!meal){
alert("Enter a meal");
return;
}

results.innerHTML = "Loading recipes...";

try{

const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${meal}`);
const data = await res.json();

if(data.meals){

generatedList = data.meals.slice(0,3); // MULTIPLE RECIPES

renderRecipes(generatedList);

}else{
fallbackAI(meal);
}

}catch{
fallbackAI(meal);
}

}

/* RENDER */
function renderRecipes(list){

results.innerHTML = "";

list.forEach((m,i)=>{

let ingredients=[];
for(let x=1;x<=20;x++){
let ing=m["strIngredient"+x];
if(ing && ing.trim()!=""){
ingredients.push(ing.toLowerCase());
}
}

/* MATCH */
let match = ingredients.filter(i =>
pantryItems.some(p => i.includes(p))
);

let percent = Math.floor((match.length / ingredients.length)*100);

/* MISSING */
let missing = ingredients.filter(i =>
!pantryItems.some(p => i.includes(p))
);

/* SUBSTITUTIONS */
let subs = missing.map(i => {
if(i.includes("cheese")) return "cheese → butter or sauce";
if(i.includes("milk")) return "milk → water or cream";
if(i.includes("chicken")) return "chicken → eggs or beans";
return i + " → similar pantry item";
});

const card = document.createElement("div");
card.className="recipe";

card.innerHTML = `
<div class="title">${m.strMeal}</div>

<div class="match">Match: ${percent}%</div>

<div class="section">
Pantry:<br>- ${pantryItems.join("<br>- ")}
</div>

<div class="section">
Missing:<br>- ${missing.length ? missing.join("<br>- ") : "None"}
</div>

<div class="section">
Substitutions:<br>- ${subs.join("<br>- ")}
</div>

<button onclick="postToFeed(${i})">Post to Feed</button>
`;

results.appendChild(card);

/* STORE CLEAN VERSION */
generatedList[i] = {
title: m.strMeal,
desc: "AI generated meal",
images: [m.strMealThumb],
ingredients: ingredients,
steps: m.strInstructions.split("."),
likes: Math.floor(Math.random()*200),
views: Math.floor(Math.random()*2000),
comments: [],
created: Date.now()
};

});

}

/* FALLBACK */
function fallbackAI(meal){

generatedList=[{
title: meal,
desc: "Custom meal",
images:[`https://source.unsplash.com/featured/?${meal},food`],
ingredients: pantryItems,
steps:["Prep","Cook","Serve"],
likes:50,
views:500,
comments:[],
created:Date.now()
}];

renderRecipes(generatedList);

}

/* POST + REDIRECT */
function postToFeed(i){

let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");

recipes.unshift(generatedList[i]);

localStorage.setItem("recipes", JSON.stringify(recipes));

/* AUTO REDIRECT */
window.location.href = "feed.html";

}

</script>

</body>
</html>
