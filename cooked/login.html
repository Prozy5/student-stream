<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  height:100vh;
  display:flex;
  background:#050a08;
  color:white;
}

/* 🖼 LEFT SIDE */
.left{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(160deg,#081710,#0b1f16);
  position:relative;
  overflow:hidden;
}

/* glow */
.left::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#00ff9d22,transparent 70%);
  filter:blur(100px);
  animation:float 10s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-40px)}
}

/* logo */
.heroLogo{
  width:200px;
  z-index:2;
  filter:drop-shadow(0 0 30px rgba(0,255,157,.4));
  animation:fadeIn 1s ease;
}

/* floating food cards */
.preview{
  position:absolute;
  display:flex;
  gap:15px;
  bottom:80px;
}

.preview div{
  width:120px;
  height:160px;
  border-radius:16px;
  background:linear-gradient(135deg,#123,#000);
  padding:10px;
  font-size:13px;
  font-weight:700;
  display:flex;
  align-items:end;
  animation:floatCard 6s infinite ease-in-out;
}

.preview div:nth-child(2){
  animation-delay:1s;
}
.preview div:nth-child(3){
  animation-delay:2s;
}

@keyframes floatCard{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* text */
.heroText{
  position:absolute;
  top:60px;
  text-align:center;
}

.heroText h1{
  font-size:30px;
}

.heroText p{
  font-size:14px;
  color:#9fb3c8;
}

/* 🔐 RIGHT SIDE */
.right{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#050a08;
}

/* card */
.card{
  width:340px;
  padding:32px;
  border-radius:22px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  box-shadow:0 0 40px rgba(0,0,0,.4);
  animation:fadeUp .8s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* logo */
.logoTop{
  width:50px;
  margin-bottom:10px;
}

.title{
  font-size:24px;
  font-weight:900;
}

.tag{
  font-size:13px;
  color:#aaa;
  margin-bottom:22px;
}

/* inputs */
.input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:#0c1c14;
  color:white;
  outline:none;
  transition:.2s;
}

.input:focus{
  border-color:#00ff9d;
  box-shadow:0 0 10px rgba(0,255,157,.2);
}

/* button */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
  cursor:pointer;
  margin-top:5px;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,255,157,.4);
}

/* social */
.social{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.social button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  transition:.2s;
}

.social button:hover{
  background:rgba(255,255,255,0.15);
}

/* alt */
.alt{
  margin-top:15px;
  font-size:13px;
  color:#aaa;
}

.alt span{
  color:#00ff9d;
  cursor:pointer;
}

/* 📱 MOBILE */
@media(max-width:768px){
  body{
    flex-direction:column;
  }

  .left{
    height:35%;
  }

  .heroLogo{
    width:120px;
  }

  .preview{
    display:none;
  }

  .heroText{
    display:none;
  }

  .right{
    height:65%;
  }
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">

  <div class="heroText">
    <h1>Cook smarter</h1>
    <p>Turn anything into a meal.</p>
  </div>

  <img src="cooked-logo.png" class="heroLogo">

  <div class="preview">
    <div>🍝 Viral Pasta</div>
    <div>🍳 Egg Hack</div>
    <div>🌯 Budget Wrap</div>
  </div>

</div>

<!-- RIGHT -->
<div class="right">
  <div class="card">

    <img src="cooked-logo.png" class="logoTop">

    <div class="title">Cook’ed</div>
    <div class="tag">Welcome back 👋</div>

    <input class="input" placeholder="Email">
    <input class="input" type="password" placeholder="Password">

    <button class="btn">Log In</button>

    <div class="social">
      <button>Google</button>
      <button>Apple</button>
    </div>

    <div class="alt">
      Don’t have an account? <span>Sign up</span>
    </div>

  </div>
</div>

</body>
</html>
