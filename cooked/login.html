<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  height:100vh;
  display:flex;
  background:#050a08;
  color:white;
}

/* 🖼 LEFT SIDE (IMAGE / BRAND) */
.left{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(160deg,#081710,#0b1f16);
  position:relative;
  overflow:hidden;
}

/* glow */
.left::before{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:radial-gradient(circle,#00ff9d33,transparent 70%);
  filter:blur(80px);
}

/* big logo */
.heroLogo{
  width:220px;
  z-index:2;
  filter:drop-shadow(0 0 30px rgba(0,255,157,.4));
}

/* text */
.heroText{
  position:absolute;
  bottom:60px;
  text-align:center;
  font-weight:800;
}

.heroText h1{
  font-size:28px;
}

.heroText p{
  font-size:14px;
  color:#9fb3c8;
}

/* 🔐 RIGHT SIDE (LOGIN) */
.right{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#050a08;
}

/* card */
.card{
  width:320px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
}

/* small logo */
.logoTop{
  width:50px;
  margin-bottom:10px;
}

.title{
  font-size:22px;
  font-weight:900;
}

.tag{
  font-size:13px;
  color:#aaa;
  margin-bottom:20px;
}

/* inputs */
.input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:#0c1c14;
  color:white;
  outline:none;
}

.input:focus{
  border-color:#00ff9d;
}

/* button */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
  cursor:pointer;
  margin-top:5px;
}

/* social */
.social{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.social button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
}

/* alt */
.alt{
  margin-top:15px;
  font-size:13px;
  color:#aaa;
}

.alt span{
  color:#00ff9d;
  cursor:pointer;
}

/* 📱 MOBILE */
@media(max-width:768px){
  body{
    flex-direction:column;
  }

  .left{
    height:35%;
  }

  .heroLogo{
    width:120px;
  }

  .heroText{
    display:none;
  }

  .right{
    height:65%;
  }
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
  <img src="cooked-logo.png" class="heroLogo">

  <div class="heroText">
    <h1>Cook smarter</h1>
    <p>Turn anything into a meal.</p>
  </div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
  <div class="card">

    <img src="cooked-logo.png" class="logoTop">

    <div class="title">Cook’ed</div>
    <div class="tag">Welcome back 👋</div>

    <input class="input" placeholder="Email">
    <input class="input" type="password" placeholder="Password">

    <button class="btn">Log In</button>

    <div class="social">
      <button>Google</button>
      <button>Apple</button>
    </div>

    <div class="alt">
      Don’t have an account? <span>Sign up</span>
    </div>

  </div>
</div>

</body>
</html>
