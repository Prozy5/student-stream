<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f2027,#1c3b46,#00ff9d);
  overflow:hidden;
  color:white;
  transition:background .5s;
}

/* ✨ PARTICLES */
canvas{
  position:absolute;
  inset:0;
  z-index:-2;
}

/* 🔥 GLOW */
.bgGlow{
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#00ff9d33,transparent 70%);
  filter:blur(100px);
  animation:float 7s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-50px)}
}

/* CARD */
.card{
  width:360px;
  padding:35px;
  border-radius:24px;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 60px rgba(0,0,0,.4);
  text-align:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(25px)}
  to{opacity:1; transform:translateY(0)}
}

/* LOGO */
.logo{
  font-size:30px;
  font-weight:900;
  margin-bottom:8px;
  text-shadow:0 0 15px rgba(0,255,157,.6);
}

.tag{
  font-size:13px;
  color:#ccc;
  margin-bottom:25px;
}

/* INPUT */
.input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:white;
  outline:none;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,255,157,.6);
}

/* ERROR */
.error{
  color:#ff6b6b;
  font-size:12px;
  margin-top:10px;
  display:none;
}

/* SUCCESS SCREEN */
.success{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:1s;
}

.success.show{
  opacity:1;
  pointer-events:auto;
}

/* LOADING BAR */
.loader{
  width:200px;
  height:4px;
  background:#222;
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4CAF50,#00ff9d);
  animation:load 2s forwards;
}

@keyframes load{
  to{width:100%;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="bgGlow"></div>

<div class="card">

  <div class="logo">Cook’ed</div>
  <div class="tag">Smart meals. Built for you.</div>

  <input class="input" id="email" placeholder="Email">
  <input class="input" id="password" type="password" placeholder="Password">

  <button class="btn" onclick="login()">Log In</button>

  <div class="error" id="error">Enter a valid email + password</div>

</div>

<!-- SUCCESS -->
<div class="success" id="success">
  <h1>Welcome to Cook’ed 🔥</h1>
  <p>Preparing your experience...</p>

  <div class="loader">
    <div class="bar"></div>
  </div>
</div>

<script>
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const error = document.getElementById("error");

  if(!email.includes("@") || pass.length < 3){
    error.style.display = "block";
    return;
  }

  error.style.display = "none";

  document.getElementById("success").classList.add("show");

  setTimeout(()=>{
    window.location.href = "home.html"; // 🔥 CONNECT TO YOUR HOMEPAGE
  },2200);
}

/* ENTER KEY SUPPORT */
document.addEventListener("keydown", e=>{
  if(e.key === "Enter") login();
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = Array.from({length:60},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2,
  d:Math.random()*1
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,157,0.4)";
    ctx.fill();

    p.y += p.d;
    if(p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
