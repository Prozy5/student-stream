<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(160deg,#050a08,#0b1f16,#00ff9d10);
  color:white;
}

/* 🌿 CLEAN GLOW */
.bgGlow{
  position:absolute;
  width:350px;
  height:350px;
  background:radial-gradient(circle,#00ff9d22,transparent 70%);
  filter:blur(70px);
  animation:float 8s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-30px)}
}

/* 📱 APP CARD */
.card{
  width:340px;
  padding:30px;
  border-radius:22px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(0,0,0,.4);
  text-align:center;
  animation:fadeUp .8s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* 🍳 LOGO IMAGE */
.logoImg{
  width:70px;
  margin-bottom:10px;
  filter:drop-shadow(0 0 12px rgba(0,255,157,.4));
}

.logoText{
  font-size:22px;
  font-weight:900;
}

.tag{
  font-size:13px;
  color:#aaa;
  margin-bottom:25px;
}

/* INPUT */
.inputWrap{
  margin-bottom:15px;
}

.input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:#0c1c14;
  color:white;
  outline:none;
  transition:.2s;
}

.input:focus{
  border-color:#00ff9d;
  box-shadow:0 0 10px rgba(0,255,157,.2);
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* SOCIAL */
.social{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.social button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
}

/* ALT */
.alt{
  margin-top:18px;
  font-size:13px;
  color:#aaa;
}

.alt span{
  color:#00ff9d;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bgGlow"></div>

<div class="card">

  <!-- 🔥 YOUR LOGO -->
  <img src="cooked-logo.png" class="logoImg">
  
  <div class="logoText">Cook’ed</div>
  <div class="tag">Turn what you have into meals.</div>

  <div class="inputWrap">
    <input class="input" placeholder="Email">
  </div>

  <div class="inputWrap">
    <input class="input" type="password" placeholder="Password">
  </div>

  <button class="btn">Log In</button>

  <div class="social">
    <button>Google</button>
    <button>Apple</button>
  </div>

  <div class="alt">
    Don’t have an account? <span>Sign up</span>
  </div>

</div>

</body>
</html>
