<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#050a08,#0c1c14);
  color:white;
}

/* 🔥 BACKGROUND GLOW */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 50% 20%, rgba(0,255,157,.15), transparent 60%);
}

/* 📱 APP CARD */
.card{
  width:360px;
  padding:32px;
  border-radius:28px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  text-align:center;
  animation:fadeIn .8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* 🔥 LOGO */
.logoImg{
  width:70px;
  margin-bottom:12px;
  filter:drop-shadow(0 0 15px rgba(0,255,157,.5));
}

.logoText{
  font-size:28px;
  font-weight:900;
}

.tag{
  font-size:13px;
  color:#9fb3c8;
  margin-bottom:25px;
}

/* INPUT */
.input{
  width:100%;
  padding:15px;
  margin-bottom:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:white;
  outline:none;
}

.input:focus{
  border-color:#00ff9d;
  box-shadow:0 0 10px rgba(0,255,157,.2);
}

/* BUTTON */
.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:scale(1.04);
  box-shadow:0 0 20px rgba(0,255,157,.4);
}

/* DIVIDER */
.divider{
  margin:20px 0;
  font-size:12px;
  color:#666;
}

/* SOCIAL */
.social{
  display:flex;
  gap:10px;
}

.social button{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
  cursor:pointer;
}

/* ALT */
.alt{
  margin-top:18px;
  font-size:13px;
  color:#888;
}

.alt span{
  color:#00ff9d;
  cursor:pointer;
}

/* GUEST */
.guest{
  margin-top:12px;
  font-size:13px;
  color:#aaa;
  cursor:pointer;
}

/* SUCCESS */
.success{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:.6s;
}

.success.show{
  opacity:1;
}

.success img{
  width:80px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <img src="cooked-logo.png" class="logoImg">
  <div class="logoText">Cook’ed</div>
  <div class="tag">Turn what you have into real meals</div>

  <input class="input" placeholder="Email">
  <input class="input" type="password" placeholder="Password">

  <button class="btn" onclick="login()">Log In</button>

  <div class="divider">or continue with</div>

  <div class="social">
    <button>Google</button>
    <button>Apple</button>
  </div>

  <div class="guest" onclick="login()">Continue as Guest</div>

  <div class="alt">
    Don’t have an account? <span>Sign up</span>
  </div>

</div>

<div class="success" id="success">
  <img src="cooked-logo.png">
  <h2>Welcome to Cook’ed 🔥</h2>
</div>

<script>
function login(){
  document.getElementById("success").classList.add("show");

  setTimeout(()=>{
    window.location.href="feed.html"; // connect to your feed
  },1200);
}
</script>

</body>
</html>
