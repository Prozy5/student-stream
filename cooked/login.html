<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook’ed Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f2027,#1c3b46,#00ff9d);
  overflow:hidden;
  color:white;
}

/* ✨ PARTICLES */
canvas{
  position:absolute;
  inset:0;
  z-index:-2;
}

/* 🔥 GLOW */
.bgGlow{
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#00ff9d33,transparent 70%);
  filter:blur(100px);
  animation:float 7s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-50px)}
}

/* 🔥 CARD */
.card{
  position:relative;
  width:360px;
  padding:35px;
  border-radius:24px;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 60px rgba(0,0,0,.4);
  text-align:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(25px)}
  to{opacity:1; transform:translateY(0)}
}

/* 🔥 LOGO */
.logo{
  font-size:30px;
  font-weight:900;
  margin-bottom:8px;
  text-shadow:0 0 15px rgba(0,255,157,.6);
  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.7}
}

.tag{
  font-size:13px;
  color:#ccc;
  margin-bottom:25px;
}

/* INPUT WRAP */
.inputWrap{
  position:relative;
  margin-bottom:18px;
}

.input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  outline:none;
  background:rgba(255,255,255,0.12);
  color:white;
}

.input::placeholder{
  color:#bbb;
}

/* ✨ FOCUS LINE */
.inputWrap::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:0%;
  height:2px;
  background:#00ff9d;
  transition:.3s;
}

.input:focus + .inputWrap::after,
.inputWrap:focus-within::after{
  width:100%;
}

/* 👁 PASSWORD TOGGLE */
.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:14px;
  color:#aaa;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4CAF50,#00ff9d);
  font-weight:900;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.06);
  box-shadow:0 0 25px rgba(0,255,157,.6);
}

/* SOCIAL */
.social{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.social button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:.3s;
}

.social button:hover{
  background:rgba(255,255,255,0.2);
}

/* ALT */
.alt{
  margin-top:20px;
  font-size:13px;
  color:#aaa;
}

.alt span{
  color:#00ff9d;
  cursor:pointer;
}

/* ERROR */
.error{
  color:#ff6b6b;
  font-size:12px;
  margin-top:8px;
  display:none;
}

/* SUCCESS SCREEN */
.success{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:1s;
}

.success.show{
  opacity:1;
  pointer-events:auto;
}

.success h1{
  font-size:32px;
  margin-bottom:10px;
}

.success p{
  color:#aaa;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="bgGlow"></div>

<div class="card" id="card">

  <div class="logo">Cook’ed</div>
  <div class="tag">Smart meals. Built for you.</div>

  <div class="inputWrap">
    <input class="input" id="email" placeholder="Email">
  </div>

  <div class="inputWrap">
    <input class="input" id="password" type="password" placeholder="Password">
    <span class="eye" onclick="togglePass()">👁</span>
  </div>

  <button class="btn" onclick="login()">Log In</button>

  <div class="error" id="error">Invalid login. Try again.</div>

  <div class="social">
    <button>Google</button>
    <button>Apple</button>
  </div>

  <div class="alt">
    Don’t have an account? <span>Sign up</span>
  </div>

</div>

<!-- SUCCESS SCREEN -->
<div class="success" id="success">
  <h1>Welcome to Cook’ed 🔥</h1>
  <p>Loading your experience...</p>
</div>

<script>
function togglePass(){
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const error = document.getElementById("error");

  if(email === "" || pass === ""){
    error.style.display = "block";
    return;
  }

  error.style.display = "none";

  setTimeout(()=>{
    document.getElementById("success").classList.add("show");
  },800);
}

/* ✨ PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,157,0.4)";
    ctx.fill();

    p.y += p.d;
    if(p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
