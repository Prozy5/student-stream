<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont;
}

body{
min-height:100vh;
background:radial-gradient(circle at top,#08142c,#02030a);
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

/* BACKGROUND ORBS */
.blurOrb,.blurOrb2{
position:absolute;
width:900px;
height:900px;
filter:blur(120px);
}

.blurOrb{
background:radial-gradient(circle,rgba(60,140,255,0.25),transparent 70%);
top:-300px;
left:-250px;
animation:float 12s ease-in-out infinite;
}

.blurOrb2{
background:radial-gradient(circle,rgba(0,255,170,0.18),transparent 70%);
bottom:-320px;
right:-250px;
animation:float 14s ease-in-out infinite reverse;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(40px)}
}

/* LOGIN CARD */
.loginBox{
width:100%;
max-width:470px;
padding:50px 45px;
border-radius:28px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(25px);
box-shadow:0 0 80px rgba(0,0,0,.55);
z-index:5;
text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* TITLE */
.logoTitle{
font-size:52px;
font-weight:950;
letter-spacing:-1px;
}

.logoTitle span{
color:#3c8cff;
}

.subtitle{
margin-top:10px;
font-size:15px;
opacity:.7;
line-height:1.6;
}

/* INPUTS */
.field{
text-align:left;
margin-top:22px;
}

label{
font-size:13px;
font-weight:700;
opacity:.75;
}

input{
width:100%;
margin-top:9px;
padding:15px;
border-radius:16px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.03);
color:white;
font-size:15px;
outline:none;
transition:.25s;
}

input:focus{
border-color:rgba(60,140,255,.65);
box-shadow:0 0 0 3px rgba(60,140,255,.18);
}

/* BUTTON */
.loginBtn{
width:100%;
margin-top:25px;
padding:15px;
border-radius:18px;
border:none;
cursor:pointer;
font-weight:900;
font-size:16px;
background:linear-gradient(90deg,#3c8cff,#00ffae);
color:black;
transition:.25s;
}

.loginBtn:hover{
transform:translateY(-2px);
box-shadow:0 15px 40px rgba(0,0,0,.55);
}

/* STATUS */
.status{
margin-top:16px;
font-size:14px;
opacity:.8;
min-height:20px;
}

/* TERMS */
.terms{
margin-top:20px;
display:flex;
gap:10px;
align-items:center;
font-size:13px;
opacity:.8;
text-align:left;
}

.terms a{
color:#6cf2c2;
font-weight:700;
cursor:pointer;
}

/* LINKS */
.links{
margin-top:28px;
font-size:13px;
opacity:.65;
}

.links a{
color:white;
font-weight:700;
text-decoration:none;
}

</style>
</head>

<body>

<div class="blurOrb"></div>
<div class="blurOrb2"></div>

<div class="loginBox">

<div class="logoTitle">
StudentStream<span>HQ</span>
</div>

<div class="subtitle">
One account for the entire platform.<br>
<strong>All divisions. One system.</strong>
</div>

<!-- EMAIL -->
<div class="field">
<label>Email</label>
<input id="email" type="email">
</div>

<!-- PASSWORD -->
<div class="field">
<label>Password</label>
<input id="password" type="password">
</div>

<!-- TERMS -->
<div class="terms">
<input type="checkbox" id="agree">
<label>
I agree to the <a onclick="openAgreement()">Platform Agreement</a>
</label>
</div>

<!-- LOGIN -->
<button class="loginBtn" onclick="loginUser()">
Login to StudentStreamHQ
</button>

<div class="status" id="statusText"></div>

<div class="links">
New here? <a href="/signup.html">Create Account</a>
</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const status=document.getElementById("statusText");

/* REDIRECT */
const params=new URLSearchParams(window.location.search);
const nextPage=params.get("next")||"/dashboard.html";

/* CHECK SESSION */
const { data:sessionData }=await supabase.auth.getSession();

if(sessionData.session){

// CHECK IF CONTRACT SIGNED
const { data:contract } = await supabase
.from("contracts")
.select("*")
.eq("user_id",sessionData.session.user.id)
.single();

if(!contract){
window.location.href="/agreement.html";
}else{
window.location.href=nextPage;
}

}

/* OPEN AGREEMENT */
window.openAgreement=()=>{
window.location.href="/agreement.html";
};

/* LOGIN */
window.loginUser=async()=>{

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();
const agree=document.getElementById("agree").checked;

if(!email||!password){
status.textContent="⚠️ Enter email & password";
return;
}

if(!agree){
status.textContent="⚠️ You must accept the agreement";
return;
}

status.textContent="Logging in...";

const { data,error }=await supabase.auth.signInWithPassword({
email,password
});

if(error){
status.textContent="❌ "+error.message;
return;
}

/* CHECK CONTRACT */
const { data:contract }=await supabase
.from("contracts")
.select("*")
.eq("user_id",data.user.id)
.single();

if(!contract){
status.textContent="Redirecting to agreement...";
setTimeout(()=>{
window.location.href="/agreement.html";
},800);
return;
}

status.textContent="✅ Welcome back";

setTimeout(()=>{
window.location.href=nextPage;
},700);

};
</script>

</body>
</html>
