<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Login • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui,-apple-system;
}

body{
min-height:100vh;
background:#02030a;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

/* Animated grid background */

body::before{
content:"";
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
background-size:60px 60px;
animation:gridMove 25s linear infinite;
z-index:-3;
}

@keyframes gridMove{
0%{transform:translateY(0)}
100%{transform:translateY(60px)}
}

/* glow orbs */

.orb{
position:absolute;
width:900px;
height:900px;
border-radius:50%;
filter:blur(140px);
opacity:.35;
z-index:-2;
}

.orb1{
background:#3c8cff;
top:-350px;
left:-300px;
}

.orb2{
background:#00ffae;
bottom:-350px;
right:-300px;
}

/* particles */

.particle{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:.2;
animation:float 20s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-1000px)}
}

/* login card */

.loginBox{
width:100%;
max-width:480px;
padding:55px 45px;
border-radius:30px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(30px);
box-shadow:0 40px 120px rgba(0,0,0,.8);
z-index:5;
animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* logo */

.logoTitle{
font-size:54px;
font-weight:900;
letter-spacing:-1px;
text-align:center;
}

.logoTitle span{
background:linear-gradient(90deg,#3c8cff,#00ffae);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
margin-top:10px;
font-size:14px;
opacity:.75;
line-height:1.6;
}

/* fields */

.field{
margin-top:24px;
}

label{
font-size:13px;
font-weight:700;
opacity:.75;
}

.inputWrap{
position:relative;
}

input{
width:100%;
margin-top:8px;
padding:15px 16px;
border-radius:16px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.04);
color:white;
font-size:15px;
outline:none;
transition:.25s;
}

input:focus{
border-color:#3c8cff;
box-shadow:0 0 0 3px rgba(60,140,255,.2);
}

/* show password */

.togglePass{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
opacity:.6;
font-size:13px;
}

/* button */

.loginBtn{
width:100%;
margin-top:32px;
padding:16px;
border-radius:18px;
border:none;
cursor:pointer;
font-weight:900;
font-size:16px;
background:linear-gradient(90deg,#3c8cff,#00ffae);
color:black;
transition:.25s;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.loginBtn:hover{
transform:translateY(-2px);
box-shadow:0 15px 40px rgba(0,0,0,.6);
}

/* loading spinner */

.spinner{
width:16px;
height:16px;
border:3px solid rgba(0,0,0,.2);
border-top:3px solid black;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* status */

.status{
margin-top:16px;
font-size:14px;
opacity:.85;
min-height:20px;
text-align:center;
}

/* links */

.links{
margin-top:28px;
text-align:center;
font-size:13px;
opacity:.65;
}

.links a{
color:white;
font-weight:700;
text-decoration:none;
}

.links a:hover{
opacity:1;
}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- particles -->
<script>
for(let i=0;i<40;i++){
let p=document.createElement("div")
p.className="particle"
p.style.left=Math.random()*100+"%"
p.style.top=Math.random()*100+"%"
p.style.animationDuration=(15+Math.random()*20)+"s"
document.body.appendChild(p)
}
</script>

<div class="loginBox">

<div class="logoTitle">
StudentStream<span>HQ</span>
</div>

<div class="subtitle">
One account for the entire platform<br>
<strong>SS:Watch • DevForum • Studio • Creator Hub</strong>
</div>

<div class="field">
<label>Email</label>
<div class="inputWrap">
<input id="email" type="email" placeholder="you@studentstream.com">
</div>
</div>

<div class="field">
<label>Password</label>
<div class="inputWrap">
<input id="password" type="password" placeholder="••••••••">
<span class="togglePass" onclick="togglePass()">SHOW</span>
</div>
</div>

<button class="loginBtn" id="loginBtn" onclick="loginUser()">
Login to StudentStreamHQ
</button>

<div class="status" id="statusText"></div>

<div class="links">
New here? <a href="/signup.html">Create Account</a>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const status=document.getElementById("statusText")
const btn=document.getElementById("loginBtn")

const params=new URLSearchParams(window.location.search)
const nextPage=params.get("next") || "/dashboard.html"

/* auto redirect if logged in */

const {data:{session}}=await supabase.auth.getSession()

if(session){
window.location.href=nextPage
}

/* show password */

window.togglePass=()=>{
const input=document.getElementById("password")
input.type=input.type==="password"?"text":"password"
}

/* enter key login */

document.addEventListener("keypress",e=>{
if(e.key==="Enter") loginUser()
})

/* login */

window.loginUser=async()=>{

const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()

if(!email || !password){
status.textContent="⚠️ Enter email and password"
return
}

btn.innerHTML=`<div class="spinner"></div> Signing in`
btn.disabled=true

const {error}=await supabase.auth.signInWithPassword({
email,
password
})

if(error){
status.textContent="❌ "+error.message
btn.innerHTML="Login to StudentStreamHQ"
btn.disabled=false
return
}

status.textContent="✅ Welcome back"

setTimeout(()=>{
window.location.href=nextPage
},600)

}

</script>

</body>
</html>
