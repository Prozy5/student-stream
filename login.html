<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont;
}

body{
min-height:100vh;
background:radial-gradient(circle at top,#08142c,#02030a);
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

/* FLOATING GLOW ORBS */
.blurOrb,.blurOrb2{
position:absolute;
width:900px;
height:900px;
filter:blur(120px);
animation:float 12s ease-in-out infinite alternate;
}

.blurOrb{
background:radial-gradient(circle,rgba(60,140,255,0.25),transparent 70%);
top:-300px;
left:-250px;
}

.blurOrb2{
background:radial-gradient(circle,rgba(0,255,170,0.18),transparent 70%);
bottom:-320px;
right:-250px;
animation-delay:4s;
}

@keyframes float{
from{transform:translateY(0px);}
to{transform:translateY(60px);}
}

/* LOGIN CARD */
.loginBox{
width:100%;
max-width:470px;
padding:50px 45px;
border-radius:28px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(25px);
box-shadow:0 0 80px rgba(0,0,0,.55);
z-index:5;
text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* TITLE */
.logoTitle{
font-size:52px;
font-weight:950;
letter-spacing:-1px;
}

.logoTitle span{
background:linear-gradient(90deg,#3c8cff,#00ffae);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUBTITLE */
.subtitle{
margin-top:10px;
font-size:15px;
opacity:.7;
line-height:1.6;
}

/* FORM */
.field{
text-align:left;
margin-top:22px;
}

label{
font-size:13px;
font-weight:700;
opacity:.75;
}

input{
width:100%;
margin-top:9px;
padding:15px;
border-radius:16px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.03);
color:white;
font-size:15px;
outline:none;
transition:.25s;
}

input:focus{
border-color:#3c8cff;
box-shadow:0 0 0 3px rgba(60,140,255,.2);
transform:scale(1.01);
}

/* BUTTON */
.loginBtn{
width:100%;
margin-top:30px;
padding:15px;
border-radius:18px;
border:none;
cursor:pointer;
font-weight:900;
font-size:16px;
background:linear-gradient(90deg,#3c8cff,#00ffae);
color:black;
transition:.25s;
}

.loginBtn:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.loginBtn:active{
transform:scale(.98);
}

/* STATUS */
.status{
margin-top:16px;
font-size:14px;
opacity:.8;
min-height:20px;
}

/* LINKS */
.links{
margin-top:25px;
font-size:13px;
opacity:.65;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.links a{
color:white;
font-weight:700;
text-decoration:none;
opacity:.75;
}

.links a:hover{
opacity:1;
}

/* TERMS LINK */
.terms{
margin-top:15px;
font-size:12px;
opacity:.5;
}

.terms a{
color:#6cf2c2;
text-decoration:none;
}

.terms a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="blurOrb"></div>
<div class="blurOrb2"></div>

<div class="loginBox">

<div class="logoTitle">
StudentStream<span>HQ</span>
</div>

<div class="subtitle">
One account for the entire platform.<br>
<strong>Creator Network • Systems • Divisions</strong>
</div>

<!-- EMAIL -->
<div class="field">
<label>Email</label>
<input id="email" type="email" placeholder="you@studentstream.com">
</div>

<!-- PASSWORD -->
<div class="field">
<label>Password</label>
<input id="password" type="password" placeholder="••••••••••••">
</div>

<!-- BUTTON -->
<button class="loginBtn" id="loginBtn" onclick="loginUser()">
Login to StudentStreamHQ
</button>

<div class="status" id="statusText"></div>

<div class="links">
<span>New here?</span>
<a href="/signup.html">Create Account</a>
</div>

<div class="terms">
<a href="/terms.html" target="_blank">View Terms & Agreement</a>
</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const status = document.getElementById("statusText");
const btn = document.getElementById("loginBtn");

/* REDIRECT */
const params = new URLSearchParams(window.location.search);
const nextPage = params.get("next") || "/dashboard.html";

/* AUTO LOGIN */
const { data: sessionData } = await supabase.auth.getSession();
if (sessionData.session) {
window.location.href = nextPage;
}

/* ENTER KEY SUPPORT */
document.addEventListener("keydown",(e)=>{
if(e.key==="Enter") loginUser();
});

/* LOGIN */
window.loginUser = async function(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if(!email || !password){
status.textContent="⚠️ Enter your email and password.";
return;
}

btn.disabled=true;
btn.textContent="Logging in...";
status.textContent="";

const { error } = await supabase.auth.signInWithPassword({
email,
password
});

if(error){
status.textContent="❌ "+error.message;
btn.disabled=false;
btn.textContent="Login to StudentStreamHQ";
return;
}

status.textContent="✅ Welcome back.";

setTimeout(()=>{
window.location.href=nextPage;
},600);

};

</script>

</body>
</html>
