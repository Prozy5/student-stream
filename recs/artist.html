<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Artist • SSHQ Records</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#050505;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* BACKGROUND GLOW */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#ff1d48,transparent 60%);
top:-200px;
left:-200px;
opacity:.15;
filter:blur(140px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#7b5cff,transparent 70%);
bottom:-300px;
right:-200px;
opacity:.12;
filter:blur(150px);
z-index:-1;
}

/* HERO */

.hero{
height:340px;
background:linear-gradient(90deg,#ff1d48,#7b5cff);
display:flex;
align-items:flex-end;
padding:40px;
}

.artistInfo{
display:flex;
align-items:center;
gap:25px;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
background-size:cover;
background-position:center;
border:4px solid white;
}

.artistName{
font-size:42px;
font-weight:900;
}

.verified{
color:#3ea6ff;
margin-left:6px;
}

.stats{
margin-top:6px;
opacity:.8;
font-size:14px;
}

.followBtn{
margin-top:12px;
background:#ff1d48;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:600;
}

/* SECTION */

.section{
padding:50px;
}

.section h2{
margin-bottom:25px;
font-size:24px;
}

/* SONG LIST */

.song{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
padding:16px;
border-radius:12px;
margin-bottom:12px;
transition:.2s;
}

.song:hover{
background:#181818;
}

.songInfo{
display:flex;
align-items:center;
gap:16px;
}

.cover{
width:60px;
height:60px;
border-radius:10px;
background-size:cover;
background-position:center;
}

.songTitle{
font-weight:600;
}

.plays{
opacity:.6;
font-size:13px;
margin-top:2px;
}

.playBtn{
background:#ff1d48;
border:none;
color:white;
padding:9px 16px;
border-radius:8px;
cursor:pointer;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0b0b0b;
border-top:1px solid rgba(255,255,255,.08);
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nowPlaying{
font-size:14px;
opacity:.8;
}

audio{
height:36px;
}

</style>
</head>

<body>



<div class="hero">

<div class="artistInfo">

<div class="avatar" id="artistAvatar"></div>

<div>

<div class="artistName" id="artistName">
Artist
</div>

<div class="stats" id="artistStats">
0 streams • 0 songs
</div>

<button class="followBtn" id="followBtn">
Follow
</button>

<div id="followersCount" style="margin-top:6px;font-size:13px;opacity:.7;">
0 Followers
</div>

</div>

</div>

</div>



<div class="section">

<h2>🎵 Songs</h2>

<div id="songList"></div>

</div>



<div class="player">

<div class="nowPlaying" id="nowPlaying">
Nothing playing
</div>

<audio id="audioPlayer" controls></audio>

</div>



<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const params=new URLSearchParams(window.location.search)
const artistId=params.get("id")

const avatar=document.getElementById("artistAvatar")
const name=document.getElementById("artistName")
const stats=document.getElementById("artistStats")
const songList=document.getElementById("songList")

const followBtn=document.getElementById("followBtn")
const followersCount=document.getElementById("followersCount")

const audio=document.getElementById("audioPlayer")
const nowPlaying=document.getElementById("nowPlaying")

let currentUser=null


async function loadUser(){

const {data}=await supabase.auth.getUser()

currentUser=data.user

}


async function loadArtist(){

const {data}=await supabase
.from("artists")
.select("*")
.eq("id",artistId)
.single()

name.innerHTML=data.stage_name + (data.verified ? ' <span class="verified">✔</span>' : '')

avatar.style.backgroundImage=`url(${data.avatar_url})`

}


async function loadFollowers(){

const {count}=await supabase
.from("artist_followers")
.select("*",{count:"exact",head:true})
.eq("artist_id",artistId)

followersCount.textContent=count+" Followers"

}


async function loadSongs(){

const {data}=await supabase
.from("songs")
.select("*")
.eq("artist_id",artistId)

songList.innerHTML=""

let totalStreams=0

data.forEach(song=>{

totalStreams+=song.plays || 0

const row=document.createElement("div")

row.className="song"

row.innerHTML=`

<div class="songInfo">

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div>

<div class="songTitle">${song.title}</div>

<div class="plays">${song.plays || 0} plays</div>

</div>

</div>

<button class="playBtn">Play</button>

`

row.querySelector(".playBtn").onclick=()=>playSong(song)

songList.appendChild(row)

})

stats.textContent=`${totalStreams} streams • ${data.length} songs`

}


async function toggleFollow(){

if(!currentUser){
alert("Login required")
return
}

if(followBtn.textContent==="Follow"){

await supabase.from("artist_followers").insert({
artist_id:artistId,
user_id:currentUser.id
})

followBtn.textContent="Following"

}else{

await supabase
.from("artist_followers")
.delete()
.eq("artist_id",artistId)
.eq("user_id",currentUser.id)

followBtn.textContent="Follow"

}

loadFollowers()

}


function playSong(song){

audio.src=song.audio_url

audio.play()

nowPlaying.textContent="Now Playing: "+song.title

}


followBtn.onclick=toggleFollow


async function init(){

await loadUser()

loadArtist()

loadSongs()

loadFollowers()

}

init()

</script>

</body>
</html>
