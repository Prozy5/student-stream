<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Artist • SSHQ Records</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#050505;
color:white;
min-height:100vh;
}

/* HERO */

.hero{
height:320px;
background:linear-gradient(90deg,#ff1d48,#7b5cff);
display:flex;
align-items:flex-end;
padding:40px;
}

.artistInfo{
display:flex;
align-items:center;
gap:25px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background-size:cover;
background-position:center;
border:4px solid white;
}

.artistName{
font-size:40px;
font-weight:900;
}

.stats{
margin-top:6px;
opacity:.8;
}

/* SECTION */

.section{
padding:40px;
}

.section h2{
margin-bottom:25px;
}

/* SONG LIST */

.song{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
padding:16px;
border-radius:10px;
margin-bottom:10px;
}

.song:hover{
background:#181818;
}

.songInfo{
display:flex;
align-items:center;
gap:14px;
}

.cover{
width:55px;
height:55px;
border-radius:8px;
background-size:cover;
background-position:center;
}

.playBtn{
background:#ff1d48;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0b0b0b;
border-top:1px solid rgba(255,255,255,.08);
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>
</head>

<body>


<div class="hero">

<div class="artistInfo">

<div class="avatar" id="artistAvatar"></div>

<div>

<div class="artistName" id="artistName">
Artist
</div>

<div class="stats" id="artistStats">
0 streams • 0 songs
</div>

</div>

</div>

</div>



<div class="section">

<h2>🎵 Songs</h2>

<div id="songList"></div>

</div>



<div class="player">

<div id="nowPlaying">
Nothing playing
</div>

<audio id="audioPlayer" controls></audio>

</div>



<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const params=new URLSearchParams(window.location.search)
const artistId=params.get("id")

const avatar=document.getElementById("artistAvatar")
const name=document.getElementById("artistName")
const stats=document.getElementById("artistStats")
const songList=document.getElementById("songList")

const audio=document.getElementById("audioPlayer")
const nowPlaying=document.getElementById("nowPlaying")


async function loadArtist(){

const {data}=await supabase
.from("artists")
.select("*")
.eq("id",artistId)
.single()

name.textContent=data.stage_name
avatar.style.backgroundImage=`url(${data.avatar_url})`

}



async function loadSongs(){

const {data}=await supabase
.from("songs")
.select("*")
.eq("artist_id",artistId)

songList.innerHTML=""

let totalStreams=0

data.forEach(song=>{

totalStreams+=song.plays || 0

const row=document.createElement("div")

row.className="song"

row.innerHTML=`

<div class="songInfo">

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div>

<div>${song.title}</div>

<div style="opacity:.6;font-size:13px">${song.plays || 0} plays</div>

</div>

</div>

<button class="playBtn">Play</button>

`

row.querySelector(".playBtn").onclick=()=>playSong(song)

songList.appendChild(row)

})

stats.textContent=`${totalStreams} streams • ${data.length} songs`

}



function playSong(song){

audio.src=song.audio_url

audio.play()

nowPlaying.textContent="Now Playing: "+song.title

}



loadArtist()
loadSongs()

</script>

</body>
</html>
