<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SSHQ Records • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#050505;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

/* GLOW BACKGROUND */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#ff1d48,transparent 60%);
top:-200px;
left:-200px;
opacity:.15;
filter:blur(140px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#7b5cff,transparent 70%);
bottom:-300px;
right:-200px;
opacity:.12;
filter:blur(150px);
z-index:-1;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0b0b0b;
border-right:1px solid rgba(255,255,255,.05);
padding:40px 25px;
display:flex;
flex-direction:column;
gap:35px;
}

.logo{
font-size:26px;
font-weight:900;
}

.logo span{
color:#ff1d48;
}

.menu a{
display:block;
padding:12px 0;
text-decoration:none;
color:white;
opacity:.7;
font-size:15px;
}

.menu a:hover{
opacity:1;
color:#ff1d48;
}

/* MAIN */

.main{
flex:1;
padding-bottom:150px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 50px;
}

.search{
width:420px;
background:#111;
border:none;
padding:14px 18px;
border-radius:12px;
color:white;
}

.authButtons{
display:flex;
gap:12px;
}

.loginBtn{
background:#ff1d48;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:600;
}

.signupBtn{
background:#1a1a1a;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* HERO */

.hero{
margin:0 50px 40px;
padding:50px;
border-radius:20px;
background:linear-gradient(90deg,#ff1d48,#7b5cff);
}

.hero h1{
font-size:52px;
font-weight:900;
}

.hero p{
opacity:.9;
margin-top:8px;
}

/* FEED */

.feed{
padding:0 50px;
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
}

/* SONG FEED */

.songPost{
background:#0f0f0f;
padding:20px;
border-radius:16px;
margin-bottom:18px;
display:flex;
gap:18px;
align-items:center;
}

.songCover{
width:80px;
height:80px;
border-radius:12px;
background-size:cover;
background-position:center;
}

.songInfo{
flex:1;
}

.songTitle{
font-weight:700;
}

.songArtist{
font-size:13px;
opacity:.6;
}

.songActions{
display:flex;
gap:10px;
}

.playBtn{
background:#ff1d48;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.likeBtn{
background:#181818;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
color:white;
}

/* TRENDING GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.card{
background:#0f0f0f;
border-radius:14px;
padding:12px;
transition:.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
background:#151515;
}

.cover{
width:100%;
height:160px;
border-radius:10px;
background-size:cover;
background-position:center;
margin-bottom:8px;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:260px;
right:0;
background:#0b0b0b;
border-top:1px solid rgba(255,255,255,.08);
padding:16px 40px;
display:flex;
align-items:center;
gap:20px;
}

.nowPlaying{
width:220px;
font-size:14px;
}

.controls button{
background:#ff1d48;
border:none;
color:white;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

.progress{
flex:1;
}

</style>
</head>

<body>


<div class="sidebar">

<div class="logo">
SSHQ <span>Records</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Charts</a>
<a href="#">Artists</a>
<a href="#">Trending</a>
</div>

</div>


<div class="main">

<div class="header">

<input id="searchInput" class="search" placeholder="Search songs or artists">

<div class="authButtons">
<button class="signupBtn">Sign Up</button>
<button class="loginBtn">Login</button>
</div>

</div>


<div class="hero">

<h1>SSHQ Records</h1>
<p>StudentStreamHQ Music Division • Discover new artists and trending music</p>

</div>


<div class="feed">

<!-- LEFT FEED -->

<div>

<h2 style="margin-bottom:20px">🎧 Music Feed</h2>

<div id="musicFeed"></div>

</div>


<!-- RIGHT SIDE -->

<div>

<h2 style="margin-bottom:20px">🔥 Trending</h2>

<div class="grid" id="trendingSongs"></div>

</div>

</div>


</div>


<div class="player">

<div class="nowPlaying" id="nowPlaying">
Nothing playing
</div>

<div class="controls">

<button onclick="togglePlay()">Play/Pause</button>

</div>

<input type="range" id="progressBar" class="progress" value="0">

<audio id="audioPlayer"></audio>

</div>



<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const audio=document.getElementById("audioPlayer")
const nowPlaying=document.getElementById("nowPlaying")
const progress=document.getElementById("progressBar")

function togglePlay(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

audio.ontimeupdate=()=>{
progress.value=(audio.currentTime/audio.duration)*100
}

progress.oninput=()=>{
audio.currentTime=(progress.value/100)*audio.duration
}

/* PLAY SONG */

function playSong(song){

audio.src=song.audio_url
audio.play()

nowPlaying.textContent=song.title

}

/* MUSIC FEED */

async function loadFeed(){

const {data}=await supabase
.from("songs")
.select("*")
.order("created_at",{ascending:false})
.limit(10)

const feed=document.getElementById("musicFeed")

feed.innerHTML=""

data.forEach(song=>{

const post=document.createElement("div")

post.className="songPost"

post.innerHTML=`

<div class="songCover" style="background-image:url('${song.cover_url}')"></div>

<div class="songInfo">

<div class="songTitle">${song.title}</div>

<div class="songArtist">${song.genre || "Artist"}</div>

</div>

<div class="songActions">

<button class="playBtn">▶</button>

<button class="likeBtn">❤️</button>

</div>

`

post.querySelector(".playBtn").onclick=()=>playSong(song)

feed.appendChild(post)

})

}

/* TRENDING */

async function loadTrending(){

const {data}=await supabase
.from("songs")
.select("*")
.order("plays",{ascending:false})
.limit(6)

const grid=document.getElementById("trendingSongs")

grid.innerHTML=""

data.forEach(song=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div>${song.title}</div>

`

card.onclick=()=>playSong(song)

grid.appendChild(card)

})

}

loadFeed()
loadTrending()

</script>

</body>
</html>
