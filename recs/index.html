<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SSHQ Records • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:radial-gradient(circle at top,#0f1c35,#05070c 70%);
color:white;
min-height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#04060c;
border-right:1px solid rgba(255,255,255,.05);
padding:30px 20px;
display:flex;
flex-direction:column;
gap:25px;
}

.logo{
font-size:22px;
font-weight:900;
}

.logo span{
color:#4da3ff;
}

.menu a{
display:block;
color:white;
text-decoration:none;
opacity:.75;
margin:10px 0;
font-size:14px;
}

.menu a:hover{
opacity:1;
}

/* MAIN */

.main{
flex:1;
overflow:auto;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.search{
background:#0d111b;
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
width:250px;
}

/* HERO */

.hero{
padding:40px;
}

.hero h1{
font-size:42px;
font-weight:900;
}

/* SECTIONS */

.section{
padding:0 40px 40px;
}

.section h2{
margin-bottom:20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

/* CARD */

.card{
background:#0d111b;
border-radius:14px;
padding:14px;
cursor:pointer;
transition:.25s;
position:relative;
}

.card:hover{
transform:translateY(-5px);
background:#12182a;
}

.cover{
width:100%;
height:150px;
border-radius:10px;
background-size:cover;
background-position:center;
}

.songTitle{
margin-top:10px;
font-weight:700;
font-size:14px;
}

.artist{
font-size:12px;
opacity:.6;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:230px;
right:0;
background:#05070c;
border-top:1px solid rgba(255,255,255,.05);
padding:15px 25px;
display:flex;
align-items:center;
justify-content:space-between;
}

.nowPlaying{
font-size:14px;
opacity:.8;
}

audio{
height:35px;
}

</style>
</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
SSHQ <span>Records</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Trending</a>
<a href="#">Artists</a>
<a href="#">Upload Music</a>
<a href="#">Charts</a>
</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">

<input class="search" placeholder="Search music...">

</div>


<div class="hero">
<h1>Discover New Music</h1>
<p>SSHQ Records • A StudentStreamHQ Music Division</p>
</div>


<div class="section">

<h2>🔥 Trending Songs</h2>
<div class="grid" id="trendingSongs"></div>

</div>


<div class="section">

<h2>🎵 Latest Releases</h2>
<div class="grid" id="latestSongs"></div>

</div>


<div class="section">

<h2>⭐ Top Artists</h2>
<div class="grid" id="topArtists"></div>

</div>

</div>


<!-- PLAYER -->

<div class="player">

<div class="nowPlaying" id="nowPlaying">
Nothing playing
</div>

<audio id="audioPlayer" controls></audio>

</div>



<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const audioPlayer = document.getElementById("audioPlayer")
const nowPlaying = document.getElementById("nowPlaying")


/* PLAY SONG + COUNT STREAM */

async function playSong(song){

audioPlayer.src = song.audio_url
audioPlayer.play()

nowPlaying.textContent = "Now Playing: " + song.title

/* update stream count */

await supabase
.from("songs")
.update({ plays: song.plays + 1 })
.eq("id",song.id)

}



/* LOAD TRENDING */

async function loadTrending(){

const { data } = await supabase
.from("songs")
.select("*")
.order("plays",{ascending:false})
.limit(8)

const container=document.getElementById("trendingSongs")

container.innerHTML=""

data.forEach(song=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="cover" style="background-image:url('${song.cover_url}')"></div>
<div class="songTitle">${song.title}</div>
<div class="artist">${song.genre || "Artist"}</div>
`

card.onclick=()=>playSong(song)

container.appendChild(card)

})

}



/* LOAD LATEST */

async function loadLatest(){

const { data } = await supabase
.from("songs")
.select("*")
.order("created_at",{ascending:false})
.limit(8)

const container=document.getElementById("latestSongs")

container.innerHTML=""

data.forEach(song=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="cover" style="background-image:url('${song.cover_url}')"></div>
<div class="songTitle">${song.title}</div>
<div class="artist">${song.genre || "Artist"}</div>
`

card.onclick=()=>playSong(song)

container.appendChild(card)

})

}



/* LOAD ARTISTS */

async function loadArtists(){

const { data } = await supabase
.from("artists")
.select("*")
.limit(6)

const container=document.getElementById("topArtists")

container.innerHTML=""

data.forEach(artist=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="cover" style="background-image:url('${artist.avatar_url || ""}')"></div>
<div class="songTitle">${artist.stage_name}</div>
<div class="artist">Artist</div>
`

container.appendChild(card)

})

}


loadTrending()
loadLatest()
loadArtists()

</script>

</body>
</html>
