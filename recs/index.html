<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SSHQ Records • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#050505;
color:white;
display:flex;
min-height:100vh;
}

/* GRADIENT GLOW */

body::before{
content:"";
position:fixed;
top:-200px;
left:-200px;
width:800px;
height:800px;
background:radial-gradient(circle,#ff1d48,transparent 60%);
opacity:.15;
filter:blur(120px);
z-index:-1;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0b0b0b;
border-right:1px solid rgba(255,255,255,.06);
padding:35px 25px;
display:flex;
flex-direction:column;
gap:35px;
}

.logo{
font-size:24px;
font-weight:900;
letter-spacing:.5px;
}

.logo span{
color:#ff1d48;
}

.menu a{
display:block;
padding:10px 0;
text-decoration:none;
color:white;
opacity:.7;
font-size:15px;
}

.menu a:hover{
opacity:1;
color:#ff1d48;
}

/* MAIN */

.main{
flex:1;
padding-bottom:120px;
}

/* HEADER */

.header{
padding:30px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

.search{
width:320px;
background:#111;
border:none;
padding:12px 15px;
border-radius:12px;
color:white;
}

/* HERO */

.hero{
padding:20px 50px 50px;
}

.hero h1{
font-size:52px;
font-weight:900;
}

.hero p{
opacity:.6;
margin-top:8px;
}

/* SECTIONS */

.section{
padding:0 50px 50px;
}

.section h2{
margin-bottom:25px;
font-size:22px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:28px;
}

/* CARD */

.card{
background:#0e0e0e;
border-radius:16px;
padding:14px;
transition:.25s;
cursor:pointer;
position:relative;
}

.card:hover{
transform:translateY(-6px);
background:#141414;
}

/* COVER */

.cover{
width:100%;
height:180px;
border-radius:10px;
background-size:cover;
background-position:center;
margin-bottom:10px;
}

/* PLAY BUTTON */

.playBtn{
position:absolute;
bottom:70px;
right:18px;
background:#ff1d48;
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
opacity:0;
transition:.25s;
}

.card:hover .playBtn{
opacity:1;
}

/* TEXT */

.songTitle{
font-weight:700;
font-size:15px;
}

.artist{
font-size:13px;
opacity:.6;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:260px;
right:0;
background:#0b0b0b;
border-top:1px solid rgba(255,255,255,.08);
padding:18px 35px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nowPlaying{
font-size:14px;
opacity:.8;
}

audio{
height:36px;
}

</style>
</head>

<body>


<div class="sidebar">

<div class="logo">
SSHQ <span>Records</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Trending</a>
<a href="#">Artists</a>
<a href="#">Upload Music</a>
<a href="#">Charts</a>
</div>

</div>



<div class="main">

<div class="header">

<input class="search" placeholder="Search music...">

</div>


<div class="hero">

<h1>Discover New Music</h1>
<p>SSHQ Records • A StudentStreamHQ Music Division</p>

</div>



<div class="section">

<h2>🔥 Trending Songs</h2>

<div class="grid" id="trendingSongs"></div>

</div>



<div class="section">

<h2>🎵 Latest Releases</h2>

<div class="grid" id="latestSongs"></div>

</div>



<div class="section">

<h2>⭐ Top Artists</h2>

<div class="grid" id="topArtists"></div>

</div>

</div>



<div class="player">

<div class="nowPlaying" id="nowPlaying">
Nothing playing
</div>

<audio id="audioPlayer" controls></audio>

</div>



<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const audioPlayer=document.getElementById("audioPlayer")
const nowPlaying=document.getElementById("nowPlaying")

async function playSong(song){

audioPlayer.src=song.audio_url
audioPlayer.play()

nowPlaying.textContent="Now Playing: "+song.title

await supabase
.from("songs")
.update({plays:song.plays+1})
.eq("id",song.id)

}



async function loadSongs(type){

let query=supabase.from("songs").select("*")

if(type==="trending"){
query=query.order("plays",{ascending:false})
}

if(type==="latest"){
query=query.order("created_at",{ascending:false})
}

const {data}=await query.limit(8)

return data

}



function renderSongs(list,id){

const container=document.getElementById(id)
container.innerHTML=""

list.forEach(song=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div class="playBtn">▶</div>

<div class="songTitle">${song.title}</div>

<div class="artist">${song.genre || "Artist"}</div>

`

card.onclick=()=>playSong(song)

container.appendChild(card)

})

}



async function loadArtists(){

const {data}=await supabase
.from("artists")
.select("*")
.limit(6)

const container=document.getElementById("topArtists")

data.forEach(artist=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${artist.avatar_url || ""}')"></div>

<div class="songTitle">${artist.stage_name}</div>

<div class="artist">Artist</div>

`

container.appendChild(card)

})

}



async function init(){

const trending=await loadSongs("trending")
renderSongs(trending,"trendingSongs")

const latest=await loadSongs("latest")
renderSongs(latest,"latestSongs")

loadArtists()

}

init()

</script>


</body>
</html>
