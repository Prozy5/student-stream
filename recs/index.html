<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SSHQ Records • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#050505;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

/* BACKGROUND GLOWS */

body::before{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,#ff1d48,transparent 60%);
top:-200px;
left:-200px;
opacity:.15;
filter:blur(120px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#6b4dff,transparent 70%);
bottom:-300px;
right:-200px;
opacity:.12;
filter:blur(150px);
z-index:-1;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0b0b0b;
border-right:1px solid rgba(255,255,255,.05);
padding:40px 25px;
display:flex;
flex-direction:column;
gap:40px;
}

.logo{
font-size:26px;
font-weight:900;
letter-spacing:.5px;
}

.logo span{
color:#ff1d48;
}

.menu a{
display:block;
padding:12px 0;
text-decoration:none;
color:white;
opacity:.7;
font-size:15px;
transition:.2s;
}

.menu a:hover{
opacity:1;
color:#ff1d48;
}

/* MAIN */

.main{
flex:1;
padding-bottom:140px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 50px;
}

.search{
width:350px;
background:#101010;
border:none;
padding:13px 16px;
border-radius:12px;
color:white;
font-size:14px;
}

.profile{
background:#ff1d48;
padding:10px 16px;
border-radius:8px;
font-size:13px;
}

/* HERO */

.hero{
padding:20px 50px 40px;
}

.hero h1{
font-size:54px;
font-weight:900;
}

.hero p{
opacity:.6;
margin-top:8px;
}

/* SECTIONS */

.section{
padding:0 50px 60px;
}

.section h2{
margin-bottom:28px;
font-size:24px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
gap:30px;
}

/* CARD */

.card{
background:#0e0e0e;
border-radius:18px;
padding:14px;
cursor:pointer;
transition:.25s;
position:relative;
}

.card:hover{
transform:translateY(-7px);
background:#151515;
}

/* COVER */

.cover{
width:100%;
height:190px;
border-radius:12px;
background-size:cover;
background-position:center;
margin-bottom:10px;
}

/* PLAY BUTTON */

.playBtn{
position:absolute;
bottom:80px;
right:18px;
background:#ff1d48;
width:48px;
height:48px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
opacity:0;
transition:.25s;
box-shadow:0 0 15px rgba(255,29,72,.6);
}

.card:hover .playBtn{
opacity:1;
}

/* SONG TEXT */

.songTitle{
font-weight:700;
font-size:15px;
}

.artist{
font-size:13px;
opacity:.6;
margin-top:3px;
}

.plays{
font-size:12px;
opacity:.4;
margin-top:2px;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:260px;
right:0;
background:#0b0b0b;
border-top:1px solid rgba(255,255,255,.08);
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nowPlaying{
font-size:14px;
opacity:.8;
}

audio{
height:36px;
}

/* RESPONSIVE */

@media(max-width:900px){

.sidebar{
display:none;
}

.player{
left:0;
}

.header{
padding:25px;
}

.hero{
padding:25px;
}

.section{
padding:25px;
}

}

</style>
</head>

<body>


<div class="sidebar">

<div class="logo">
SSHQ <span>Records</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Trending</a>
<a href="#">Artists</a>
<a href="#">Upload Music</a>
<a href="#">Charts</a>
</div>

</div>


<div class="main">


<div class="header">

<input class="search" id="searchInput" placeholder="Search music...">

<div class="profile">Creator</div>

</div>


<div class="hero">

<h1>Discover New Music</h1>
<p>SSHQ Records • A StudentStreamHQ Music Division</p>

</div>


<div class="section">

<h2>🔥 Trending Songs</h2>
<div class="grid" id="trendingSongs"></div>

</div>


<div class="section">

<h2>🎵 Latest Releases</h2>
<div class="grid" id="latestSongs"></div>

</div>


<div class="section">

<h2>⭐ Top Artists</h2>
<div class="grid" id="topArtists"></div>

</div>

</div>



<div class="player">

<div class="nowPlaying" id="nowPlaying">
Nothing playing
</div>

<audio id="audioPlayer" controls></audio>

</div>



<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const audioPlayer=document.getElementById("audioPlayer")
const nowPlaying=document.getElementById("nowPlaying")

let allSongs=[]

async function playSong(song){

audioPlayer.src=song.audio_url
audioPlayer.play()

nowPlaying.textContent="Now Playing: "+song.title

await supabase
.from("songs")
.update({plays:song.plays+1})
.eq("id",song.id)

}



async function loadSongs(type){

let query=supabase.from("songs").select("*")

if(type==="trending"){
query=query.order("plays",{ascending:false})
}

if(type==="latest"){
query=query.order("created_at",{ascending:false})
}

const {data}=await query.limit(8)

return data

}



function renderSongs(list,id){

const container=document.getElementById(id)
container.innerHTML=""

list.forEach(song=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div class="playBtn">▶</div>

<div class="songTitle">${song.title}</div>

<div class="artist">${song.genre || "Artist"}</div>

<div class="plays">${song.plays || 0} plays</div>

`

card.onclick=()=>playSong(song)

container.appendChild(card)

})

}



async function loadArtists(){

const {data}=await supabase
.from("artists")
.select("*")
.limit(6)

const container=document.getElementById("topArtists")

data.forEach(artist=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${artist.avatar_url || ""}')"></div>

<div class="songTitle">${artist.stage_name}</div>

<div class="artist">Artist</div>

`

container.appendChild(card)

})

}



async function init(){

const trending=await loadSongs("trending")
const latest=await loadSongs("latest")

allSongs=[...trending,...latest]

renderSongs(trending,"trendingSongs")
renderSongs(latest,"latestSongs")

loadArtists()

}

init()



/* SEARCH */

document.getElementById("searchInput").addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

const filtered=allSongs.filter(s=>
s.title.toLowerCase().includes(q)
)

renderSongs(filtered,"latestSongs")

})

</script>

</body>
</html>
