<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SSHQ Records • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#050505;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

/* GLOW BACKGROUND */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#ff1d48,transparent 60%);
top:-200px;
left:-200px;
opacity:.15;
filter:blur(140px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#7b5cff,transparent 70%);
bottom:-300px;
right:-200px;
opacity:.12;
filter:blur(150px);
z-index:-1;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0b0b0b;
border-right:1px solid rgba(255,255,255,.05);
padding:40px 25px;
display:flex;
flex-direction:column;
gap:35px;
}

.logo{
font-size:26px;
font-weight:900;
}

.logo span{
color:#ff1d48;
}

.menu a{
display:block;
padding:12px 0;
text-decoration:none;
color:white;
opacity:.7;
font-size:15px;
}

.menu a:hover{
opacity:1;
color:#ff1d48;
}

/* MAIN */

.main{
flex:1;
padding-bottom:140px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 50px;
}

.search{
width:360px;
background:#111;
border:none;
padding:13px 16px;
border-radius:12px;
color:white;
}

.loginBtn{
background:#ff1d48;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

/* HERO */

.hero{
padding:40px 50px;
background:linear-gradient(90deg,#ff1d48,#7b5cff);
border-radius:20px;
margin:0 50px 40px;
}

.hero h1{
font-size:54px;
font-weight:900;
}

.hero p{
opacity:.8;
margin-top:8px;
}

/* SECTIONS */

.section{
padding:0 50px 60px;
}

.section h2{
margin-bottom:25px;
font-size:24px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
gap:28px;
}

/* CARD */

.card{
background:#0f0f0f;
border-radius:16px;
padding:14px;
cursor:pointer;
transition:.25s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
background:#151515;
}

/* COVER */

.cover{
width:100%;
height:190px;
border-radius:12px;
background-size:cover;
background-position:center;
margin-bottom:10px;
}

/* PLAY BUTTON */

.playBtn{
position:absolute;
bottom:80px;
right:18px;
background:#ff1d48;
width:48px;
height:48px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
opacity:0;
transition:.25s;
}

.card:hover .playBtn{
opacity:1;
}

/* LIKE BUTTON */

.likeBtn{
position:absolute;
top:12px;
right:12px;
font-size:18px;
cursor:pointer;
}

/* TEXT */

.songTitle{
font-weight:700;
font-size:15px;
}

.artist{
font-size:13px;
opacity:.6;
}

/* ARTIST GRID */

.artistCard{
text-align:center;
}

.artistAvatar{
width:120px;
height:120px;
border-radius:50%;
background-size:cover;
background-position:center;
margin:auto;
margin-bottom:10px;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:260px;
right:0;
background:#0b0b0b;
border-top:1px solid rgba(255,255,255,.08);
padding:18px 40px;
display:flex;
align-items:center;
gap:20px;
}

.nowPlaying{
width:220px;
font-size:14px;
}

.controls button{
background:#ff1d48;
border:none;
color:white;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

.progress{
flex:1;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
SSHQ <span>Records</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="charts.html">Charts</a>
<a href="#">Artists</a>
<a href="#">Trending</a>
</div>

</div>

<div class="main">

<div class="header">

<input id="searchInput" class="search" placeholder="Search songs or artists">

<button class="loginBtn">Login</button>

</div>


<div class="hero">

<h1>SSHQ Records</h1>
<p>StudentStreamHQ Music Division • Discover New Artists</p>

</div>


<div class="section">

<h2>🔥 Trending</h2>

<div class="grid" id="trendingSongs"></div>

</div>


<div class="section">

<h2>🎵 Latest Releases</h2>

<div class="grid" id="latestSongs"></div>

</div>


<div class="section">

<h2>⭐ Featured Artists</h2>

<div class="grid" id="artists"></div>

</div>

</div>


<div class="player">

<div class="nowPlaying" id="nowPlaying">
Nothing playing
</div>

<div class="controls">

<button onclick="togglePlay()">Play/Pause</button>

</div>

<input type="range" id="progressBar" class="progress" value="0">

<audio id="audioPlayer"></audio>

</div>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const audio=document.getElementById("audioPlayer")
const nowPlaying=document.getElementById("nowPlaying")
const progress=document.getElementById("progressBar")

function togglePlay(){
audio.paused ? audio.play() : audio.pause()
}

audio.ontimeupdate=()=>{
progress.value=(audio.currentTime/audio.duration)*100
}

progress.oninput=()=>{
audio.currentTime=(progress.value/100)*audio.duration
}

async function playSong(song){

audio.src=song.audio_url
audio.play()

nowPlaying.textContent=song.title

await supabase
.from("songs")
.update({plays:song.plays+1})
.eq("id",song.id)

}

/* SONG LOAD */

async function loadSongs(type){

let query=supabase.from("songs").select("*,artists(stage_name,verified)")

if(type==="trending"){
query=query.order("plays",{ascending:false})
}

if(type==="latest"){
query=query.order("created_at",{ascending:false})
}

const {data}=await query.limit(8)

return data

}

function renderSongs(list,id){

const container=document.getElementById(id)

container.innerHTML=""

list.forEach(song=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div class="playBtn">▶</div>

<div class="likeBtn">❤️</div>

<div class="songTitle">${song.title}</div>

<div class="artist">
${song.artists.stage_name} ${song.artists.verified ? "✔" : ""}
</div>

`

card.querySelector(".playBtn").onclick=()=>playSong(song)

container.appendChild(card)

})

}

/* ARTISTS */

async function loadArtists(){

const {data}=await supabase
.from("artists")
.select("*")
.limit(6)

const container=document.getElementById("artists")

data.forEach(artist=>{

const card=document.createElement("div")

card.className="artistCard"

card.innerHTML=`

<div class="artistAvatar"
style="background-image:url('${artist.avatar_url}')">
</div>

<div>${artist.stage_name}</div>

`

container.appendChild(card)

})

}

/* INIT */

async function init(){

const trending=await loadSongs("trending")
const latest=await loadSongs("latest")

renderSongs(trending,"trendingSongs")
renderSongs(latest,"latestSongs")

loadArtists()

}

init()

</script>

</body>
</html>
