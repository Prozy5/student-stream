<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSRecs • StudentStreamHQ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#05060f;
color:white;
overflow-x:hidden;
}

/* BACKGROUND LIGHTING */

.bg-light{
position:fixed;
width:900px;
height:900px;
filter:blur(140px);
opacity:.35;
z-index:-2;
}

.light1{
background:#4da3ff;
top:-300px;
left:-300px;
}

.light2{
background:#6cf2c2;
bottom:-300px;
right:-300px;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 50px;
background:rgba(10,12,20,.65);
backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,.06);
z-index:50;
}

.logo{
font-size:24px;
font-weight:800;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
padding:10px 14px;
border-radius:10px;
border:none;
background:#0f1324;
color:white;
width:220px;
}

/* HERO */

.hero{
height:85vh;
display:flex;
align-items:flex-end;
padding:80px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#05060f 10%,transparent);
}

.heroContent{
position:relative;
z-index:5;
max-width:600px;
}

.hero h1{
font-size:60px;
font-weight:800;
margin-bottom:12px;
}

.hero p{
opacity:.8;
margin-bottom:20px;
}

.hero button{
padding:14px 28px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
color:white;
font-weight:700;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:60px 60px;
}

.section h2{
font-size:24px;
margin-bottom:20px;
}

/* ROW */

.row{
display:flex;
gap:18px;
overflow-x:auto;
scroll-behavior:smooth;
}

.row::-webkit-scrollbar{
display:none;
}

/* CARD */

.card{
min-width:220px;
height:320px;
border-radius:16px;
overflow:hidden;
position:relative;
cursor:pointer;
background:#101426;
border:1px solid rgba(255,255,255,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 15px 40px rgba(0,0,0,.6);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* CARD OVERLAY */

.overlay{
position:absolute;
bottom:0;
padding:14px;
width:100%;
background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

.overlay h3{
font-size:15px;
margin-bottom:4px;
}

.overlay span{
font-size:12px;
opacity:.7;
}

/* LIVE BADGE */

.live{
position:absolute;
top:12px;
left:12px;
background:#ff3b3b;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:6px;
font-weight:700;
}

/* MOBILE */

@media(max-width:700px){

.hero{
padding:40px;
}

.hero h1{
font-size:36px;
}

.section{
padding:40px 25px;
}

}

</style>

</head>

<body>

<div class="bg-light light1"></div>
<div class="bg-light light2"></div>

<nav>

<div class="logo">SSRecs</div>

<input id="search" class="search" placeholder="Search creators, rooms, events">

</nav>

<section class="hero" id="hero">

<div class="heroContent">

<h1 id="heroTitle">Discover What's Trending</h1>

<p id="heroDesc">
Explore live conversations, creators, and events across StudentStreamHQ.
</p>

<button>Explore</button>

</div>

</section>

<section class="section">

<h2>🔥 Trending</h2>

<div class="row" id="trendingRow"></div>

</section>

<section class="section">

<h2>🎙 Live Rooms</h2>

<div class="row" id="roomsRow"></div>

</section>

<section class="section">

<h2>⭐ Creators</h2>

<div class="row" id="creatorRow"></div>

</section>

<section class="section">

<h2>📅 Events</h2>

<div class="row" id="eventsRow"></div>

</section>

<script>

const supabase = window.supabase.createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const trendingRow=document.getElementById("trendingRow")
const roomsRow=document.getElementById("roomsRow")
const creatorRow=document.getElementById("creatorRow")
const eventsRow=document.getElementById("eventsRow")

let heroItems=[]
let heroIndex=0

function createCard(item,isLive=false){

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

${isLive ? `<div class="live">LIVE</div>` : ""}

<img src="${item.thumbnail_url || 'https://picsum.photos/400/600'}">

<div class="overlay">
<h3>${item.title || item.name || "Untitled"}</h3>
<span>${item.category || ""}</span>
</div>

`

return card

}

/* HERO ROTATION */

function rotateHero(){

if(heroItems.length==0)return

heroIndex=(heroIndex+1)%heroItems.length

const item=heroItems[heroIndex]

document.getElementById("heroTitle").innerText=item.title || item.name
document.getElementById("heroDesc").innerText=item.description || ""

document.getElementById("hero").style.backgroundImage=`url(${item.thumbnail_url})`

}

setInterval(rotateHero,7000)

/* LOAD TRENDING */

async function loadTrending(){

const {data}=await supabase
.from("recommendations")
.select("*")
.limit(12)

heroItems=data || []

trendingRow.innerHTML=""

data.forEach(item=>{
trendingRow.appendChild(createCard(item))
})

}

loadTrending()

/* ROOMS */

async function loadRooms(){

const {data}=await supabase
.from("rooms")
.select("*")
.limit(10)

roomsRow.innerHTML=""

data.forEach(item=>{
roomsRow.appendChild(createCard(item,true))
})

}

loadRooms()

/* CREATORS */

async function loadCreators(){

const {data}=await supabase
.from("profiles")
.select("*")
.limit(10)

creatorRow.innerHTML=""

data.forEach(item=>{
creatorRow.appendChild(createCard(item))
})

}

loadCreators()

/* EVENTS */

async function loadEvents(){

const {data}=await supabase
.from("events")
.select("*")
.limit(10)

eventsRow.innerHTML=""

data.forEach(item=>{
eventsRow.appendChild(createCard(item))
})

}

loadEvents()

</script>

</body>
</html>
