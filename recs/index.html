<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSRecs • StudentStreamHQ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#05060f;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
z-index:10;
}

.logo{
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
padding:10px 14px;
border-radius:8px;
border:none;
background:#111;
color:white;
}

/* HERO */

.hero{
height:75vh;
display:flex;
align-items:end;
padding:60px;
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#05060f 10%,transparent);
}

.heroContent{
position:relative;
z-index:2;
max-width:600px;
}

.hero h1{
font-size:48px;
font-weight:800;
margin-bottom:10px;
}

.hero p{
opacity:.8;
margin-bottom:20px;
}

.hero button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#4da3ff;
color:white;
font-weight:600;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:40px;
}

.section h2{
margin-bottom:20px;
}

/* ROW */

.row{
display:flex;
gap:16px;
overflow-x:auto;
}

.row::-webkit-scrollbar{
display:none;
}

/* CARD */

.card{
min-width:200px;
height:260px;
border-radius:12px;
overflow:hidden;
position:relative;
cursor:pointer;
background:#111;
transition:.25s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card:hover{
transform:scale(1.06);
}

.overlay{
position:absolute;
bottom:0;
padding:12px;
width:100%;
background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

.overlay h3{
font-size:14px;
}

.overlay span{
font-size:12px;
opacity:.7;
}

</style>

</head>

<body>

<nav>

<div class="logo">SSRecs</div>

<input id="search" class="search" placeholder="Search creators, rooms, events">

</nav>

<section class="hero" id="hero">

<div class="heroContent">

<h1 id="heroTitle">Discover What's Trending</h1>

<p id="heroDesc">
SSRecs helps you discover creators, events, and live conversations across StudentStreamHQ.
</p>

<button onclick="openHero()">Explore</button>

</div>

</section>

<section class="section">

<h2>🔥 Trending Now</h2>

<div class="row" id="trendingRow"></div>

</section>

<section class="section">

<h2>🎙 Live Rooms</h2>

<div class="row" id="roomsRow"></div>

</section>

<section class="section">

<h2>⭐ Creators</h2>

<div class="row" id="creatorRow"></div>

</section>

<section class="section">

<h2>📅 Upcoming Events</h2>

<div class="row" id="eventsRow"></div>

</section>

<script>

/* SUPABASE */

const SUPABASE_URL="https://iabzmoxzbqzcqgypxctr.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

/* ROWS */

const trendingRow=document.getElementById("trendingRow")
const roomsRow=document.getElementById("roomsRow")
const creatorRow=document.getElementById("creatorRow")
const eventsRow=document.getElementById("eventsRow")

let heroItem=null

/* CREATE CARD */

function createCard(item){

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${item.thumbnail_url || 'https://picsum.photos/300/400'}">

<div class="overlay">
<h3>${item.title || item.name}</h3>
<span>${item.category || ''}</span>
</div>

`

return card

}

/* LOAD TRENDING */

async function loadTrending(){

const {data}=await supabase
.from("recommendations")
.select("*")
.limit(12)

trendingRow.innerHTML=""

data.forEach((item,i)=>{

let card=createCard(item)

trendingRow.appendChild(card)

if(i==0){
heroItem=item

document.getElementById("heroTitle").innerText=item.title
document.getElementById("heroDesc").innerText=item.description

document.getElementById("hero").style.backgroundImage=
`url(${item.thumbnail_url})`
}

})

}

loadTrending()

/* LOAD ROOMS */

async function loadRooms(){

const {data}=await supabase
.from("rooms")
.select("*")
.limit(10)

roomsRow.innerHTML=""

data.forEach(r=>{
roomsRow.appendChild(createCard(r))
})

}

loadRooms()

/* LOAD CREATORS */

async function loadCreators(){

const {data}=await supabase
.from("profiles")
.select("*")
.limit(10)

creatorRow.innerHTML=""

data.forEach(c=>{
creatorRow.appendChild(createCard(c))
})

}

loadCreators()

/* LOAD EVENTS */

async function loadEvents(){

const {data}=await supabase
.from("events")
.select("*")
.limit(10)

eventsRow.innerHTML=""

data.forEach(e=>{
eventsRow.appendChild(createCard(e))
})

}

loadEvents()

</script>

</body>
</html>
