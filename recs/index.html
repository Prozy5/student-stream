<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SSHQ Records • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:radial-gradient(circle at top,#0f1c35,#05070c 70%);
color:white;
min-height:100vh;
}

/* glow */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
background:linear-gradient(45deg,#4da3ff,#6cf2c2);
filter:blur(200px);
opacity:.05;
top:-300px;
left:-200px;
z-index:-1;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:24px;
font-weight:900;
}

.logo span{
color:#4da3ff;
}

.nav{
display:flex;
gap:20px;
}

.nav a{
text-decoration:none;
color:white;
opacity:.8;
font-size:14px;
}

.nav a:hover{
opacity:1;
}

/* hero */

.hero{
padding:50px 40px;
}

.hero h1{
font-size:46px;
font-weight:900;
}

.hero p{
opacity:.7;
margin-top:10px;
}

/* sections */

.section{
padding:40px;
}

.section h2{
margin-bottom:25px;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

/* cards */

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:15px;
transition:.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
border-color:#4da3ff;
}

.cover{
width:100%;
height:150px;
background:#111;
border-radius:10px;
background-size:cover;
background-position:center;
}

.songTitle{
margin-top:10px;
font-weight:700;
font-size:14px;
}

.artist{
font-size:12px;
opacity:.7;
}

/* music player */

.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#05070c;
border-top:1px solid rgba(255,255,255,.08);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
SSHQ <span>Records</span>
</div>

<div class="nav">
<a href="#">Home</a>
<a href="#">Artists</a>
<a href="#">Upload</a>
<a href="#">Charts</a>
</div>

</div>


<div class="hero">

<h1>Discover New Music</h1>
<p>SSHQ Records • A StudentStreamHQ Music Division</p>

</div>


<div class="section">

<h2>🔥 Trending Songs</h2>

<div class="grid" id="trendingSongs"></div>

</div>


<div class="section">

<h2>🎵 Latest Releases</h2>

<div class="grid" id="latestSongs"></div>

</div>


<div class="player">

<div id="nowPlaying">Nothing playing</div>

<audio id="audioPlayer" controls></audio>

</div>



<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)


const audioPlayer = document.getElementById("audioPlayer")
const nowPlaying = document.getElementById("nowPlaying")


function playSong(title,url){

audioPlayer.src = url
audioPlayer.play()

nowPlaying.textContent = "Now Playing: " + title

}



async function loadTrending(){

const { data } = await supabase
.from("songs")
.select("*")
.order("release_date",{ascending:false})
.limit(8)

const container = document.getElementById("trendingSongs")

container.innerHTML=""

data.forEach(song=>{

const card = document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div class="songTitle">${song.title}</div>

<div class="artist">${song.genre || "Artist"}</div>

`

card.onclick=()=>playSong(song.title,song.audio_url)

container.appendChild(card)

})

}



async function loadLatest(){

const { data } = await supabase
.from("songs")
.select("*")
.order("created_at",{ascending:false})
.limit(8)

const container = document.getElementById("latestSongs")

container.innerHTML=""

data.forEach(song=>{

const card = document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="cover" style="background-image:url('${song.cover_url}')"></div>

<div class="songTitle">${song.title}</div>

<div class="artist">${song.genre || "Artist"}</div>

`

card.onclick=()=>playSong(song.title,song.audio_url)

container.appendChild(card)

})

}



loadTrending()
loadLatest()

</script>

</body>
</html>
