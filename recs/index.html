<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentStreamHQ • SSRecs Division</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',system-ui;
}

body{
background:#060914;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0b1020;
padding:30px 20px;
border-right:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:20px;
font-weight:800;
margin-bottom:30px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav a{
display:block;
padding:12px;
border-radius:8px;
text-decoration:none;
color:#cbd5e1;
margin-bottom:8px;
}

.nav a:hover{
background:#111733;
}

/* MAIN */

.main{
flex:1;
padding:30px;
overflow:auto;
}

/* METRICS */

.metrics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#0d1326;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,.05);
}

.card h3{
font-size:14px;
opacity:.7;
margin-bottom:6px;
}

.value{
font-size:26px;
font-weight:700;
}

/* RECOMMENDATIONS */

.feed{
margin-top:20px;
}

.item{
background:#0d1326;
padding:16px;
border-radius:10px;
margin-bottom:10px;
border:1px solid rgba(255,255,255,.05);
}

.time{
font-size:12px;
opacity:.6;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">SSRecs</div>

<div class="nav">
<a href="#">Dashboard</a>
<a href="#">Live Feed</a>
<a href="#">Recommendations</a>
<a href="#">Creators</a>
<a href="#">Analytics</a>
</div>

</div>

<div class="main">

<h1>SSRecs Division</h1>
<p style="opacity:.7;margin-bottom:30px;">
Recommendation engine for StudentStreamHQ
</p>

<div class="metrics">

<div class="card">
<h3>Total Recommendations</h3>
<div class="value" id="recCount">0</div>
</div>

<div class="card">
<h3>Active Creators</h3>
<div class="value" id="creatorCount">0</div>
</div>

<div class="card">
<h3>Trending Items</h3>
<div class="value" id="trendCount">0</div>
</div>

<div class="card">
<h3>Live Activity</h3>
<div class="value" id="activityCount">0</div>
</div>

</div>

<h2>Live Recommendation Feed</h2>

<div class="feed" id="feed"></div>

</div>

<script>

/* SUPABASE CONFIG */

const SUPABASE_URL = "https://iabzmoxzbqzcqgypxctr.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

/* LOAD METRICS */

async function loadMetrics(){

let { data:recs } = await supabase
.from("recommendations")
.select("*")

let { data:creators } = await supabase
.from("profiles")
.select("*")

let { data:activity } = await supabase
.from("global_activity")
.select("*")

document.getElementById("recCount").textContent =
recs ? recs.length : 0

document.getElementById("creatorCount").textContent =
creators ? creators.length : 0

document.getElementById("activityCount").textContent =
activity ? activity.length : 0

document.getElementById("trendCount").textContent =
Math.floor(Math.random()*20)

}

loadMetrics()

/* LOAD FEED */

async function loadFeed(){

const { data } = await supabase
.from("recommendations")
.select("*")
.order("created_at",{ascending:false})
.limit(20)

const container = document.getElementById("feed")

container.innerHTML=""

data.forEach(item=>{

let div=document.createElement("div")

div.className="item"

div.innerHTML=`
<b>${item.title}</b>
<div>${item.description || ""}</div>
<div class="time">${new Date(item.created_at).toLocaleString()}</div>
`

container.appendChild(div)

})

}

loadFeed()

/* REALTIME */

supabase
.channel("recs-feed")
.on(
'postgres_changes',
{
event:"INSERT",
schema:"public",
table:"recommendations"
},
payload=>{
loadFeed()
loadMetrics()
}
)
.subscribe()

</script>

</body>
</html>
