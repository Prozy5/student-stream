<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSRecs • StudentStreamHQ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#04050c;
color:white;
overflow-x:hidden;
}

/* animated gradient background */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#4da3ff30,transparent 60%);
top:-200px;
left:-200px;
filter:blur(120px);
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#6cf2c230,transparent 60%);
bottom:-200px;
right:-200px;
filter:blur(120px);
z-index:-2;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 40px;
background:rgba(10,12,20,.7);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.05);
z-index:50;
}

.logo{
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
padding:10px 14px;
border-radius:8px;
border:none;
background:#0f1324;
color:white;
width:200px;
}

/* HERO */

.hero{
height:80vh;
display:flex;
align-items:flex-end;
padding:80px 60px;
background-size:cover;
background-position:center;
position:relative;
transition:background 1s ease;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#04050c 15%,transparent);
}

.heroContent{
position:relative;
z-index:3;
max-width:600px;
}

.hero h1{
font-size:52px;
font-weight:800;
margin-bottom:10px;
}

.hero p{
opacity:.8;
margin-bottom:20px;
}

.hero button{
padding:12px 24px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#4da3ff,#6cf2c2);
color:white;
font-weight:600;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:50px 40px;
}

.section h2{
margin-bottom:20px;
font-size:22px;
}

/* ROW */

.row{
display:flex;
gap:16px;
overflow-x:auto;
scroll-behavior:smooth;
}

.row::-webkit-scrollbar{
display:none;
}

/* CARD */

.card{
min-width:210px;
height:300px;
border-radius:14px;
overflow:hidden;
position:relative;
cursor:pointer;
background:#0f1426;
transition:.35s;
border:1px solid rgba(255,255,255,.05);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 10px 35px rgba(0,0,0,.5);
}

/* CARD OVERLAY */

.overlay{
position:absolute;
bottom:0;
padding:14px;
width:100%;
background:linear-gradient(to top,rgba(0,0,0,.95),transparent);
}

.overlay h3{
font-size:15px;
margin-bottom:4px;
}

.overlay span{
font-size:12px;
opacity:.7;
}

/* skeleton loaders */

.skeleton{
background:linear-gradient(90deg,#101426,#1a1f38,#101426);
background-size:200%;
animation:load 1.4s infinite;
}

@keyframes load{
0%{background-position:200%}
100%{background-position:-200%}
}

</style>

</head>

<body>

<nav>

<div class="logo">SSRecs</div>

<input id="search" class="search" placeholder="Search creators, rooms, events">

</nav>

<section class="hero" id="hero">

<div class="heroContent">

<h1 id="heroTitle">Discover What's Trending</h1>

<p id="heroDesc">
Explore live conversations, creators, and events across StudentStreamHQ.
</p>

<button>Explore</button>

</div>

</section>

<section class="section">
<h2>🔥 Trending</h2>
<div class="row" id="trendingRow"></div>
</section>

<section class="section">
<h2>🎙 Live Rooms</h2>
<div class="row" id="roomsRow"></div>
</section>

<section class="section">
<h2>⭐ Creators</h2>
<div class="row" id="creatorRow"></div>
</section>

<section class="section">
<h2>📅 Events</h2>
<div class="row" id="eventsRow"></div>
</section>

<script>

/* SUPABASE */

const supabase = window.supabase.createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

/* ROWS */

const trendingRow=document.getElementById("trendingRow")
const roomsRow=document.getElementById("roomsRow")
const creatorRow=document.getElementById("creatorRow")
const eventsRow=document.getElementById("eventsRow")

/* CREATE CARD */

function createCard(item){

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${item.thumbnail_url || 'https://picsum.photos/400/600'}">

<div class="overlay">
<h3>${item.title || item.name || "Untitled"}</h3>
<span>${item.category || ""}</span>
</div>

`

return card

}

/* HERO ROTATION */

let heroItems=[]
let heroIndex=0

function rotateHero(){

if(heroItems.length==0)return

heroIndex=(heroIndex+1)%heroItems.length

const item=heroItems[heroIndex]

document.getElementById("heroTitle").innerText=item.title || item.name
document.getElementById("heroDesc").innerText=item.description || ""

document.getElementById("hero").style.backgroundImage=
`url(${item.thumbnail_url})`

}

setInterval(rotateHero,8000)

/* LOAD TRENDING */

async function loadTrending(){

const {data}=await supabase
.from("recommendations")
.select("*")
.limit(12)

heroItems=data || []

trendingRow.innerHTML=""

data.forEach(item=>{
trendingRow.appendChild(createCard(item))
})

}

loadTrending()

/* LOAD ROOMS */

async function loadRooms(){

const {data}=await supabase
.from("rooms")
.select("*")
.limit(10)

roomsRow.innerHTML=""

data.forEach(item=>{
roomsRow.appendChild(createCard(item))
})

}

loadRooms()

/* LOAD CREATORS */

async function loadCreators(){

const {data}=await supabase
.from("profiles")
.select("*")
.limit(10)

creatorRow.innerHTML=""

data.forEach(item=>{
creatorRow.appendChild(createCard(item))
})

}

loadCreators()

/* LOAD EVENTS */

async function loadEvents(){

const {data}=await supabase
.from("events")
.select("*")
.limit(10)

eventsRow.innerHTML=""

data.forEach(item=>{
eventsRow.appendChild(createCard(item))
})

}

loadEvents()

/* REALTIME */

supabase
.channel("realtime-recs")
.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"recommendations"},
payload=>{
loadTrending()
}
)
.subscribe()

</script>

</body>
</html>
