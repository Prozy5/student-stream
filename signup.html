<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sign Up • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

body{
min-height:100vh;
background:radial-gradient(circle at top,#08142c,#02030a);
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

/* GLOW (same system as login) */

.blurOrb{
position:absolute;
width:900px;
height:900px;
background:radial-gradient(circle,rgba(60,140,255,0.25),transparent 70%);
filter:blur(120px);
top:-300px;
left:-250px;
}

.blurOrb2{
position:absolute;
width:900px;
height:900px;
background:radial-gradient(circle,rgba(0,255,170,0.18),transparent 70%);
filter:blur(130px);
bottom:-320px;
right:-250px;
}

/* CARD */

.signupBox{
width:100%;
max-width:480px;
padding:50px 45px;
border-radius:28px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(25px);
box-shadow:0 0 80px rgba(0,0,0,0.55);
z-index:5;
}

/* LOGO */

.logoTitle{
font-size:48px;
font-weight:950;
letter-spacing:-1px;
text-align:center;
}

.logoTitle span{
color:#3c8cff;
}

/* SUB */

.subtitle{
margin-top:10px;
font-size:14px;
opacity:.7;
text-align:center;
}

/* PLAN */

.planBox{
margin-top:20px;
text-align:center;
font-size:13px;
opacity:.7;
}

.planBadge{
margin-top:6px;
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:#3c8cff;
font-weight:700;
}

/* FORM */

.field{
margin-top:22px;
}

label{
font-size:13px;
font-weight:700;
opacity:.75;
}

input{
width:100%;
margin-top:8px;
padding:15px;
border-radius:16px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.03);
color:white;
font-size:15px;
outline:none;
transition:.25s;
}

input:focus{
border-color:rgba(60,140,255,.65);
box-shadow:0 0 0 3px rgba(60,140,255,.18);
}

/* BUTTON */

.signupBtn{
width:100%;
margin-top:30px;
padding:15px;
border-radius:18px;
border:none;
cursor:pointer;
font-weight:900;
font-size:16px;
background:linear-gradient(90deg,#3c8cff,#00ffae);
color:black;
transition:.25s;
}

.signupBtn:hover{
transform:translateY(-2px);
box-shadow:0 15px 40px rgba(0,0,0,.55);
}

/* STATUS */

.status{
margin-top:16px;
font-size:14px;
opacity:.8;
text-align:center;
min-height:20px;
}

/* LINKS */

.links{
margin-top:25px;
font-size:13px;
opacity:.65;
text-align:center;
}

.links a{
color:white;
font-weight:700;
text-decoration:none;
}

.links a:hover{
opacity:1;
}

</style>
</head>

<body>

<div class="blurOrb"></div>
<div class="blurOrb2"></div>

<div class="signupBox">

<div class="logoTitle">
StudentStream<span>HQ</span>
</div>

<div class="subtitle">
Create your account to access the platform.
</div>

<div class="planBox">
Selected Plan:
<div class="planBadge" id="planText">FREE</div>
</div>

<div class="field">
<label>Username</label>
<input id="username" placeholder="yourname">
</div>

<div class="field">
<label>Email</label>
<input id="email" type="email" placeholder="you@email.com">
</div>

<div class="field">
<label>Password</label>
<input id="password" type="password" placeholder="••••••••">
</div>

<button class="signupBtn" onclick="signupUser()">
Create Account
</button>

<div class="status" id="statusText"></div>

<div class="links">
Already have an account? <a href="/login.html">Login</a>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const status = document.getElementById("statusText")

const selectedPlan = localStorage.getItem("selectedPlan") || "free"
document.getElementById("planText").textContent = selectedPlan.toUpperCase()

window.signupUser = async function(){

const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()
const username=document.getElementById("username").value.trim()

if(!email||!password||!username){
status.textContent="⚠️ Fill all fields"
return
}

status.textContent="Creating account..."

const { data, error } = await supabase.auth.signUp({
email,
password
})

if(error){
status.textContent="❌ "+error.message
return
}

const user=data.user

if(!user){
status.textContent="Check your email to confirm signup"
return
}

await supabase
.from("profiles")
.update({
username:username,
plan:selectedPlan
})
.eq("id",user.id)

status.textContent="✅ Account created"

localStorage.removeItem("selectedPlan")

setTimeout(()=>{
window.location.href="/dashboard.html"
},800)

}

</script>

</body>
</html>
