<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Join • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
min-height:100vh;
background:#050506;
color:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* 🔥 BACKGROUND SYSTEM */

.bg{
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at 20% 20%, #ff1d4830, transparent 40%),
radial-gradient(circle at 80% 70%, #7b5cff30, transparent 40%),
radial-gradient(circle at 50% 100%, #00ffd530, transparent 40%);
filter:blur(80px);
animation:moveBg 12s linear infinite alternate;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(40px,-40px)}
}

/* GRID OVERLAY */

.grid{
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* CARD */

.container{
width:100%;
max-width:520px;
padding:50px 45px;
border-radius:30px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 0 100px rgba(0,0,0,.7);
}

/* LOGO */

.logo{
font-size:42px;
font-weight:900;
text-align:center;
letter-spacing:-1px;
}

.logo span{
background:linear-gradient(90deg,#ff1d48,#7b5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUB */

.subtitle{
text-align:center;
margin-top:10px;
opacity:.7;
font-size:14px;
line-height:1.6;
}

/* PLAN BADGE */

.planBadge{
margin-top:20px;
text-align:center;
font-size:13px;
opacity:.7;
}

.planHighlight{
display:inline-block;
margin-top:6px;
padding:6px 14px;
border-radius:999px;
background:linear-gradient(90deg,#ff1d48,#7b5cff);
font-weight:700;
}

/* FORM */

.field{
margin-top:20px;
}

label{
font-size:12px;
opacity:.7;
font-weight:600;
}

input{
width:100%;
margin-top:8px;
padding:14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.04);
color:white;
outline:none;
transition:.25s;
}

input:focus{
border-color:#ff1d48;
box-shadow:0 0 0 3px rgba(255,29,72,.2);
}

/* BUTTON */

.signupBtn{
width:100%;
margin-top:28px;
padding:15px;
border:none;
border-radius:16px;
font-weight:900;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#ff1d48,#7b5cff);
color:white;
transition:.25s;
}

.signupBtn:hover{
transform:translateY(-2px);
box-shadow:0 15px 40px rgba(0,0,0,.6);
}

/* STATUS */

.status{
margin-top:14px;
font-size:13px;
opacity:.8;
text-align:center;
min-height:18px;
}

/* FOOT */

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
opacity:.6;
}

.footer a{
color:white;
font-weight:700;
text-decoration:none;
}

.footer a:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="container">

<div class="logo">
StudentStream<span>HQ</span>
</div>

<div class="subtitle">
Create your account and unlock the full platform.
</div>

<div class="planBadge">
Selected Plan:
<div class="planHighlight" id="planText">FREE</div>
</div>

<!-- USERNAME -->
<div class="field">
<label>Username</label>
<input id="username" placeholder="yourname">
</div>

<!-- EMAIL -->
<div class="field">
<label>Email</label>
<input id="email" type="email" placeholder="you@email.com">
</div>

<!-- PASSWORD -->
<div class="field">
<label>Password</label>
<input id="password" type="password" placeholder="••••••••">
</div>

<button class="signupBtn" onclick="signupUser()">
Create Account
</button>

<div class="status" id="statusText"></div>

<div class="footer">
Already have an account? <a href="/login.html">Login</a>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const status = document.getElementById("statusText")

// GET PLAN
const selectedPlan = localStorage.getItem("selectedPlan") || "free"
document.getElementById("planText").textContent = selectedPlan.toUpperCase()

window.signupUser = async function(){

const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()
const username = document.getElementById("username").value.trim()

if(!email || !password || !username){
status.textContent="⚠️ Fill all fields"
return
}

status.textContent="Creating account..."

const { data, error } = await supabase.auth.signUp({
email,
password
})

if(error){
status.textContent="❌ "+error.message
return
}

const user = data.user

if(!user){
status.textContent="Check your email to confirm signup"
return
}

// SAVE PROFILE
const { error: profileError } = await supabase
.from("profiles")
.update({
username: username,
plan: selectedPlan
})
.eq("id", user.id)

if(profileError){
status.textContent="❌ Profile error"
return
}

status.textContent="✅ Welcome to StudentStreamHQ"

localStorage.removeItem("selectedPlan")

setTimeout(()=>{
window.location.href="/dashboard.html"
},800)

}

</script>

</body>
</html>
