<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sign Up • StudentStreamHQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system;}

body{
min-height:100vh;
background:radial-gradient(circle at top,#08142c,#02030a);
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

/* GLOW */
.blurOrb,.blurOrb2{
position:absolute;
width:900px;height:900px;
filter:blur(120px);
animation:float 12s ease-in-out infinite alternate;
}
.blurOrb{background:radial-gradient(circle,rgba(60,140,255,.25),transparent 70%);top:-300px;left:-250px;}
.blurOrb2{background:radial-gradient(circle,rgba(0,255,170,.18),transparent 70%);bottom:-320px;right:-250px;animation-delay:4s;}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(60px);}
}

/* CARD */
.signupBox{
width:100%;
max-width:480px;
padding:50px 45px;
border-radius:28px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(25px);
box-shadow:0 0 80px rgba(0,0,0,.55);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

.logoTitle{
font-size:48px;
font-weight:950;
text-align:center;
}
.logoTitle span{
background:linear-gradient(90deg,#3c8cff,#00ffae);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
margin-top:10px;
font-size:14px;
opacity:.7;
text-align:center;
}

.planBox{
margin-top:20px;
text-align:center;
font-size:13px;
opacity:.7;
}
.planBadge{
margin-top:8px;
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:linear-gradient(90deg,#3c8cff,#00ffae);
font-weight:700;
color:black;
}

/* FORM */
.field{margin-top:22px;}
label{font-size:13px;font-weight:700;opacity:.75;}

input{
width:100%;
margin-top:8px;
padding:15px;
border-radius:16px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.03);
color:white;
font-size:15px;
outline:none;
transition:.25s;
}

input:focus{
border-color:#3c8cff;
box-shadow:0 0 0 3px rgba(60,140,255,.2);
}

/* USERNAME STATUS */
.usernameStatus{
font-size:12px;
margin-top:5px;
opacity:.8;
}

/* BUTTON */
.signupBtn{
width:100%;
margin-top:30px;
padding:15px;
border-radius:18px;
border:none;
cursor:pointer;
font-weight:900;
font-size:16px;
background:linear-gradient(90deg,#3c8cff,#00ffae);
color:black;
transition:.25s;
}

.signupBtn:hover{
transform:translateY(-3px);
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.status{
margin-top:16px;
font-size:14px;
text-align:center;
min-height:20px;
}

.links{
margin-top:25px;
font-size:13px;
opacity:.65;
text-align:center;
}

.terms{
margin-top:10px;
font-size:12px;
opacity:.5;
text-align:center;
}
.terms a{color:#6cf2c2;text-decoration:none;}
</style>

</head>

<body>

<div class="blurOrb"></div>
<div class="blurOrb2"></div>

<div class="signupBox">

<div class="logoTitle">
StudentStream<span>HQ</span>
</div>

<div class="subtitle">
Create your account to access the platform.
</div>

<div class="planBox">
Selected Plan:
<div class="planBadge" id="planText">FREE</div>
</div>

<!-- USERNAME -->
<div class="field">
<label>Username</label>
<input id="username" placeholder="yourname">
<div class="usernameStatus" id="usernameStatus"></div>
</div>

<div class="field">
<label>Email</label>
<input id="email" type="email">
</div>

<div class="field">
<label>Password</label>
<input id="password" type="password">
</div>

<button class="signupBtn" id="signupBtn" onclick="signupUser()">
Create Account
</button>

<div class="status" id="statusText"></div>

<div class="links">
Already have an account? <a href="/login.html">Login</a>
</div>

<div class="terms">
<a href="/terms.html" target="_blank">View Terms & Agreement</a>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

const status = document.getElementById("statusText")
const btn = document.getElementById("signupBtn")
const usernameInput = document.getElementById("username")
const usernameStatus = document.getElementById("usernameStatus")

let usernameAvailable = false

/* PLAN */
const selectedPlan = localStorage.getItem("selectedPlan") || "free"
document.getElementById("planText").textContent = selectedPlan.toUpperCase()

/* USERNAME CHECK (LIVE) */
usernameInput.addEventListener("input", async () => {

const username = usernameInput.value.trim()

if(username.length < 3){
usernameStatus.textContent = "⚠️ Too short"
usernameAvailable = false
return
}

usernameStatus.textContent = "Checking..."

const { data } = await supabase
.from("profiles")
.select("username")
.eq("username", username)
.single()

if(data){
usernameStatus.textContent = "❌ Username taken"
usernameAvailable = false
}else{
usernameStatus.textContent = "✅ Available"
usernameAvailable = true
}

})

/* SIGNUP */
window.signupUser = async function(){

const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()
const username = usernameInput.value.trim()

if(!email || !password || !username){
status.textContent="⚠️ Fill all fields"
return
}

if(!usernameAvailable){
status.textContent="⚠️ Username not available"
return
}

btn.disabled = true
btn.textContent = "Creating..."

const { data, error } = await supabase.auth.signUp({
email,
password
})

if(error){
status.textContent="❌ "+error.message
btn.disabled=false
btn.textContent="Create Account"
return
}

const user = data.user

/* SAVE PROFILE */
await supabase.from("profiles").update({
username:username,
plan:selectedPlan
}).eq("id",user.id)

/* SAVE FLAG FOR CONTRACT */
localStorage.setItem("needsContract","true")

status.textContent="✅ Account created"

/* REDIRECT TO CONTRACT PAGE */
setTimeout(()=>{
window.location.href="/contract.html"
},700)

}

</script>

</body>
</html>
