<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SS:I — StudentStream Investigations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#050b14;
  --panel:#0b1624;
  --text:#e8f0ff;
  --muted:#8aa0c4;
  --accent:#3fa9ff;
  --danger:#ff3b3b;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#0c1b33,#050b14 70%);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  overflow-x:hidden;
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(63,169,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(63,169,255,.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* SCAN EFFECT */
.scan{
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,transparent 40%,rgba(63,169,255,.06),transparent 60%);
  animation:scan 6s linear infinite;
  pointer-events:none;
}

@keyframes scan{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:18px 30px;
  background:rgba(5,11,20,.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

header h1{
  font-size:18px;
  letter-spacing:2px;
}

.status{
  font-size:12px;
  color:var(--muted);
}

main{
  padding:120px 40px 60px;
  max-width:1100px;
  margin:auto;
}

.hero{
  margin-bottom:40px;
}

.hero h2{
  font-size:42px;
  margin:0 0 10px;
}

.hero p{
  color:var(--muted);
  max-width:600px;
}

.controls{
  margin-top:20px;
}

button{
  background:var(--accent);
  border:none;
  padding:12px 18px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  opacity:.85;
}

.feed{
  display:grid;
  gap:20px;
}

.card{
  background:var(--panel);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.05);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card h3{
  margin:0 0 10px;
}

.meta{
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
}

pre{
  white-space:pre-wrap;
  font-family:inherit;
  line-height:1.6;
}

.loading{
  opacity:.5;
}

</style>
</head>

<body>

<div class="scan"></div>

<header>
  <h1>SS:I</h1>
  <div class="status" id="status">SYSTEM READY</div>
</header>

<main>

<div class="hero">
  <h2>Investigations</h2>
  <p>Active intelligence reports generated and logged in real-time.</p>

  <div class="controls">
    <button onclick="generate()">Run Investigation</button>
  </div>
</div>

<div class="feed" id="feed"></div>

</main>

<script>

const SUPABASE_URL = "https://iabzmoxzbqzcqgypxctr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ";
const EDGE_FUNCTION = `${SUPABASE_URL}/functions/v1/ssi-engine`;

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const feed = document.getElementById("feed");
const statusEl = document.getElementById("status");

async function generate(){
  statusEl.innerText = "PROCESSING...";

  const card = document.createElement("div");
  card.className = "card loading";
  card.innerHTML = "Generating investigation...";
  feed.prepend(card);

  try{
    const res = await fetch(EDGE_FUNCTION);
    const data = await res.json();

    if(!data.success) throw new Error(data.error);

    card.classList.remove("loading");
    card.innerHTML = `
      <h3>${data.topic}</h3>
      <div class="meta">Generated • ${new Date().toLocaleTimeString()}</div>
      <pre>${data.article}</pre>
    `;

    statusEl.innerText = "COMPLETE";

  }catch(err){
    card.classList.remove("loading");
    card.innerHTML = "Error: " + err.message;
    statusEl.innerText = "ERROR";
  }
}

async function loadFeed(){
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("id", { ascending:false })
    .limit(10);

  if(!data) return;

  feed.innerHTML = "";

  data.forEach(post=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${post.title}</h3>
      <div class="meta">Stored Record</div>
      <pre>${post.content}</pre>
    `;

    feed.appendChild(card);
  });
}

loadFeed();

</script>

</body>
</html>
