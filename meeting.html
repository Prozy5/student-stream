<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudentStream HQ • Live Meetings</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  color:white;
  overflow:hidden;
  background:linear-gradient(135deg,#0a0a0f,#111827,#0f172a);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* TOP BAR */
.topbar{
  height:60px;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:14px;
}

.live{
  color:#00ff99;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  background:#00ff99;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:.3}
  100%{opacity:1}
}

.clock{
  opacity:.7;
  font-size:13px;
}

/* LAYOUT */
.layout{
  display:flex;
  height:calc(100vh - 60px);
}

/* MAIN VIDEO */
.main-video{
  flex:3;
  display:flex;
  flex-direction:column;
}

.video-box{
  flex:1;
  position:relative;
  background:black;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.video-overlay{
  position:absolute;
  bottom:20px;
  left:20px;
  background:rgba(0,0,0,.6);
  padding:12px 16px;
  border-radius:14px;
  font-size:14px;
  font-weight:600;
  backdrop-filter:blur(8px);
}

/* SWITCH BAR */
.video-switch{
  height:75px;
  display:flex;
  gap:12px;
  padding:12px;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(12px);
}

.switch-btn{
  flex:1;
  background:rgba(255,255,255,.05);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.25s;
  font-size:13px;
}

.switch-btn:hover{
  background:rgba(0,255,153,.15);
}

.active-meeting{
  border:1px solid #00ff99;
  background:rgba(0,255,153,.2);
}

/* PARTICIPANTS */
.participants{
  height:120px;
  display:flex;
  gap:12px;
  padding:12px;
  background:rgba(0,0,0,.4);
}

.tile{
  flex:1;
  background:rgba(255,255,255,.05);
  border-radius:14px;
  padding:12px;
  font-size:13px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:.3s;
}

.speaking{
  box-shadow:0 0 15px rgba(0,255,153,.5);
  border:1px solid #00ff99;
}

.status{
  font-size:12px;
  opacity:.6;
}

/* SIDE PANEL */
.sidepanel{
  flex:1;
  border-left:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  background:rgba(10,10,15,.85);
  backdrop-filter:blur(15px);
}

.agenda{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.agenda h3{
  margin:0 0 10px;
  color:#00ff99;
}

.agenda ul{
  margin:0;
  padding-left:18px;
  line-height:1.6;
  font-size:13px;
  opacity:.85;
}

.chatbox{
  flex:1;
  padding:18px;
  overflow-y:auto;
  font-size:13px;
}

.msg{
  margin-bottom:14px;
}

.msg b{
  color:#00ff99;
}

.timestamp{
  font-size:11px;
  opacity:.4;
  margin-left:6px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="live"><div class="dot"></div>Live • Recording</div>
  <div id="meetingTitle">SS Films Content Strategy</div>
  <div class="clock" id="clock"></div>
</div>

<div class="layout">

<div class="main-video">

<div class="video-box">
  <video id="mainVideo" autoplay muted loop></video>
  <div class="video-overlay">Deondre • Founder • Screen Sharing</div>
</div>

<div class="video-switch">
  <div class="switch-btn active-meeting" onclick="switchMeeting(0)">SS Films Strategy</div>
  <div class="switch-btn" onclick="switchMeeting(1)">Marketing Brainstorm</div>
  <div class="switch-btn" onclick="switchMeeting(2)">Creator Review</div>
</div>

<div class="participants">
  <div class="tile" id="Mike"><div>Mike</div><div class="status">Muted</div></div>
  <div class="tile" id="Rebecca"><div>Rebecca</div><div class="status">Muted</div></div>
  <div class="tile" id="Edward"><div>Edward</div><div class="status">Muted</div></div>
  <div class="tile" id="Jason"><div>Jason</div><div class="status">Muted</div></div>
</div>

</div>

<div class="sidepanel">

<div class="agenda">
  <h3>📌 Meeting Agenda</h3>
  <ul id="agendaList"></ul>
</div>

<div class="chatbox" id="chatBox"></div>

</div>
</div>

<script>

/* CLOCK */
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=
    now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* MEETINGS */
const meetings=[
{
title:"SS Films Content Strategy",
video:"meeting1.mp4",
agenda:["SS Films rollout","Monetization update","Content pipeline","Execution timeline"]
},
{
title:"Marketing Brainstorm",
video:"meeting2.mp4",
agenda:["TikTok campaign","Influencer partnerships","Ad spend allocation","Creative testing"]
},
{
title:"Creator Review Session",
video:"meeting3.mp4",
agenda:["Creator onboarding","Platform improvements","Feature roadmap","Q2 projections"]
}
];

let currentMeeting=0;
const video=document.getElementById("mainVideo");

function switchMeeting(index){
currentMeeting=index;
video.src=meetings[index].video;
video.play();
document.getElementById("meetingTitle").innerText=meetings[index].title;

const agenda=document.getElementById("agendaList");
agenda.innerHTML="";
meetings[index].agenda.forEach(item=>{
const li=document.createElement("li");
li.innerText=item;
agenda.appendChild(li);
});

document.querySelectorAll(".switch-btn")
.forEach(btn=>btn.classList.remove("active-meeting"));
document.querySelectorAll(".switch-btn")[index]
.classList.add("active-meeting");
}

switchMeeting(0);

/* SMART CHAT (no spam repeat) */
const names=["Mike","Rebecca","Edward","Jason"];
const messages=[
"Analytics are trending upward this week.",
"That rollout design looks polished.",
"We should increase short-form volume.",
"Monetization metrics improved 12%.",
"The creator onboarding flow feels smoother.",
"Let’s test two headline variations.",
"Brand visuals look premium.",
"Engagement retention is stronger this month.",
"Upload pipeline latency dropped.",
"We need stronger CTA placement."
];

let usedMessages=[];

function addMessage(){
if(usedMessages.length===messages.length){
usedMessages=[];
}

let msg;
do{
msg=messages[Math.floor(Math.random()*messages.length)];
}while(usedMessages.includes(msg));

usedMessages.push(msg);

const name=names[Math.floor(Math.random()*names.length)];
const div=document.createElement("div");
div.className="msg";

const time=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

div.innerHTML=`<b>${name}</b> <span class="timestamp">${time}</span><br>${msg}`;
chatBox.appendChild(div);
chatBox.scrollTop=chatBox.scrollHeight;
}

setInterval(addMessage,5000);

/* SPEAKING EFFECT */
function randomSpeaker(){
const person=names[Math.floor(Math.random()*names.length)];
const tile=document.getElementById(person);
tile.classList.add("speaking");
tile.querySelector(".status").innerText="Speaking...";

setTimeout(()=>{
tile.classList.remove("speaking");
tile.querySelector(".status").innerText="Muted";
},2000+Math.random()*2000);
}

setInterval(()=>{
if(Math.random()>.4) randomSpeaker();
},6000);

</script>

</body>
</html>
