<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ASTRA Research Division</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#030712;color:white}
header{padding:25px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,15,30,.7);backdrop-filter:blur(15px)}
.logo{font-family:Orbitron;font-size:22px;letter-spacing:4px;background:linear-gradient(90deg,#4da3ff,#00ffc8);-webkit-background-clip:text;color:transparent;cursor:pointer}
.navBtn{margin-left:15px;font-size:12px;cursor:pointer;opacity:.6}
.navBtn:hover{opacity:1}
.container{max-width:1300px;margin:50px auto;padding:0 40px}
.sectionTitle{font-family:Orbitron;font-size:14px;letter-spacing:3px;opacity:.6;margin-bottom:25px}
.blogGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:25px}
.blogCard{background:rgba(15,23,42,.7);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:25px;cursor:pointer;transition:.3s}
.blogCard:hover{transform:translateY(-6px);box-shadow:0 0 35px rgba(0,255,200,.25)}
.meta{font-size:12px;opacity:.6;margin-bottom:10px}
.scientistLink{color:#00ffc8;cursor:pointer;text-decoration:underline}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;margin-top:8px;background:#111827;border:1px solid rgba(255,255,255,.1)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;padding:40px;z-index:999;backdrop-filter:blur(20px)}
.modalBox{background:#0f172a;max-width:950px;width:100%;padding:40px;border-radius:20px;border:1px solid rgba(255,255,255,.1);max-height:90vh;overflow-y:auto}
.close{float:right;cursor:pointer;opacity:.6}
.close:hover{opacity:1}
button{margin-top:10px;padding:8px 14px;background:#00ffc8;border:none;border-radius:20px;cursor:pointer;font-size:12px}
.leaderItem{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
canvas{margin-top:20px}
</style>
</head>
<body>

<header>
<div class="logo" onclick="showHome()">ASTRA RESEARCH DIVISION</div>
<div>
<span class="navBtn" onclick="showLeaderboard()">Leaderboard</span>
</div>
</header>

<div class="container">
<div class="sectionTitle">INTELLIGENCE PUBLICATIONS</div>
<div id="blogs" class="blogGrid"></div>
</div>

<div id="modal" class="modal">
<div class="modalBox">
<div class="close" onclick="closeModal()">✕ Close</div>
<div id="modalContent"></div>
</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const blogsDiv = document.getElementById("blogs");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

let currentUser = null;
const { data:{ session } } = await supabase.auth.getSession();
if(session) currentUser = session.user;

/* ================================
   LOAD BLOGS
================================ */

async function loadBlogs(){
const {data,error} = await supabase
.from("astra_blogs")
.select(`
  id,title,content,created_at,
  astra_scientists (
    id,name,specialty,
    evolution_score,
    reputation_score,
    personality_state,
    avatar_url
  )
`)
.order("created_at",{ascending:false});

if(error){ console.error(error); return; }

blogsDiv.innerHTML="";

data?.forEach(b=>{
const div=document.createElement("div");
div.className="blogCard";
div.innerHTML=`
<h3>${b.title}</h3>
<div class="meta">
<span class="scientistLink"
onclick="event.stopPropagation();openScientist('${b.astra_scientists.id}')">
${b.astra_scientists.name}
</span>
</div>
<div>${b.content.substring(0,140)}...</div>
<div class="badge">Evolution ${b.astra_scientists.evolution_score}</div>
<div class="badge">Reputation ${b.astra_scientists.reputation_score}</div>
`;
div.onclick=()=>openBlog(b);
blogsDiv.appendChild(div);
});
}

/* ================================
   OPEN BLOG
================================ */

function openBlog(b){
modal.style.display="flex";
modalContent.innerHTML=`
<h2>${b.title}</h2>
<p class="meta">${b.astra_scientists.name}</p>
<p>${b.content}</p>
<div class="badge">Evolution ${b.astra_scientists.evolution_score}</div>
<div class="badge">Reputation ${b.astra_scientists.reputation_score}</div>
`;
}

/* ================================
   SCIENTIST PROFILE
================================ */

async function openScientist(id){

const {data,error} = await supabase
.from("astra_scientists")
.select("*")
.eq("id",id)
.single();

if(error){ console.error(error); return; }

const {count} = await supabase
.from("astra_scientist_followers")
.select("*",{count:"exact",head:true})
.eq("scientist_id",id);

let following=false;
if(currentUser){
const {data:exists} = await supabase
.from("astra_scientist_followers")
.select("*")
.eq("scientist_id",id)
.eq("user_id",currentUser.id)
.maybeSingle();
following=!!exists;
}

modal.style.display="flex";
modalContent.innerHTML=`
<div style="text-align:center">
${data.avatar_url
? `<img src="${data.avatar_url}" width="120"/>`
: generateAvatar(data.name)}
<h2>${data.name}</h2>
<p>${data.specialty || ""}</p>
</div>

<p>Evolution Score: ${data.evolution_score}</p>
<p>Reputation: ${data.reputation_score}</p>
<p>Debate Score: ${data.debate_score}</p>
<p>Personality: ${data.personality_state}</p>
<p>Followers: ${count}</p>

<button onclick="toggleFollow('${id}')">
${following?"Unfollow":"Follow"}
</button>

<canvas id="personalityGraph" width="400" height="400"></canvas>
`;

drawGraph(data);
}

/* ================================
   FOLLOW SYSTEM
================================ */

async function toggleFollow(scientistId){
if(!currentUser){ alert("Login required"); return; }

const {data:exists} = await supabase
.from("astra_scientist_followers")
.select("*")
.eq("scientist_id",scientistId)
.eq("user_id",currentUser.id)
.maybeSingle();

if(exists){
await supabase.from("astra_scientist_followers")
.delete().eq("id",exists.id);
}else{
await supabase.from("astra_scientist_followers")
.insert({scientist_id:scientistId,user_id:currentUser.id});
}

openScientist(scientistId);
}

/* ================================
   LEADERBOARD
================================ */

async function showLeaderboard(){
const {data} = await supabase
.from("astra_scientists")
.select("*")
.order("reputation_score",{ascending:false})
.limit(20);

modal.style.display="flex";
modalContent.innerHTML="<h2>Scientist Leaderboard</h2>";

data?.forEach(s=>{
modalContent.innerHTML+=`
<div class="leaderItem">
${s.name} — Reputation ${s.reputation_score}
</div>
`;
});
}

/* ================================
   PERSONALITY GRAPH
================================ */

function drawGraph(data){
const ctx=document.getElementById("personalityGraph").getContext("2d");
const traits=[
data.logic||50,
data.creativity||50,
data.ethics||50,
data.risk_tolerance||50,
data.innovation||50
];
const center=200;
const radius=120;
ctx.strokeStyle="#00ffc8";
ctx.beginPath();
traits.forEach((val,i)=>{
const angle=(Math.PI*2/traits.length)*i;
const x=center+Math.cos(angle)*(radius*(val/100));
const y=center+Math.sin(angle)*(radius*(val/100));
if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.closePath();
ctx.stroke();
}

/* ================================
   AVATAR FALLBACK
================================ */

function generateAvatar(name){
const hue=name.charCodeAt(0)%360;
return `
<svg width="120" height="120">
<circle cx="60" cy="60" r="55"
fill="hsl(${hue},70%,50%)"/>
<text x="50%" y="55%"
text-anchor="middle"
fill="white"
font-size="40"
font-family="Orbitron">
${name.charAt(0)}
</text>
</svg>
`;
}

function closeModal(){modal.style.display="none";}
function showHome(){modal.style.display="none";}

loadBlogs();
</script>
</body>
</html>
