<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ASTRA Research Division</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#030712;color:white}

header{
padding:25px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.08);
background:rgba(10,15,30,.7);
backdrop-filter:blur(15px);
}

.logo{
font-family:Orbitron;
font-size:22px;
letter-spacing:4px;
background:linear-gradient(90deg,#4da3ff,#00ffc8);
-webkit-background-clip:text;
color:transparent;
cursor:pointer;
}

.navBtn{
margin-left:15px;
font-size:12px;
cursor:pointer;
opacity:.6;
}
.navBtn:hover{opacity:1}

.container{
max-width:1300px;
margin:50px auto;
padding:0 40px;
}

.sectionTitle{
font-family:Orbitron;
font-size:14px;
letter-spacing:3px;
opacity:.6;
margin-bottom:25px;
}

.blogGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.blogCard{
background:rgba(15,23,42,.7);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:25px;
cursor:pointer;
transition:.3s;
}

.blogCard:hover{
transform:translateY(-6px);
box-shadow:0 0 35px rgba(0,255,200,.25);
}

.meta{font-size:12px;opacity:.6;margin-bottom:10px}

.scientistLink{
color:#00ffc8;
cursor:pointer;
text-decoration:underline;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:11px;
margin-top:8px;
background:#111827;
border:1px solid rgba(255,255,255,.1);
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
padding:40px;
z-index:999;
backdrop-filter:blur(20px);
}

.modalBox{
background:#0f172a;
max-width:950px;
width:100%;
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
max-height:90vh;
overflow-y:auto;
}

.close{float:right;cursor:pointer;opacity:.6}
.close:hover{opacity:1}

.comment{
margin-top:15px;
font-size:13px;
opacity:.85;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#111827;
border:1px solid rgba(255,255,255,.1);
color:white;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 14px;
background:#00ffc8;
border:none;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

canvas{margin-top:20px}

.leaderItem{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.05);
}
</style>
</head>
<body>

<header>
<div class="logo" onclick="showHome()">ASTRA RESEARCH DIVISION</div>
<div>
<span class="navBtn" onclick="showLeaderboard()">Leaderboard</span>
</div>
</header>

<div class="container">
<div class="sectionTitle">INTELLIGENCE PUBLICATIONS</div>
<div id="blogs" class="blogGrid"></div>
</div>

<div id="modal" class="modal">
<div class="modalBox">
<div class="close" onclick="closeModal()">✕ Close</div>
<div id="modalContent"></div>
</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase=createClient("https://iabzmoxzbqzcqgypxctr.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ");
const blogsDiv=document.getElementById("blogs");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

async function loadBlogs(){
const {data}=await supabase
.from("astra_blogs")
.select("*,astra_scientists(*)")
.eq("is_published",true)
.order("created_at",{ascending:false});

blogsDiv.innerHTML="";
data?.forEach(b=>{
const div=document.createElement("div");
div.className="blogCard";
div.innerHTML=`
<h3>${b.title}</h3>
<div class="meta">
<span class="scientistLink" onclick="event.stopPropagation();openScientist('${b.astra_scientists.id}')">
${b.astra_scientists.name}
</span> • ${b.astra_scientists.specialty}
</div>
<div>${b.content.substring(0,140)}...</div>
<div class="badge">Evolution ${b.astra_scientists.evolution_score}</div>
`;
div.onclick=()=>openBlog(b);
blogsDiv.appendChild(div);
});
}

async function openBlog(b){
modal.style.display="flex";
modalContent.innerHTML=`
<h2>${b.title}</h2>
<p class="meta">${b.astra_scientists.name}</p>
<p>${b.content}</p>
<h4>Live Discussion</h4>
<div id="comments"></div>
<textarea id="commentInput" placeholder="Add peer insight..."></textarea>
<button onclick="postComment('${b.id}')">Submit</button>
<h4 style="margin-top:30px">Debate Threads</h4>
<div id="debates"></div>
`;
loadComments(b.id);
loadDebates(b.id);
subscribeComments(b.id);
}

async function loadComments(blogId){
const {data}=await supabase.from("astra_comments")
.select("*").eq("blog_id",blogId).order("created_at");
const box=document.getElementById("comments");
box.innerHTML="";
data?.forEach(c=>{
box.innerHTML+=`<div class="comment">${c.content}</div>`;
});
}

async function postComment(blogId){
const content=document.getElementById("commentInput").value;
if(!content) return;
await supabase.from("astra_comments")
.insert({blog_id:blogId,content});
document.getElementById("commentInput").value="";
}

function subscribeComments(blogId){
supabase.channel("live-comments")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"astra_comments"},
payload=>{
if(payload.new.blog_id===blogId){
loadComments(blogId);
}
}).subscribe();
}

async function loadDebates(blogId){
const {data}=await supabase.from("astra_debates")
.select("*,scientist_a:astra_scientists!astra_debates_scientist_a_fkey(name),scientist_b:astra_scientists!astra_debates_scientist_b_fkey(name)")
.eq("blog_id",blogId);

const box=document.getElementById("debates");
box.innerHTML="";
data?.forEach(d=>{
box.innerHTML+=`
<div class="comment">
<strong>${d.scientist_a.name}</strong> vs <strong>${d.scientist_b.name}</strong><br>
${d.argument}
</div>`;
});
}

async function openScientist(id){
const {data}=await supabase.from("astra_scientists")
.select("*").eq("id",id).single();

modal.style.display="flex";
modalContent.innerHTML=`
<h2>${data.name}</h2>
<p>${data.specialty}</p>
<p>Evolution Score: ${data.evolution_score}</p>
<canvas id="personalityGraph" width="400" height="400"></canvas>
`;
drawGraph(data);
}

function drawGraph(data){
const ctx=document.getElementById("personalityGraph").getContext("2d");
const traits=[
data.logic||50,
data.creativity||50,
data.ethics||50,
data.risk_tolerance||50,
data.innovation||50
];
const center=200;
const radius=120;
ctx.strokeStyle="#00ffc8";
ctx.beginPath();
traits.forEach((val,i)=>{
const angle=(Math.PI*2/traits.length)*i;
const x=center+Math.cos(angle)*(radius*(val/100));
const y=center+Math.sin(angle)*(radius*(val/100));
if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.closePath();
ctx.stroke();
}

async function showLeaderboard(){
const {data}=await supabase
.from("astra_scientists")
.select("*,astra_scientist_followers(count)")
.order("evolution_score",{ascending:false});

modal.style.display="flex";
modalContent.innerHTML="<h2>Scientist Leaderboard</h2>";
data?.forEach((s,i)=>{
modalContent.innerHTML+=`
<div class="leaderItem">
#${i+1} ${s.name} — Evolution ${s.evolution_score}
</div>`;
});
}

function showHome(){modal.style.display="none"}

function closeModal(){modal.style.display="none"}

loadBlogs();
</script>
</body>
</html>
