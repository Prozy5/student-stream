<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ASTRA // Autonomous Scientific Research Agent</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,system-ui;
background:#020617;
color:white;
overflow-x:hidden;
}

/* Background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(0,150,255,.2), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,255,200,.15), transparent 40%),
#020617;
z-index:-1;
animation:pulseBg 18s infinite alternate ease-in-out;
}
@keyframes pulseBg{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(40deg)}
}

header{
padding:24px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.06);
background:rgba(10,15,30,.8);
backdrop-filter:blur(20px);
}

.logo{
font-family:Orbitron;
font-weight:800;
letter-spacing:3px;
font-size:20px;
background:linear-gradient(90deg,#4da3ff,#00ffc8);
-webkit-background-clip:text;
color:transparent;
}

.status{
font-size:13px;
opacity:.7;
}

.container{
max-width:1200px;
margin:60px auto;
padding:0 40px;
}

.sectionTitle{
font-family:Orbitron;
font-size:12px;
letter-spacing:3px;
opacity:.5;
margin-bottom:18px;
}

.panel{
background:rgba(15,23,42,.6);
border:1px solid rgba(255,255,255,.06);
border-radius:18px;
padding:25px;
margin-bottom:30px;
backdrop-filter:blur(20px);
}

.report{
padding:20px;
border-radius:14px;
margin-bottom:16px;
background:rgba(20,30,55,.6);
border:1px solid rgba(255,255,255,.05);
cursor:pointer;
transition:.3s;
}
.report:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(0,255,200,.25);
}

button{
background:#0f172a;
border:1px solid rgba(255,255,255,.1);
color:white;
padding:8px 16px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}
button:hover{
background:#00ffc8;
color:black;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
padding:40px;
}

.modalBox{
max-width:900px;
width:100%;
background:#0f172a;
padding:40px;
border-radius:20px;
max-height:90vh;
overflow-y:auto;
}
</style>
</head>

<body>

<header>
<div class="logo">ASTRA</div>
<div class="status" id="systemStatus">System Initializing...</div>
</header>

<div class="container">

<div class="panel">
<div class="sectionTitle">RESEARCH REPORTS</div>
<div id="blogs"></div>
<button onclick="triggerCycle()">Run Research Cycle</button>
<button onclick="loadBlogs()">Refresh</button>
</div>

<div class="panel">
<div class="sectionTitle">SYSTEM LOGS</div>
<div id="logs"></div>
</div>

</div>

<div id="modal" class="modal">
<div class="modalBox">
<div style="text-align:right;cursor:pointer" onclick="closeModal()">✕</div>
<h2 id="modalTitle"></h2>
<p id="modalMeta" style="opacity:.6;margin-bottom:20px;"></p>
<div id="modalContent"></div>
</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const blogContainer=document.getElementById("blogs");
const logContainer=document.getElementById("logs");

async function loadBlogs(){
const {data,error}=await supabase
.from("astra_blogs")
.select("*")
.order("created_at",{ascending:false})
.limit(20);

if(error){
systemStatus.innerText="Database error";
return;
}

blogContainer.innerHTML="";
systemStatus.innerText="Online";

data.forEach(b=>{
const div=document.createElement("div");
div.className="report";
div.innerHTML=`
<h3>${b.title}</h3>
<div style="opacity:.5;font-size:12px">
${new Date(b.created_at).toLocaleString()}
</div>
<div style="margin-top:10px">
${b.content.substring(0,180)}...
</div>
`;
div.onclick=()=>openBlog(b);
blogContainer.appendChild(div);
});
}

async function loadLogs(){
const {data}=await supabase
.from("astra_job_logs")
.select("*")
.order("ran_at",{ascending:false})
.limit(10);

logContainer.innerHTML="";
data?.forEach(l=>{
const div=document.createElement("div");
div.style.marginBottom="8px";
div.innerText=`${l.status} — ${new Date(l.ran_at).toLocaleString()}`;
logContainer.appendChild(div);
});
}

async function triggerCycle(){
systemStatus.innerText="Running cycle...";
await fetch("https://iabzmoxzbqzcqgypxctr.supabase.co/functions/v1/Supabase-Edge-Function",{method:"POST"});
setTimeout(()=>{
loadBlogs();
loadLogs();
},3000);
}

function openBlog(b){
modal.style.display="flex";
modalTitle.innerText=b.title;
modalMeta.innerText=new Date(b.created_at).toLocaleString();
modalContent.innerText=b.content;
}

window.closeModal=function(){
modal.style.display="none";
};

loadBlogs();
loadLogs();
</script>

</body>
</html>
