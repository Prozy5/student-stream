<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ASTRA • Orbital Event Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,system-ui;
background:#020617;
color:white;
overflow-x:hidden;
}

/* Animated Background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(0,150,255,.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,0,150,.15), transparent 40%),
radial-gradient(circle at 50% 50%, rgba(0,255,200,.1), transparent 60%),
#020617;
z-index:-3;
animation:pulseBg 15s infinite alternate ease-in-out;
}
@keyframes pulseBg{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(35deg)}
}

/* Header */
header{
backdrop-filter:blur(20px);
background:rgba(10,15,30,.75);
border-bottom:1px solid rgba(255,255,255,.08);
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-family:Orbitron;
font-weight:800;
letter-spacing:4px;
font-size:22px;
background:linear-gradient(90deg,#4da3ff,#00ffc8);
-webkit-background-clip:text;
color:transparent;
}

.statusBar{
display:flex;
gap:30px;
font-size:13px;
opacity:.85;
}

.health{
padding:4px 10px;
border-radius:20px;
font-size:12px;
background:#062e2e;
color:#00ffc8;
animation:pulseHealth 2s infinite alternate;
}
@keyframes pulseHealth{
0%{box-shadow:0 0 0 rgba(0,255,200,0)}
100%{box-shadow:0 0 12px rgba(0,255,200,.6)}
}

/* Global Status */
.globalStatus{
padding:18px 40px;
background:rgba(15,23,42,.7);
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
gap:40px;
flex-wrap:wrap;
}

.statusMetric strong{
display:block;
font-size:16px;
margin-top:3px;
}

/* Layout */
.layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
max-width:1500px;
margin:50px auto;
padding:0 40px;
}

.sectionTitle{
font-family:Orbitron;
font-size:13px;
letter-spacing:3px;
opacity:.6;
margin-bottom:15px;
}

.glass{
background:rgba(15,23,42,.65);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:20px;
}

/* Reports */
.report{
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
margin-bottom:15px;
background:rgba(15,23,42,.7);
transition:.3s;
cursor:pointer;
}
.report:hover{
transform:translateY(-4px);
box-shadow:0 0 30px rgba(0,255,200,.35);
}

.threatBar{
height:6px;
background:#111827;
border-radius:4px;
margin-top:12px;
overflow:hidden;
}
.threatFill{
height:100%;
transition:width .8s ease;
}

/* Scientist Cards */
.leaderCard{
padding:15px;
border-radius:12px;
margin-bottom:12px;
background:rgba(15,23,42,.6);
border:1px solid rgba(255,255,255,.08);
cursor:pointer;
transition:.3s;
}
.leaderCard:hover{
transform:translateY(-3px);
box-shadow:0 0 20px rgba(0,150,255,.35);
}

.metricBar{
height:5px;
background:#1f2937;
border-radius:3px;
margin-top:8px;
overflow:hidden;
}
.metricFill{
height:100%;
background:#4da3ff;
}

/* Modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
backdrop-filter:blur(20px);
display:none;
align-items:center;
justify-content:center;
padding:40px;
z-index:999;
}
.modalBox{
max-width:950px;
width:100%;
background:#0f172a;
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
max-height:90vh;
overflow-y:auto;
}
.closeBtn{
float:right;
cursor:pointer;
opacity:.6;
}
.closeBtn:hover{opacity:1}

footer{
text-align:center;
padding:40px;
opacity:.4;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="logo">ASTRA ORBITAL INTELLIGENCE</div>
<div class="statusBar">
<div id="cycleStatus">Initializing...</div>
<div id="reportCount">Reports: 0</div>
<div id="scientistCount">Scientists: 0</div>
<div class="health" id="systemHealth">SYSTEM HEALTH: OPTIMAL</div>
</div>
</header>

<div class="globalStatus">
<div class="statusMetric">Latest Threat<strong id="gThreat">—</strong></div>
<div class="statusMetric">Risk Score<strong id="gRisk">—</strong></div>
<div class="statusMetric">Forecast<strong id="gForecast">—</strong></div>
<div class="statusMetric">Updated<strong id="gUpdated">—</strong></div>
</div>

<div class="layout">
<div class="glass">
<div class="sectionTitle">ORBITAL EVENT STREAM</div>
<div id="reports"></div>
</div>

<div class="glass">
<div class="sectionTitle">SCIENTIST PERFORMANCE RANKING</div>
<div id="scientists"></div>
</div>
</div>

<footer>Live orbital intelligence stream • © 2026 ASTRA</footer>

<div id="modal" class="modal">
<div class="modalBox">
<div class="closeBtn" onclick="closeModal()">✕ Close</div>
<h2 id="modalTitle"></h2>
<p id="modalMeta" style="opacity:.6;margin-bottom:15px;"></p>
<div id="modalContent"></div>
<div id="modalExtra"></div>
</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase=createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const reportsContainer=document.getElementById("reports");
const scientistContainer=document.getElementById("scientists");

function threatColor(score){
if(score>=75) return "#ff3b3b";
if(score>=50) return "#ff9f43";
if(score>=25) return "#ffd32a";
return "#00ffc8";
}

async function loadReports(){
const {data}=await supabase
.from("astra_reports")
.select("*")
.order("created_at",{ascending:false})
.limit(20);

if(!data) return;

reportsContainer.innerHTML="";
document.getElementById("reportCount").innerText="Reports: "+data.length;

data.forEach(r=>{
const div=document.createElement("div");
div.className="report";
div.innerHTML=`
<h3>${r.event_title}</h3>
<div style="opacity:.6;font-size:12px">${new Date(r.created_at).toLocaleString()}</div>
<div style="margin-top:10px">${r.summary}</div>
<div class="threatBar">
<div class="threatFill" style="width:${r.threat_score}%;background:${threatColor(r.threat_score)}"></div>
</div>
`;
div.onclick=()=>openReport(r);
reportsContainer.appendChild(div);
});

if(data.length){
const latest=data[0];
gThreat.innerText=latest.threat_level;
gRisk.innerText=latest.threat_score;
gForecast.innerText=latest.forecast_risk||"—";
gUpdated.innerText=new Date(latest.created_at).toLocaleTimeString();
cycleStatus.innerText="Live Monitoring Active";
}
}

async function loadScientists(){
const {data}=await supabase
.from("astra_scientists")
.select("*")
.order("reputation_score",{ascending:false});

if(!data) return;

scientistContainer.innerHTML="";
scientistCount.innerText="Scientists: "+data.length;

data.forEach((s,i)=>{
const div=document.createElement("div");
div.className="leaderCard";
div.innerHTML=`
<strong>#${i+1} ${s.name}</strong><br>
Reputation: ${Number(s.reputation_score).toFixed(1)}<br>
Accuracy: ${s.prediction_accuracy||0}%<br>
Active Cases: ${s.active_cases||0}
<div class="metricBar">
<div class="metricFill" style="width:${s.prediction_accuracy||0}%"></div>
</div>
`;
div.onclick=()=>openScientist(s);
scientistContainer.appendChild(div);
});
}

async function openReport(r){
modal.style.display="flex";
modalTitle.innerText=r.event_title;
modalMeta.innerText=new Date(r.created_at).toLocaleString();
modalContent.innerText=r.full_article;

const {data:analyses}=await supabase
.from("astra_analyses")
.select("analysis,confidence,astra_scientists(name)")
.eq("report_id",r.id);

modalExtra.innerHTML="<h3 style='margin-top:20px'>Scientific Analyses</h3>";

analyses?.forEach(a=>{
modalExtra.innerHTML+=`
<div style="margin-top:10px">
<strong>${a.astra_scientists?.name||"Research Analyst"}</strong><br>
${a.analysis}<br>
<small>Confidence: ${a.confidence}%</small>
</div>
`;
});
}

function openScientist(s){
modal.style.display="flex";
modalTitle.innerText=s.name;
modalMeta.innerText="Specialty: "+s.specialty;
modalContent.innerHTML=`
Reputation Score: ${Number(s.reputation_score).toFixed(1)}<br>
Accuracy: ${s.prediction_accuracy||0}%<br>
Active Cases: ${s.active_cases||0}<br><br>
${s.bio||"No biography available."}
`;
modalExtra.innerHTML="";
}

window.closeModal=function(){
modal.style.display="none";
};

/* Realtime + Fallback */
supabase.channel("live-reports")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"astra_reports"},()=>loadReports())
.subscribe();

setInterval(loadReports,60000);

loadReports();
loadScientists();
</script>

</body>
</html>
