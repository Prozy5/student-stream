<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#020617;color:white;overflow-x:hidden}

body::before{
content:"";position:fixed;inset:0;
background:
radial-gradient(circle at 15% 20%, rgba(0,150,255,.2), transparent 40%),
radial-gradient(circle at 85% 70%, rgba(0,255,200,.15), transparent 40%),
#020617;
z-index:-1;
}

header{
padding:25px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,15,30,.8);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{font-family:Orbitron;font-size:22px;letter-spacing:4px}
.meta{font-size:12px;opacity:.6}

.wrapper{
max-width:1400px;margin:50px auto;padding:0 50px;
display:grid;grid-template-columns:2fr 1fr;gap:40px;
}

.panel{
background:rgba(15,23,42,.6);
border:1px solid rgba(255,255,255,.05);
border-radius:20px;padding:30px;
backdrop-filter:blur(25px);
}

.sectionTitle{
font-family:Orbitron;font-size:11px;letter-spacing:3px;
opacity:.5;margin-bottom:20px;
}

.report{
padding:22px;border-radius:16px;margin-bottom:18px;
background:rgba(20,30,55,.6);
border:1px solid rgba(255,255,255,.05);
cursor:pointer;transition:.2s;
}
.report:hover{transform:scale(1.02)}

.scientist{
padding:18px;border-radius:14px;margin-bottom:15px;
background:rgba(20,30,55,.5);
border:1px solid rgba(255,255,255,.05);
}

.threatLow{border-left:4px solid #00ffc8}
.threatMedium{border-left:4px solid #ffd000}
.threatHigh{border-left:4px solid #ff4d6d}

button{
background:#0ea5e9;border:none;color:white;
padding:8px 14px;border-radius:8px;cursor:pointer;
}

.pagination{
display:flex;justify-content:space-between;margin-top:15px;
}

.modal{
position:fixed;inset:0;background:rgba(0,0,0,.7);
display:none;align-items:center;justify-content:center;
}

.modalContent{
background:#0f172a;padding:30px;border-radius:15px;
max-width:700px;width:90%;max-height:80vh;overflow:auto;
}

.modal.show{display:flex}

.debugPanel{
position:fixed;bottom:0;left:0;right:0;
background:#000;color:#00ff88;font-family:monospace;
font-size:12px;padding:12px;max-height:200px;
overflow:auto;z-index:9999;
}
</style>
</head>
<body>

<header>
<div class="logo">ASTRA</div>
<div>
<span class="meta" id="systemStatus">CONNECTING...</span>
<button id="ingestBtn">INGEST NOW</button>
</div>
</header>

<div class="wrapper">

<div class="panel">
<div class="sectionTitle">INTELLIGENCE STREAM</div>
<div id="reportContainer"></div>

<div class="pagination">
<button id="prevBtn">Prev</button>
<button id="nextBtn">Next</button>
</div>
</div>

<div class="panel">
<div class="sectionTitle">AI SCIENTISTS</div>
<div id="scientistContainer"></div>
</div>

</div>

<div id="modal" class="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<div class="debugPanel" id="debugContent"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const reportContainer=document.getElementById("reportContainer");
const scientistContainer=document.getElementById("scientistContainer");
const systemStatus=document.getElementById("systemStatus");
const debugContent=document.getElementById("debugContent");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

let page=0;
const pageSize=10;

function debug(msg){debugContent.innerHTML+="<div>> "+msg+"</div>";}

function threatClass(score){
if(score>=70) return "threatHigh";
if(score>=40) return "threatMedium";
return "threatLow";
}

async function loadReports(){
debug("Loading publications page "+page);

const {data,error}=await supabase
.from("astra_publications")
.select("*, astra_scientists(name)")
.eq("published",true)
.order("created_at",{ascending:false})
.range(page*pageSize,(page+1)*pageSize-1);

if(error){debug("ERROR: "+error.message);return;}

reportContainer.innerHTML="";
data.forEach(r=>{
const div=document.createElement("div");
div.className="report "+threatClass(r.threat_score||0);
div.innerHTML=`
<strong>${r.title}</strong><br>
<small>Scientist: ${r.astra_scientists?.name||"Unknown"}</small><br>
<small>${new Date(r.created_at).toLocaleString()}</small>
`;
div.onclick=()=>openModal(r);
reportContainer.appendChild(div);
});
}

function openModal(r){
modalContent.innerHTML=`
<h2>${r.title}</h2>
<p><strong>Scientist:</strong> ${r.astra_scientists?.name||"Unknown"}</p>
<p><strong>Threat Score:</strong> ${r.threat_score||0}</p>
<hr>
<p>${r.body||""}</p>
<br><button onclick="document.getElementById('modal').classList.remove('show')">Close</button>
`;
modal.classList.add("show");
}

async function loadScientists(){
const {data}=await supabase
.from("astra_scientists")
.select("*")
.eq("active",true)
.order("reputation",{ascending:false});

scientistContainer.innerHTML="";
data.forEach(s=>{
scientistContainer.innerHTML+=`
<div class="scientist">
<strong>${s.name}</strong><br>
<small>${s.specialization}</small><br>
<small>Reputation: ${s.reputation}</small>
</div>`;
});
}

function setupRealtime(){
supabase
.channel("astra-live")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"astra_publications"},
payload=>{
debug("Realtime publication inserted");
loadReports();
})
.subscribe();
}

async function ingestNow(){
debug("Triggering ingestion...");
await fetch("https://iabzmoxzbqzcqgypxctr.supabase.co/functions/v1/astra-ingest",{
method:"POST",
headers:{Authorization:"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NzEwODM3MCwiZXhwIjoyMDgyNjg0MzcwfQ.CsPZH8iEu--QB8Zcug4TaqBS8T-g_eqWBbnx9zJH7yA"}
});
}

document.getElementById("ingestBtn").onclick=ingestNow;
document.getElementById("nextBtn").onclick=()=>{page++;loadReports();}
document.getElementById("prevBtn").onclick=()=>{if(page>0)page--;loadReports();}
modal.onclick=e=>{if(e.target===modal)modal.classList.remove("show");}

setInterval(loadReports,60000);

async function init(){
systemStatus.innerText="LOADING...";
await loadReports();
await loadScientists();
setupRealtime();
systemStatus.innerText="LIVE";
debug("ASTRA READY");
}

init();
</script>

</body>
</html>
