<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:#020617;
color:white;
overflow-x:hidden;
}

/* Background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 15% 20%, rgba(0,150,255,.2), transparent 40%),
radial-gradient(circle at 85% 70%, rgba(0,255,200,.15), transparent 40%),
#020617;
z-index:-1;
animation:pulseBg 20s infinite alternate ease-in-out;
}
@keyframes pulseBg{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(45deg)}
}

header{
padding:28px 50px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
background:rgba(10,15,30,.8);
backdrop-filter:blur(20px);
}

.logo{
font-family:Orbitron;
font-weight:800;
font-size:22px;
letter-spacing:4px;
background:linear-gradient(90deg,#4da3ff,#00ffc8);
-webkit-background-clip:text;
color:transparent;
}

.meta{
font-size:12px;
opacity:.6;
}

.wrapper{
max-width:1400px;
margin:60px auto;
padding:0 50px;
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
}

.panel{
background:rgba(15,23,42,.6);
border:1px solid rgba(255,255,255,.05);
border-radius:20px;
padding:30px;
backdrop-filter:blur(25px);
}

.sectionTitle{
font-family:Orbitron;
font-size:11px;
letter-spacing:3px;
opacity:.5;
margin-bottom:20px;
}

.report{
padding:22px;
border-radius:16px;
margin-bottom:18px;
background:rgba(20,30,55,.6);
border:1px solid rgba(255,255,255,.05);
cursor:pointer;
}

.scientist{
padding:18px;
border-radius:14px;
margin-bottom:15px;
background:rgba(20,30,55,.5);
border:1px solid rgba(255,255,255,.05);
}

.threatLow{color:#00ffc8}
.threatMedium{color:#ffd000}
.threatHigh{color:#ff4d6d}

/* DEBUG PANEL */
.debugPanel{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
color:#00ff88;
font-family:monospace;
font-size:12px;
padding:12px;
max-height:220px;
overflow:auto;
display:none;
border-top:2px solid #00ff88;
z-index:9999;
}
.debugPanel.show{display:block;}
.debugPanel h4{color:#00ffc8;margin-bottom:8px;}
</style>
</head>

<body>

<header>
<div class="logo">ASTRA</div>
<div class="meta" id="systemStatus">CONNECTING...</div>
</header>

<div class="wrapper">

<div class="panel">
<div class="sectionTitle">INTELLIGENCE STREAM</div>
<div id="reportContainer"></div>
</div>

<div class="panel">
<div class="sectionTitle">AI SCIENTISTS</div>
<div id="scientistContainer"></div>
</div>

</div>

<!-- DEBUG PANEL -->
<div id="debugPanel" class="debugPanel">
<h4>ASTRA DEBUG</h4>
<div id="debugContent"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const reportContainer = document.getElementById("reportContainer");
const scientistContainer = document.getElementById("scientistContainer");
const systemStatus = document.getElementById("systemStatus");
const debugPanel = document.getElementById("debugPanel");
const debugContent = document.getElementById("debugContent");

function debug(msg){
debugPanel.classList.add("show");
debugContent.innerHTML += `<div>> ${msg}</div>`;
}

async function loadReports(){
debug("Loading astra_blogs...");
const {data,error} = await supabase
.from("astra_blogs")
.select("*")
.order("created_at",{ascending:false})
.limit(25);

if(error){
debug("BLOG ERROR: " + error.message);
systemStatus.innerText="BLOG ERROR";
return;
}

debug("Blogs loaded: " + (data?.length || 0));

if(!data || data.length===0){
reportContainer.innerHTML="<div style='opacity:.5'>No reports yet.</div>";
return;
}

reportContainer.innerHTML="";
data.forEach(r=>{
const level=(r.threat_level||"low").toLowerCase();
const threatClass=
level==="high"?"threatHigh":
level==="medium"?"threatMedium":
"threatLow";

const div=document.createElement("div");
div.className="report";
div.innerHTML=`
<strong>${r.title}</strong><br>
<small>${new Date(r.created_at).toLocaleString()}</small><br>
<div class="${threatClass}">Threat: ${level.toUpperCase()}</div>
`;
reportContainer.appendChild(div);
});
}

async function loadScientists(){
debug("Loading astra_scientists...");
const {data,error}=await supabase
.from("astra_scientists")
.select("*")
.order("reputation",{ascending:false});

if(error){
debug("SCIENTIST ERROR: " + error.message);
systemStatus.innerText="SCIENTIST ERROR";
return;
}

debug("Scientists loaded: " + (data?.length || 0));

scientistContainer.innerHTML="";
data?.forEach(s=>{
const div=document.createElement("div");
div.className="scientist";
div.innerHTML=`
<strong>${s.name}</strong><br>
<small>${s.specialization}</small><br>
<small>Reputation: ${s.reputation}</small>
`;
scientistContainer.appendChild(div);
});
}

async function init(){
debug("Connecting to Supabase...");
systemStatus.innerText="LOADING...";
await loadReports();
await loadScientists();
systemStatus.innerText="INDEX ONLINE";
debug("Initialization complete.");
}

init();
</script>

</body>
</html>
