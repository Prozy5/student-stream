<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:#020617;
color:white;
overflow-x:hidden;
}

/* Animated background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 15% 20%, rgba(0,150,255,.2), transparent 40%),
radial-gradient(circle at 85% 70%, rgba(0,255,200,.15), transparent 40%),
#020617;
z-index:-1;
animation:pulseBg 20s infinite alternate ease-in-out;
}
@keyframes pulseBg{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(45deg)}
}

/* Header */
header{
padding:28px 50px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
background:rgba(10,15,30,.8);
backdrop-filter:blur(20px);
}

.logo{
font-family:Orbitron;
font-weight:800;
font-size:22px;
letter-spacing:4px;
background:linear-gradient(90deg,#4da3ff,#00ffc8);
-webkit-background-clip:text;
color:transparent;
}

.meta{
font-size:12px;
opacity:.6;
}

/* Layout */
.wrapper{
max-width:1400px;
margin:60px auto;
padding:0 50px;
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
}

/* Panels */
.panel{
background:rgba(15,23,42,.6);
border:1px solid rgba(255,255,255,.05);
border-radius:20px;
padding:30px;
backdrop-filter:blur(25px);
}

.sectionTitle{
font-family:Orbitron;
font-size:11px;
letter-spacing:3px;
opacity:.5;
margin-bottom:20px;
}

/* Reports */
.report{
padding:22px;
border-radius:16px;
margin-bottom:18px;
background:rgba(20,30,55,.6);
border:1px solid rgba(255,255,255,.05);
transition:.3s;
cursor:pointer;
}
.report:hover{
transform:translateY(-6px);
box-shadow:0 0 30px rgba(0,255,200,.25);
}

.report h3{
font-weight:600;
margin-bottom:6px;
}

.report small{
opacity:.5;
font-size:12px;
}

.threatLow{color:#00ffc8}
.threatMedium{color:#ffd000}
.threatHigh{color:#ff4d6d}

/* Scientist Board */
.scientist{
padding:18px;
border-radius:14px;
margin-bottom:15px;
background:rgba(20,30,55,.5);
border:1px solid rgba(255,255,255,.05);
}

.scientist h4{
font-size:14px;
margin-bottom:6px;
}

.scientist small{
opacity:.6;
}

/* Modal */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
padding:40px;
}

.modalBox{
max-width:900px;
width:100%;
background:#0f172a;
padding:50px;
border-radius:24px;
max-height:90vh;
overflow-y:auto;
}

.closeBtn{
text-align:right;
cursor:pointer;
opacity:.6;
margin-bottom:20px;
}
.closeBtn:hover{opacity:1}
</style>
</head>

<body>

<header>
<div class="logo">ASTRA</div>
<div class="meta" id="systemStatus">INDEX ONLINE</div>
</header>

<div class="wrapper">

<!-- LEFT: Intelligence Stream -->
<div class="panel">
<div class="sectionTitle">INTELLIGENCE STREAM</div>
<div id="reportContainer"></div>
</div>

<!-- RIGHT: AI Scientists -->
<div class="panel">
<div class="sectionTitle">AI SCIENTISTS</div>
<div id="scientistContainer"></div>
</div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
<div class="modalBox">
<div class="closeBtn" onclick="closeModal()">✕ CLOSE</div>
<h2 id="modalTitle"></h2>
<p id="modalMeta" style="opacity:.6;margin-bottom:25px;"></p>
<div id="modalContent" style="line-height:1.7;"></div>
</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const reportContainer=document.getElementById("reportContainer");
const scientistContainer=document.getElementById("scientistContainer");

/* LOAD REPORTS */
async function loadReports(){
const {data,error}=await supabase
.from("astra_blogs")
.select("*")
.order("created_at",{ascending:false})
.limit(25);

if(error){
systemStatus.innerText="DATABASE ERROR";
return;
}

reportContainer.innerHTML="";

data.forEach(r=>{
const threatClass =
r.threat_level === "high" ? "threatHigh" :
r.threat_level === "medium" ? "threatMedium" :
"threatLow";

const div=document.createElement("div");
div.className="report";
div.innerHTML=`
<h3>${r.title}</h3>
<small>${new Date(r.created_at).toLocaleString()}</small>
<div style="margin-top:10px" class="${threatClass}">
Threat Level: ${r.threat_level?.toUpperCase() || "LOW"}
</div>
`;
div.onclick=()=>openReport(r);
reportContainer.appendChild(div);
});
}

/* LOAD SCIENTISTS */
async function loadScientists(){
const {data}=await supabase
.from("astra_scientists")
.select("*")
.order("reputation",{ascending:false});

scientistContainer.innerHTML="";

data?.forEach(s=>{
const div=document.createElement("div");
div.className="scientist";
div.innerHTML=`
<h4>${s.name}</h4>
<small>Specialization: ${s.specialization}</small><br>
<small>Reputation: ${s.reputation}</small>
`;
scientistContainer.appendChild(div);
});
}

function openReport(r){
modal.style.display="flex";
modalTitle.innerText=r.title;
modalMeta.innerText=new Date(r.created_at).toLocaleString();
modalContent.innerText=r.content;
}

window.closeModal=function(){
modal.style.display="none";
};

loadReports();
loadScientists();
</script>

</body>
</html>
