<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudentStreamHQ Internal Communications</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#050505;
overflow:hidden;
color:white;

}

.screen{

position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

transition:1s;

}

.hidden{

opacity:0;
pointer-events:none;

}

.portal{

width:92%;
max-width:420px;

height:88vh;

background:#0f0f0f;

border-radius:28px;

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 30px 80px rgba(0,0,0,.55);

overflow:hidden;

display:flex;
flex-direction:column;

}

.header{

padding:24px;

border-bottom:1px solid rgba(255,255,255,.08);

}

.company{

font-size:22px;
font-weight:700;

}

.subtitle{

margin-top:5px;

color:#8b8b8b;

font-size:14px;

}

.confidential{

margin-top:15px;

display:inline-block;

padding:6px 12px;

border-radius:50px;

background:#1a1a1a;

color:#ff4b4b;

font-size:12px;

letter-spacing:1px;

}

.time{

margin-top:18px;

font-size:13px;

color:#888;

}

.chat{

padding:25px;

display:flex;

flex-direction:column;

gap:18px;

flex:1;

}

.label{

font-size:13px;

color:#888;

letter-spacing:.5px;

}

.message{

background:#181818;

padding:18px;

border-radius:18px;

line-height:1.7;

font-size:17px;

transform:translateY(30px);

opacity:0;

transition:1s;

}

.message.show{

transform:translateY(0);

opacity:1;

}

.reply{

margin:20px;

padding:18px;

background:#111;

border-radius:18px;

display:flex;

align-items:center;

gap:12px;

border:1px solid rgba(255,255,255,.05);

}

.input{

flex:1;

font-size:18px;

color:white;

white-space:nowrap;

overflow:hidden;

}

.cursor{

display:inline-block;

width:2px;

height:20px;

background:white;

animation:blink .8s infinite;

vertical-align:middle;

}

@keyframes blink{

50%{

opacity:0;

}

}

.send{

width:46px;
height:46px;

border-radius:50%;

background:#d4af37;

display:flex;

justify-content:center;
align-items:center;

font-size:20px;

color:black;

font-weight:bold;

transform:scale(.8);

opacity:.4;

transition:.5s;

}

.send.active{

opacity:1;

transform:scale(1);

}

.reveal{

position:absolute;

inset:0;

background:black;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

opacity:0;

pointer-events:none;

transition:1.4s;

}

.reveal.show{

opacity:1;

pointer-events:auto;

}

.big{

font-size:42px;

font-weight:800;

margin-top:18px;

text-align:center;

}

.small{

margin-top:20px;

font-size:20px;

color:#bfbfbf;

text-align:center;

line-height:1.6;

}

.logo{

width:120px;
height:120px;

border-radius:32px;

background:linear-gradient(135deg,#ffd76a,#b8860b);

display:flex;

justify-content:center;

align-items:center;

font-size:72px;

font-weight:800;

color:black;

box-shadow:

0 0 80px rgba(212,175,55,.35);

transform:scale(.8);

opacity:0;

transition:1.4s;

}

.logo.show{

opacity:1;

transform:scale(1);

}

.footer{

position:absolute;

bottom:60px;

font-size:18px;

letter-spacing:1px;

color:#888;

}

.fadeText{

opacity:0;

transform:translateY(20px);

transition:1s;

}

.fadeText.show{

opacity:1;

transform:translateY(0);

}

</style>
</head>

<body>

<div class="screen" id="portal">

<div class="portal">

<div class="header">

<div class="company">
StudentStreamHQ
</div>

<div class="subtitle">
Internal Communications
</div>

<div class="confidential">
CONFIDENTIAL
</div>

<div class="time">
June 18, 2026 • Executive Meeting
</div>

</div>

<div class="chat">

<div class="label">
Management Team
</div>

<div class="message" id="question">

Will Relvia continue to operate under the StudentStreamHQ domain?

</div>

</div>

<div class="reply">

<div class="input">

<span id="typed"></span>

<span class="cursor"></span>

</div>

<div class="send" id="send">

➜

</div>

</div>

</div>

</div>

<div class="reveal" id="reveal">

<div class="logo" id="logo">
R
</div>

<div class="big fadeText" id="line1">
What site is this?
</div>

<div class="big fadeText" id="line2">
It's Relvia.
</div>

<div class="small fadeText" id="line3">
Coming Soon
<br><br>
relvia.online
</div>

</div>
<script>

const question = document.getElementById("question");
const typed = document.getElementById("typed");
const send = document.getElementById("send");

const portal = document.getElementById("portal");
const reveal = document.getElementById("reveal");

const logo = document.getElementById("logo");

const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");
const line3 = document.getElementById("line3");

const text = "No.";

setTimeout(()=>{

question.classList.add("show");

},1200);

setTimeout(typeReply,4200);

function typeReply(){

let i=0;

const typing = setInterval(()=>{

typed.textContent += text.charAt(i);

i++;

if(i===text.length){

clearInterval(typing);

setTimeout(()=>{

send.classList.add("active");

},500);

setTimeout(()=>{

send.style.transform="scale(.85)";

},1200);

setTimeout(()=>{

send.style.transform="scale(1)";

},1350);

setTimeout(startReveal,2000);

}

},350);

}

function startReveal(){

portal.classList.add("hidden");

setTimeout(()=>{

reveal.classList.add("show");

},1000);

setTimeout(()=>{

logo.classList.add("show");

},1800);

setTimeout(()=>{

line1.classList.add("show");

},3200);

setTimeout(()=>{

line2.classList.add("show");

},4700);

setTimeout(()=>{

line3.classList.add("show");

},6200);

}

</script>
<script>

// ---------- Gold Logo Glow ----------

setInterval(()=>{

logo.style.boxShadow =
"0 0 "+(70+Math.random()*35)+"px rgba(212,175,55,.45)";

},800);


// ---------- Floating Background ----------

const bg=document.createElement("div");

bg.style.position="fixed";
bg.style.inset="0";
bg.style.pointerEvents="none";
bg.style.overflow="hidden";

document.body.appendChild(bg);

for(let i=0;i<35;i++){

const p=document.createElement("div");

const size=Math.random()*4+2;

p.style.position="absolute";
p.style.width=size+"px";
p.style.height=size+"px";

p.style.borderRadius="50%";

p.style.background="rgba(212,175,55,.20)";

p.style.left=Math.random()*100+"vw";

p.style.top=Math.random()*100+"vh";

p.style.animation=
`float ${8+Math.random()*8}s linear infinite`;

p.style.animationDelay=Math.random()*6+"s";

bg.appendChild(p);

}

const style=document.createElement("style");

style.innerHTML=`

@keyframes float{

0%{

transform:translateY(0px);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-140vh);

opacity:0;

}

}

`;

document.head.appendChild(style);


// ---------- Cinematic Fade ----------

document.body.animate(

[
{opacity:0},
{opacity:1}
],

{

duration:1500,

fill:"forwards"

}

);


// ---------- Mobile Safe ----------

window.addEventListener("resize",()=>{

document.body.style.height=
window.innerHeight+"px";

});

document.body.style.height=
window.innerHeight+"px";

</script>

</body>
</html>
