<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Command Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:#020617;
  color:#e6edf3;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#010409;
  padding:20px;
  border-right:1px solid #1f2933;
}

.logo{color:#3b82f6;font-weight:700;margin-bottom:10px;}
.owner{color:#22c55e;font-size:12px;margin-bottom:20px;}

.sidebar a{
  display:block;
  margin:10px 0;
  color:#9ca3af;
  text-decoration:none;
}
.sidebar a:hover{color:#3b82f6;}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:12px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* GRID */
.dashboard{
  flex:1;
  display:grid;
  grid-template-columns:2.5fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:12px;
}

/* CARDS */
.card{
  background:#020617;
  border:1px solid #1f2933;
  border-radius:12px;
  padding:12px;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* MAP */
#map{
  flex:1;
  border-radius:10px;
  overflow:hidden;
}

/* METRICS */
.metric{
  font-size:20px;
  color:#3b82f6;
  font-weight:700;
}

/* BADGE */
.badge{padding:3px 7px;border-radius:6px;font-size:10px;}
.green{background:#022c22;color:#22c55e;}
.yellow{background:#2c2a0a;color:#eab308;}
.blue{background:#0a1f2c;color:#3b82f6;}

/* DM */
.messages{flex:1;overflow:hidden;}
.msg{
  margin:4px 0;
  padding:6px;
  background:#0a1f2c;
  border-radius:6px;
  font-size:11px;
}

/* INPUT */
.input{display:flex;margin-top:8px;}
.input input{
  flex:1;
  background:#010409;
  border:1px solid #1f2933;
  color:white;
  padding:6px;
  border-radius:6px;
}
.input button{
  margin-left:5px;
  background:#3b82f6;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
}

/* AI */
.ai{
  position:absolute;
  bottom:20px;
  right:20px;
  width:260px;
  background:#010409;
  border:1px solid #1f2933;
  border-radius:12px;
  padding:10px;
}
.ai-log{font-size:11px;color:#9ca3af;max-height:120px;overflow:hidden;}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">StudentStreamHQ</div>
  <div class="owner">👑 Owner</div>

  <a href="#">Dashboard</a>
  <a href="#">SS Studios</a>
  <a href="#">SS Productions</a>
  <a href="#">Astra Messaging</a>
  <a href="#">DevForum</a>
</div>

<div class="main">

<div class="topbar">
  <h2>Command Center</h2>
  <div style="color:#22c55e">● Systems Active</div>
</div>

<div class="dashboard">

<!-- MAP -->
<div class="card" style="grid-row:1 / span 2;">
  <h3>Global Network</h3>
  <div id="map"></div>
</div>

<!-- DIVISIONS -->
<div class="card">
  <h3>Divisions</h3>
  <p>SS Studios <span class="badge green">Active</span></p>
  <p>SS Productions <span class="badge green">Filming</span></p>
  <p>Astra Messaging <span class="badge green">Online</span></p>
</div>

<!-- METRICS -->
<div class="card">
  <h3>Live Metrics</h3>
  <div class="metric" id="users">120</div> Users
  <div class="metric" id="messages">300</div> Msg/min
</div>

<!-- DMS -->
<div class="card">
  <h3>Staff Messages</h3>
  <div class="messages" id="dmBox"></div>
  <div class="input">
    <input id="inputMsg" placeholder="Reply...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

</div>
</div>

<div class="ai">
  <div id="aiLog"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// DARK MAP (THIS FIXES YOUR PROBLEM)
const map = L.map('map',{zoomControl:false}).setView([20,0],2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

// FIX BLANK MAP BUG
setTimeout(()=>{map.invalidateSize()},500);

// LOCATIONS
const points=[
[37.7749,-122.4194],
[51.5074,-0.1278],
[35.6895,139.6917],
[-33.8688,151.2093]
];

// CURVED LINES
function drawLine(a,b){
  const latlngs=[
    a,
    [(a[0]+b[0])/2 + 10, (a[1]+b[1])/2],
    b
  ];
  L.polyline(latlngs,{color:'#3b82f6',weight:2,opacity:0.7}).addTo(map);
}

for(let i=0;i<points.length-1;i++){
  drawLine(points[i],points[i+1]);
}

// PULSING NODES
points.forEach(p=>{
  const marker=L.circleMarker(p,{radius:5,color:'#3b82f6'}).addTo(map);

  setInterval(()=>{
    const pulse=L.circle(p,{radius:500000,color:'#3b82f6',opacity:0.2});
    pulse.addTo(map);
    setTimeout(()=>map.removeLayer(pulse),2000);
  },2000);
});

// METRICS
setInterval(()=>{
  users.innerText=100+Math.random()*50|0;
  messages.innerText=250+Math.random()*100|0;
},2000);

// DMS
function sendMsg(){
  const input=document.getElementById("inputMsg");
  if(!input.value) return;

  const box=document.getElementById("dmBox");
  const msg=document.createElement("div");
  msg.className="msg";
  msg.innerText="You: "+input.value;
  box.prepend(msg);
  input.value="";
}

const dms=["Dev: Push update?","Finance: Approve?","Security: Alert triggered"];

setInterval(()=>{
  const box=document.getElementById("dmBox");
  const msg=document.createElement("div");
  msg.className="msg";
  msg.innerText=dms[Math.random()*dms.length|0];
  box.prepend(msg);
},2500);

// AI
const aiLogs=["Scanning...","All systems normal","Traffic spike detected"];

setInterval(()=>{
  const log=document.getElementById("aiLog");
  const msg=document.createElement("div");
  msg.innerText="> "+aiLogs[Math.random()*aiLogs.length|0];
  log.prepend(msg);
},2000);

</script>

</body>
</html>
