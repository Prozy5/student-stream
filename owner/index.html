<!DOCTYPE html>
<html>

<head>

<title>StudentStreamHQ Command Center</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
position:fixed;
width:230px;
height:100%;
background:#020617;
padding:20px;
}

.logo{
color:#22c55e;
font-size:20px;
margin-bottom:25px;
}

.sidebar a{
display:block;
padding:10px;
margin-bottom:5px;
cursor:pointer;
border-radius:6px;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:260px;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

button{
background:#22c55e;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.on{background:#16a34a}
.off{background:#dc2626}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">👑 Command</div>

<a onclick="dashboard()">Dashboard</a>
<a onclick="activity()">Live Activity</a>
<a onclick="admins()">Admin Monitor</a>
<a onclick="modules()">Modules</a>
<a onclick="security()">Security</a>
<a onclick="analytics()">Analytics</a>

</div>

<div class="main" id="main"></div>

<script>

const SUPABASE_URL="https://iabzmoxzbqzcqgypxctr.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"

const {createClient}=supabase
const db=createClient(SUPABASE_URL,SUPABASE_KEY)

dashboard()

async function dashboard(){

main.innerHTML=`

<h1>StudentStreamHQ Command Center</h1>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p id="users">0</p>
</div>

<div class="card">
<h3>Admins</h3>
<p id="admins">0</p>
</div>

<div class="card">
<h3>Security Alerts</h3>
<p id="alerts">0</p>
</div>

<div class="card">
<h3>Events Today</h3>
<p id="events">0</p>
</div>

</div>

<div class="card">

<h2>Live Platform Events</h2>

<table>

<thead>
<tr>
<th>Event</th>
<th>Module</th>
<th>Time</th>
</tr>
</thead>

<tbody id="eventTable"></tbody>

</table>

</div>

`

loadStats()
subscribeEvents()

}

async function loadStats(){

let {count:users}=await db.from("users").select("*",{count:"exact",head:true})
let {count:admins}=await db.from("users").select("*",{count:"exact",head:true}).eq("role","admin")
let {count:alerts}=await db.from("security_alerts").select("*",{count:"exact",head:true})

document.getElementById("users").innerText=users||0
document.getElementById("admins").innerText=admins||0
document.getElementById("alerts").innerText=alerts||0

}

function subscribeEvents(){

db.channel("events")

.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"platform_events"},
payload=>{

let e=payload.new

let row=`

<tr>
<td>${e.event_type}</td>
<td>${e.module}</td>
<td>${new Date(e.created_at).toLocaleString()}</td>
</tr>

`

document.getElementById("eventTable").innerHTML=row+
document.getElementById("eventTable").innerHTML

})

.subscribe()

}

async function activity(){

main.innerHTML=`

<h1>Real-Time User Activity</h1>

<table>

<thead>
<tr>
<th>User</th>
<th>Action</th>
<th>Page</th>
<th>Time</th>
</tr>
</thead>

<tbody id="activityTable"></tbody>

</table>

`

db.channel("activity")

.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"activity_logs"},
payload=>{

let a=payload.new

let row=`

<tr>
<td>${a.user_email}</td>
<td>${a.action}</td>
<td>${a.page}</td>
<td>${new Date(a.created_at).toLocaleString()}</td>
</tr>

`

document.getElementById("activityTable").innerHTML=row+
document.getElementById("activityTable").innerHTML

})

.subscribe()

}

async function admins(){

main.innerHTML=`

<h1>Admin Monitoring</h1>

<table>

<thead>
<tr>
<th>Admin</th>
<th>Action</th>
<th>Target</th>
<th>Time</th>
</tr>
</thead>

<tbody id="adminTable"></tbody>

</table>

`

db.channel("admins")

.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"admin_logs"},
payload=>{

let a=payload.new

let row=`

<tr>
<td>${a.admin_email}</td>
<td>${a.action}</td>
<td>${a.target}</td>
<td>${new Date(a.created_at).toLocaleString()}</td>
</tr>

`

document.getElementById("adminTable").innerHTML=row+
document.getElementById("adminTable").innerHTML

})

.subscribe()

}

async function modules(){

main.innerHTML=`

<h1>Module Control</h1>

<table>

<thead>
<tr>
<th>Module</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="modulesTable"></tbody>

</table>

`

let {data}=await db.from("modules").select("*")

let html=""

data.forEach(m=>{

let btn=m.status==="on"
?`<button class="off" onclick="toggle('${m.id}','off')">Disable</button>`
:`<button class="on" onclick="toggle('${m.id}','on')">Enable</button>`

html+=`

<tr>
<td>${m.name}</td>
<td>${m.status}</td>
<td>${btn}</td>
</tr>

`

})

modulesTable.innerHTML=html

}

async function toggle(id,status){

await db
.from("modules")
.update({status})
.eq("id",id)

modules()

}

async function security(){

main.innerHTML=`

<h1>Security Scanner</h1>

<table>

<thead>
<tr>
<th>Type</th>
<th>Severity</th>
<th>Message</th>
<th>Time</th>
</tr>
</thead>

<tbody id="securityTable"></tbody>

</table>

`

db.channel("security")

.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"security_alerts"},
payload=>{

let s=payload.new

let row=`

<tr>
<td>${s.type}</td>
<td>${s.severity}</td>
<td>${s.message}</td>
<td>${new Date(s.created_at).toLocaleString()}</td>
</tr>

`

securityTable.innerHTML=row+securityTable.innerHTML

})

.subscribe()

}

async function analytics(){

main.innerHTML=`

<h1>Platform Analytics</h1>

<div class="cards">

<div class="card">
<h3>Total Activity Logs</h3>
<p id="logs">0</p>
</div>

<div class="card">
<h3>Admin Actions</h3>
<p id="adminCount">0</p>
</div>

</div>

`

let {count:logs}=await db.from("activity_logs").select("*",{count:"exact",head:true})
let {count:admin}=await db.from("admin_logs").select("*",{count:"exact",head:true})

logsEl=document.getElementById("logs")
adminEl=document.getElementById("adminCount")

logsEl.innerText=logs||0
adminEl.innerText=admin||0

}

</script>

</body>
</html>
