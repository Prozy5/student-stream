<!DOCTYPE html>
<html>
<head>

<title>Owner Control Room • StudentStreamHQ</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

.sidebar{
width:240px;
height:100vh;
background:#111827;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#22c55e;
}

.sidebar a{
display:block;
padding:10px;
margin-top:10px;
color:#cbd5f5;
text-decoration:none;
}

.sidebar a:hover{
background:#1f2937;
border-radius:6px;
}

.main{
margin-left:260px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.card h3{
margin:0;
font-size:14px;
color:#94a3b8;
}

.card p{
font-size:28px;
margin-top:10px;
}

.table{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

button{
background:#22c55e;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>👑 Owner</h2>

<a>Dashboard</a>
<a>Users</a>
<a>Admins</a>
<a>Modules</a>
<a>Security</a>
<a>AI Lab</a>
<a>System</a>
<a>Settings</a>

</div>

<div class="main">

<h1>Owner Control Room</h1>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p id="users">0</p>
</div>

<div class="card">
<h3>Admins</h3>
<p id="admins">0</p>
</div>

<div class="card">
<h3>Modules Online</h3>
<p id="modules">0</p>
</div>

<div class="card">
<h3>Security Alerts</h3>
<p id="alerts">0</p>
</div>

<div class="card">
<h3>AI Tasks</h3>
<p id="ai">0</p>
</div>

<div class="card">
<h3>Active Users</h3>
<p id="active">0</p>
</div>

</div>

<div class="table">

<h2>Recent Platform Events</h2>

<table>

<thead>

<tr>
<th>Event</th>
<th>Module</th>
<th>Time</th>
</tr>

</thead>

<tbody id="events"></tbody>

</table>

</div>

<div class="table">

<h2>Users</h2>

<table>

<thead>

<tr>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL="https://iabzmoxzbqzcqgypxctr.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"

const supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function loadStats(){

let {count:users}=await supabase
.from("users")
.select("*",{count:"exact",head:true})

let {count:admins}=await supabase
.from("users")
.select("*",{count:"exact",head:true})
.eq("role","admin")

let {count:modules}=await supabase
.from("modules")
.select("*",{count:"exact",head:true})
.eq("status","active")

let {count:alerts}=await supabase
.from("security_alerts")
.select("*",{count:"exact",head:true})

document.getElementById("users").innerText=users
document.getElementById("admins").innerText=admins
document.getElementById("modules").innerText=modules
document.getElementById("alerts").innerText=alerts

}

async function loadUsers(){

let {data}=await supabase
.from("users")
.select("*")
.limit(10)

let html=""

data.forEach(u=>{

html+=`
<tr>
<td>${u.email}</td>
<td>${u.status}</td>
<td>
<button onclick="ban('${u.id}')">Ban</button>
<button onclick="suspend('${u.id}')">Suspend</button>
</td>
</tr>
`

})

document.getElementById("userTable").innerHTML=html

}

async function loadEvents(){

let {data}=await supabase
.from("platform_events")
.select("*")
.order("created_at",{ascending:false})
.limit(10)

let html=""

data.forEach(e=>{

html+=`
<tr>
<td>${e.event_type}</td>
<td>${e.module}</td>
<td>${new Date(e.created_at).toLocaleString()}</td>
</tr>
`

})

document.getElementById("events").innerHTML=html

}

async function ban(id){

await supabase
.from("users")
.update({status:"banned"})
.eq("id",id)

}

async function suspend(id){

await supabase
.from("users")
.update({status:"suspended"})
.eq("id",id)

}

supabase
.channel("users_live")
.on(
"postgres_changes",
{event:"*",schema:"public",table:"users"},
()=>loadUsers()
)
.subscribe()

supabase
.channel("events_live")
.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"platform_events"},
()=>loadEvents()
)
.subscribe()

loadStats()
loadUsers()
loadEvents()

</script>

</body>
</html>
