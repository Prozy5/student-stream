<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Owner Control Room • StudentStreamHQ</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',system-ui;
}

body{
background:#05060a;
color:white;
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:250px;
background:#0b0d14;
padding:25px;
border-right:1px solid rgba(255,255,255,.08);
}

.sidebar h2{
font-size:20px;
margin-bottom:25px;
color:#00ffa6;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin-bottom:15px;
opacity:.7;
}

.sidebar a:hover{
opacity:1;
}

/* Main */

.main{
flex:1;
padding:30px;
}

/* Cards */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:rgba(255,255,255,.04);
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
}

.card h3{
margin-bottom:10px;
font-size:16px;
opacity:.7;
}

.card span{
font-size:28px;
font-weight:800;
}

/* tables */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:14px;
}

button{
background:#00ffa6;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>👑 Owner</h2>

<a href="#">Dashboard</a>
<a href="#">Users</a>
<a href="#">Admins</a>
<a href="#">Modules</a>
<a href="#">Security</a>
<a href="#">AI Lab</a>
<a href="#">System</a>
<a href="#">Settings</a>

</div>

<div class="main">

<h1>Owner Control Room</h1>

<br>

<!-- PLATFORM STATS -->

<div class="grid">

<div class="card">
<h3>Total Users</h3>
<span id="usersCount">0</span>
</div>

<div class="card">
<h3>Admins</h3>
<span id="adminsCount">0</span>
</div>

<div class="card">
<h3>Security Alerts</h3>
<span id="alertsCount">0</span>
</div>

<div class="card">
<h3>Active Modules</h3>
<span id="modulesCount">0</span>
</div>

</div>

<!-- USER CONTROL -->

<h2>User Management</h2>

<table>

<thead>
<tr>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

async function loadStats(){

const { count:users } = await supabase
.from("users")
.select("*",{count:"exact",head:true})

document.getElementById("usersCount").innerText = users

const { data:admins } = await supabase
.from("profiles")
.select("*")
.eq("role","admin")

document.getElementById("adminsCount").innerText = admins.length

const { data:alerts } = await supabase
.from("security_events")
.select("*")

document.getElementById("alertsCount").innerText = alerts.length

const { data:modules } = await supabase
.from("platform_modules")
.select("*")
.eq("status","active")

document.getElementById("modulesCount").innerText = modules.length

}

async function loadUsers(){

const { data } = await supabase
.from("users")
.select("*")
.limit(20)

const table = document.getElementById("usersTable")

table.innerHTML=""

data.forEach(user=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${user.email}</td>
<td>${user.status}</td>

<td>

<button onclick="banUser('${user.id}')">Ban</button>

<button onclick="lockUser('${user.id}')">Lock</button>

<button onclick="suspendUser('${user.id}')">Suspend</button>

</td>
`

table.appendChild(row)

})

}

window.banUser = async function(id){

await supabase.rpc("ban_user",{target:id,reason:"Owner action"})

loadUsers()

}

window.lockUser = async function(id){

await supabase.rpc("lock_user",{target:id,reason:"Owner action"})

loadUsers()

}

window.suspendUser = async function(id){

await supabase.rpc("suspend_user",{target:id,reason:"Owner action"})

loadUsers()

}

loadStats()
loadUsers()

</script>

</body>
</html>
