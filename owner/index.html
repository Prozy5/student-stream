<!DOCTYPE html>
<html>

<head>

<title>StudentStreamHQ Command Center</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
position:fixed;
width:240px;
height:100vh;
background:#020617;
padding:20px;
box-shadow:2px 0 10px rgba(0,0,0,0.4);
}

.logo{
font-size:20px;
font-weight:bold;
color:#22c55e;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px;
margin-bottom:6px;
cursor:pointer;
border-radius:6px;
color:#cbd5f5;
text-decoration:none;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:260px;
padding:30px;
}

h1{
margin-top:0;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.card h3{
margin:0;
font-size:14px;
color:#94a3b8;
}

.card p{
font-size:30px;
margin-top:10px;
}

.table{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

button{
background:#22c55e;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
margin-right:6px;
}

button:hover{
opacity:0.8;
}

.statusbar{
margin-bottom:20px;
}

.status{
padding:5px 10px;
border-radius:6px;
font-size:12px;
margin-right:10px;
}

.online{background:#16a34a}
.warning{background:#ca8a04}
.offline{background:#dc2626}

</style>

</head>

<body>

<a onclick="security()">Security</a>
<a onclick="ai()">AI Lab</a>

<a onclick="settings()">Settings</a>

</div>

<div class="main" id="main">

<h1>StudentStreamHQ Command Center</h1>

</div>

<script>

const SUPABASE_URL="https://iabzmoxzbqzcqgypxctr.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"

const supabase = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

window.onload = function(){
dashboard()
}

async function dashboard(){

const main=document.getElementById("main")

main.innerHTML=`

<div class="statusbar">
<span class="status online">Database</span>
<span class="status online">API</span>
<span class="status warning">AI Workers</span>
</div>

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p id="users">0</p>
</div>

<div class="card">
<h3>Admins</h3>
<p id="admins">0</p>
</div>

<div class="card">
<h3>Modules Online</h3>
<p id="modules">0</p>
</div>

<div class="card">
<h3>Security Alerts</h3>
<p id="alerts">0</p>
</div>

<div class="card">
<h3>AI Tasks</h3>
<p id="ai">0</p>
</div>

<div class="card">
<h3>Active Users</h3>
<p id="active">0</p>
</div>

</div>

<div class="table">

<h2>Recent Platform Events</h2>

<table>

<thead>
<tr>
<th>Event</th>
<th>Module</th>
<th>Time</th>
</tr>
</thead>

<tbody id="events"></tbody>

</table>

</div>
`

let {count:users}=await supabase.from("users").select("*",{count:"exact",head:true})
let {count:admins}=await supabase.from("users").select("*",{count:"exact",head:true}).eq("role","admin")
let {count:modules}=await supabase.from("modules").select("*",{count:"exact",head:true}).eq("status","active")
let {count:alerts}=await supabase.from("security_alerts").select("*",{count:"exact",head:true})

document.getElementById("users").innerText=users||0
document.getElementById("admins").innerText=admins||0
document.getElementById("modules").innerText=modules||0
document.getElementById("alerts").innerText=alerts||0

loadEvents()

}

async function loadEvents(){

let {data}=await supabase
.from("platform_events")
.select("*")
.order("created_at",{ascending:false})
.limit(10)

let html=""

if(data){
data.forEach(e=>{
html+=`
<tr>
<td>${e.event_type}</td>
<td>${e.module}</td>
<td>${new Date(e.created_at).toLocaleString()}</td>
</tr>`
})
}

document.getElementById("events").innerHTML=html

}

async function users(){

const main=document.getElementById("main")

main.innerHTML=`

<h1>User Management</h1>

<div class="table">

<table>

<thead>
<tr>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>
`

let {data}=await supabase.from("users").select("*")

let html=""

if(data){
data.forEach(u=>{
html+=`
<tr>
<td>${u.email}</td>
<td>${u.status}</td>
<td>
<button onclick="ban('${u.id}')">Ban</button>
<button onclick="suspend('${u.id}')">Suspend</button>
</td>
</tr>`
})
}

document.getElementById("userTable").innerHTML=html

}

function settings(){

<h1>Platform Settings</h1>

`

async function ban(id){

await supabase
.from("users")
.update({status:"banned"})
.eq("id",id)

users()

}

async function suspend(id){

await supabase
.from("users")
.update({status:"suspended"})
.eq("id",id)

users()

}

</script>
