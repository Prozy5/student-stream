<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Founder Command Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#04050a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* Sidebar */

.sidebar{
width:260px;
background:#0a0c14;
padding:25px;
border-right:1px solid rgba(255,255,255,.06);
}

.sidebar h1{
font-size:20px;
margin-bottom:25px;
color:#00ffa6;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin-bottom:16px;
opacity:.65;
}

.sidebar a:hover{
opacity:1;
}

/* Main */

.main{
flex:1;
overflow:auto;
padding:30px;
}

h2{
margin-bottom:12px;
}

/* Stat Grid */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:rgba(255,255,255,.03);
padding:20px;
border-radius:14px;
border:1px solid rgba(255,255,255,.06);
}

.card span{
font-size:30px;
font-weight:800;
display:block;
margin-top:5px;
}

/* Tables */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,.08);
}

button{
background:#00ffa6;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-weight:600;
margin-right:5px;
}

.danger{
background:#ff4a4a;
}

</style>

</head>

<body>

<div class="sidebar">

<h1>👑 Founder</h1>

<a href="#">Dashboard</a>
<a href="#">Users</a>
<a href="#">Admins</a>
<a href="#">Modules</a>
<a href="#">Security</a>
<a href="#">AI Lab</a>
<a href="#">System</a>
<a href="#">Emergency</a>

</div>

<div class="main">

<h2>Platform Overview</h2>

<div class="stats">

<div class="card">
Users
<span id="usersCount">0</span>
</div>

<div class="card">
Admins
<span id="adminsCount">0</span>
</div>

<div class="card">
Security Alerts
<span id="alertsCount">0</span>
</div>

<div class="card">
Active Modules
<span id="modulesCount">0</span>
</div>

</div>

<h2>Recent Admin Activity</h2>

<table>

<thead>
<tr>
<th>Admin</th>
<th>Action</th>
<th>Time</th>
</tr>
</thead>

<tbody id="adminLog"></tbody>

</table>

<br><br>

<h2>User Management</h2>

<table>

<thead>
<tr>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

<br><br>

<h2>Emergency Controls</h2>

<button class="danger" onclick="maintenanceMode()">Enable Maintenance Mode</button>

<button class="danger" onclick="lockPlatform()">Lock Platform</button>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

/* LOAD STATS */

async function loadStats(){

const {count:users}=await supabase
.from("users")
.select("*",{count:"exact",head:true})

document.getElementById("usersCount").innerText=users

const {data:admins}=await supabase
.from("profiles")
.select("*")
.eq("role","admin")

document.getElementById("adminsCount").innerText=admins.length

const {data:alerts}=await supabase
.from("security_events")
.select("*")

document.getElementById("alertsCount").innerText=alerts.length

const {data:modules}=await supabase
.from("platform_modules")
.select("*")
.eq("status","active")

document.getElementById("modulesCount").innerText=modules.length

}

/* LOAD USERS */

async function loadUsers(){

const {data}=await supabase
.from("users")
.select("*")
.limit(15)

const table=document.getElementById("usersTable")

table.innerHTML=""

data.forEach(user=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${user.email}</td>
<td>${user.status}</td>

<td>

<button onclick="banUser('${user.id}')">Ban</button>
<button onclick="suspendUser('${user.id}')">Suspend</button>
<button onclick="lockUser('${user.id}')">Lock</button>

</td>
`

table.appendChild(row)

})

}

/* ADMIN LOG */

async function loadAdminLog(){

const {data}=await supabase
.from("admin_actions_log")
.select("*")
.order("created_at",{ascending:false})
.limit(10)

const table=document.getElementById("adminLog")

table.innerHTML=""

data.forEach(log=>{

const row=document.createElement("tr")

row.innerHTML=`

<td>${log.staff_id}</td>
<td>${log.action}</td>
<td>${new Date(log.created_at).toLocaleString()}</td>

`

table.appendChild(row)

})

}

/* USER ACTIONS */

window.banUser=async function(id){

await supabase.rpc("ban_user",{target:id,reason:"Owner action"})
loadUsers()

}

window.suspendUser=async function(id){

await supabase.rpc("suspend_user",{target:id,reason:"Owner action"})
loadUsers()

}

window.lockUser=async function(id){

await supabase.rpc("lock_user",{target:id,reason:"Owner action"})
loadUsers()

}

/* EMERGENCY */

window.maintenanceMode=async function(){

await supabase
.from("platform_settings")
.update({value:"true"})
.eq("key","maintenance_mode")

alert("Maintenance Mode Enabled")

}

window.lockPlatform=async function(){

await supabase
.from("platform_settings")
.update({value:"true"})
.eq("key","platform_lockdown")

alert("Platform Locked")

}

loadStats()
loadUsers()
loadAdminLog()

</script>

</body>
</html>
