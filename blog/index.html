<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>StudentStreamHQ • Debug Newsroom</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
padding:40px;
}

h1{
margin-bottom:20px;
}

#debugBox{
background:#0f172a;
border:1px solid #334155;
padding:20px;
border-radius:16px;
margin-bottom:30px;
white-space:pre-wrap;
line-height:1.7;
overflow:auto;
}

.article{
background:#111827;
padding:20px;
border-radius:16px;
margin-bottom:20px;
border:1px solid #1e293b;
}

.title{
font-size:28px;
font-weight:800;
margin-bottom:10px;
}

.meta{
color:#94a3b8;
font-size:14px;
margin-bottom:16px;
}

.content{
line-height:1.8;
color:#dbe5f3;
}

.error{
color:#f87171;
font-weight:700;
}

.success{
color:#4ade80;
font-weight:700;
}

</style>
</head>

<body>

<h1>StudentStreamHQ Debug Console</h1>

<div id="debugBox">
Starting debug...
</div>

<div id="articles"></div>

<script>

/* DEBUG ELEMENT */

const debugBox =
document.getElementById("debugBox");

function log(message){

console.log(message);

debugBox.innerHTML += `
${message}
`;

}

/* STEP 1 */

log("1. Checking if Supabase library loaded...");

/* CHECK SUPABASE */

if(!window.supabase){

log("❌ ERROR: Supabase library failed to load.");
throw new Error("Supabase missing");

}

log("✅ Supabase library loaded");

/* STEP 2 */

log("\n2. Creating client...");

const supabaseClient =
window.supabase.createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

log("✅ Client created");

/* STEP 3 */

async function testDatabase(){

try{

log("\n3. Testing database connection...");

const {
data,
error
} = await supabaseClient
.from("studentstream_blog_posts")
.select("*");

log("\n4. Raw response received");

if(error){

log(`
❌ DATABASE ERROR:

${JSON.stringify(error,null,2)}
`);

return;

}

log(`
✅ SUCCESS

Articles found: ${data.length}
`);

console.log(data);

if(data.length === 0){

log(`
⚠️ No articles found in database.
`);

return;

}

renderArticles(data);

}catch(err){

log(`
❌ FATAL ERROR:

${err.message}
`);

console.error(err);

}

}

/* RENDER */

function renderArticles(posts){

const articles =
document.getElementById("articles");

articles.innerHTML = "";

posts.forEach(post=>{

articles.innerHTML += `

<div class="article">

<div class="title">
${post.title || "Untitled"}
</div>

<div class="meta">
${post.created_at || ""}
</div>

<div class="content">
${post.content || ""}
</div>

</div>

`;

});

log(`
✅ Articles rendered successfully.
`);

}

/* START */

testDatabase();

</script>

</body>
</html>
