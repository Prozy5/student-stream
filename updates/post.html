<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Article</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:#020617;
  color:#e6edf3;
  padding:20px;
}

/* HEADER */
.header{
  max-width:900px;
  margin:auto;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:18px;
  font-weight:700;
  color:#3b82f6;
}

/* BACK */
.back{
  max-width:900px;
  margin:10px auto 20px;
  color:#3b82f6;
  cursor:pointer;
  font-size:13px;
  transition:.2s;
}

.back:hover{opacity:.7;}

/* ARTICLE */
.article{
  max-width:900px;
  margin:auto;
  background:#010409;
  border:1px solid #1f2933;
  border-radius:16px;
  padding:28px;
  animation:fadeIn .4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* TEXT */
.title{
  font-size:28px;
  font-weight:800;
  margin-bottom:12px;
}

.meta{
  font-size:13px;
  color:#9ca3af;
  margin-bottom:25px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

/* BADGE */
.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.critical{background:#2c0a0a;color:#ef4444;}
.update{background:#0a1f2c;color:#3b82f6;}
.info{background:#022c22;color:#22c55e;}

/* CONTENT */
.content{
  line-height:1.8;
  color:#cbd5e1;
  font-size:16px;
}

/* PARAGRAPHS */
.content p{
  margin-bottom:18px;
}

/* HEADINGS AUTO */
.content p:first-child{
  font-size:17px;
  font-weight:500;
}

/* DIVIDER */
.divider{
  height:1px;
  background:#1f2933;
  margin:25px 0;
}

/* STATES */
.center{
  text-align:center;
  margin-top:60px;
  color:#9ca3af;
}

/* MOBILE */
@media(max-width:600px){
  .article{padding:20px;}
  .title{font-size:24px;}
  .content{font-size:15px;}
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">StudentStreamHQ</div>
</div>

<div class="back" onclick="goBack()">← Back to Updates</div>

<div class="article" id="article">
  <div class="center">Loading article...</div>
</div>

<script>

// 🔌 SUPABASE
const supabase = window.supabase.createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

// GET ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const articleEl = document.getElementById("article");

/* DATE */
function formatDate(dateString){
  const date = new Date(dateString);
  return date.toLocaleDateString("en-US", {
    year:"numeric",
    month:"long",
    day:"numeric"
  });
}

/* TAG */
function getTagClass(tag){
  if(!tag) return "update";
  const t = tag.toLowerCase();
  if(t.includes("critical")) return "critical";
  if(t.includes("info")) return "info";
  return "update";
}

/* FORMAT CONTENT */
function formatContent(text){
  if(!text) return "";

  const paragraphs = text.split("\n\n");

  return paragraphs.map(p=>{
    if(p.trim() === "---"){
      return `<div class="divider"></div>`;
    }
    return `<p>${p.replace(/\n/g,"<br>")}</p>`;
  }).join("");
}

/* LOAD */
async function loadArticle(){

  if(!id){
    articleEl.innerHTML = `<div class="center">Invalid article.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !data){
    articleEl.innerHTML = `<div class="center">Article not found.</div>`;
    console.error(error);
    return;
  }

  const tagClass = getTagClass(data.tag);

  articleEl.innerHTML = `
    <div class="title">${data.title}</div>

    <div class="meta">
      ${formatDate(data.created_at)}
      • StudentStream HQ
      <span class="badge ${tagClass}">
        ${data.tag || "Update"}
      </span>
    </div>

    <div class="content">
      ${formatContent(data.content)}
    </div>
  `;
}

/* BACK */
function goBack(){
  window.location.href = "/updates/index.html";
}

loadArticle();

</script>

</body>
</html>
