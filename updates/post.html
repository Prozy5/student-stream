<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Article</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:#020617;color:#e6edf3;padding:20px;}

.header{max-width:900px;margin:auto;margin-bottom:20px;}
.logo{font-size:20px;color:#3b82f6;}

.back{
  max-width:900px;
  margin:auto;
  margin-bottom:10px;
  color:#3b82f6;
  cursor:pointer;
  font-size:13px;
}

.article{
  max-width:900px;
  margin:auto;
  background:#010409;
  border:1px solid #1f2933;
  border-radius:12px;
  padding:25px;
}

/* CONTENT */
.title{font-size:26px;margin-bottom:10px;}
.meta{font-size:12px;color:#9ca3af;margin-bottom:20px;}

.badge{
  padding:3px 8px;
  border-radius:6px;
  margin-left:10px;
  font-size:11px;
}

/* TAG COLORS */
.critical{background:#2c0a0a;color:#ef4444;}
.update{background:#0a1f2c;color:#3b82f6;}
.info{background:#022c22;color:#22c55e;}

.content{
  line-height:1.7;
  color:#cbd5e1;
  font-size:15px;
}

.content p{margin-bottom:16px;}

.divider{
  height:1px;
  background:#1f2933;
  margin:20px 0;
}

/* STATES */
.center{
  text-align:center;
  margin-top:50px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">StudentStreamHQ • System Updates</div>
</div>

<div class="back" onclick="goBack()">← Back to Updates</div>

<div class="article" id="article">
  <div class="center">Loading article...</div>
</div>

<script>

// 🔌 SUPABASE INIT
const supabase = window.supabase.createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

// GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const articleEl = document.getElementById("article");

// FORMAT DATE
function formatDate(dateString){
  const date = new Date(dateString);
  return date.toLocaleDateString("en-US", {
    year:"numeric",
    month:"long",
    day:"numeric"
  });
}

// TAG STYLE
function getTagClass(tag){
  if(!tag) return "update";
  const t = tag.toLowerCase();
  if(t.includes("critical")) return "critical";
  if(t.includes("info")) return "info";
  return "update";
}

// FORMAT CONTENT INTO HTML
function formatContent(text){
  if(!text) return "";

  // Split paragraphs
  const paragraphs = text.split("\n\n");

  return paragraphs.map(p=>{
    if(p.trim() === "---"){
      return `<div class="divider"></div>`;
    }
    return `<p>${p.replace(/\n/g,"<br>")}</p>`;
  }).join("");
}

// LOAD ARTICLE
async function loadArticle(){
  if(!id){
    articleEl.innerHTML = `<div class="center">Invalid article.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !data){
    articleEl.innerHTML = `<div class="center">Article not found.</div>`;
    console.error(error);
    return;
  }

  const tagClass = getTagClass(data.tag);

  articleEl.innerHTML = `
    <div class="title">${data.title}</div>
    <div class="meta">
      ${formatDate(data.created_at)} • Internal Systems
      <span class="badge ${tagClass}">${data.tag || "Update"}</span>
    </div>
    <div class="content">
      ${formatContent(data.content)}
    </div>
  `;
}

// BACK NAV
function goBack(){
  window.location.href = "/updates/index.html";
}

// INIT
loadArticle();

</script>

</body>
</html>
