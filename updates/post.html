<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Article</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:#020617;color:#e6edf3;padding:20px;}

.header{max-width:900px;margin:auto;margin-bottom:20px;}
.logo{font-size:20px;color:#3b82f6;}

.back{
  max-width:900px;
  margin:auto;
  margin-bottom:10px;
  color:#3b82f6;
  cursor:pointer;
  font-size:13px;
}

.article{
  max-width:900px;
  margin:auto;
  background:#010409;
  border:1px solid #1f2933;
  border-radius:12px;
  padding:25px;
}

.title{font-size:26px;margin-bottom:10px;}
.meta{font-size:12px;color:#9ca3af;margin-bottom:20px;}

.badge{
  background:#2c0a0a;
  color:#ef4444;
  padding:3px 8px;
  border-radius:6px;
  margin-left:10px;
}

.content{line-height:1.7;color:#cbd5e1;font-size:15px;}
.content p{margin-bottom:16px;}

.divider{height:1px;background:#1f2933;margin:20px 0;}

</style>
</head>

<body>

<div class="header">
  <div class="logo">StudentStreamHQ • System Updates</div>
</div>

<div class="back" onclick="goBack()">← Back to Updates</div>

<div class="article" id="article"></div>

<script>

// GET ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// TEMP DATABASE
const posts = {
  1: {
    title:"StudentStreamHQ Launch Delayed Following Data Outage",
    date:"April 5, 2026 • Internal Systems",
    tag:"Critical Incident",
    content:`
      <p>StudentStreamHQ has officially delayed its platform launch following a critical data outage that occurred earlier last month. The incident impacted core infrastructure systems and resulted in the loss of essential platform data required for deployment.</p>

      <p>Initial investigations traced the disruption to backend systems associated with our primary server infrastructure located in North Virginia. However, despite extensive diagnostics and internal review processes, no definitive root cause has been identified at this time.</p>

      <p>Engineering teams conducted a full analysis across system logs, network activity, and database structures. The outage appears to have occurred without a clear trigger, leaving no direct traceable failure point within the system. This has significantly delayed recovery efforts.</p>

      <div class="divider"></div>

      <p>Due to the inability to isolate the origin of the failure, StudentStreamHQ has made the decision to fully rebuild its platform infrastructure from the ground up.</p>

      <p>Teams are currently working to determine:<br>
      • The exact time of the outage<br>
      • The location and system layer affected<br>
      • Any potential vulnerabilities within the North Virginia server environment</p>

      <p>At this stage, the root cause of the outage remains unknown.</p>

      <div class="divider"></div>

      <p>While this has resulted in a delay of the official launch, the rebuild process is expected to produce a more stable and secure version moving forward.</p>

      <p>Further updates will be provided as new findings emerge.</p>
    `
  }
};

// LOAD ARTICLE
const article = posts[id];

document.getElementById("article").innerHTML = `
  <div class="title">${article.title}</div>
  <div class="meta">${article.date} <span class="badge">${article.tag}</span></div>
  <div class="content">${article.content}</div>
`;

function goBack(){
  window.location.href = "/updates/index.html";
}

</script>

</body>
</html>
