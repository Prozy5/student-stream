<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Updates</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:#020617;
  color:#e6edf3;
  padding:20px;
}

/* HEADER */
.header{
  max-width:900px;
  margin:auto;
  margin-bottom:30px;
}

.logo{
  font-size:22px;
  font-weight:800;
  color:#3b82f6;
}

.sub{
  font-size:13px;
  color:#9ca3af;
}

/* FEED */
.feed{
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* CARD */
.card{
  background:#010409;
  border:1px solid #1f2933;
  border-radius:14px;
  padding:20px;
  cursor:pointer;
  transition:0.25s ease;
}

.card:hover{
  border-color:#3b82f6;
  transform:translateY(-3px) scale(1.01);
}

/* FEATURED */
.card.featured{
  border:1px solid #3b82f6;
  box-shadow:0 0 20px rgba(59,130,246,0.15);
}

/* TEXT */
.title{font-size:20px;font-weight:700;margin-bottom:8px;}
.meta{font-size:12px;color:#9ca3af;margin-bottom:10px;display:flex;gap:8px;}
.preview{color:#cbd5e1;font-size:14px;line-height:1.5;}

/* BADGES */
.badge{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;}
.critical{background:#2c0a0a;color:#ef4444;}
.update{background:#0a1f2c;color:#3b82f6;}
.info{background:#022c22;color:#22c55e;}

/* STATES */
.center{text-align:center;margin-top:60px;color:#9ca3af;}

/* LOADING */
.skeleton{
  height:90px;
  border-radius:14px;
  background:linear-gradient(90deg,#0a0f1a,#111827,#0a0f1a);
  background-size:200% 100%;
  animation:loading 1.2s infinite;
}

@keyframes loading{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* DEBUG PANEL */
.debug{
  max-width:900px;
  margin:20px auto;
  padding:12px;
  border-radius:10px;
  background:#111827;
  font-size:12px;
  color:#9ca3af;
  line-height:1.4;
  white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">StudentStreamHQ • Updates</div>
  <div class="sub">System Reports • Platform Growth</div>
</div>

<div id="debug" class="debug">🔍 Debug loading...</div>

<div class="feed" id="feed">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<script>

console.log("🚀 Script started");

const debugBox = document.getElementById("debug");
const feed = document.getElementById("feed");

function log(msg){
  console.log(msg);
  debugBox.textContent += "\n" + msg;
}

// 🔌 SUPABASE INIT
let supabase;

try {
  supabase = window.supabase.createClient(
    "https://iabzmoxzbqzcqgypxctr.supabase.co",
    "PUT_REAL_KEY_HERE"
  );
  log("✅ Supabase client created");
} catch(e){
  log("❌ Supabase init failed: " + e.message);
}

// ⏱️ TIMEOUT WRAPPER
function timeout(ms){
  return new Promise((_, reject)=>
    setTimeout(()=>reject(new Error("Request timeout")), ms)
  );
}

// 📡 LOAD POSTS
async function loadPosts(){

  log("📡 Fetching posts...");

  try {

    const query = supabase
      .from("posts")
      .select("*")
      .eq("status","published")
      .order("created_at",{ ascending:false });

    const result = await Promise.race([
      query,
      timeout(8000)
    ]);

    log("📦 Response received");

    const { data, error } = result;

    if(error){
      log("❌ ERROR: " + error.message);
      feed.innerHTML = `<div class="center">Error loading data</div>`;
      return;
    }

    if(!data || data.length === 0){
      log("⚠️ No data returned");
      feed.innerHTML = `<div class="center">No updates yet</div>`;
      return;
    }

    log("✅ Posts loaded: " + data.length);

    feed.innerHTML = "";

    data.forEach((post,index)=>{

      const card = document.createElement("div");
      card.className = "card";

      if(index === 0) card.classList.add("featured");

      card.innerHTML = `
        <div class="title">${post.title}</div>
        <div class="meta">${new Date(post.created_at).toLocaleDateString()}</div>
        <div class="preview">${post.preview || ""}</div>
      `;

      feed.appendChild(card);
    });

  } catch(err){
    log("💥 CRASH: " + err.message);
    feed.innerHTML = `<div class="center">Crash occurred</div>`;
  }

}

// 🚀 RUN
loadPosts();

</script>
