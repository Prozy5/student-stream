<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Updates (Debug)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:#020617;color:#e6edf3;padding:20px;}

.header{max-width:900px;margin:auto;margin-bottom:20px;}
.logo{font-size:22px;font-weight:700;color:#3b82f6;}
.sub{font-size:13px;color:#9ca3af;}

.feed{max-width:900px;margin:auto;}

.card{
  background:#010409;
  border:1px solid #1f2933;
  border-radius:12px;
  padding:20px;
  margin-bottom:15px;
  cursor:pointer;
}

.title{font-size:20px;margin-bottom:8px;}
.meta{font-size:12px;color:#9ca3af;margin-bottom:10px;}
.preview{color:#cbd5e1;font-size:14px;}

.center{
  text-align:center;
  margin-top:50px;
  color:#9ca3af;
}

/* DEBUG PANEL */
.debug{
  max-width:900px;
  margin:30px auto;
  background:#000;
  border:1px solid #333;
  padding:15px;
  font-size:12px;
  white-space:pre-wrap;
  color:#22c55e;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">StudentStreamHQ • Updates (Debug Mode)</div>
  <div class="sub">Live Debugging Enabled</div>
</div>

<div class="feed" id="feed">
  <div class="center">Loading updates...</div>
</div>

<div class="debug" id="debug">Starting debug...</div>

<script>

// 🔌 INIT SUPABASE
const supabase = window.supabase.createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const feed = document.getElementById("feed");
const debug = document.getElementById("debug");

// DEBUG LOGGER
function log(msg){
  console.log(msg);
  debug.textContent += "\n" + JSON.stringify(msg, null, 2);
}

// FORMAT DATE
function formatDate(dateString){
  const date = new Date(dateString);
  return date.toLocaleDateString();
}

// LOAD POSTS
async function loadPosts(){
  log("🚀 Fetching posts...");

  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  log({ data, error });

  if(error){
    feed.innerHTML = `<div class="center">❌ Error loading updates</div>`;
    log("❌ ERROR FOUND");
    return;
  }

  if(!data || data.length === 0){
    feed.innerHTML = `<div class="center">⚠️ No posts found</div>`;
    log("⚠️ EMPTY DATA");
    return;
  }

  feed.innerHTML = "";

  data.forEach(post=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${post.title}</div>
      <div class="meta">${formatDate(post.created_at)}</div>
      <div class="preview">${post.preview || "No preview"}</div>
    `;

    feed.appendChild(card);
  });

  log("✅ POSTS RENDERED");
}

// RUN
loadPosts();

</script>

</body>
</html>
