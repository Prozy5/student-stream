<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Updates</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:#020617;color:#e6edf3;padding:20px;}

.header{max-width:900px;margin:auto;margin-bottom:30px;}
.logo{font-size:22px;font-weight:700;color:#3b82f6;}
.sub{font-size:13px;color:#9ca3af;}

.feed{max-width:900px;margin:auto;}

.card{
  background:#010409;
  border:1px solid #1f2933;
  border-radius:12px;
  padding:20px;
  margin-bottom:15px;
  cursor:pointer;
}

.title{font-size:20px;margin-bottom:8px;}
.meta{font-size:12px;color:#9ca3af;margin-bottom:10px;}
.preview{color:#cbd5e1;font-size:14px;}

.badge{padding:3px 8px;border-radius:6px;margin-left:10px;font-size:11px;}
.critical{background:#2c0a0a;color:#ef4444;}
.update{background:#0a1f2c;color:#3b82f6;}
.info{background:#022c22;color:#22c55e;}

.center{text-align:center;margin-top:50px;color:#9ca3af;}
.error{color:#ef4444;font-size:13px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">StudentStreamHQ • Updates</div>
  <div class="sub">System Reports & Platform Status</div>
</div>

<div class="feed" id="feed">
  <div class="center">Loading updates...</div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const feed = document.getElementById("feed");

function formatDate(dateString){
  return new Date(dateString).toLocaleDateString("en-US", {
    year:"numeric", month:"long", day:"numeric"
  });
}

function getTagClass(tag){
  if(!tag) return "update";
  tag = tag.toLowerCase();
  if(tag.includes("critical")) return "critical";
  if(tag.includes("info")) return "info";
  return "update";
}

async function loadPosts(){
  try {

    const { data, error } = await supabase
      .from("posts")
      .select("*")
      .order("created_at",{ ascending:false });

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if(error){
      feed.innerHTML = `
        <div class="center">
          Failed to load updates
          <div class="error">${error.message}</div>
        </div>`;
      return;
    }

    if(!data || data.length === 0){
      feed.innerHTML = `
        <div class="center">
          No posts found
          <div class="error">Check if your table has data</div>
        </div>`;
      return;
    }

    feed.innerHTML = "";

    data.forEach(post=>{
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = ()=>openPost(post.id);

      card.innerHTML = `
        <div class="title">${post.title}</div>
        <div class="meta">
          ${formatDate(post.created_at)}
          <span class="badge ${getTagClass(post.tag)}">${post.tag || "Update"}</span>
        </div>
        <div class="preview">${post.preview || ""}</div>
      `;

      feed.appendChild(card);
    });

  } catch(err){
    feed.innerHTML = `
      <div class="center">
        System error
        <div class="error">${err.message}</div>
      </div>`;
  }
}

function openPost(id){
  window.location.href = "/updates/post.html?id=" + id;
}

loadPosts();

</script>

</body>
</html>
