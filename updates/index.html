<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudentStreamHQ • Updates</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:#020617;
  color:#e6edf3;
  padding:20px;
}

/* HEADER */
.header{
  max-width:900px;
  margin:auto;
  margin-bottom:30px;
}

.logo{
  font-size:22px;
  font-weight:800;
  color:#3b82f6;
}

.sub{
  font-size:13px;
  color:#9ca3af;
}

/* FEED */
.feed{
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* CARD */
.card{
  background:#010409;
  border:1px solid #1f2933;
  border-radius:14px;
  padding:20px;
  cursor:pointer;
  transition:0.25s ease;
}

.card:hover{
  border-color:#3b82f6;
  transform:translateY(-3px) scale(1.01);
}

/* FEATURED FIRST CARD */
.card.featured{
  border:1px solid #3b82f6;
  background:linear-gradient(180deg,#010409,#020617);
  box-shadow:0 0 20px rgba(59,130,246,0.15);
}

/* TEXT */
.title{
  font-size:20px;
  font-weight:700;
  margin-bottom:8px;
}

.meta{
  font-size:12px;
  color:#9ca3af;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}

.preview{
  color:#cbd5e1;
  font-size:14px;
  line-height:1.5;
}

/* BADGES */
.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

/* TAG COLORS */
.critical{background:#2c0a0a;color:#ef4444;}
.update{background:#0a1f2c;color:#3b82f6;}
.info{background:#022c22;color:#22c55e;}

/* STATES */
.center{
  text-align:center;
  margin-top:60px;
  color:#9ca3af;
}

/* LOADING SKELETON */
.skeleton{
  height:90px;
  border-radius:14px;
  background:linear-gradient(90deg,#0a0f1a,#111827,#0a0f1a);
  background-size:200% 100%;
  animation:loading 1.2s infinite;
}

@keyframes loading{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* MOBILE */
@media(max-width:600px){
  .title{font-size:18px;}
  .card{padding:16px;}
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">StudentStreamHQ • Updates</div>
  <div class="sub">System Reports • Partnerships • Platform Growth</div>
</div>

<div class="feed" id="feed">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<script>

// 🔌 SUPABASE
const supabase = window.supabase.createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "YOUR_PUBLIC_ANON_KEY"
);

const feed = document.getElementById("feed");

/* DATE FORMAT */
function formatDate(dateString){
  const date = new Date(dateString);
  return date.toLocaleDateString("en-US", {
    year:"numeric",
    month:"short",
    day:"numeric"
  });
}

/* TAG STYLE */
function getTagClass(tag){
  if(!tag) return "update";
  const t = tag.toLowerCase();
  if(t.includes("critical")) return "critical";
  if(t.includes("info")) return "info";
  return "update";
}

/* LOAD POSTS */
async function loadPosts(){

  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .eq("status","published")
    .order("created_at",{ ascending:false });

  if(error){
    feed.innerHTML = `<div class="center">⚠️ Failed to load updates.</div>`;
    console.error(error);
    return;
  }

  if(!data || data.length === 0){
    feed.innerHTML = `<div class="center">No updates yet.</div>`;
    return;
  }

  feed.innerHTML = "";

  data.forEach((post,index)=>{

    const tagClass = getTagClass(post.tag);

    const card = document.createElement("div");
    card.className = "card";

    if(index === 0){
      card.classList.add("featured");
    }

    card.onclick = () => openPost(post.id);

    card.innerHTML = `
      <div class="title">${post.title}</div>

      <div class="meta">
        ${formatDate(post.created_at)}
        <span class="badge ${tagClass}">
          ${post.tag || "Update"}
        </span>
      </div>

      <div class="preview">
        ${post.preview || "No preview available."}
      </div>
    `;

    feed.appendChild(card);
  });

}

/* NAV */
function openPost(id){
  window.location.href = "/updates/post.html?id=" + id;
}

/* INIT */
loadPosts();

</script>

</body>
</html>
