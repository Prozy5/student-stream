<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudentStream Law Division</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="/js/platform-guard.js"></script>

<style>
:root{
  --bg:#05080f;
  --panel:#0c1626;
  --panel2:#101f35;
  --accent:#ff5d5d;
  --accent2:#ff2f2f;
  --text:#eaf1ff;
  --muted:#9fb0cc;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:radial-gradient(circle at top,#0c1b33,#05080f 75%);
  color:var(--text);
}

/* STATUS BAR */
.statusBar{
  text-align:center;
  padding:8px;
  font-size:12px;
  background:linear-gradient(90deg,#091426,#05080f);
  border-bottom:1px solid var(--border);
  color:var(--muted);
}
.statusDot{
  display:inline-block;
  width:8px;height:8px;
  border-radius:50%;
  background:#00ff9d;
  margin-right:6px;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 26px;
  background:rgba(10,20,40,.85);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}

.brand{
  font-weight:950;
  font-size:16px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* HERO */
.hero{
  max-width:1120px;
  margin:auto;
  padding:85px 22px 55px;
  text-align:center;
  animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.hero h1{
  font-size:56px;
  font-weight:990;
}

.hero span{color:var(--accent);}

.hero p{
  max-width:880px;
  margin:18px auto;
  color:var(--muted);
}

/* METRICS ANIMATION */
.metricCard h2{
  font-size:26px;
  font-weight:990;
  margin-top:6px;
  transition:.3s;
}

/* ACTIVITY FEED */
.activityFeed{
  margin:40px auto 0;
  max-width:880px;
  text-align:left;
}

.activityItem{
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:10px;
  background:rgba(255,255,255,.02);
  font-size:13px;
  color:var(--muted);
}

/* SECURITY BADGE */
.security{
  margin-top:20px;
  font-size:12px;
  color:var(--muted);
}
.security strong{
  color:var(--accent);
}

/* (keep all your original styles below unchanged) */
</style>
</head>

<body>

<div class="statusBar">
<span class="statusDot"></span>
System Status: All Enforcement Systems Operational
</div>

<!-- KEEP YOUR NAV + HERO EXACTLY -->
<!-- (your original HTML stays the same here) -->

<!-- ADD THIS UNDER METRICS -->
<div class="activityFeed" id="activityFeed">
<h3 style="margin-bottom:10px;">📂 Recent Activity</h3>

<div class="activityItem">Loading activity...</div>
</div>

<div class="security">
Security Level: <strong>Internal Enforcement Access Only</strong>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

/* METRICS */
async function loadMetrics(){

  const { count:reports } = await supabase
    .from("law_cases")
    .select("*", { count:"exact", head:true });

  const { count:assigned } = await supabase
    .from("law_cases")
    .select("*", { count:"exact", head:true })
    .not("assigned_to", "is", null);

  animateNumber("metricReports", reports || 0);
  animateNumber("metricAssigned", assigned || 0);
}

/* ANIMATION */
function animateNumber(id, value){
  let el=document.getElementById(id)
  let count=0
  let step=Math.ceil(value/20)

  let interval=setInterval(()=>{
    count+=step
    if(count>=value){
      el.textContent=value
      clearInterval(interval)
    }else{
      el.textContent=count
    }
  },30)
}

/* ACTIVITY FEED */
async function loadActivity(){
  const { data } = await supabase
    .from("law_cases")
    .select("created_at, status")
    .order("created_at",{ascending:false})
    .limit(5);

  const feed=document.getElementById("activityFeed")
  feed.innerHTML="<h3>📂 Recent Activity</h3>"

  data?.forEach(c=>{
    const item=document.createElement("div")
    item.className="activityItem"
    item.textContent=`Case ${c.status} • ${new Date(c.created_at).toLocaleString()}`
    feed.appendChild(item)
  })
}

/* STAFF DETECT */
async function detectStaff(){
  const { data:{user} } = await supabase.auth.getUser();
  if(!user) return;

  const { data:profile } = await supabase
    .from("profiles")
    .select("law_rank")
    .eq("id", user.id)
    .single();

  if(profile?.law_rank && profile.law_rank !== "none"){
    document.getElementById("staffPanel").style.display="block";
  }
}

/* INIT */
loadMetrics();
loadActivity();
detectStaff();
</script>

</body>
</html>
