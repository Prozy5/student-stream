<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Studios Library</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
/* SAME DESIGN (kept yours but polished slightly) */
:root{
  --bg:#04070d;
  --card:#0c1424;
  --accent:#6c5cff;
  --text:#eef2ff;
  --muted:#8b9ab5;
  --border:rgba(255,255,255,.08);
}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  margin:0;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 25px;
  border-bottom:1px solid var(--border);
}

.logo{font-weight:900;font-size:22px;}
.logo span{color:var(--accent)}

/* GRID */
.grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{transform:scale(1.05)}

.cover{
  height:160px;
  background:#111;
}

.cardContent{padding:10px}

.title{font-weight:700;font-size:14px;}
.author{font-size:12px;color:var(--muted);}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:12px;
}

.like{cursor:pointer}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalContent{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">SS <span>Studios</span></div>
  <div>📚 Library</div>
</nav>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modalContent" id="modalContent"></div>
</div>

<script>
/* 🔌 CONNECT SUPABASE */
const supabase = window.supabase.createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

let currentUser = null;

/* 🔐 GET USER */
async function getUser(){
  const { data } = await supabase.auth.getUser();
  currentUser = data.user;
}
getUser();

/* 📚 FETCH PROJECTS */
async function fetchProjects(){
  const { data, error } = await supabase
    .from("projects")
    .select(`
      *,
      profiles(username),
      project_stats(likes, views)
    `)
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  render(data);
}

/* 🎨 RENDER */
function render(items){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  items.forEach(item=>{
    const el = document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <div class="cover" style="background:url('${item.cover_url || ""}') center/cover"></div>
      <div class="cardContent">
        <div class="title">${item.title}</div>
        <div class="author">@${item.profiles?.username || "unknown"}</div>
        <div class="actions">
          <span class="like" onclick="like(event,'${item.id}')">❤️ ${item.project_stats?.likes || 0}</span>
          <span>👁 ${item.project_stats?.views || 0}</span>
        </div>
      </div>
    `;

    el.onclick=()=>openModal(item);

    grid.appendChild(el);
  });
}

/* ❤️ LIKE SYSTEM */
async function like(e, projectId){
  e.stopPropagation();

  if(!currentUser){
    alert("Login first");
    return;
  }

  const { error } = await supabase
    .from("likes")
    .insert({
      user_id: currentUser.id,
      project_id: projectId
    });

  if(error){
    console.log("Already liked or error");
  }

  fetchProjects();
}

/* 👀 VIEW TRACK */
async function addView(projectId){
  if(!currentUser) return;

  await supabase
    .from("views")
    .insert({
      user_id: currentUser.id,
      project_id: projectId
    });
}

/* 📖 MODAL */
function openModal(item){
  document.getElementById("modal").style.display="flex";

  addView(item.id);

  document.getElementById("modalContent").innerHTML=`
    <h2>${item.title}</h2>
    <p>@${item.profiles?.username}</p>
    <p style="margin-top:10px;color:gray;">
      ${item.description || "No description yet."}
    </p>
  `;
}

modal.onclick=()=>modal.style.display="none";

/* 🚀 INIT */
fetchProjects();
</script>

</body>
</html>
