<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS Studios Library</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#02040a;
  --card:rgba(255,255,255,.05);
  --accent:#6c5cff;
  --text:#eef2ff;
  --muted:#8b9ab5;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 25px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
  font-weight:900;
  font-size:22px;
}

.logo span{color:var(--accent)}

/* SEARCH */
.search{
  padding:15px 20px;
}

.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:white;
}

/* ROWS */
.section{
  padding:10px 20px;
}

.sectionTitle{
  font-weight:800;
  margin-bottom:10px;
}

.row{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

/* BOOK CARD */
.book{
  min-width:140px;
  cursor:pointer;
}

.cover{
  height:200px;
  border-radius:12px;
  background:#111;
  margin-bottom:6px;
}

.title{
  font-size:13px;
  font-weight:700;
}

.author{
  font-size:11px;
  color:var(--muted);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  background:black;
  overflow:auto;
}

.reader{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.readBtn{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:white;
  font-weight:800;
}
</style>
</head>

<body>

<nav>
  <div class="logo">SS <span>Library</span></div>
</nav>

<div class="search">
  <input id="search" placeholder="Search books...">
</div>

<!-- CONTINUE -->
<div class="section">
  <div class="sectionTitle">Continue Reading</div>
  <div class="row" id="continueRow"></div>
</div>

<!-- TRENDING -->
<div class="section">
  <div class="sectionTitle">🔥 Trending</div>
  <div class="row" id="trendingRow"></div>
</div>

<!-- NEW -->
<div class="section">
  <div class="sectionTitle">🆕 New Releases</div>
  <div class="row" id="newRow"></div>
</div>

<!-- ALL -->
<div class="section">
  <div class="sectionTitle">📚 Library</div>
  <div class="row" id="allRow"></div>
</div>

<!-- MODAL READER -->
<div class="modal" id="modal">
  <div class="reader" id="reader"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://iabzmoxzbqzcqgypxctr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

let all=[];

/* FETCH */
async function load(){
  const { data } = await supabase
    .from("projects")
    .select(`*, profiles(username), project_stats(likes, views)`)
    .order("created_at",{ascending:false});

  all=data||[];

  renderRow(allRow, all);
  renderRow(newRow, all.slice(0,10));
  renderTrending(all);
  renderContinue();
}

/* RENDER ROW */
function renderRow(container, items){
  container.innerHTML="";
  items.forEach(item=>{
    const el=document.createElement("div");
    el.className="book";

    el.innerHTML=`
      <div class="cover" style="background:url('${item.cover_url||""}') center/cover"></div>
      <div class="title">${item.title}</div>
      <div class="author">@${item.profiles?.username||"user"}</div>
    `;

    el.onclick=()=>openReader(item);

    container.appendChild(el);
  });
}

/* TRENDING */
function renderTrending(items){
  const sorted=[...items].sort((a,b)=>
    (b.project_stats?.views||0)-(a.project_stats?.views||0)
  );

  renderRow(trendingRow, sorted.slice(0,10));
}

/* CONTINUE */
function renderContinue(){
  const saved=JSON.parse(localStorage.getItem("continue")||"[]");
  const items=all.filter(i=>saved.includes(i.id));
  renderRow(continueRow, items);
}

/* SEARCH */
search.addEventListener("input",e=>{
  const v=e.target.value.toLowerCase();
  renderRow(allRow, all.filter(i=>i.title.toLowerCase().includes(v)));
});

/* OPEN READER */
function openReader(item){
  modal.style.display="block";

  saveContinue(item.id);

  reader.innerHTML=`
    <h1>${item.title}</h1>
    <p>@${item.profiles?.username}</p>
    <p style="margin-top:15px;color:gray;">
      ${item.description||"Start reading..."}
    </p>

    <button class="readBtn">Start Reading</button>
  `;
}

/* SAVE CONTINUE */
function saveContinue(id){
  let list=JSON.parse(localStorage.getItem("continue")||"[]");
  if(!list.includes(id)){
    list.unshift(id);
    localStorage.setItem("continue",JSON.stringify(list.slice(0,10)));
  }
}

/* CLOSE */
modal.onclick=()=>modal.style.display="none";

/* INIT */
load();
</script>

</body>
</html>
