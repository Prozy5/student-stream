<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Studios Library</title>

<style>
:root{
  --bg:#04070d;
  --card:#0c1424;
  --accent:#6c5cff;
  --accent2:#9b8cff;
  --text:#eef2ff;
  --muted:#8b9ab5;
  --border:rgba(255,255,255,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 25px;
  border-bottom:1px solid var(--border);
}

.logo{font-weight:900;font-size:22px;}
.logo span{color:var(--accent)}

.hero{
  padding:25px;
}

.featured{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.featureCard{
  min-width:260px;
  height:150px;
  border-radius:16px;
  background:linear-gradient(135deg,#6c5cff,#000);
  padding:15px;
  display:flex;
  align-items:flex-end;
  font-weight:700;
}

/* SEARCH */
.search{
  padding:15px 20px;
}
.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:white;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  padding:0 20px 10px;
  overflow-x:auto;
}
.tab{
  padding:8px 14px;
  border-radius:999px;
  background:var(--card);
  cursor:pointer;
}
.tab.active{
  background:var(--accent);
}

/* GRID */
.grid{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{
  transform:scale(1.05);
}

.cover{
  height:160px;
  background:linear-gradient(#222,#000);
}

.cardContent{
  padding:10px;
}

.title{font-weight:700;font-size:14px;}
.author{font-size:12px;color:var(--muted);}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.like{
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalContent{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

/* BUTTON */
.createBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:15px 20px;
  border-radius:999px;
  border:none;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<nav>
  <div class="logo">SS <span>Studios</span></div>
  <div>📚 Library</div>
</nav>

<section class="hero">
  <div class="featured">
    <div class="featureCard">🔥 Midnight School</div>
    <div class="featureCard">🚀 Lost Signals</div>
  </div>
</section>

<div class="search">
  <input id="search" placeholder="Search...">
</div>

<div class="tabs">
  <div class="tab active" onclick="filter('all')">All</div>
  <div class="tab" onclick="filter('comic')">Comics</div>
  <div class="tab" onclick="filter('book')">Books</div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modalContent" id="modalContent"></div>
</div>

<button class="createBtn">+ Create</button>

<script>
const data = [
  {title:"Midnight School", author:"@user1", type:"comic"},
  {title:"Street Legends", author:"@creator", type:"book"},
  {title:"Lost Signals", author:"@alex", type:"comic"}
];

const grid = document.getElementById("grid");

function render(items){
  grid.innerHTML = "";
  items.forEach(item=>{
    const el = document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <div class="cover"></div>
      <div class="cardContent">
        <div class="title">${item.title}</div>
        <div class="author">${item.author}</div>
        <div class="actions">
          <span class="like" onclick="like(event)">❤️</span>
          <span>👁</span>
        </div>
      </div>
    `;
    el.onclick=()=>openModal(item);
    grid.appendChild(el);
  });
}

render(data);

/* FILTER */
function filter(type){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  if(type==="all") return render(data);
  render(data.filter(i=>i.type===type));
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();
  render(data.filter(i=>i.title.toLowerCase().includes(val)));
});

/* LIKE */
function like(e){
  e.stopPropagation();
  e.target.textContent="💜";
}

/* MODAL */
function openModal(item){
  modal.style.display="flex";
  modalContent.innerHTML=`
    <h2>${item.title}</h2>
    <p>${item.author}</p>
    <p style="margin-top:10px;color:gray;">
      This is a preview of the story.
    </p>
  `;
}

modal.onclick=()=>modal.style.display="none";
</script>

</body>
</html>
