<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Studios Library</title>

<style>
:root{
  --bg:#05080f;
  --card:#0c1424;
  --accent:#6c5cff;
  --text:#eaf0ff;
  --muted:#8b9ab5;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 25px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
  font-weight:900;
  font-size:20px;
}

.logo span{color:var(--accent)}

/* SEARCH */
.search{
  padding:15px 20px;
}

.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:white;
}

/* SECTION */
.section{
  padding:20px;
}

.section h2{
  margin-bottom:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

/* BOOK CARD */
.card{
  background:var(--card);
  border-radius:14px;
  padding:10px;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
}

.cover{
  height:140px;
  border-radius:10px;
  background:linear-gradient(135deg,#222,#000);
}

.title{
  font-size:14px;
  margin-top:8px;
}

.author{
  font-size:12px;
  color:var(--muted);
}

/* CREATE BUTTON */
.createBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:15px 20px;
  border-radius:999px;
  border:none;
  font-weight:900;
  background:linear-gradient(135deg,#6c5cff,#8f7bff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">SS <span>Studios</span></div>
  <div>📚 Library</div>
</nav>

<div class="search">
  <input placeholder="Search books, comics, creators...">
</div>

<section class="section">
  <h2>🔥 Trending</h2>
  <div class="grid">
    <div class="card">
      <div class="cover"></div>
      <div class="title">Midnight School</div>
      <div class="author">by @user1</div>
    </div>

    <div class="card">
      <div class="cover"></div>
      <div class="title">Street Legends</div>
      <div class="author">by @creator</div>
    </div>
  </div>
</section>

<section class="section">
  <h2>🆕 New Drops</h2>
  <div class="grid">
    <div class="card">
      <div class="cover"></div>
      <div class="title">Lost Signals</div>
      <div class="author">by @alex</div>
    </div>
  </div>
</section>

<button class="createBtn">+ Create</button>

</body>
</html>
