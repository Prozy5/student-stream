<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS Films</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#050507;
color:white;
}

/* header */

header{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
padding:16px;
z-index:100;
}

header h1{
margin:0;
font-size:20px;
color:#00ff99;
font-weight:800;
}

#userStatus{
font-size:12px;
opacity:.6;
}

/* controls */

.controls{
display:flex;
gap:10px;
margin-top:10px;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,.08);
color:white;
flex:1;
}

/* hero */

.hero{
height:65vh;
display:flex;
align-items:flex-end;
padding:100px 20px 40px;
background-size:cover;
background-position:center;
}

.heroContent{
max-width:500px;
}

.hero h2{
font-size:42px;
margin:0;
}

.hero button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#00ff99;
font-weight:bold;
cursor:pointer;
}

/* sections */

.section{
padding:20px;
}

.row{
display:flex;
gap:14px;
overflow-x:auto;
}

.row::-webkit-scrollbar{
display:none;
}

/* cards */

.card{
min-width:170px;
height:240px;
border-radius:14px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:scale(1.07);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
}

.overlay h4{
margin:0;
font-size:14px;
}

.meta{
font-size:11px;
opacity:.7;
}

</style>

</head>

<body>

<header>

<div style="display:flex;justify-content:space-between;align-items:center">

<div>
<h1>🎬 SS Films</h1>
<div id="userStatus">Loading...</div>
</div>

<div>
<button id="logoutBtn">Logout</button>
</div>

</div>

<div class="controls">

<input id="searchInput" placeholder="Search films">

<select id="filterSelect">
<option value="all">All</option>
<option value="movie">Movies</option>
<option value="series">Series</option>
<option value="documentary">Documentary</option>
</select>

</div>

</header>

<!-- HERO -->

<section class="hero" id="hero">

<div class="heroContent">

<h2 id="spotlightTitle">Featured Film</h2>
<p id="spotlightDesc"></p>

<button onclick="watchSpotlight()">▶ Watch</button>

</div>

</section>

<!-- CONTINUE WATCHING -->

<section class="section">

<h3>▶ Continue Watching</h3>
<div class="row" id="continueRow"></div>

</section>

<!-- TRENDING -->

<section class="section">

<h3>🔥 Trending</h3>
<div class="row" id="trendingRow"></div>

</section>

<!-- TOP RATED -->

<section class="section">

<h3>⭐ Top Rated</h3>
<div class="row" id="topRow"></div>

</section>

<!-- MOVIES -->

<section class="section">

<h3>🍿 Movies</h3>
<div class="row" id="moviesRow"></div>

</section>

<!-- SERIES -->

<section class="section">

<h3>📺 Series</h3>
<div class="row" id="seriesRow"></div>

</section>

<!-- DOC -->

<section class="section">

<h3>🎥 Documentary</h3>
<div class="row" id="docRow"></div>

</section>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
)

/* elements */

const moviesRow = document.getElementById("moviesRow")
const seriesRow = document.getElementById("seriesRow")
const docRow = document.getElementById("docRow")
const trendingRow = document.getElementById("trendingRow")
const topRow = document.getElementById("topRow")

const hero = document.getElementById("hero")

let spotlight = null
let films = []

/* load films */

async function loadFilms(){

const {data,error} = await supabase
.from("films")
.select("*")
.eq("visibility","public")

if(error){

alert("Error loading films")
console.log(error)
return

}

films = data

renderFilms()

}

/* render */

function renderFilms(){

moviesRow.innerHTML=""
seriesRow.innerHTML=""
docRow.innerHTML=""
trendingRow.innerHTML=""
topRow.innerHTML=""

/* trending */

let trending = [...films]
.sort((a,b)=>b.views-a.views)
.slice(0,8)

trending.forEach(f=>{
trendingRow.appendChild(card(f))
})

/* top rated */

let top = [...films]
.sort((a,b)=>b.rating-a.rating)
.slice(0,8)

top.forEach(f=>{
topRow.appendChild(card(f))
})

/* categories */

films.forEach(f=>{

if(!spotlight && f.featured) spotlight=f

if(f.category==="movie") moviesRow.appendChild(card(f))
if(f.category==="series") seriesRow.appendChild(card(f))
if(f.category==="documentary") docRow.appendChild(card(f))

})

/* hero */

if(spotlight){

document.getElementById("spotlightTitle").innerText=spotlight.title
document.getElementById("spotlightDesc").innerText=spotlight.description

hero.style.background =
`url(${spotlight.thumbnail_url}) center/cover`

}

}

/* card */

function card(f){

let el=document.createElement("div")

el.className="card"

el.innerHTML=`

<img src="${f.thumbnail_url}">

<div class="overlay">

<h4>${f.title}</h4>

<div class="meta">

⭐ ${f.rating || "N/A"}  
👀 ${f.views || 0}

</div>

</div>

`

el.onclick=()=>{

window.location.href=`watch.html?id=${f.id}`

}

return el

}

/* spotlight */

window.watchSpotlight = ()=>{

if(!spotlight) return

window.location.href=`watch.html?id=${spotlight.id}`

}

/* user status */

async function checkUser(){

const {data} = await supabase.auth.getSession()

const status=document.getElementById("userStatus")

if(!data.session){

status.innerText="Guest mode"

return

}

status.innerText="Signed in as "+data.session.user.email

}

checkUser()
loadFilms()

</script>

</body>
</html>
