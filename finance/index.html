<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SS Finance — Treasury</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter;
background:#0a0f1a;
color:white;
padding:40px;
}

h1{font-weight:600;margin-bottom:30px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#111827;
padding:25px;
border-radius:12px;
border:1px solid rgba(255,255,255,.05);
}

.card h2{
font-size:14px;
opacity:.6;
margin-bottom:10px;
}

.card .value{
font-size:26px;
font-weight:700;
}

.section{
margin-top:50px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
text-align:left;
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
font-size:14px;
}

th{opacity:.6}

.status{
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

.completed{background:#064e3b}
.pending{background:#78350f}
.reserved{background:#1e3a8a}
</style>
</head>
<body>

<h1>SS Finance Treasury</h1>

<div class="grid">
<div class="card">
<h2>Master Balance</h2>
<div class="value" id="masterBalance">$0</div>
</div>

<div class="card">
<h2>Available Balance</h2>
<div class="value" id="availableBalance">$0</div>
</div>

<div class="card">
<h2>Reserved Balance</h2>
<div class="value" id="reservedBalance">$0</div>
</div>
</div>

<div class="section">
<h2>Division Summary</h2>
<table>
<thead>
<tr>
<th>Division</th>
<th>Total Flow</th>
<th>Transactions</th>
</tr>
</thead>
<tbody id="divisionTable"></tbody>
</table>
</div>

<div class="section">
<h2>Recent Ledger Activity</h2>
<table>
<thead>
<tr>
<th>Type</th>
<th>Division</th>
<th>Amount</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>
<tbody id="ledgerTable"></tbody>
</table>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://iabzmoxzbqzcqgypxctr.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhYnptb3h6YnF6Y3FneXB4Y3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMDgzNzAsImV4cCI6MjA4MjY4NDM3MH0.mHke56jh8WSlzzQxa7o2PIxqLRk1eyPRZerJ3avuGkQ"
);

const masterEl = document.getElementById("masterBalance");
const availableEl = document.getElementById("availableBalance");
const reservedEl = document.getElementById("reservedBalance");
const divisionTable = document.getElementById("divisionTable");
const ledgerTable = document.getElementById("ledgerTable");

function formatMoney(num){
return "$" + Number(num).toLocaleString(undefined,{minimumFractionDigits:2});
}

async function verifyOwner(){
const { data: { user } } = await supabase.auth.getUser();
if(!user){
alert("Not authenticated.");
window.location.href="/login.html";
return;
}

const { data } = await supabase
.from("profiles")
.select("role")
.eq("id", user.id)
.single();

if(!data || data.role !== "owner"){
alert("Unauthorized.");
document.body.innerHTML = "<h2>Access Denied</h2>";
}
}

async function loadBalances(){
const { data } = await supabase
.from("ss_finance_balances")
.select("*")
.single();

if(!data) return;

masterEl.textContent = formatMoney(data.master_balance);
availableEl.textContent = formatMoney(data.available_balance);
reservedEl.textContent = formatMoney(data.reserved_balance);
}

async function loadDivisionSummary(){
const { data } = await supabase
.from("ss_finance_division_summary")
.select("*");

divisionTable.innerHTML = "";

data?.forEach(d=>{
divisionTable.innerHTML += `
<tr>
<td>${d.division || "General"}</td>
<td>${formatMoney(d.total_flow)}</td>
<td>${d.transaction_count}</td>
</tr>
`;
});
}

async function loadLedger(){
const { data } = await supabase
.from("ss_finance_ledger")
.select("*")
.order("created_at",{ascending:false})
.limit(20);

ledgerTable.innerHTML = "";

data?.forEach(l=>{
ledgerTable.innerHTML += `
<tr>
<td>${l.transaction_type}</td>
<td>${l.division || "-"}</td>
<td>${formatMoney(l.amount)}</td>
<td><span class="status ${l.status}">${l.status}</span></td>
<td>${new Date(l.created_at).toLocaleString()}</td>
</tr>
`;
});
}

async function init(){
await verifyOwner();
await loadBalances();
await loadDivisionSummary();
await loadLedger();
}

init();

// Auto refresh every 30 seconds
setInterval(()=>{
loadBalances();
loadDivisionSummary();
loadLedger();
},30000);
</script>

</body>
</html>
